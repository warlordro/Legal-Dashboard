<!doctype html>
<html lang="ro" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Legal Dashboard — Ghid de utilizare</title>
<meta name="description" content="Ghid simplu de utilizare pentru aplicatia Legal Dashboard — pe intelesul tuturor." />
<style>
/* Fara fonturi externe: documentul functioneaza offline si nu face
   request-uri catre terti. Stack-uri de sistem cu aspect apropiat. */
:root{
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:system-ui,"Segoe UI",Roboto,Arial,sans-serif;
  --maxw:1120px;
  --ease:cubic-bezier(.22,.61,.36,1);

  /* light (default) — warm handbook */
  --bg:#faf6ee;
  --bg-soft:#f3ede0;
  --paper:#ffffff;
  --panel:#fdfbf6;
  --ink:#2c2a25;
  --ink-strong:#181712;
  --muted:#6e695e;
  --muted-2:#9a9484;
  --line:#e7e0d1;
  --line-2:#d8cfba;
  --primary:#157a63;
  --primary-soft:#e3f1ec;
  --primary-ink:#0d5546;
  --warm:#c47a32;
  --warm-soft:#fbeede;
  --shadow:0 18px 40px -26px rgba(60,45,20,.35);
  --shadow-sm:0 4px 14px -8px rgba(60,45,20,.3);
  --hi:#ffe7a8;
}
html[data-theme="dark"]{
  --bg:#14130f;
  --bg-soft:#1b1a15;
  --paper:#1f1d17;
  --panel:#1c1a15;
  --ink:#e9e3d5;
  --ink-strong:#fbf7ec;
  --muted:#a8a08c;
  --muted-2:#7c7563;
  --line:#312e25;
  --line-2:#403c30;
  --primary:#54c9a8;
  --primary-soft:#16322a;
  --primary-ink:#7fdcc0;
  --warm:#e0a25c;
  --warm-soft:#332615;
  --shadow:0 18px 40px -22px rgba(0,0,0,.7);
  --shadow-sm:0 4px 14px -8px rgba(0,0,0,.6);
  --hi:#5a4a1e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);line-height:1.68;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:16.5px}
body::before{content:"";position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(900px 500px at 88% -5%, color-mix(in srgb,var(--primary) 9%,transparent), transparent 60%),
    radial-gradient(700px 500px at 4% 4%, color-mix(in srgb,var(--warm) 8%,transparent), transparent 55%)}
a{color:inherit;text-decoration:none}
::selection{background:var(--hi);color:var(--ink-strong)}
mark{background:var(--hi);color:var(--ink-strong);border-radius:3px;padding:0 2px}

#progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:100;
  background:linear-gradient(90deg,var(--primary),var(--warm));transition:width .12s linear}

/* topbar */
#topbar{position:fixed;top:0;left:0;right:0;z-index:60;height:62px;display:flex;align-items:center;gap:16px;
  padding:0 22px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px}
.brand .mk{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(150deg,var(--primary),var(--primary-ink));box-shadow:var(--shadow-sm)}
.brand .mk svg{width:19px;height:19px}
.brand .bt b{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--ink-strong);display:block;line-height:1.1}
.brand .bt span{font-size:11px;color:var(--muted);letter-spacing:.04em}
.search-wrap{margin-left:auto;position:relative;display:flex;align-items:center;width:min(330px,40vw)}
.search-wrap svg{position:absolute;left:13px;width:16px;height:16px;color:var(--muted-2)}
#search{width:100%;background:var(--paper);border:1.5px solid var(--line-2);color:var(--ink);font-family:inherit;
  font-size:14px;padding:10px 12px 10px 38px;border-radius:12px;outline:none;transition:.2s}
#search:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
#search::placeholder{color:var(--muted-2)}
.ibtn{width:40px;height:40px;border-radius:11px;border:1.5px solid var(--line-2);background:var(--paper);color:var(--muted);
  display:grid;place-items:center;cursor:pointer;transition:.16s;flex:none}
.ibtn:hover{color:var(--primary);border-color:var(--primary)}
.ibtn svg{width:18px;height:18px}

/* layout */
.layout{display:grid;grid-template-columns:248px minmax(0,1fr);max-width:var(--maxw);margin:0 auto;padding-top:62px}
#toc{position:sticky;top:62px;align-self:start;height:calc(100vh - 62px);overflow-y:auto;padding:26px 12px 40px 22px;scrollbar-width:thin}
#toc::-webkit-scrollbar{width:6px}#toc::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
.toc-h{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin:0 0 12px 8px}
.toc-link{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;cursor:pointer;color:var(--muted);
  font-size:14.5px;font-weight:500;transition:.15s;line-height:1.25}
.toc-link .nb{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;font-size:12.5px;font-weight:700;flex:none;
  background:var(--bg-soft);color:var(--muted);font-family:var(--font-display);transition:.15s}
.toc-link:hover{background:var(--panel);color:var(--ink-strong)}
.toc-link.active{background:var(--primary-soft);color:var(--primary-ink);font-weight:600}
.toc-link.active .nb{background:var(--primary);color:#fff}

main{min-width:0;padding:0 34px 120px}
@media(max-width:860px){.layout{grid-template-columns:1fr}#toc{display:none}main{padding:0 20px 80px}}

/* cover */
.cover{padding:60px 4px 26px;border-bottom:1px solid var(--line);margin-bottom:8px}
.cover .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--primary);background:var(--primary-soft);padding:6px 13px;border-radius:999px}
.cover h1{font-family:var(--font-display);font-weight:700;font-size:clamp(40px,6.5vw,66px);line-height:1.02;
  letter-spacing:-.02em;color:var(--ink-strong);margin:20px 0 0}
.cover .sub{font-size:clamp(16px,2.2vw,20px);color:var(--muted);max-width:60ch;margin-top:16px;line-height:1.55}
.howto{display:flex;gap:13px;align-items:flex-start;background:var(--warm-soft);border:1px solid color-mix(in srgb,var(--warm) 30%,var(--line));
  border-radius:16px;padding:16px 18px;margin-top:26px;max-width:70ch}
.howto .hi{font-size:20px;flex:none}
.howto .ht{font-size:14.5px;color:var(--ink)}
.howto .ht b{color:var(--ink-strong)}
.cover .vchip{display:inline-block;margin-top:22px;font-size:12.5px;color:var(--muted);font-weight:500}
.cover .vchip b{color:var(--ink-strong)}

/* toc cards */
.toc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:30px}
.tcard{display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:15px;cursor:pointer;background:var(--paper);
  border:1px solid var(--line);transition:.18s var(--ease);box-shadow:var(--shadow-sm)}
.tcard:hover{transform:translateY(-3px);border-color:var(--primary);box-shadow:var(--shadow)}
.tcard .tn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex:none;background:var(--primary-soft)}
.tcard .tt b{display:block;font-weight:700;color:var(--ink-strong);font-size:14.5px;line-height:1.2}
.tcard .tt span{font-size:12px;color:var(--muted-2);font-weight:500}

/* chapter */
.chapter{padding:46px 0 10px;border-top:1px solid var(--line);scroll-margin-top:78px}
.chapter:first-of-type{border-top:none}
.ch-head{display:flex;align-items:center;gap:17px;margin-bottom:6px}
.ch-num{width:58px;height:58px;border-radius:17px;display:grid;place-items:center;flex:none;position:relative;
  background:linear-gradient(150deg,var(--primary),var(--primary-ink));color:#fff;box-shadow:var(--shadow-sm)}
.ch-num .e{font-size:27px}
.ch-num .n{position:absolute;right:-6px;bottom:-6px;width:24px;height:24px;border-radius:50%;background:var(--warm);color:#fff;
  font-family:var(--font-display);font-weight:700;font-size:12.5px;display:grid;place-items:center;border:2.5px solid var(--bg)}
.ch-title{font-family:var(--font-display);font-weight:700;font-size:clamp(27px,3.8vw,38px);letter-spacing:-.015em;
  color:var(--ink-strong);line-height:1.08}
.ch-intro{font-size:17px;color:var(--muted);max-width:74ch;margin:16px 0 4px;padding-left:75px}
@media(max-width:680px){.ch-intro{padding-left:0}}

/* sections */
.sblock{margin-top:24px}
.sec{background:var(--paper);border:1px solid var(--line);border-radius:17px;padding:20px 22px;margin-bottom:14px;
  box-shadow:var(--shadow-sm)}
.sec h3{font-family:var(--font-display);font-weight:600;font-size:18.5px;color:var(--ink-strong);line-height:1.25;
  display:flex;align-items:center;gap:10px}
.sec h3::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--primary);flex:none}
.sec .desc{font-size:15.5px;color:var(--ink);margin-top:9px;max-width:80ch}
.steps{list-style:none;counter-reset:st;margin:15px 0 2px;padding:0;display:flex;flex-direction:column;gap:9px}
.steps li{counter-increment:st;display:flex;gap:12px;align-items:flex-start;font-size:14.5px;color:var(--ink)}
.steps li::before{content:counter(st);flex:none;width:25px;height:25px;border-radius:50%;background:var(--primary-soft);
  color:var(--primary-ink);font-weight:700;font-size:12.5px;display:grid;place-items:center;margin-top:1px;font-family:var(--font-display)}
.tip{display:flex;gap:11px;align-items:flex-start;background:var(--warm-soft);border-left:3px solid var(--warm);
  border-radius:0 11px 11px 0;padding:11px 15px;margin-top:14px}
.tip .ti{font-size:15px;flex:none}
.tip .tx{font-size:14px;color:var(--ink)}
.tip .tx b{color:var(--warm);font-weight:700}

/* settings box */
.setbox{background:var(--primary-soft);border:1px solid color-mix(in srgb,var(--primary) 22%,var(--line));
  border-radius:17px;padding:18px 20px;margin-top:18px}
.setbox .sh{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--primary-ink);
  display:flex;align-items:center;gap:9px;margin-bottom:12px}
.setrow{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;padding:11px 0;border-top:1px solid color-mix(in srgb,var(--primary) 16%,transparent)}
.setrow:first-of-type{border-top:none;padding-top:2px}
.setrow .sn{font-weight:700;color:var(--ink-strong);font-size:14.5px}
.setrow .sd{font-size:13.5px;color:var(--ink);grid-column:2}
.setrow .sw{font-size:12.5px;color:var(--muted);grid-column:2}
.setrow .sdef{display:inline-block;font-size:11.5px;font-weight:600;color:var(--primary-ink);
  background:color-mix(in srgb,var(--primary) 14%,transparent);padding:1px 8px;border-radius:6px;margin-left:8px}

/* good to know */
.gtk{margin-top:18px}
.gtk .gh{font-size:12.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:11px}
.gtk ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.gtk li{display:flex;gap:11px;align-items:flex-start;font-size:14.5px;color:var(--ink)}
.gtk li svg{flex:none;width:18px;height:18px;color:var(--primary);margin-top:2px}

/* footer */
.foot{max-width:var(--maxw);margin:0 auto;padding:46px 34px 60px;border-top:1px solid var(--line);
  color:var(--muted);font-size:13.5px;text-align:center}
.foot b{color:var(--ink-strong)}

.no-results{display:none;text-align:center;padding:70px 20px;color:var(--muted)}
.no-results.show{display:block}
.no-results .nb{font-family:var(--font-display);font-size:24px;color:var(--ink-strong)}
body.searching .chapter.hide-ch{display:none}
body.searching .sec.hide-s{display:none}
body.searching .cover,body.searching .setbox,body.searching .gtk,body.searching .ch-intro{display:none}

.reveal{opacity:0;transform:translateY(15px)}
.reveal.in{opacity:1;transform:none;transition:opacity .6s var(--ease),transform .6s var(--ease)}

@media print{
  #topbar,#toc,#progress,.ibtn,.search-wrap,.toc-cards{display:none!important}
  body::before{display:none}.layout{display:block;padding-top:0;max-width:none}main{padding:0}
  .reveal{opacity:1!important;transform:none!important}
  .chapter,.sec{page-break-inside:avoid}
  body{background:#fff}
}
</style>
</head>
<body>

<script>
/*GUIDE_DATA_START*/
window.__GUIDE__ = {
  meta:{
    app:"Legal Dashboard",
    version:"v2.42.0",
    date:"Iulie 2026",
    subtitle:"Tot ce-ti trebuie ca sa folosesti aplicatia — explicat pe intelesul tuturor, fara termeni tehnici."
  },
  chapters:[{"key":"dashboard","title":"Tablou de bord","icon":"📊","intro":"Tabloul de bord este pagina de pornire a aplicatiei. Iti arata dintr-o privire ce se intampla cu dosarele tale: cate lucruri urmaresti, ce alerte noi ai si ce ai cautat ultima data. De aici ajungi rapid la orice sectiune.","sections":[{"name":"Vezi situatia pe scurt (cei 4 indicatori)","desc":"Sus pe pagina ai patru casute care iti spun rapid cum stai: cate dosare si nume urmaresti, cate alerte necitite ai (cu cate sunt noi in ultima zi), cate verificari automate s-au facut in ultimele 24 de ore si cat te-a costat asistenta AI in aceeasi perioada. Cifrele se reimprospateaza singure cam la fiecare jumatate de minut, deci nu trebuie sa reincarci pagina.","tip":"Daca o casuta arata un mesaj de eroare sau ramane goala, reincarca pagina dupa cateva secunde."},{"name":"Mergi rapid unde ai nevoie (Actiuni rapide)","desc":"O banda cu sase butoane te duce direct la sectiunile principale, fara sa cauti prin meniu.","steps":["Apasa \"Cauta dosar\" ca sa gasesti un dosar nou.","Apasa \"Vezi termene\" pentru termenele de judecata.","Apasa \"Cauta RNPM\" pentru avize din Registrul de Publicitate Mobiliara.","Apasa \"Monitorizare\" sau \"Vezi alerte\" ca sa urmaresti modificarile.","Apasa \"Export raport\" ca sa salvezi un rezumat al activitatii."]},{"name":"Revezi ultima cautare","desc":"Doua carduri iti reamintesc ce ai cautat ultima data: la dosare vezi cate ai gasit, ce categorii si institutii, dupa ce parte ai cautat; la RNPM vezi cate avize ai gasit, de ce tip si data. Un link \"Vezi dosarele\" sau \"Vezi avizele\" te duce inapoi la rezultate. Aceste carduri raman si dupa ce inchizi si redeschizi aplicatia, iar daca rezultatele nu mai sunt in memorie, cautarea se reface automat cand apesi linkul."},{"name":"Urmareste evolutia in timp (Tendinte)","desc":"Cardul \"Tendinte\" iti arata trei grafice zilnice: cate alerte ai primit, cate verificari automate s-au facut (reusite, cu erori sau oprite) si cat ai cheltuit pe AI. Poti comuta intre ultimele 7 zile si ultimele 30 de zile, iar butonul \"Actualizeaza\" reincarca datele. Daca nu exista date pentru perioada aleasa, vei vedea un mesaj care te anunta."},{"name":"Exporta un raport (Excel sau PDF)","desc":"Poti salva un rezumat al activitatii ca fisier, util pentru arhiva sau pentru un raport intern.","steps":["Apasa \"Export raport\" din actiunile rapide.","Alege perioada: ultimele 7 zile sau ultimele 30 de zile.","Alege formatul: Excel sau PDF.","Confirma, iar fisierul se genereaza cu cifrele si activitatea din perioada aleasa."],"tip":"De fiecare data cand redeschizi fereastra, revine pe 7 zile si Excel; schimba daca ai nevoie de altceva."},{"name":"Afla noutatile si deschide manualul","desc":"Un card jos arata versiunea aplicatiei si un scurt rezumat al functiilor disponibile. De aici apesi \"Vezi Noutati\" ca sa citesti ce s-a schimbat in ultimele versiuni, sau \"Manual\" ca sa deschizi ghidul de utilizare. Manualul poate fi si descarcat ca PDF.","tip":"Inchizi oricare fereastra cu butonul X, cu tasta Escape sau apasand in afara ei."},{"name":"Despre serviciul de cautare a dosarelor","desc":"Un card informativ explica de unde vin datele despre dosare si termene: din serviciul public al Ministerului Justitiei. Pentru ca este public, nu ai nevoie de cont sau parola, iar o cautare poate aduce cel mult 1000 de rezultate o data."}],"settings":[{"name":"Perioada graficelor Tendinte","effect":"Alegi daca graficele arata ultimele 7 zile sau ultimele 30 de zile","where":"In cardul \"Tendinte\", comutatorul 7 zile / 30 zile","default":"7 zile"},{"name":"Perioada raportului exportat","effect":"Stabileste cat de mult inapoi acopera raportul salvat","where":"In fereastra \"Export raport\"","default":"Ultimele 7 zile"},{"name":"Formatul raportului exportat","effect":"Alegi daca primesti un fisier Excel sau un PDF","where":"In fereastra \"Export raport\"","default":"Excel"}],"goodToKnow":["Cifrele de sus se actualizeaza singure cam la fiecare jumatate de minut, deci sunt mereu recente.","Ultima ta cautare ramane salvata si dupa ce inchizi aplicatia.","Pentru cautarea de dosare nu ai nevoie de cont sau parola, datele sunt publice.","O cautare poate aduce cel mult 1000 de rezultate o data."]},{"key":"dosare","title":"Cautare dosare","intro":"Aici cauti dosare in instante, fie la tribunale si judecatorii obisnuite, fie la Inalta Curte (ICCJ), totul din acelasi formular. Vezi rezultatele intr-un tabel pe care il poti filtra, sorta, deschide pentru detalii si exporta in Excel sau PDF.","icon":"🔎","sections":[{"name":"Alege unde cauti: instante obisnuite sau Inalta Curte","desc":"Sus, in formular, ai un buton cu doua jumatati: instantele obisnuite (PortalJust) si Inalta Curte (ICCJ). Apesi pe jumatatea dorita si formularul se adapteaza singur. Pentru instantele obisnuite alegi instanta; pentru Inalta Curte, in locul instantei apare un camp pentru Sectie. Restul cautarii merge la fel.","steps":["Apasa pe \"PortalJust\" pentru tribunale, judecatorii si curti de apel.","Apasa pe \"ICCJ\" pentru dosarele de la Inalta Curte de Casatie si Justitie.","Observa ca, la ICCJ, campul de instanta se transforma in selectorul de Sectie."],"tip":"Dosarele de la Inalta Curte nu apar in cautarea obisnuita, deci foloseste butonul ICCJ daca te intereseaza acolo."},{"name":"Completeaza formularul de cautare","desc":"Ai trei campuri principale: Numar Dosar, Nume Parte si Obiect Dosar. Completezi cel putin unul ca sa pornesti cautarea. Optional poti adauga si un interval de date (de la / pana la). La Inalta Curte poti cauta chiar si numai dupa data.","steps":["Scrie numarul exact al dosarului (ex. 1234/2/2024), sau","numele unei parti (ex. Popescu Ion), sau obiectul dosarului (ex. litigiu proprietate).","Daca vrei, completeaza Data Start si Data Stop pentru o anumita perioada.","Apasa cautarea."],"tip":"Numele se gaseste chiar daca scrii cu sau fara diacritice, iar abrevierile cu puncte (S.R.L., S.A.) sunt potrivite automat."},{"name":"Cauta in mai multe instante deodata","desc":"Cand cauti in instantele obisnuite, poti alege una sau mai multe instante dintr-o lista de 246, grupate pe tipuri (curti de apel, tribunale, judecatorii etc.). Aplicatia le interogheaza pe toate in acelasi timp si iti aduce rezultatele la un loc, fara sa astepti instanta cu instanta. Daca nu alegi nimic, cauta in toate.","steps":["Apasa pe campul de instante ca sa deschizi lista.","Cauta dupa nume, oras sau grup (functioneaza si fara diacritice).","Bifeaza instantele dorite; fiecare alegere apare ca o eticheta.","Foloseste \"Reseteaza\" daca vrei sa stergi selectia."],"tip":"Poti selecta pana la 50 de instante intr-o singura cautare."},{"name":"Filtreaza rezultatele fara o cautare noua","desc":"Dupa ce ai rezultate, le poti ingusta direct, fara sa cauti din nou. Ai filtre rapide pentru Categorie Caz (penal, civil, faliment etc.) si Stadiu Procesual (fond, apel, recurs etc.), plus filtrarea pe instanta si pe data. La Inalta Curte aceste filtre se construiesc din ce a aparut efectiv in rezultate.","steps":["Apasa pe etichetele de Categorie sau Stadiu ca sa pastrezi doar ce te intereseaza.","Apasa din nou pe o eticheta ca sa o dezactivezi.","Combina mai multe filtre ca sa ajungi rapid la dosarele relevante."]},{"name":"Citeste tabelul de rezultate","desc":"Rezultatele apar intr-un tabel cu numarul dosarului, categoria si stadiul (etichete colorate), data, instanta, primele parti si numarul de sedinte. Poti ordona dupa numar, data sau instanta apasand pe capul de coloana. Dosarele de la Inalta Curte au o eticheta ICCJ, iar numarul de dosar este un link care deschide pagina oficiala. Dosarele pe care nu le-ai deschis inca au un punct albastru; cele vizitate primesc o pictograma de ochi.","steps":["Apasa pe \"Numar Dosar\", \"Data\" sau \"Institutie\" ca sa sortezi crescator/descrescator.","Alege cate dosare vezi pe pagina (10, 15, 25, 50 sau 100) si navigheaza intre pagini.","Urmareste punctul albastru ca sa stii ce dosare n-ai deschis inca."],"tip":"Numele cautat e evidentiat cu galben in lista de parti, ca sa-l gasesti din ochi."},{"name":"Deschide un dosar pentru detalii complete","desc":"Apasa pe un rand ca sa il extinzi. Vei vedea data si instanta, categoria si stadiul, obiectul dosarului, lista completa a partilor, istoricul sedintelor (cu data, ora, complet, solutie si documente) si, la Inalta Curte, caile de atac. Tot aici ai si o analiza generata automat si butonul de monitorizare.","steps":["Apasa pe randul dosarului ca sa il deschizi.","Parcurge partile, sedintele si solutiile.","Apasa din nou ca sa il inchizi."]},{"name":"Vezi statisticile cautarii","desc":"Dupa o cautare reusita apare un panou cu un rezumat (total dosare, categorii, stadii, instante) si grafice usor de citit: distributia pe categorii, pe stadii si primele instante. Cand cauti dupa numele unei parti, vezi si in ce calitate apare acea persoana (reclamant, parat, creditor, debitor) si de cate ori. Poti apasa pe un rol ca sa filtrezi tabelul doar la acele dosare.","steps":["Priveste cardurile de sus pentru cifrele-cheie.","Apasa pe un rol din analiza partii ca sa pastrezi doar dosarele cu acel rol.","Foloseste butonul Ascunde/Arata daca vrei sa strangi panoul."]},{"name":"Selecteaza dosare si exporta in Excel sau PDF","desc":"Fiecare rand are o bifa, iar din capul tabelului poti selecta sau deselecta toata pagina. Numarul de dosare alese e afisat, cu optiunea de a deselecta tot. Apasa Excel sau PDF din bara tabelului ca sa salvezi rezultatele. Daca ai bifat ceva, se exporta doar selectia; daca nu, se exporta toate dosarele.","steps":["Bifeaza dosarele dorite (sau bifa din cap ca sa iei toata pagina).","Apasa butonul Excel sau PDF din bara tabelului.","Asteapta indicatorul de pe buton; fisierul se genereaza singur."],"tip":"Vrei toate rezultatele intr-un fisier? Nu bifa nimic si apasa direct pe export."},{"name":"Incarca mai multe rezultate cand sunt prea multe","desc":"Cand o cautare aduce foarte multe dosare si atinge plafonul sursei, apare butonul \"Incarca mai multe\". La instantele obisnuite porneste o cautare extinsa pe ultimii ani, impartita pe luni, cu bara de progres si buton Stop. La Inalta Curte aduce pur si simplu pagina urmatoare de rezultate. In ambele cazuri totalul si eventualele atentionari sunt afisate.","steps":["Apasa \"Incarca mai multe\" cand il vezi sub rezultate.","Urmareste progresul (luna sau pagina curenta).","Apasa Stop oricand vrei sa te opresti."]},{"name":"Monitorizeaza un dosar pentru schimbari","desc":"In dosarul deschis ai butonul \"Monitorizeaza schimbari\". Il adaugi la urmarirea automata, iar aplicatia il verifica periodic singura si te anunta la termene noi, solutii sau cand dosarul nu mai e gasit. Butonul iti arata starea: in lucru, adaugat sau deja monitorizat. Functioneaza si pentru dosarele de la Inalta Curte.","steps":["Deschide dosarul si apasa \"Monitorizeaza schimbari\".","Asteapta confirmarea pe buton.","Vezi alertele si notificarile in modulul de monitorizare."]},{"name":"Reia o cautare sau ia-o de la capat","desc":"Butonul \"Reseteaza\" goleste formularul si rezultatele ca sa incepi o cautare noua. Daca alegi o cautare salvata din istoric, formularul se completeaza singur si cautarea porneste automat.","steps":["Apasa \"Reseteaza\" pentru un formular gol.","Sau alege o cautare din istoric ca sa o rulezi din nou rapid."]}],"settings":[{"name":"Sursa cautarii (instante obisnuite / Inalta Curte)","where":"Butonul de sus din formularul de cautare","effect":"Comuta intre cautarea in instantele obisnuite si cea la Inalta Curte (ICCJ)","default":"Instante obisnuite (PortalJust)"},{"name":"Instante de cautat","where":"Selectorul de instante din formular","effect":"Restrange cautarea la instantele alese; lasat gol cauta in toate","default":"Toate instantele"},{"name":"Sectie (la Inalta Curte)","where":"Lista de Sectie din formular, cand alegi ICCJ","effect":"Limiteaza cautarea la o anumita sectie a Inaltei Curti","default":"Toate sectiile"},{"name":"Filtru Categorie Caz","where":"Etichetele rapide din formular","effect":"Pastreaza doar dosarele din categoriile alese (penal, civil, faliment etc.)","default":"Niciun filtru"},{"name":"Filtru Stadiu Procesual","where":"Etichetele rapide din formular","effect":"Pastreaza doar dosarele dintr-un anumit stadiu (fond, apel, recurs etc.)","default":"Niciun filtru"},{"name":"Interval de date","where":"Campurile Data Start / Data Stop din formular","effect":"Limiteaza rezultatele la perioada aleasa","default":"Gol (fara limita de perioada)"},{"name":"Cate dosare pe pagina","where":"Sub tabelul de rezultate","effect":"Alegi cate dosare vezi pe o pagina (10, 15, 25, 50 sau 100)","default":"15"},{"name":"Ordonarea tabelului","where":"Click pe capul coloanei (Numar, Data, Institutie)","effect":"Sorteaza crescator sau descrescator dupa coloana aleasa","default":"Dupa data, de la cel mai nou"},{"name":"Afisarea panoului de statistici","where":"Butonul Ascunde/Arata din panoul de metrici","effect":"Ascunde sau arata graficele de rezumat","default":"Afisat"}],"goodToKnow":["Din acelasi formular cauti atat in instantele obisnuite, cat si la Inalta Curte, doar schimbi butonul de sursa.","Trebuie sa completezi cel putin un camp (numar, parte sau obiect); la Inalta Curte poti cauta si numai dupa data.","Filtrele pe categorie, stadiu, instanta si data se aplica peste rezultate fara o cautare noua.","Daca nu bifezi niciun dosar, exportul Excel/PDF include toate rezultatele.","Numele si abrevierile se potrivesc indiferent de diacritice sau puncte, deci nu trebuie sa scrii perfect.","Pentru rezultate foarte numeroase, butonul \"Incarca mai multe\" aduce restul treptat si poate fi oprit oricand."]},{"key":"termene","title":"Termene & calendar","icon":"📅","intro":"Aici vezi toate termenele de judecată (sedintele) din dosarele gasite la o cautare, fie sub forma de tabel, fie ca un calendar lunar. Poti vedea rapid ce urmeaza, ce a trecut, ce a primit solutie, si poti exporta totul in Excel sau PDF.","sections":[{"name":"Cauta termenele dintr-un dosar","desc":"Folosesti exact acelasi formular ca la cautarea de dosare, ca sa nu inveti nimic nou. Aplicatia ia dosarele gasite si scoate automat din ele toate sedintele de judecata.","steps":["Completeaza ce stii: numar dosar, nume parte, obiect sau institutie.","Alege sursa: instantele obisnuite (PortalJust) sau Inalta Curte (ICCJ).","Optional, pune un interval de date ca sa restrangi perioada.","Apasa cautare; vei vedea o eticheta care iti spune ca se cauta sedinte."],"tip":"Daca ai cautat ceva recent, aplicatia poate relua singura cautarea de termene cand intri pe pagina, fara sa reintroduci datele."},{"name":"Comuta intre Tabel si Calendar","desc":"Ai doua moduri de a privi aceleasi termene. Tabelul e bun pentru liste si export; calendarul lunar e bun cand vrei sa vezi rapid pe ce zi pici. Comutatorul apare doar cand exista rezultate.","steps":["Sus, in antetul paginii, apasa butonul Tabel sau butonul Calendar.","In calendar, apasa pe o zi ca sa vezi intr-un panou lateral toate termenele acelei zile."]},{"name":"Vezi rapid ce e viitor, trecut sau cu solutie","desc":"Deasupra rezultatelor sunt patru carduri: Total Termene, Viitoare, Trecute si Cu Solutie. Pe langa cifre, ele functioneaza si ca filtre rapide.","steps":["Apasa pe Viitoare, Trecute sau Cu Solutie ca sa pastrezi doar acele termene.","Poti combina filtrele (de ex. Viitoare + Cu Solutie).","Apasa pe Total ca sa anulezi toate filtrele si sa vezi din nou tot."],"tip":"Sub carduri ai si un grafic cu cate termene viitoare cad pe fiecare luna (pana la 8 luni). Il poti ascunde sau arata dupa preferinta."},{"name":"Citeste detaliile unui termen","desc":"Tabelul arata pe scurt: numar dosar, data, ora, institutia, completul si solutia. Termenele viitoare sunt scoase in evidenta cu un fundal usor si un mic indicator verde 'Viitor'.","steps":["Apasa pe un rand ca sa il extinzi.","Vei vedea categoria cazului, stadiul procesual, obiectul, solutia completa cu sumar si lista partilor (numele pe care l-ai cautat e evidentiat).","Pagina se deruleaza automat la detaliul deschis."],"tip":"Dosarele nedeschise inca au un punct albastru care pulseaza; dupa ce le deschizi o data, apare o pictograma de ochi care arata ca le-ai vazut. Marcajul tine pana inchizi aplicatia."},{"name":"Deschide dosarul pe portalul oficial","desc":"Numarul de dosar, atat in tabel cat si in calendar, este un link catre pagina oficiala a sursei: portalul instantelor pentru dosarele obisnuite sau site-ul Inaltei Curti pentru dosarele ICCJ.","steps":["Apasa pe numarul dosarului ca sa se deschida pagina sursei intr-o fereastra noua."]},{"name":"Adauga un dosar la monitorizare automata","desc":"Poti pune un dosar sub urmarire direct din termenele lui, ca sa fii anuntat cand apar schimbari, fara sa il cauti din nou.","steps":["Extinde randul termenului.","Apasa 'Monitorizeaza schimbari'.","Vei vedea un mesaj de confirmare: 'Adaugat la monitorizare' sau 'Deja monitorizat'."]},{"name":"Restrange rezultatele fara o cautare noua","desc":"Pentru dosarele de la instantele obisnuite poti filtra ce e deja afisat dupa interval de date, dupa categoria cazului (Penal, Civil, Contencios, Litigii de munca, Faliment, Litigii cu profesionisti sau Altele) si dupa stadiul procesual. La dosarele ICCJ aceste filtre nu apar, pentru ca termenele vin deja filtrate.","tip":"'Altele' aduna orice categorie care nu se incadreaza in lista cunoscuta."},{"name":"Selecteaza, paginreaza si exporta","desc":"Poti bifa termene individuale sau toata pagina si apoi le exporti in Excel sau PDF. Daca ai bifat ceva, exportul include doar selectia (numarul apare pe buton, de ex. 'Excel (3)'); daca nu ai bifat nimic, exporta toate termenele afisate.","steps":["Bifeaza randurile dorite sau caseta din capul tabelului pentru toata pagina.","Foloseste 'Deselecteaza tot' daca vrei sa pornesti de la zero.","Apasa Excel sau PDF ca sa descarci fisierul.","Schimba cate termene apar pe pagina (10, 20, 50 sau 100) din controlul de paginare."]},{"name":"Aduce toate termenele cand cautarea e foarte mare","desc":"Cand o cautare atinge plafonul maxim de dosare, aplicatia te avertizeaza ca lista de termene poate fi incompleta si iti ofera un buton sa aduci restul.","steps":["Cand apare mesajul, apasa 'Incarca mai multe'.","Vei vedea un progres pe masura ce sosesc termenele si poti opri oricand.","La final pot aparea avertismente daca ceva nu a putut fi adus."],"tip":"La cautarile ICCJ, un mesaj galben te anunta cand sunt prea multe dosare si iti recomanda sa restrangi cautarea pentru rezultate complete."},{"name":"Ce vezi cat timp se incarca sau nu sunt rezultate","desc":"Pagina iti spune mereu in ce stadiu e: un indicator de incarcare cu eticheta potrivita sursei, un panou rosu daca apare o eroare, sau mesajul 'Niciun termen gasit' cand dosarele nu au sedinte."}],"settings":[{"name":"Sursa cautarii","where":"Comutatorul de sursa din formularul de cautare","effect":"Alegi intre instantele obisnuite (PortalJust) si Inalta Curte (ICCJ). Implicit sunt instantele obisnuite.","default":"Instante obisnuite (PortalJust)"},{"name":"Mod de vizualizare","where":"Butoanele Tabel / Calendar din antetul paginii","effect":"Comuta intre lista in tabel si calendarul lunar.","default":"Tabel"},{"name":"Cate termene pe pagina","where":"Controlul de paginare de sub tabel","effect":"Stabilesti cate termene apar pe o pagina: 10, 20, 50 sau 100.","default":"20"},{"name":"Afisare grafic pe luni","where":"Butonul Ascunde / Arata din zona cardurilor de metrici","effect":"Ascunde sau arata graficul cu termenele viitoare distribuite pe luni.","default":"Afisat"},{"name":"Interval de date","where":"Selectorul de date din formularul de cautare","effect":"Limiteaza termenele la perioada aleasa. Implicit e gol, adica fara restrictie de data.","default":"Gol (fara filtru)"}],"goodToKnow":["Termenele se obtin din dosarele gasite la cautare, deci o cautare mai precisa iti da o lista de termene mai curata.","Marcajul vazut/nevazut se reseteaza cand inchizi aplicatia.","La un export poti include pana la 100.000 de termene; peste atat trebuie sa restrangi cautarea.","Calendarul afiseaza puncte sub zilele cu termene, iar cand sunt multe intr-o zi arata direct numarul (de ex. '4 term.')."]},{"key":"ai","title":"Analiza AI a dosarelor","icon":"🤖","intro":"Acest capitol iti arata cum sa ceri aplicatiei sa citeasca un dosar in locul tau si sa ti-l explice pe intelesul tau. Primesti un rezumat clar, in romana, plus posibilitatea de a-l descarca in PDF.","sections":[{"name":"Ce face analiza AI a unui dosar","desc":"Asistentul citeste datele dosarului si iti scrie o explicatie simpla, impartita pe sectiuni: un rezumat, cine sunt partile, unde a ajuns dosarul acum, istoricul sedintelor, ce ar putea urma, temeiul juridic si eventuale legaturi cu alte dosare. Totul e scris pe intelesul cuiva care nu e specialist.","tip":"E gandit sa iti dea o imagine rapida si clara, fara sa rasfoiesti tot dosarul manual."},{"name":"Analiza rapida (un singur asistent)","desc":"Cea mai simpla varianta: un singur asistent AI citeste dosarul si iti da interpretarea lui. E mai rapida si potrivita pentru cele mai multe situatii cand vrei sa intelegi repede despre ce e vorba.","steps":["Deschide dosarul care te intereseaza","Alege asistentul pe care vrei sa il folosesti (sunt mai multe variante disponibile)","Porneste analiza si asteapta cateva momente sa apara textul"]},{"name":"Analiza avansata (mai multi asistenti + un verificator)","desc":"Pentru o opinie mai bine cantarita, doi asistenti diferiti analizeaza acelasi dosar separat, fiecare cu interpretarea lui. Apoi un al treilea asistent, in rol de verificator, le compara, le imbina intr-un singur text unitar si adauga o sectiune aparte care arata unde difereau si cum a decis. E mai lenta (poate dura cateva minute), dar mai temeinica.","steps":["Alege cei doi asistenti care vor analiza dosarul (trebuie sa fie diferiti intre ei)","Alege asistentul-verificator care va imbina cele doua analize","Porneste analiza avansata"],"tip":"Cei doi asistenti nu pot fi identici, exact ca sa obtii doua perspective diferite, nu aceeasi de doua ori."},{"name":"Cum urmaresti progresul analizei avansate","desc":"Pentru ca analiza avansata dureaza mai mult, vei vedea pe ecran trei randuri (cei doi asistenti si verificatorul). Fiecare primeste o bifa pe masura ce isi termina partea, ca sa stii ca lucrul avanseaza si sa nu te uiti la o rotita care se invarte in gol."},{"name":"Compara analizele individuale","desc":"Dupa analiza avansata, sub textul final imbinat poti apasa pe \"Vezi analizele individuale\" ca sa vezi una langa alta ce a scris fiecare dintre cei doi asistenti, inainte de imbinare. Util cand vrei sa intelegi de unde vin diferentele."},{"name":"Descarca analiza in PDF","desc":"Orice analiza, rapida sau avansata, poate fi salvata ca document PDF ingrijit: are antet, o caseta cu datele dosarului, textul analizei si numerotarea paginilor. Bun pentru arhiva, pentru atasat la dosar sau pentru trimis unui coleg.","steps":["Deschide analiza pe care vrei sa o pastrezi","Apasa optiunea de export / descarcare PDF","Salveaza fisierul unde iti convine"]},{"name":"Daca analiza AI nu apare","desc":"Functia de analiza are nevoie de o cheie de acces la asistentul AI, pe care o configurezi o singura data. Daca nu e setata nimic, in locul butoanelor de analiza vei vedea un mesaj discret care iti spune ca analizele devin disponibile dupa ce introduci o cheie in Setari. Functia nu dispare, doar asteapta cheia.","tip":"Cheia se introduce in sectiunea Setari API; dupa aceea panourile de analiza apar din nou."},{"name":"Vezi cat te costa analizele","desc":"Un panou de consum iti arata cat ai cheltuit pe analize in ultimele 24 de ore si in ultimele 30 de zile, cate analize ai facut, un grafic zilnic si costul mediu pe analiza. Te ajuta sa tii sub control cheltuielile, mai ales ca aceste costuri sunt facturate de furnizorul asistentului AI.","tip":"Daca folosesti aplicatia in varianta cu cont (web) si adminul ti-a setat o limita, vei vedea si o bara care arata cat din bugetul tau ai consumat."}],"settings":[{"name":"Cheia pentru asistentul AI","where":"Setari API","effect":"Activeaza analizele AI. Fara ea, butoanele de analiza sunt inlocuite cu un mesaj care iti cere sa o introduci.","default":"necompletata"},{"name":"Asistentul pentru analiza rapida","where":"Panoul de analiza din dosar","effect":"Alegi care asistent AI face analiza rapida (sunt mai multe variante, de la mai simple si ieftine la mai puternice).","default":"o varianta echilibrata, presetata"},{"name":"Cei doi asistenti + verificatorul (analiza avansata)","where":"Panoul de analiza avansata din dosar","effect":"Alegi cei doi asistenti care analizeaza dosarul si asistentul-verificator care le imbina. Cei doi asistenti trebuie sa fie diferiti.","default":"verificatorul se alege dintre variantele puternice"}],"goodToKnow":["Analiza rapida e potrivita pentru majoritatea situatiilor; cea avansata o folosesti cand vrei o opinie mai bine cantarita pe un dosar important.","Analiza avansata poate dura cateva minute, pentru ca lucreaza trei asistenti pe rand.","Costul analizelor e suportat prin cheia ta de acces la AI si e facturat de furnizorul asistentului, asa ca merita sa arunci din cand in cand un ochi pe panoul de consum.","Datele dosarului sunt folosite doar ca informatie de analizat, nu pot da comenzi asistentului, deci analiza ramane pe subiect."]},{"key":"rnpm","title":"Cautare RNPM","icon":"🗃️","intro":"RNPM inseamna Registrul National de Publicitate Mobiliara, evidenta oficiala a ipotecilor si garantiilor pe bunuri mobile (masini, utilaje, conturi, creante). Aici poti cauta avize de garantie dupa o persoana sau o firma, le poti salva intr-o baza proprie pe calculator si le poti studia, filtra si exporta oricand.","sections":[{"name":"Alege tipul de aviz pe care il cauti","desc":"Inainte de cautare alegi una dintre cele 5 categorii de avize din registru: Ipoteca mobiliara, Fiducie, Aviz specific, Creante securitizate si Obligatiuni ipotecare. In functie de categorie, formularul iti arata campurile potrivite (de exemplu Debitor si Creditor la ipoteci, Constituitor si Beneficiar la fiducii, Parte la avize specifice).","steps":["Deschide pagina de cautare RNPM","Apasa pe categoria dorita din partea de sus","Vei vedea campurile specifice acelei categorii"],"tip":"Daca nu stii sigur, incepe cu Ipoteca mobiliara, este cea mai folosita."},{"name":"Cauta dupa o persoana sau o firma","desc":"Pentru fiecare parte (debitor, creditor, etc.) poti comuta intre Persoana Juridica (cauti dupa denumire, CUI, optional numar de la Registrul Comertului) si Persoana Fizica (nume, optional prenume, CNP). Mai poti cauta dupa identificatorul avizului, perioada de inregistrare sau date despre bunul garantat (de exemplu un vehicul: model, serie sasiu, numar de inmatriculare).","steps":["Apasa comutatorul Persoana Juridica / Persoana Fizica","Completeaza campurile cunoscute (nu trebuie completate toate)","Lasa bifate optiunile implicite daca vrei doar avize active","Apasa Cauta"],"tip":"Bifele Numai active si Nemodificate de alte inscrieri sunt activate din start; debifeaza-le doar daca vrei sa vezi si avize vechi sau modificate."},{"name":"Urmareste cautarea si opreste-o oricand","desc":"Dupa ce apesi Cauta, aplicatia trece automat prin pasi pe care ii vezi pe ecran: rezolva codul de verificare, interogheaza registrul, apoi descarca si salveaza rezultatele. Daca s-au gasit multe avize, se incarca intai primele si poti apasa Incarca tot pentru restul. Butonul rosu Stop opreste imediat orice cautare in curs, ca sa nu astepti degeaba.","steps":["Apasa Cauta si urmareste textul de stare","Daca apare Incarca tot, apasa-l ca sa aduci toate rezultatele","Apasa Stop oricand vrei sa opresti"],"tip":"Butonul Reset goleste tot formularul si rezultatele, ca sa incepi o cautare noua de la zero."},{"name":"Cand cautarea este prea larga","desc":"Registrul nu poate returna mai mult de 1500 de rezultate odata. Daca cautarea ta depaseste aceasta limita, aplicatia iti propune sa o imparta automat in mai multe cautari mai mici (cate una pe fiecare tip de inscriere). Inainte sa confirmi, vezi o estimare clara: cate coduri de verificare se vor consuma, costul aproximativ in dolari si cat va dura. Tu decizi daca pornesti sau renunti.","tip":"In timpul impartirii apare un mic indicator de progres jos in dreapta, iar la final un rezumat iti spune cate avize s-au strans si daca a ramas ceva neacoperit."},{"name":"Cauta dintr-o lista mare (Bulk)","desc":"Daca ai o lista intreaga de CUI-uri, CNP-uri sau denumiri de verificat, foloseste tabul Bulk. Lipesti valorile cate una pe rand, alegi categoria si campul de cautare, apoi pornesti. Vezi in timp real starea fiecarui element din lista (in lucru, gata cu X rezultate sau eroare) si un contor general. Toate avizele gasite se salveaza automat.","steps":["Deschide tabul Bulk","Alege categoria si campul de cautare","Lipeste lista (o valoare pe rand)","Apasa Porneste si urmareste progresul"],"tip":"Se proceseaza maxim 200 de valori odata; pentru liste lungi imparte-le in mai multe taburi sau reluari succesive."},{"name":"Baza ta locala de avize","desc":"Toate avizele descarcate se pastreaza pe calculatorul tau, in tabul Baza locala. Aici poti cauta text liber (numar de aviz, contract, CUI, CNP, denumire), filtra dupa categorie, interval de date sau doar avize active, si poti sorta tabelul pe coloane. Rezultatele sunt impartite pe pagini ca sa fie usor de parcurs.","steps":["Deschide tabul Baza locala","Scrie in caseta de cautare sau alege filtrele dorite","Apasa pe capul unei coloane ca sa sortezi"]},{"name":"Vezi toate detaliile unui aviz","desc":"Click pe orice rand deschide fisa completa a avizului, organizata pe sectiuni: date generale (tip, act, date de inregistrare si expirare, stadiu), Creditori, Debitori, Bunuri garantate si Istoricul inscrierilor. Daca ai ajuns aici dintr-o cautare filtrata, termenii cautati sunt evidentiati ca sa-i gasesti rapid.","tip":"La avizele specifice, Creditorii si Debitorii sunt grupati intr-o singura sectiune numita Parti."},{"name":"Sterge, selecteaza si gestioneaza avizele","desc":"Poti bifa unul sau mai multe avize si sterge selectia, sau sterge un aviz individual (cu confirmare). Daca vrei sa golesti complet evidenta, butonul Sterge baza elimina tot dupa o confirmare cu numarul exact. Butonul Compacteaza rescrie fisierul ca sa eliberezi spatiul ramas dupa stergeri.","tip":"In timpul compactarii apare un ecran care iti cere sa nu inchizi aplicatia; asteapta cateva secunde pana se termina."},{"name":"Statistici despre baza ta","desc":"Butonul de informatii deschide o privire de ansamblu: cate avize ai in total (active si inactive), cum sunt distribuite pe cele 5 categorii, cat spatiu ocupa pe disc si unde este salvat fisierul pe calculator (cu optiune de copiere a caii).","tip":"Util cand vrei sa stii rapid cate dosare ai strans sau cat de mare a devenit baza."},{"name":"Export in Excel sau PDF","desc":"Din baza locala poti exporta fie doar avizele selectate, fie tot setul filtrat curent, in Excel sau PDF. Numarul de avize care vor fi exportate este afisat chiar pe buton, iar numele fisierului reflecta categoria cand toate avizele sunt de acelasi tip.","tip":"Un export cuprinde maxim 5000 de avize; pentru seturi mai mari filtreaza si exporta pe bucati."},{"name":"Copii de siguranta (backup) si restaurare","desc":"Aplicatia salveaza automat zilnic o copie a bazei tale. Poti deschide folderul cu copiile, le poti sterge sau poti restaura o copie mai veche dintr-o lista (cu data si dimensiune). Inainte de orice restaurare, baza actuala este salvata din nou, ca sa nu pierzi nimic din greseala.","tip":"Dupa o restaurare se recomanda sa repornesti aplicatia."},{"name":"Codul de verificare (captcha) se rezolva automat","desc":"Registrul cere la fiecare cautare un cod de verificare (captcha). Aplicatia il rezolva automat folosind unul din doi furnizori platiti, 2Captcha sau CapSolver. Tu doar iti configurezi cheia furnizorului o singura data; cheia este pastrata criptat pe calculatorul tau. Poti verifica oricand soldul ramas in cont si primesti mesaje clare in romana daca apare o problema (cheie gresita, sold insuficient).","steps":["Apasa Configureaza in dreapta sus cand ti se cere","Introdu cheia de la 2Captcha sau CapSolver","Optional, apasa Verifica pentru a vedea soldul ramas"],"tip":"Daca pui ambele chei poti alege modul Paralel, in care pornesc ambii furnizori odata si castiga cel mai rapid (mai rapid, dar coste dubla)."}],"goodToKnow":["O cautare costa bani reali: fiecare interogare consuma un cod de verificare platit la furnizorul tau (aproximativ 0,003 dolari la 2Captcha sau 0,0008 dolari la CapSolver).","Avizele gasite raman salvate pe calculatorul tau si le poti consulta oricand, fara sa refaci cautarea.","Daca nu ai configurat o cheie de captcha, cautarea nu porneste si ti se cere intai sa o configurezi.","Butonul Stop si schimbarea tabului opresc o cautare in curs, ca sa nu consumi credit inutil."],"settings":[{"name":"Furnizor captcha activ","where":"Fereastra de configurare a cheilor (Captcha RNPM)","effect":"Alegi care furnizor rezolva codurile de verificare: 2Captcha sau CapSolver","default":"2Captcha"},{"name":"Mod de rezolvare a captchei","where":"Fereastra de configurare a cheilor","effect":"Secvential incearca un furnizor si trece la celalalt daca esueaza; Paralel ii porneste pe ambii odata (mai rapid, cost dublu). Paralel e disponibil doar daca ai introdus ambele chei","default":"Secvential"},{"name":"Cheie 2Captcha","where":"Fereastra de configurare a cheilor","effect":"Cheia contului tau 2Captcha, folosita la rezolvare si la verificarea soldului. Se pastreaza criptata pe calculator","default":"goala"},{"name":"Cheie CapSolver","where":"Fereastra de configurare a cheilor","effect":"Cheia contului tau CapSolver, folosita la rezolvare si la verificarea soldului. Se pastreaza criptata pe calculator","default":"goala"},{"name":"Numai active","where":"Bifa sub formularul de cautare","effect":"Aduce doar avizele aflate inca in vigoare","default":"bifat"},{"name":"Nemodificate de alte inscrieri","where":"Bifa sub formularul de cautare","effect":"Exclude avizele care au fost modificate ulterior de alte inscrieri","default":"bifat"},{"name":"Numar de avize pe pagina (Baza locala)","where":"Sub tabelul din Baza locala","effect":"Cate avize vezi pe o pagina inainte de a trece la urmatoarea","default":"25"}]},{"key":"monitorizare","title":"Monitorizare automata","icon":"📡","intro":"Monitorizarea automata verifica singura, in mod periodic, dosarele si numele pe care le alegi si te anunta cand apar termene noi, solutii sau dosare noi. Practic, aplicatia tine ochii pe portal in locul tau, ca sa nu mai trebuiasca sa cauti manual in fiecare zi.","sections":[{"name":"Adauga un dosar sau un nume la monitorizare","desc":"Pui aplicatia sa urmareasca un dosar anume sau un subiect (o persoana ori o firma). Folosesti un formular cu doua file: 'Nr. Dosar' pentru un numar de dosar si 'Nume' pentru o persoana sau firma. Astfel afli imediat cand apare ceva nou, fara sa mai cauti manual.","steps":["Deschide formularul de adaugare si alege fila potrivita: 'Nr. Dosar' sau 'Nume'.","Completeaza numarul de dosar sau numele persoanei/firmei.","La 'Nume' poti alege optional una sau mai multe instante (daca le lasi goale, se cauta la toate).","Alege cat de des sa verifice aplicatia (la 4, 8, 12 sau 24 de ore).","Adauga, daca vrei, o notita scurta si apasa sa salvezi."],"tip":"Daca nu stii ce instanta sa alegi la o cautare dupa nume, las-o goala: aplicatia va verifica la toate instantele."},{"name":"Ce tipuri de lucruri poti monitoriza","desc":"Poti urmari trei lucruri: un dosar de pe portalul instantelor, un nume (persoana sau firma) pe acelasi portal, si un dosar la Inalta Curte. Fiecare apare in lista cu o eticheta care iti arata sursa, ca sa stii dintr-o privire de unde vine informatia.","tip":"Tipul unei monitorizari nu se mai poate schimba dupa ce ai creat-o. Daca ai gresit, sterge-o si adaug-o din nou cu tipul corect."},{"name":"Adauga mai multe dosare si nume deodata (din fisier)","desc":"Cand ai multe dosare sau nume de adaugat, le poti incarca toate odata dintr-un fisier Excel, in loc sa le introduci unul cate unul. Economisesti mult timp la liste mari de clienti.","steps":["Deschide sectiunea 'Adaugare in masa din fisier'.","Descarca modelul de fisier Excel oferit de aplicatie.","Completeaza in fisier dosarele si/sau numele dorite.","Incarca fisierul inapoi in aplicatie.","Verifica lista de previzualizare, apoi confirma adaugarea."],"tip":"Inainte de confirmare poti scoate manual orice rand care nu vrei sa fie adaugat."},{"name":"Intelege previzualizarea inainte de import","desc":"Dupa ce incarci fisierul, aplicatia iti arata fiecare rand cu un semn de stare, ca sa stii ce intra si ce nu. 'Ok' inseamna valid, 'avertisment' inseamna ca e ceva de verificat (de exemplu un nume care apare de doua ori in fisier sau e prea lung), iar 'respins' inseamna ca randul nu poate fi adaugat (gol, prea scurt, prea lung sau format doar din cifre).","steps":["Filtreaza previzualizarea ca sa vezi doar randurile ok, doar avertismentele sau doar respinsele.","Daca vrei, bifeaza optiunea de a exclude automat toate avertismentele.","Confirma importul cand esti multumit de lista."],"tip":"Randurile marcate 'respins' nu se adauga niciodata, oricat ai incerca; corecteaza-le in fisier si reincarca."},{"name":"Gaseste si filtreaza monitorizarile din lista","desc":"Cand ai multe monitorizari, le poti gasi rapid filtrand pe tip (Toate, Dosare, Nume sau Inalta Curte) sau cautand direct dupa nume ori numar de dosar. Asa ajungi imediat la ce te intereseaza.","tip":"Foloseste filele de sus pentru a vedea separat doar dosarele sau doar numele."},{"name":"Adauga note si regleaza cat de des se verifica","desc":"Pentru fiecare monitorizare poti scrie o notita scurta (de exemplu 'Client X - de sunat') care apare sub dosar sau nume, ca sa-ti amintesti contextul. Tot din lista poti schimba oricand cat de des verifica aplicatia (la 4, 8, 12 sau 24 de ore).","tip":"Daca o monitorizare are un interval de verificare neobisnuit, apare evidentiata cu galben si o poti aduce inapoi la o valoare standard alegand din lista."},{"name":"Pune pe pauza, reia sau opreste totul","desc":"Poti opri temporar o singura monitorizare (cu butonul de pauza), fara sa o stergi, si o reiei oricand. Exista si un buton general care opreste sau reia toata monitorizarea ta dintr-o data, util cand pleci in concediu sau vrei o pauza completa.","tip":"Butonul general nu modifica starea fiecarei monitorizari in parte: cand reiei, totul revine asa cum era inainte."},{"name":"Sterge sau exporta mai multe monitorizari","desc":"Poti bifa mai multe randuri si sa le stergi pe toate odata, sau sa exporti lista de monitorizari in Excel ori PDF, pentru evidenta sau pentru a o trimite mai departe. Daca ai bifat ceva, se exporta doar randurile alese; altfel se exporta tot ce vezi filtrat.","tip":"Foloseste exportul ca sa ai o copie a listei tale de urmariri inainte de o curatenie mare."},{"name":"Verifica acum si urmareste starea fiecarui dosar","desc":"Nu trebuie sa astepti urmatoarea verificare automata: poti cere o verificare imediata pentru o monitorizare anume. Pentru fiecare rand vezi starea (activ sau in pauza, ultima verificare reusita sau cu eroare), cand a fost ultima verificare si cand urmeaza urmatoarea. Ai si un link direct catre portal si un buton care deschide dosarul in pagina de Cautare Dosare.","tip":"La monitorizarile dupa nume cu instante alese, apasa iconita de informatii ca sa vezi exact ce instante sunt urmarite."},{"name":"Alege cand si cum primesti alertele","desc":"Pentru fiecare monitorizare poti decide ce te anunta aplicatia: cand apare un termen nou, cand apare o solutie, cand un dosar dispare de pe portal, si cu cate zile inainte de termen vrei sa fii avertizat. Poti adauga si o adresa de email pe care sa primesti alertele.","tip":"Implicit esti anuntat cu 14, 7, 3 si 1 zi inainte de termen, dar poti schimba aceste valori dupa preferinta."}],"settings":[{"name":"Cat de des se verifica (cadenta)","where":"Lista sau formular de adaugare a unei monitorizari","effect":"Stabileste la cate ore verifica aplicatia automat (4, 8, 12 sau 24 de ore)","default":"4 ore"},{"name":"Instante urmarite (la cautarea dupa nume)","where":"Formularul de adaugare, fila 'Nume'","effect":"Restrange cautarea doar la instantele alese; daca le lasi goale, se cauta la toate","default":"Toate instantele"},{"name":"Notita","where":"Formular de adaugare sau direct pe randul din lista","effect":"Adauga un text scurt de context sub dosar sau nume (pana la 200 de caractere)","default":"Goala"},{"name":"Anuntare la termen nou","where":"Setarile de alerta ale monitorizarii","effect":"Te anunta cand apare un termen nou la dosar","default":"Pornit"},{"name":"Anuntare la solutie","where":"Setarile de alerta ale monitorizarii","effect":"Te anunta cand apare o solutie","default":"Pornit"},{"name":"Anuntare cand dosarul dispare","where":"Setarile de alerta ale monitorizarii","effect":"Te anunta daca dosarul nu mai apare pe portal","default":"Oprit"},{"name":"Cu cate zile inainte de termen esti anuntat","where":"Setarile de alerta ale monitorizarii","effect":"Alegi cu cat timp inainte de termen sa primesti avertizari","default":"14, 7, 3 si 1 zi"},{"name":"Email pentru alerte","where":"Setarile de alerta ale monitorizarii","effect":"Adresa de email pe care primesti notificarile","default":"Neconfigurat (optional)"}],"goodToKnow":["Aplicatia verifica singura, in fundal, la intervalul ales; nu trebuie sa o tii deschisa si sa cauti manual.","Istoricul verificarilor si al alertelor se pastreaza aproximativ 90 de zile, apoi cel vechi se curata automat.","Modulul pentru avize RNPM apare in structura aplicatiei, dar deocamdata nu se verifica automat in cadrul monitorizarii.","Un import dintr-un fisier adauga pana la 100 de nume odata; pentru liste foarte mari incarci fisierul de mai multe ori.","Tabelul monitorizarilor se poate sorta cu un click pe titlul unei coloane; inca un click inverseaza ordinea."]},{"key":"alerte","title":"Alerte & notificari","icon":"🔔","intro":"Alertele sunt locul unde aplicatia iti spune ce s-a schimbat la dosarele tale monitorizate: termen nou, solutie aparuta, dosar nou si altele. Le vezi toate intr-un singur loc si poti alege sa fii anuntat si pe email sau printr-un mesaj pe ecran.","sections":[{"name":"Vezi alertele si afla cate sunt noi","desc":"Pe pagina Alerte gasesti toate noutatile gasite de monitorizare, sub forma de carduri. Alertele necitite sunt evidentiate cu o bara colorata si eticheta 'Nou'; cele pe care le-ai inchis apar sterse, cu eticheta 'Inchisa'. In meniul lateral, langa Alerte, vezi o bulina cu numarul de alerte necitite.","tip":"Nu trebuie sa reincarci pagina: alertele noi apar singure, iar bulina cu numarul de necitite se actualizeaza automat."},{"name":"Gaseste o alerta anume (filtre si cautare)","desc":"Cand ai multe alerte, le poti restrange. Poti filtra dupa tipul monitorizarii (Dosare sau Nume), dupa tipul si importanta evenimentului (Critic, Atentie, Info), dupa un interval de date, sau poti bifa sa vezi doar alertele necitite. In plus, poti cauta dupa numele partii sau numarul dosarului.","steps":["Foloseste casuta de cautare pentru un nume sau un numar de dosar.","Alege din meniurile de filtrare tipul, importanta sau intervalul de date dorit.","Bifeaza 'Doar necitite' daca vrei sa vezi numai noutatile."]},{"name":"Marcheaza alertele ca citite","desc":"Poti marca o alerta ca citita sau o poti readuce la 'necitita'. Cand deschizi un dosar dintr-o alerta, aceasta se marcheaza automat ca citita. Daca vrei sa faci ordine rapid, un buton marcheaza ca citite toate alertele necitite de pe pagina curenta."},{"name":"Inchide alerte pe care nu le mai vrei","desc":"Cand o alerta nu iti mai trebuie, o poti inchide cu butonul 'Inchide' de pe card. Poti inchide si mai multe deodata: bifezi cardurile dorite si apesi 'Inchide selectia', sau inchizi toate alertele care corespund filtrelor active. Inainte de a inchide in masa primesti o confirmare cu numarul exact.","tip":"Inchiderea este definitiva: o alerta inchisa nu mai poate fi redeschisa. Daca vrei sa o regasesti, bifeaza 'Include inchise' in filtre."},{"name":"Citeste notitele si detaliile suplimentare","desc":"Daca monitorizarea care a generat alerta are o notita atasata, aceasta apare in card intr-un bloc galben cu eticheta 'Notita:'. Pe masura ce aplicatia afla mai multe detalii despre un eveniment (de exemplu un rezumat al solutiei sau numarul documentului), cardul se completeaza singur, fara sa fie tratat ca o alerta noua."},{"name":"Exporta alertele in Excel sau PDF","desc":"Poti salva alertele intr-un fisier Excel sau PDF, cu legaturi directe catre dosare pe portalul instantelor. Alegi ce sa exporti: doar alertele bifate, toate cele care corespund filtrelor, sau alertele dintr-un interval de date la alegere.","steps":["Bifeaza alertele dorite sau seteaza filtrele pe care le vrei in export.","Deschide fereastra de export si alege sursa (selectie, filtre sau interval de date).","Alege formatul Excel sau PDF si descarca fisierul."]},{"name":"Primeste alertele pe email","desc":"Pe langa lista din aplicatie, poti primi fiecare alerta noua si pe email. Optional, poti activa si un raport zilnic, trimis dimineata la ora 09:00, cu toate alertele din ziua precedenta. Exista si un buton care trimite un email de test ca sa verifici ca totul functioneaza.","steps":["Mergi in setari, la sectiunea de notificari pe email.","Activeaza 'Activeaza notificarile pe email' si introdu adresa unde vrei sa primesti alertele.","Optional, activeaza 'Trimite raport zilnic la 09:00'.","Apasa butonul de test pentru a confirma ca primesti emailul."],"tip":"Trimiterea pe email functioneaza doar daca a fost configurat in prealabil serverul de email. Daca panoul arata 'SMTP neconfigurat', cere-i administratorului sa il seteze."},{"name":"Primeste mesaje pe ecran (notificari de sistem)","desc":"Pe calculator (Windows sau macOS), alertele noi pot aparea ca un mic mesaj popup atunci cand aplicatia nu este in fata. Un panou de stare iti arata daca aceste notificari sunt Active, Blocate sau Nesuportate si are un buton de test. Daca le opresti, popup-urile nu mai apar, dar lista de alerte si bulina cu necitite raman neschimbate.","tip":"Daca notificarile apar 'Blocate', verifica setarile de notificari ale sistemului de operare pentru aceasta aplicatie."},{"name":"Navigheaza prin pagini","desc":"Lista de alerte este impartita pe pagini. Poti alege cate alerte vrei sa vezi pe o pagina si poti naviga inainte si inapoi cand ai multe alerte."}],"settings":[{"name":"Activeaza notificarile pe email","where":"Setari, sectiunea de email","effect":"Trimite fiecare alerta noua si pe email (necesita o adresa completata)","default":"dezactivat"},{"name":"Adresa email destinatar","where":"Setari, sectiunea de email","effect":"Adresa unde primesti alertele si raportul zilnic","default":"gol"},{"name":"Trimite raport zilnic la 09:00","where":"Setari, sectiunea de email","effect":"Un singur email dimineata, cu toate alertele din ziua precedenta","default":"dezactivat"},{"name":"Trimite notificari sistem pentru alerte noi","where":"Setari, panoul de notificari pe ecran","effect":"Afiseaza un popup pe ecran cand apare o alerta noua si aplicatia nu e in fata","default":"activat"},{"name":"Marime pagina","where":"Bara de navigare de jos a listei de alerte","effect":"Cate alerte se afiseaza pe o pagina","default":"25"},{"name":"Format export","where":"Fereastra de export alerte","effect":"Tipul fisierului salvat: Excel sau PDF","default":"PDF"}],"goodToKnow":["Inchiderea unei alerte este definitiva: o alerta inchisa nu mai poate fi redeschisa, dar o poti regasi bifand 'Include inchise' in filtre.","Raportul zilnic pe email pleaca la 09:00. Pe varianta desktop, aplicatia trebuie sa fie deschisa la acea ora ca sa fie trimis.","Daca opresti popup-urile de pe ecran, nu pierzi nimic: alertele raman in lista si bulina cu necitite continua sa se actualizeze.","Emailul de alerte functioneaza doar dupa ce serverul de email a fost configurat; pana atunci butonul de test este inactiv.","Inchiderea alertelor (individuala sau in grup) cere mereu o confirmare cu numarul exact de alerte afectate, ca sa nu inchizi ceva din greseala."]},{"key":"setari","title":"Setari","icon":"⚙️","intro":"Aici personalizezi aplicatia dupa cum iti place sa lucrezi: cum arata (tema si marimea textului), ce asistent inteligent folosesti si cum tii minte cautarile recente. In versiunea web, toate acestea stau intr-o pagina dedicata Setari, organizata pe taburi; daca esti administrator, tot acolo gasesti si sectiunea de administrare (descrisa in capitolul urmator). Tot ce setezi se pastreaza si data viitoare cand deschizi aplicatia.","sections":[{"name":"Pagina Setari, organizata pe taburi (versiunea web)","desc":"In versiunea web exista o pagina dedicata Setari, impartita pe taburi. Tabul General e pentru toata lumea: aspect, chei si preferinte personale. Daca ai cont de administrator, vezi in plus taburile Utilizatori, Chei API, Cote, Granturi, Consum si Audit — despre ele citesti in capitolul \"Administrare\".","steps":["Deschide Setari din partea de jos a meniului din stanga.","Alege tabul dorit din randul de sus al paginii.","Butonul Inapoi al browserului te scoate din Setari dintr-un pas — nu te plimba prin taburile vizitate."],"tip":"In aplicatia de pe calculator (desktop), configurarea cheilor ramane in fereastra deschisa de butonul cu robot, ca pana acum."},{"name":"Schimba aspectul: tema intunecata sau luminoasa","desc":"Poti alege intre un fundal luminos (Mod Luminos) si unul intunecat, mai odihnitor pentru ochi seara (Mod Inchis). Daca nu alegi nimic, aplicatia preia automat setarea calculatorului tau.","steps":["Uita-te in partea de jos a meniului din stanga.","Apasa butonul cu pictograma de soare sau luna pentru a comuta intre cele doua moduri.","Alegerea ta ramane salvata si la urmatoarea deschidere."]},{"name":"Mareste sau micsoreaza textul","desc":"Reglezi marimea literelor din toata aplicatia pe patru trepte: Mic, Normal, Mare si Extra. Util daca vrei un text mai mare, mai usor de citit.","steps":["In partea de jos a meniului din stanga gasesti controlul de marime text.","Apasa minus sau plus, ori da click direct pe unul dintre cele patru puncte.","Cand meniul e restrans, un singur buton trece pe rand prin cele patru trepte."],"tip":"Treapta implicita este Normal. Treci usor printre ele pana gasesti marimea confortabila."},{"name":"Restrange sau extinde meniul din stanga","desc":"Poti ingusta meniul lateral ca sa ai mai mult spatiu pe ecran. Cand e restrans vezi doar pictograme (cu eticheta la trecerea mouse-ului); cand e extins vezi si textul fiecarui buton.","tip":"Aceasta optiune nu se tine minte: la fiecare repornire meniul porneste extins."},{"name":"Conecteaza asistentul inteligent (Claude, GPT sau Gemini)","desc":"Pentru analiza inteligenta a dosarelor ai nevoie de o cheie de acces de la un furnizor de inteligenta artificiala. Cheia e ca o parola personala care leaga aplicatia de serviciul ales. Introduci cheia o singura data, iar aplicatia o pastreaza in siguranta pe calculatorul tau (criptata, niciodata ca text simplu).","steps":["Apasa butonul cu pictograma de robot din partea de jos a meniului (verde = configurat, gri = inca neconfigurat).","In fereastra care se deschide, lasa selectat modul Native daca vrei sa folosesti direct Claude, GPT sau Gemini.","Lipeste cheia in casuta furnizorului dorit si salveaza. Casutele goale sunt ignorate, asa ca poti completa doar ce iti trebuie.","Cand o cheie e activa, langa ea apare eticheta Activa; o poti sterge oricand cu butonul respectiv."],"tip":"Daca preferi o singura cheie pentru toti asistentii, comuta pe modul OpenRouter si introdu o singura cheie acolo."},{"name":"Configureaza rezolvarea automata a codului de verificare (captcha) pentru RNPM","desc":"Cautarile in Registrul National de Publicitate Mobiliara cer trecerea unui cod de verificare. Aplicatia il poate rezolva automat printr-un serviciu specializat: 2Captcha sau CapSolver. Introduci cheia serviciului ales, la fel ca la asistentul inteligent.","steps":["Deschide aceeasi fereastra de configurare chei (butonul cu robotul).","Alege furnizorul activ apasand 2Captcha sau CapSolver (punctul verde arata ca o cheie este setata).","Lipeste cheia in casuta furnizorului si salveaza."],"tip":"Ca orientare de cost: 2Captcha este in jur de 0,003 dolari pe cod (cu rezolvare umana de rezerva), iar CapSolver in jur de 0,0008 dolari pe cod (rezolvare automata)."},{"name":"Alege cum se rezolva codul de verificare: pe rand sau in paralel","desc":"Decizi strategia de rezolvare a codurilor. Secvential foloseste furnizorul principal si trece la celalalt doar daca primul esueaza. Paralel porneste ambii furnizori in acelasi timp si il pastreaza pe cel mai rapid, dar plateste de doua ori.","tip":"Modul Paralel se poate folosi doar daca ai introdus ambele chei (2Captcha si CapSolver). Implicit este Secvential."},{"name":"Cand cheile sunt administrate central (versiunea web)","desc":"In versiunea web, cheile pentru asistentul inteligent si pentru captcha pot fi puse o singura data de administratorul organizatiei, pentru toata lumea. In acest caz tu nu trebuie sa introduci nimic — totul functioneaza direct. Daca o functie nu e disponibila (de exemplu analiza AI), vei vedea un mesaj discret care iti spune ca serviciul nu e configurat inca: cere administratorului sa adauge cheia.","tip":"Administratorul vede pentru fiecare serviciu daca cheia e Configurata (cu ultimele 4 caractere, ca sa o recunoasca) sau Neconfigurata. Cheia intreaga nu se mai afiseaza niciodata dupa salvare."},{"name":"Acces API pentru programe externe (doar versiunea web)","desc":"Daca cineva din echipa ta vrea sa citeasca dosare, termene sau avize RNPM dintr-un program extern (un script, o integrare), poate primi un \"token de acces\" — o cheie speciala care functioneaza doar pentru citire si doar pentru sectiunile alese. Tokenul se creeaza din Setari, sectiunea Acces API.","steps":["Deschide sectiunea Acces API si apasa pe crearea unui token nou.","Da-i un nume, alege la ce sectiuni are voie (dosare, Inalta Curte, RNPM) si, optional, o data de expirare (30/90/365 zile).","Copiaza imediat codul afisat — se arata O SINGURA DATA, ca o parola.","Cand nu mai ai nevoie de el, revoca-l din lista (individual sau pe toate deodata); efectul e imediat."],"tip":"Trateaza tokenul ca pe o parola. In lista vezi pentru fiecare token cand si de unde a fost folosit ultima data."},{"name":"Foloseste istoricul cautarilor","desc":"Aplicatia tine minte automat ultimele cautari, separat pentru dosare/termene la instante (inclusiv Inalta Curte) si pentru RNPM. Fiecare intrare arata pe scurt ce ai cautat, cate rezultate au iesit si cand. Poti da click pe o intrare ca sa o rulezi din nou, sa stergi una sau sa golesti tot.","tip":"Se pastreaza ultimele 15 cautari de fiecare tip; cele mai vechi dispar automat cand apar altele noi."},{"name":"Cheile tale sunt pastrate in siguranta","desc":"Toate cheile introduse (pentru asistentul inteligent si pentru captcha) sunt criptate cu protectia de securitate a sistemului tau de operare si raman doar pe calculatorul tau. Nu sunt salvate niciodata ca text citibil. Daca sistemul nu poate cripta, aplicatia refuza sa salveze cheia si te anunta, ca sa nu ramana nimic neprotejat."}],"settings":[{"name":"Tema (luminoasa / intunecata)","where":"Butonul cu soare/luna din partea de jos a meniului din stanga","effect":"Schimba aspectul intregii aplicatii intre Mod Luminos si Mod Inchis","default":"Setarea calculatorului tau"},{"name":"Marimea textului","where":"Controlul cu minus/plus si puncte din partea de jos a meniului","effect":"Mareste sau micsoreaza tot textul aplicatiei pe patru trepte (Mic, Normal, Mare, Extra)","default":"Normal"},{"name":"Meniul lateral restrans sau extins","where":"Buton in partea de jos a meniului din stanga","effect":"Afiseaza meniul doar cu pictograme sau cu pictograme plus etichete text","default":"Extins (nu se tine minte intre porniri)"},{"name":"Modul asistentului inteligent (separat sau o singura cheie)","where":"Fereastra Configurare Chei API, sectiunea de sus","effect":"Native = chei separate pentru Claude, GPT si Gemini; OpenRouter = o singura cheie pentru toate","default":"Native"},{"name":"Cheile pentru asistentul inteligent","where":"Fereastra Configurare Chei API (butonul cu robot din meniu)","effect":"Activeaza analiza inteligenta a dosarelor cu furnizorul ales","default":"Necompletat"},{"name":"Furnizorul de captcha activ","where":"Fereastra Configurare Chei API, sectiunea Captcha RNPM","effect":"Alege serviciul folosit pentru rezolvarea automata a codurilor de verificare la cautarile RNPM","default":"2Captcha"},{"name":"Modul de rezolvare a captcha","where":"Fereastra Configurare Chei API, butoanele Secvential / Paralel","effect":"Secvential = pe rand cu rezerva; Paralel = ambii furnizori simultan, mai rapid dar cost dublu","default":"Secvential"},{"name":"Cheile pentru captcha (2Captcha / CapSolver)","where":"Fereastra Configurare Chei API, cardurile 2Captcha si CapSolver","effect":"Permit rezolvarea automata a codurilor de verificare la RNPM","default":"Necompletat"}],"goodToKnow":["Preferintele de aspect (tema si marimea textului) raman salvate si data viitoare cand deschizi aplicatia.","Cheile se introduc o singura data si sunt criptate local pe calculatorul tau; nu pleaca nicaieri si nu sunt vizibile ca text.","La fiecare furnizor poti completa doar cheile de care ai nevoie, restul casutelor pot ramane goale.","Daca aplicatia s-ar bloca pe o sectiune, vei vedea un mic mesaj cu buton de reincercare in loc sa dispara tot ecranul.","Inainte de orice actiune care nu se mai poate anula (stergere, revocare), aplicatia iti cere intotdeauna confirmarea intr-o fereastra clara — nu se mai sterge nimic dintr-un singur click.","Dupa fiecare salvare, stergere sau export primesti un mesaj scurt de confirmare in coltul ecranului: verde inseamna succes, rosu inseamna ca ceva nu a mers si merita reincercat."]},{"key":"administrare","title":"Administrare","icon":"🛡️","intro":"Acest capitol e pentru administratori — persoanele care gestioneaza aplicatia pentru toata echipa, in versiunea web. Din pagina Setari, administratorul adauga utilizatori, stabileste bugete pentru analiza AI si captcha, urmareste consumul fiecaruia si vede un jurnal cu tot ce s-a intamplat important. Daca nu esti administrator, nu vezi aceste taburi — si e in regula: nu ai nevoie de ele ca sa lucrezi.","sections":[{"name":"Cine vede sectiunea de administrare","desc":"Doar conturile cu rol de Administrator, si doar in versiunea web (in aplicatia de pe calculator esti automat singurul utilizator, deci nu e nimic de administrat). Taburile de administrare apar in pagina Setari, langa tabul General.","tip":"Daca un coleg incearca sa deschida o pagina de administrare fara drepturi, vede un mesaj politicos de acces interzis — nimic nu se strica."},{"name":"Adauga un utilizator nou","desc":"Creezi conturi noi direct din aplicatie, fara vreo interventie tehnica: nume, adresa de email si rolul (Utilizator pentru lucru obisnuit, Admin pentru administrare).","steps":["Deschide Setari si alege tabul Utilizatori.","Apasa pe adaugarea unui utilizator nou.","Completeaza numele, emailul si rolul, apoi salveaza.","Persoana se poate conecta imediat cu contul ei Google pe adresa respectiva."],"tip":"Daca emailul a apartinut unui cont sters candva, contul vechi este reactivat (cu acelasi istoric), nu se creeaza unul nou. Emailurile nu tin cont de litere mari sau mici: Ion@firma.ro si ion@firma.ro sunt acelasi cont."},{"name":"Adauga mai multi utilizatori deodata (din Excel)","desc":"Pentru echipe intregi nu completezi formulare pe rand: descarci un model de fisier Excel, il completezi cu cate o persoana pe rand si il incarci inapoi. Aplicatia verifica totul si iti spune exact ce rand are o problema (de exemplu un email duplicat) inainte sa creeze ceva.","steps":["In tabul Utilizatori, alege importul din fisier si descarca modelul de Excel.","Completeaza cate un rand pentru fiecare persoana: nume, email, rol.","Incarca fisierul si citeste previzualizarea: fiecare problema e aratata cu numarul randului si motivul.","Confirma importul cand totul e in regula."],"tip":"Importul e totul-sau-nimic: daca un singur rand e gresit, nu se creeaza niciun cont — corectezi si incarci din nou, ca sa nu ramai cu o lista pe jumatate. Limita este de 500 de persoane per fisier."},{"name":"Roluri si statusuri: cine poate ce","desc":"Fiecare cont are un rol (ce are voie sa faca) si un status (daca are voie sa intre). Rolul Utilizator e pentru lucrul de zi cu zi; rolul Admin vede si sectiunea de administrare. Statusul poate fi Activ (intra normal), Suspendat (temporar blocat) sau Sters (scos din organizatie). Le schimbi direct din lista de utilizatori, cu confirmare.","tip":"Aplicatia nu te lasa sa ramai fara niciun administrator activ si nici sa iti dezactivezi propriul cont — asa nu poti sa te inchizi singur pe dinafara."},{"name":"Stabileste bugete pentru AI si captcha (Cote)","desc":"Plafonezi cat poate cheltui fiecare utilizator: pentru analiza AI o suma in dolari pe zi, pe saptamana sau pe luna (un singur buget acopera si analiza rapida si cea avansata), iar pentru captcha un numar de coduri rezolvate. Cand cineva isi atinge limita, aplicatia il opreste politicos si ii spune sa contacteze administratorul.","steps":["Deschide tabul Cote: vezi din prima toate plafoanele deja setate, pentru toti utilizatorii.","Alege un utilizator din lista ca sa ii setezi sau modifici plafonul.","Alege perioada (zilnic, saptamanal, lunar) si suma; bifa Nelimitat scoate orice plafon."],"tip":"Cine nu are un plafon setat foloseste limita standard a aplicatiei. Poti reveni oricand si ajusta."},{"name":"Ofera buget suplimentar temporar (Granturi)","desc":"Cand cineva are punctual nevoie de mai mult (de exemplu un dosar mare de analizat), ii dai un supliment de buget cu data de expirare si un motiv scurt. Suplimentul se adauga peste limita lui obisnuita si dispare singur la expirare; il poti si revoca oricand, cu efect imediat.","tip":"Nu poti da supliment cuiva care are deja buget nelimitat — nu ar avea niciun efect, iar aplicatia iti explica asta."},{"name":"Urmareste consumul fiecaruia (Consum)","desc":"Tabul Consum arata, pentru fiecare utilizator, cat a cheltuit pe analiza AI azi, saptamana aceasta si in total, plus cate coduri captcha a folosit — si totalul intregii organizatii. Sumele apar in dolari si in euro (la cursul Bancii Centrale Europene). Fiecare rand se poate deschide pentru detalii.","tip":"Cifrele de aici sunt exact cele dupa care aplicatia aplica limitele — nu exista doua contabilitati diferite."},{"name":"Vezi cine a facut ce (Audit) si descarca raport","desc":"Jurnalul de audit tine evidenta actiunilor importante: cine a facut schimbarea, cand, ce anume si daca a reusit. Vezi persoanele dupa adresa de email, poti filtra dupa actiune, persoana sau perioada, si poti descarca un raport Excel pentru intervalul ales.","steps":["Deschide tabul Audit si foloseste filtrele de sus ca sa gasesti ce te intereseaza.","Deschide un rand ca sa vezi detaliile complete ale schimbarii.","Apasa Descarca raport si alege perioada pentru fisierul Excel."],"tip":"Rapoartele foarte mari (peste 10.000 de randuri) sunt refuzate ca sa nu blocheze aplicatia — ingusteaza perioada si incearca din nou."},{"name":"Cheile organizatiei (Chei API)","desc":"In loc ca fiecare coleg sa isi aduca propriile chei, administratorul le introduce o singura data pentru toata organizatia: pentru asistentii inteligenti (Claude, GPT, Gemini sau OpenRouter) si pentru serviciile de captcha (2Captcha, CapSolver). Din acel moment toti utilizatorii folosesc functiile respective fara nicio configurare.","tip":"Dupa salvare, cheia nu se mai afiseaza niciodata intreaga — vezi doar ca e Configurata si ultimele 4 caractere, ca sa stii care e."}],"settings":[{"name":"Rolul utilizatorului","where":"Setari → tabul Utilizatori, pe randul fiecarei persoane","effect":"Utilizator = lucru obisnuit; Admin = vede si administrarea","default":"Utilizator"},{"name":"Statusul utilizatorului","where":"Setari → tabul Utilizatori, pe randul fiecarei persoane","effect":"Activ = intra normal; Suspendat = blocat temporar; Sters = scos din organizatie","default":"Activ"},{"name":"Perioada plafonului de buget","where":"Setari → tabul Cote, la setarea unui plafon","effect":"Fereastra pe care se aplica limita: zilnic, saptamanal sau lunar","default":"Zilnic"},{"name":"Buget nelimitat","where":"Setari → tabul Cote, bifa Nelimitat","effect":"Scoate orice plafon pentru utilizatorul respectiv","default":"Nebifat (se aplica limita standard)"},{"name":"Expirarea suplimentului (grant)","where":"Setari → tabul Granturi, la acordare","effect":"Data dupa care suplimentul dispare singur","default":"Aleasa de tine; cel mult 1 an"}],"goodToKnow":["Orice schimbare facuta de un administrator (rol, status, cota, grant, chei) ramane consemnata in jurnalul de audit, cu autor si moment.","Re-adaugarea unui email care a avut cont sters reactiveaza contul vechi, cu acelasi istoric — nimic nu se pierde.","Toate actiunile care nu se pot anula cer o confirmare explicita inainte.","Tabelele de utilizatori, consum si audit se pot sorta cu un click pe titlul coloanei."]},{"key":"export","title":"Export Excel & PDF","icon":"📤","intro":"Acest capitol iti arata cum salvezi pe calculator rezultatele din aplicatie ca fisiere Excel (pentru tabele pe care le poti edita) sau PD
