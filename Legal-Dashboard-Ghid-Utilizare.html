F (pentru documente gata de tiparit sau de trimis pe email). Poti exporta dosare, termene, avize RNPM, joburi de monitorizare, alerte, raportul de pe pagina principala, analizele AI, manualul aplicatiei si lista de noutati.","sections":[{"name":"Exporta dosare in Excel sau PDF","desc":"Salveaza lista de dosare ca fisier. In Excel primesti doua file: una cu informatiile de baza si una cu toate sedintele, iar numarul fiecarui dosar e legat direct la pagina lui de pe portalul instantei. In PDF primesti un tabel colorat, ordonat pe pagini, gata de tiparit, cu numarul dosarului clicabil.","steps":["Mergi la tabelul de dosare dupa o cautare.","Apasa butonul de export Excel sau PDF de deasupra tabelului.","Fisierul se descarca automat in folderul tau de descarcari."],"tip":"Daca bifezi doar cateva dosare, butonul iti arata cate ai selectat si exporta numai pe acelea; daca nu bifezi nimic, exporta toate rezultatele."},{"name":"Exporta termenele (datele de infatisare)","desc":"Salveaza lista de termene intr-un tabel Excel sau PDF cu numar dosar, data, ora, institutie, complet, solutie si un scurt sumar. Coloanele se potrivesc singure pe latimea textului, iar numarul dosarului ramane clicabil catre pagina instantei.","steps":["Deschide lista de termene.","Apasa export Excel sau PDF.","Deschide fisierul descarcat."]},{"name":"Exporta avize RNPM","desc":"Salveaza avizele RNPM salvate, cu toate detaliile lor. In Excel primesti mai multe file legate intre ele (Avize, Creditori, Parti, Bunuri, Istoric) si poti sari cu un clic de la un aviz la detaliile lui si inapoi. In PDF primesti avizele impreuna cu partile si bunurile, intr-un format gata de tiparit.","tip":"La unele tipuri de cautari, fila Creditori nu mai apare pentru ca nu se aplica. Daca exporti un singur aviz, fisierul poarta identificatorul acelui aviz."},{"name":"Exporta joburile de monitorizare","desc":"Salveaza in Excel sau PDF lista cu ce urmaresti automat: tinta, tipul, cat de des se verifica, cand a rulat ultima oara, cand urmeaza urmatoarea verificare, statusul si notele tale. Pentru joburile pe dosar, tinta e legata direct la pagina instantei.","tip":"Poti exporta doar joburile bifate sau toata lista, la fel ca la dosare."},{"name":"Exporta alertele cu optiuni de selectie","desc":"Pe pagina de alerte poti alege exact ce salvezi: doar alertele bifate, toate alertele care trec de filtrele active, sau alertele dintr-un interval de date ales de tine. Fisierul (Excel sau PDF) include legaturi catre dosarele de pe portalul instantei.","steps":["Pe pagina de alerte apasa butonul de export ca sa deschizi fereastra de export.","Alege sursa: selectia ta, alertele filtrate sau un interval de date.","Daca alegi interval, completeaza data de inceput si data de sfarsit (inceputul trebuie sa fie inainte de sfarsit).","Alege formatul (PDF e implicit) si confirma."],"tip":"Cand alegi un interval de date, exportul include si alertele deja inchise."},{"name":"Exporta raportul de pe pagina principala","desc":"Din actiunile rapide ale dashboard-ului poti salva un rezumat coerent al activitatii: indicatorii din ultimele 24 de ore, activitatea zilnica si cronologia, pentru ultimele 7 sau 30 de zile. In Excel ai trei file (Sumar, Activitate zilnica, Cronologie), in PDF trei tabele.","steps":["Deschide fereastra de export raport din actiunile rapide.","Alege perioada (7 sau 30 de zile) si formatul (Excel sau PDF).","Confirma si descarca."]},{"name":"Exporta analizele AI, manualul si noutatile","desc":"Poti salva ca PDF si alte materiale: analiza AI a unui dosar (simpla sau avansata) cu datele dosarului si textul formatat frumos; manualul complet al aplicatiei cu coperta, cuprins si toate capitolele; sau lista de noutati a aplicatiei cu coperta colorata si modificarile pe versiuni. Toate au numerotare si subsol pe fiecare pagina.","tip":"La analiza AI avansata, PDF-ul mentioneaza si modelul folosit pentru verificarea finala."},{"name":"Bun de stiut despre fisierele exportate","desc":"Fisierele Excel pastreaza diacriticele si protejeaza automat textul ca sa nu fie interpretat gresit ca formula de calcul. Fisierele PDF inlocuiesc diacriticele cu litere simple (fara semne), pentru ca fontul folosit nu le poate afisa corect, altfel ar aparea spatii ciudate. Pentru liste foarte mari aplicatia ramane fluida in timp ce pregateste fisierul.","tip":"Daca ai nevoie de diacritice in document, alege Excel; daca vrei ceva gata de tiparit sau de atasat pe email, alege PDF."}],"settings":[{"name":"Perioada raport (7 sau 30 de zile)","where":"Fereastra Export raport, din actiunile rapide ale paginii principale","effect":"Alege cat din activitate intra in raport: ultimele 7 sau ultimele 30 de zile","default":"7 zile"},{"name":"Format raport (Excel sau PDF)","where":"Fereastra Export raport","effect":"Alege tipul fisierului generat pentru raport","default":"Excel"},{"name":"Sursa alertelor exportate","where":"Fereastra de export de pe pagina de alerte","effect":"Decide ce alerte intra in fisier: doar cele bifate, cele care trec de filtre, sau un interval de date","default":"Cele bifate daca ai o selectie, altfel cele filtrate"},{"name":"Format export alerte (Excel sau PDF)","where":"Fereastra de export de pe pagina de alerte","effect":"Alege tipul fisierului generat pentru alerte","default":"PDF"},{"name":"Interval de date pentru alerte","where":"Fereastra de export de pe pagina de alerte, optiunea cu interval","effect":"Stabileste de la ce data si pana la ce data se exporta alertele (include si alertele inchise)","default":"Gol"},{"name":"Export pe selectie sau pe tot","where":"Butoanele de export din tabelele de dosare, termene si monitorizare","effect":"Daca ai randuri bifate, exporta doar acelea (butonul arata numarul); daca nu, exporta toate rezultatele","default":"Tot, cand nu e nimic bifat"}],"goodToKnow":["Fisierele se descarca automat in folderul tau de descarcari.","Excel e bun cand vrei sa editezi sau sa filtrezi datele tu; PDF e bun cand vrei sa tiparesti sau sa trimiti pe email.","Numarul dosarului din fisiere este de obicei clicabil si te duce direct la pagina lui pe portalul instantei.","Excelul pastreaza diacriticele, iar PDF-ul le inlocuieste cu litere simple."]},{"key":"ghid","title":"Manual, noutati & ajutor","intro":"Aici gasesti tot ce te ajuta sa folosesti aplicatia singur: noutatile fiecarei versiuni si manualul complet de utilizare, ambele putand fi descarcate ca PDF pentru consultare offline sau printare.","icon":"📖","sections":[{"name":"Vezi noutatile aplicatiei","desc":"Lista cu tot ce s-a schimbat de-a lungul timpului: fiecare versiune are o data, un titlu scurt si o explicatie a imbunatatirilor sau corectarilor aduse. Te ajuta sa intelegi rapid ce e nou fata de ultima data cand ai folosit aplicatia.","steps":["Pe pagina principala (Dashboard), apasa butonul \"Vezi Noutati\".","Se deschide o fereastra cu lista versiunilor, cele mai noi sus.","Parcurge cardul fiecarei versiuni pentru a vedea modificarile."]},{"name":"Descarca noutatile ca PDF","desc":"Salveaza intregul istoric de noutati intr-un document PDF colorat, cu o coperta care arata versiunea curenta, cate versiuni sunt documentate si data generarii. Util daca vrei sa pastrezi sau sa printezi lista.","steps":["In fereastra de noutati, apasa \"Export PDF\".","Asteapta cateva momente (butonul afiseaza \"Se genereaza...\").","Documentul se descarca automat pe calculator."],"tip":"Coperta documentului include un cuprins cu primele versiuni, ca sa te orientezi rapid."},{"name":"Citeste manualul de utilizare","desc":"Un ghid complet, organizat pe 15 capitole, care explica fiecare functie a aplicatiei: cautare dosare, termene si calendar, modulul RNPM, export, analiza cu inteligenta artificiala, monitorizare automata, alerte si multe altele. Bun de citit cand nu esti sigur cum functioneaza ceva.","steps":["Pe pagina principala, apasa butonul \"Manual\".","Se deschide ghidul cu toate capitolele.","Parcurge capitolul care te intereseaza."]},{"name":"Sari direct la un capitol din manual","desc":"La inceputul manualului gasesti un \"Cuprins\" cu toate cele 15 capitole. Apasa pe oricare si pagina te duce lin fix la sectiunea aleasa, fara sa derulezi manual.","tip":"Cuprinsul e asezat pe doua coloane, asa ca vezi toate capitolele dintr-o privire."},{"name":"Descarca manualul ca PDF","desc":"Salveaza intregul manual intr-un document PDF cu coperta, cuprins si toate capitolele explicate. Il poti citi offline sau printa pentru a-l avea la indemana.","steps":["Deschide fereastra \"Manual\".","Apasa butonul de descarcare PDF (il gasesti atat sus, in antet, cat si jos, la finalul paginii).","Asteapta scurt si documentul se salveaza pe calculator."]}],"goodToKnow":["Noutatile si manualul se deschid ca ferestre peste pagina principala, nu ca pagini separate, deci te intorci usor la treaba ta.","Documentele PDF folosesc text fara diacritice, ca sa se afiseze corect in orice cititor de PDF.","Pe coperta fiecarui document si in subsolul manualului apare versiunea curenta a aplicatiei, ca sa stii ce versiune ai consultat.","La baza manualului sunt mentionate sursele oficiale de date folosite de aplicatie (portalul instantelor si registrul de publicitate mobiliara)."]}]
};
/*GUIDE_DATA_END*/
</script>
<script>
(function(){
  const G=window.__GUIDE__||{meta:{},chapters:[]};
  const $=(s,r=document)=>r.querySelector(s);
  const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
  const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
  const chs=G.chapters||[];
  chs.forEach((c,i)=>{c._id="ch-"+(c.key||i);c.num=i+1;});

  const main=$("#main");

  /* cover */
  const cover=el("section","cover reveal");
  cover.innerHTML=`
    <span class="eyebrow">Ghid de utilizare</span>
    <h1>${esc(G.meta.app||"Legal Dashboard")}</h1>
    <p class="sub">${esc(G.meta.subtitle||"")}</p>
    <div class="howto"><span class="hi">👋</span><span class="ht">Ghidul are <b>${chs.length} capitole</b>. Foloseste meniul din stanga ca sa sari direct la ce te intereseaza, sau caseta de <b>cautare</b> din dreapta-sus ca sa gasesti rapid o functie. Fiecare capitol e impartit pe sarcini, cu pasi clari.</span></div>
    <div class="vchip">Versiune aplicatie: <b>${esc(G.meta.version||"")}</b> · ${esc(G.meta.date||"")}</div>
    <div class="toc-cards">
      ${chs.map(c=>`<div class="tcard" data-go="${esc(c._id)}"><div class="tn">${esc(c.icon||"📘")}</div>
        <div class="tt"><b>${esc(c.title)}</b><span>${(c.sections?.length||0)} sectiuni</span></div></div>`).join("")}
    </div>`;
  main.appendChild(cover);

  /* chapters */
  const checkIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  chs.forEach(c=>{
    const sec=el("section","chapter reveal");sec.id=c._id;sec.dataset.key=c.key;
    let h=`<div class="ch-head"><div class="ch-num"><span class="e">${esc(c.icon||"📘")}</span><span class="n">${c.num}</span></div>
      <h2 class="ch-title">${esc(c.title)}</h2></div>`;
    if(c.intro)h+=`<p class="ch-intro">${esc(c.intro)}</p>`;
    if(c.sections?.length){
      h+=`<div class="sblock">`+c.sections.map(s=>{
        const txt=(s.name+" "+s.desc+" "+(s.steps||[]).join(" ")+" "+(s.tip||"")).toLowerCase();
        let inner=`<h3>${esc(s.name)}</h3><p class="desc">${esc(s.desc)}</p>`;
        if(s.steps?.length)inner+=`<ol class="steps">${s.steps.map(x=>`<li>${esc(x)}</li>`).join("")}</ol>`;
        if(s.tip)inner+=`<div class="tip"><span class="ti">💡</span><span class="tx"><b>Sfat:</b> ${esc(s.tip)}</span></div>`;
        return `<div class="sec" data-text="${esc(txt)}">${inner}</div>`;
      }).join("")+`</div>`;
    }
    if(c.settings?.length){
      h+=`<div class="setbox"><div class="sh">⚙️ Setari pe care le poti regla</div>`+
        c.settings.map(st=>`<div class="setrow"><div class="sn">${esc(st.name)}${st.default?`<span class="sdef">${esc(st.default)}</span>`:""}</div>
          <div class="sd">${esc(st.effect||"")}</div>${st.where?`<div class="sw">Unde: ${esc(st.where)}</div>`:""}</div>`).join("")+`</div>`;
    }
    if(c.goodToKnow?.length){
      h+=`<div class="gtk"><div class="gh">Bun de stiut</div><ul>${c.goodToKnow.map(g=>`<li>${checkIcon}<span>${esc(g)}</span></li>`).join("")}</ul></div>`;
    }
    sec.innerHTML=h;main.appendChild(sec);
  });

  /* toc */
  const toc=$("#toc");
  toc.appendChild(el("div","toc-h","Cuprins"));
  chs.forEach(c=>{
    const l=el("div","toc-link",`<span class="nb">${c.num}</span><span>${esc(c.title)}</span>`);
    l.dataset.go=c._id;toc.appendChild(l);
  });

  /* nav + clicks */
  document.addEventListener("click",e=>{
    const go=e.target.closest("[data-go]");
    if(go){const t=$("#"+go.dataset.go);if(t)t.scrollIntoView({behavior:"smooth",block:"start"});}
  });
  const links=[...toc.querySelectorAll(".toc-link")];
  const spy=new IntersectionObserver(es=>es.forEach(en=>{if(en.isIntersecting){
    links.forEach(l=>l.classList.remove("active"));
    const a=links.find(l=>l.dataset.go===en.target.id);if(a){a.classList.add("active");a.scrollIntoView({block:"nearest"});}
  }}),{rootMargin:"-42% 0px -52% 0px",threshold:0});
  chs.forEach(c=>{const s=$("#"+c._id);if(s)spy.observe(s);});

  /* reveal */
  const rev=new IntersectionObserver(es=>es.forEach(en=>{if(en.isIntersecting){en.target.classList.add("in");rev.unobserve(en.target);}}),{rootMargin:"0px 0px -6% 0px",threshold:.03});
  document.querySelectorAll(".reveal").forEach(n=>rev.observe(n));

  /* progress */
  addEventListener("scroll",()=>{const h=document.documentElement;$("#progress").style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight||1)*100).toFixed(1)+"%";},{passive:true});

  /* search */
  const search=$("#search"),noRes=$("#noResults");
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  let last="",unmark=()=>{};
  const run=()=>{
    const raw=search.value.trim(),q=norm(raw);
    if(q===last)return;last=q;
    unmark();
    if(!q){document.body.classList.remove("searching");
      document.querySelectorAll(".hide-s,.hide-ch").forEach(n=>n.classList.remove("hide-s","hide-ch"));
      noRes.classList.remove("show");return;}
    document.body.classList.add("searching");let any=false;
    chs.forEach(c=>{const sec=$("#"+c._id);if(!sec)return;let hit=0;
      sec.querySelectorAll(".sec").forEach(s=>{const m=norm(s.dataset.text||"").includes(q);s.classList.toggle("hide-s",!m);if(m)hit++;});
      const tm=norm(c.title).includes(q);const show=hit>0||tm;sec.classList.toggle("hide-ch",!show);if(show)any=true;});
    noRes.classList.toggle("show",!any);
    if(raw){const rx=new RegExp("("+raw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");const tt=[];
      document.querySelectorAll(".chapter:not(.hide-ch) .sec:not(.hide-s) h3, .chapter:not(.hide-ch) .sec:not(.hide-s) .desc").forEach(n=>{
        if(rx.test(n.textContent)){const o=n.innerHTML;n.innerHTML=n.innerHTML.replace(rx,"<mark>$1</mark>");tt.push([n,o]);}});
      unmark=()=>{tt.forEach(([n,o])=>n.innerHTML=o);unmark=()=>{};};}
  };
  let st;search.addEventListener("input",()=>{clearTimeout(st);st=setTimeout(run,110);});
  search.addEventListener("keydown",e=>{if(e.key==="Escape"){search.value="";run();search.blur();}});
  addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement!==search){e.preventDefault();search.focus();}});

  /* theme */
  const root=document.documentElement,tb=$("#themeBtn");
  const saved=localStorage.getItem("ld-guide-theme");if(saved)root.dataset.theme=saved;
  const ico=()=>{const d=root.dataset.theme==="dark";$("#themeIco").innerHTML=d?'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>':'<circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';};
  ico();tb.addEventListener("click",()=>{root.dataset.theme=root.dataset.theme==="dark"?"light":"dark";localStorage.setItem("ld-guide-theme",root.dataset.theme);ico();});

  /* print */
  $("#printBtn").addEventListener("click",()=>{document.querySelectorAll(".reveal").forEach(n=>n.classList.add("in"));print();});

  /* footer */
  $("#foot").innerHTML=`<b>${esc(G.meta.app||"Legal Dashboard")}</b> · Ghid de utilizare · ${esc(G.meta.version||"")}<br>${chs.length} capitole · pentru utilizatori, fara parte tehnica`;
})();
</script>
</body>
