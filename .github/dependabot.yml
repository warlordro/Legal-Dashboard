version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
  # NU adauga un bloc docker pentru /deploy: acolo e doar docker-compose.prod.yml
  # (nume non-standard). Dependabot docker auto-detecteaza doar Dockerfile /
  # docker-compose.yml, deci un entry /deploy esueaza cu dependency_file_not_found.
  # Imaginile din compose sunt SHA-pinned si se bump-uiesc manual.
