version: 2
updates:
  # Pin GitHub Actions on commit SHAs (not version tags) so a compromised tag
  # cannot silently swap in malicious code under us. Dependabot auto-opens a
  # PR every Monday with the new SHA + the changelog of what moved, so we get
  # the security benefit without manual SHA bookkeeping.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  # npm root + workspaces: weekly security/version PRs grouped by ecosystem so
  # the queue does not flood. Major versions still surface as separate PRs.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-runtime:
        patterns:
          - "@anthropic-ai/sdk"
          - "@google/generative-ai"
          - "openai"
          - "@hono/*"
          - "hono"
          - "zod"
      backend-data:
        patterns:
          - "better-sqlite3"
          - "exceljs"
          - "csv-parse"
      frontend-runtime:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "recharts"
      build-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "vitest"
          - "esbuild"
          - "electron"
          - "electron-builder"
    # Block major bumps that need a dedicated upgrade sprint (breaking API
    # changes, ecosystem-wide migrations, or no real benefit for our usage).
    # Minor + patch updates still flow through the groups above. To revisit
    # any of these, remove the entry and run an isolated upgrade with full
    # smoke tests on Electron desktop + web build.
    ignore:
      # build-tooling majors — vite 6/7/8, plugin-react 5/6, typescript 6 all
      # break scripts/build.js (esbuild + vite CLI flags) and tsconfig moduleResolution.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # frontend-runtime majors — react 19 changes lifecycle + StrictMode
      # double-render semantics; react-router 7 is a full router rewrite.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      # backend-runtime majors — @hono/node-server v2 ships perf wins but is
      # a major; pin until we have a perf-regression sweep.
      - dependency-name: "@hono/node-server"
        update-types: ["version-update:semver-major"]
      # backend-data majors — csv-parse 6 changes default `objname` semantics;
      # we don't use that option so the security note is irrelevant for us.
      - dependency-name: "csv-parse"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore"
      include: "scope"
