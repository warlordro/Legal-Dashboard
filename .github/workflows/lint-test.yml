name: Lint + Test (PR gate)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Anuleaza run-urile superseded pe acelasi ref (PR push rapid sau merge consecutiv)
# ca sa nu ardem minute CI pe commits deja invechite.
concurrency:
  group: lint-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: job-ul nu scrie nimic, deci read-only e suficient.
permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # SHA-pinned (convention: aliniat cu build-windows.yml / build-mac.yml).
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Biome lint + format check
        # Gate permanent: orice eroare/warning biome pica PR-ul.
        run: npx biome check

      - name: Backend type-check
        run: npx tsc --noEmit -p backend/tsconfig.json

      - name: Backend tests
        run: npm test --workspace=backend -- --run

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Electron tests
        run: node --test "electron/*.test.cjs"
