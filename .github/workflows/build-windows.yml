name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Type-check + test gate runs BEFORE rebuild:electron so better-sqlite3
      # is still bound to Node's ABI (npm ci prebuild). After rebuild:electron
      # the module flips to Electron's ABI and `vitest` (Node) crashes on load.
      - name: Backend type-check
        run: npx tsc --noEmit -p backend/tsconfig.json

      - name: Backend tests
        run: npm test --workspace=backend -- --run

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Rebuild native modules for Electron ABI
        # Wraps @electron/rebuild and only targets modules valid on this platform
        # (better-sqlite3 + windows-notification-state on Windows). Skips
        # macos-notification-state which is in node_modules but does not compile
        # on Win32. Pairs with --config.npmRebuild=false in the next step so
        # electron-builder does not try to rebuild everything itself.
        run: npm run rebuild:electron

      - name: Build app (backend + frontend)
        run: npm run build

      - name: Package Windows (NSIS installer, x64, unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish never --config.npmRebuild=false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        continue-on-error: true
        with:
          # Artifact name includes ref (tag like v2.10.7 or branch name on
          # workflow_dispatch) + run_id to keep concurrent / re-run uploads
          # distinguishable. Avoids the legacy fixed `legal-dashboard-windows`
          # which silently overwrote prior runs in the same retention window.
          name: legal-dashboard-windows-${{ github.ref_name }}-run${{ github.run_id }}
          path: |
            release/*.exe
            release/*.exe.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish installer to dev-build prerelease
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev-build
          name: "Dev build (Windows)"
          body: |
            Unsigned Windows NSIS installer produced by workflow_dispatch.
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release/*.exe
            release/*.exe.blockmap
          draft: false
          prerelease: true

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
          draft: false
          prerelease: false
