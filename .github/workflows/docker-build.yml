name: Docker Image Build
run-name: Docker Image ${{ github.ref_name || github.sha }}

# Verifies the Dockerfile keeps building after changes to Dockerfile, build
# scripts, lockfile or backend code. The image is built fresh on every run
# (no registry push) and smoke-tested by invoking node inside the runtime
# stage to confirm that the image is at least bootable.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/build.js'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/build.js'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # Dockerfile expects dist-backend/ + dist-frontend/ to be present in the
      # build context (see comments at the top of the Dockerfile). Build them
      # locally before invoking docker build.
      - name: Install dependencies
        run: npm ci

      # v2.10.1 #5: gate merges on backend test suite. Local Electron dev
      # rebuilds better-sqlite3 against Electron's ABI, so `npm test` cannot
      # run on the dev box without `npm run rebuild:electron` first. CI runs
      # against a clean Node 22 install, so the better-sqlite3 prebuild is
      # ABI-correct here — this is the only place the suite reliably runs.
      - name: Backend type-check
        run: npx tsc --noEmit -p backend/tsconfig.json

      - name: Backend tests
        run: npm test --workspace=backend -- --run

      - name: Build (backend CJS + frontend static)
        run: npm run build

      - name: Build Docker image
        run: docker build -t legal-dashboard:ci .

      - name: Smoke test — node available in image
        run: docker run --rm legal-dashboard:ci node -e "console.log('node', process.version)"

      - name: Smoke test — /health responds (max 60s)
        run: |
          # HOST=0.0.0.0 + LEGAL_DASHBOARD_ALLOW_REMOTE=1 are required for the
          # container's port 3002 to actually be reachable from the host: the
          # default loopback bind in backend/src/index.ts is host-isolated when
          # running inside Docker (container loopback != host loopback), so
          # `-p 3002:3002` only works once the process listens on a non-loopback
          # interface. The security guard refuses non-loopback HOST without the
          # explicit ALLOW_REMOTE opt-in — it's the same gate users hit when
          # exposing the LAN port at home.
          # v2.6.4 (F2) adds a fail-closed gate: ALLOW_REMOTE=1 also requires
          # ACK_NO_AUTH=i-understand-no-auth-yet.
          # v2.7.0 PR-9 strengthens the gate: ALLOW_REMOTE=1 (or non-loopback HOST)
          # now also requires LEGAL_DASHBOARD_AUTH_MODE=web + a valid JWT secret
          # (>=32 chars) + JWT_ISSUER + JWT_AUDIENCE. Desktop noop mode is no
          # longer allowed when binding to a remote interface. We use deterministic
          # CI-only values; they never authenticate a real request because the
          # smoke test only hits /health (public, no auth required).
          docker run -d --name ld-ci -p 3002:3002 \
            -e HOST=0.0.0.0 \
            -e LEGAL_DASHBOARD_ALLOW_REMOTE=1 \
            -e LEGAL_DASHBOARD_ACK_NO_AUTH=i-understand-no-auth-yet \
            -e LEGAL_DASHBOARD_AUTH_MODE=web \
            -e LEGAL_DASHBOARD_JWT_SECRET=ci-only-test-secret-32-chars-minimum-do-not-use-in-prod \
            -e LEGAL_DASHBOARD_JWT_ISSUER=legal-dashboard-ci \
            -e LEGAL_DASHBOARD_JWT_AUDIENCE=legal-dashboard-ci \
            legal-dashboard:ci
          # Poll /health every 2s for 60s. start-period=120s keeps healthcheck
          # green during prewarm, but the endpoint itself flips to 200 as soon
          # as `serve()` fires `listening` — usually under 10s on a fresh DB.
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -w '%{http_code}' http://127.0.0.1:3002/health || echo "000")
            if [ "$code" = "200" ]; then
              echo "ready after ${i} polls (~$((i*2))s)"
              cat /tmp/health.json
              docker stop ld-ci >/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "::error::/health did not return 200 within 60s"
          docker logs ld-ci || true
          docker stop ld-ci >/dev/null || true
          exit 1

      - name: Login to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker tag legal-dashboard:ci "$image:${GITHUB_REF_NAME}"
          docker tag legal-dashboard:ci "$image:latest"
          docker push "$image:${GITHUB_REF_NAME}"
          docker push "$image:latest"
