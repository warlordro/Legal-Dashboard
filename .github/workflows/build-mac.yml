name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app (backend + frontend)
        run: npm run build

      - name: Package macOS (dmg, x64 + arm64, unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legal-dashboard-mac
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Attach DMGs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.dmg.blockmap
          draft: false
          prerelease: false
