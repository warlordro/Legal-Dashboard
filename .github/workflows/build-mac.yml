name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Type-check + test gate runs BEFORE electron-builder so better-sqlite3
      # is still bound to Node's ABI (npm ci prebuild). electron-builder's
      # internal npmRebuild then flips it to Electron's ABI for packaging.
      - name: Backend type-check
        run: npx tsc --noEmit -p backend/tsconfig.json

      - name: Backend tests
        run: npm test --workspace=backend -- --run

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build app (backend + frontend)
        run: npm run build

      - name: Package macOS (dmg, x64 + arm64, unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --x64 --arm64 --publish never

      # Branch names like `feature/foo` contain `/`, which is rejected by
      # actions/upload-artifact since v4 (treated as path separator). Replace
      # `/` with `-` so workflow_dispatch on feature branches still produces
      # a usable artifact instead of silently failing the upload.
      - name: Sanitize ref name for artifact
        shell: bash
        run: echo "SAFE_REF=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v7
        with:
          # SAFE_REF (slash-sanitized ref) + run_id keep concurrent / re-run
          # uploads distinguishable. Avoids the legacy fixed
          # `legal-dashboard-mac` which silently overwrote prior runs.
          # No `continue-on-error: true` — if upload fails the workflow MUST
          # fail loudly rather than publish a green build with no artifact.
          name: legal-dashboard-mac-${{ env.SAFE_REF }}-run${{ github.run_id }}
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish DMGs to dev-build prerelease
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev-build
          name: "Dev build (macOS)"
          body: |
            Unsigned macOS build produced by workflow_dispatch.
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release/*.dmg
            release/*.dmg.blockmap
          draft: false
          prerelease: true

      - name: Attach DMGs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.dmg
            release/*.dmg.blockmap
          draft: false
          prerelease: false
