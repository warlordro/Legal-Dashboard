name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app (backend + frontend)
        run: npm run build

      - name: Package macOS (dmg, x64 + arm64, unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: legal-dashboard-mac
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish DMGs to dev-build prerelease
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: "Dev build (macOS)"
          body: |
            Unsigned macOS build produced by workflow_dispatch.
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release/*.dmg
            release/*.dmg.blockmap
          draft: false
          prerelease: true

      - name: Attach DMGs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.dmg.blockmap
          draft: false
          prerelease: false
