# Legal Dashboard — server deployment stack (v2.31.0+)
#
# Layout:
#   internet → caddy (80/443, TLS via Let's Encrypt) → oauth2-proxy (4180)
#     → backend (3002, expose only — NEVER ports)
#
# Backend is bind-loopback inside the container network: only oauth2-proxy can
# reach it. oauth2-proxy verifies the Google OAuth session, then forwards the
# request upstream with `Authorization: Basic base64(<user>:<shared secret>)`
# (via `basic-auth-password` + `pass-basic-auth`) and `X-Forwarded-Email` (via
# `pass-user-headers`). Backend reads them EXCLUSIVELY on POST
# /api/v1/auth/oauth2/sync (the bridge endpoint) which mints the native HS256
# JWT and sets the session cookie.
#
# v2.40.1 NOTE — why Basic Auth + X-Forwarded-Email: the original design used
# `OAUTH2_PROXY_INJECT_REQUEST_HEADERS` (exists ONLY in alpha config, silently
# ignored as an env var) and `X-Auth-Request-Email` (a RESPONSE header for
# nginx auth_request mode, never sent upstream). Neither ever reached the
# backend, so the bridge always denied. This stack now uses the mechanisms
# oauth2-proxy actually implements in legacy config.
#
# Start: docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d
# Stop:  docker compose -f deploy/docker-compose.prod.yml down
# Logs:  docker compose -f deploy/docker-compose.prod.yml logs -f caddy oauth2-proxy backend

services:
  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - oauth2-proxy
    networks:
      - ld_net

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1-alpine@sha256:36b46309c74e368e4b894314f5c69723c73728d60f66b777c13a40686a1364f7
    restart: unless-stopped
    expose:
      - "4180"
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_DOMAINS: ${DOMAIN}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_EXPIRE: 168h
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: http://backend:3002/
      OAUTH2_PROXY_REDIRECT_URL: https://${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${DOMAIN}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${OAUTH2_PROXY_EMAIL_DOMAINS}
      # WARNING: keep PASS_AUTHORIZATION_HEADER=false while PASS_BASIC_AUTH is
      # on. Enabling both makes oauth2-proxy emit two Authorization values
      # upstream (Bearer id-token + Basic) — merged/duplicated headers break the
      # bridge's `Basic` parsing and would leak the Google id-token backend-side.
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "false"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      # `pass-user-headers` sends X-Forwarded-User/Email/Preferred-Username on
      # EVERY upstream request; only the bridge endpoint reads X-Forwarded-Email
      # (after validating the shared secret), all other routes ignore it.
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "false"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "GET=^/health$$"
      # Shared secret to upstream as `Authorization: Basic base64(<user>:<secret>)`
      # on every proxied request. The backend bridge validates the password part
      # timing-safe; authProvider only parses `Bearer`, so the Basic header is
      # inert on all other routes.
      OAUTH2_PROXY_PASS_BASIC_AUTH: "true"
      OAUTH2_PROXY_BASIC_AUTH_PASSWORD: "${PROXY_BRIDGE_SECRET}"
    depends_on:
      - backend
    networks:
      - ld_net

  backend:
    # Build the image from the repository root: docker compose -f deploy/docker-compose.prod.yml build
    # (in CI/CD register the digest of legal-dashboard:VERSION instead of building inline.)
    build:
      context: ..
      dockerfile: Dockerfile
    image: legal-dashboard:${APP_VERSION:-2.40.1}
    restart: unless-stopped
    expose:
      # IMPORTANT: NEVER replace with `ports:` — backend must remain reachable
      # only from the oauth2-proxy via the internal docker network. Direct
      # exposure bypasses the OAuth gate entirely.
      - "3002"
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      LEGAL_DASHBOARD_PORT: 3002
      LEGAL_DASHBOARD_AUTH_MODE: web
      LEGAL_DASHBOARD_ALLOW_REMOTE: "1"
      LEGAL_DASHBOARD_JWT_SECRET: ${JWT_SECRET}
      LEGAL_DASHBOARD_JWT_ISSUER: ${JWT_ISSUER:-legal-dashboard-prod}
      LEGAL_DASHBOARD_JWT_AUDIENCE: ${JWT_AUDIENCE:-legal-dashboard-prod}
      LEGAL_DASHBOARD_JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      LEGAL_DASHBOARD_OAUTH2_PROXY_SECRET: ${PROXY_BRIDGE_SECRET}
      LEGAL_DASHBOARD_TRUSTED_PROXY_CIDR: ${LEGAL_DASHBOARD_TRUSTED_PROXY_CIDR:-172.16.0.0/12}
      TENANT_KEY_ENCRYPTION_SECRET: ${TENANT_KEY_SECRET}
      LEGAL_DASHBOARD_DB_PATH: /data/legal-dashboard.db
      MONITORING_DISABLED_KINDS: ${MONITORING_DISABLED_KINDS:-}
      RNPM_RUNTIME_VALIDATION_DISABLED: ${RNPM_RUNTIME_VALIDATION_DISABLED:-}
      FX_PLAUSIBLE_EUR_USD_MIN: ${FX_PLAUSIBLE_EUR_USD_MIN:-}
      FX_PLAUSIBLE_EUR_USD_MAX: ${FX_PLAUSIBLE_EUR_USD_MAX:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
    volumes:
      - ld_data:/data
    networks:
      - ld_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
  ld_data:

networks:
  ld_net:
    driver: bridge
