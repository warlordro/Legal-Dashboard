verificarii arata 'Verific permisiunile...', iar pentru non-admini afiseaza un ecran '403 — Acces interzis' in loc de pagina goala.","how":"Componenta citeste useCurrentUser(); daca user.role !== 'admin' randeaza placeholder-ul 403. Este doar UX — verificarea autoritativa e requireRole('admin') pe fiecare ruta API.","citations":["frontend/src/components/AdminGate.tsx:9","frontend/src/components/AdminGate.tsx:20","backend/src/routes/admin.ts:174"]},{"name":"Pagina Setari pe taburi (v2.42.0)","what":"Toata suita admin e accesibila din pagina unica /setari, pe taburi gate-uite pe rol: General (tema, font, chei personale) pentru toti; Utilizatori, Chei API, Cote, Granturi, Consum si Audit doar pentru admin. Tabul activ sta in query-ul ?tab=; un non-admin care aterizeaza pe un tab admin din URL cade pe General.","how":"TABS cu flag adminOnly filtrat pe rolul curent; setSearchParams cu replace:true (schimbarea tabului nu adauga intrari in istoricul browserului — Back iese din Setari). Taburile admin refolosesc paginile /admin/* cu prop embedded, montate on-demand (doar tabul activ exista in DOM), impachetate in AdminGate. useCurrentUser e rescris ca store partajat cu useSyncExternalStore — toate componentele vad acelasi snapshot de rol.","citations":["frontend/src/pages/Settings.tsx:26","frontend/src/pages/Settings.tsx:51","frontend/src/pages/Settings.tsx:57","frontend/src/hooks/useCurrentUser.ts:95","frontend/src/App.tsx:237"]},{"name":"Lista utilizatori cu filtre si paginare","what":"Tabel cu toti utilizatorii: email, nume afisat, rol, status, ultimul login, data crearii. Filtrare dupa text (email/nume), rol si status, plus paginare si buton Refresh.","how":"GET /api/v1/admin/users cu query validat Zod (page, pageSize, search, role, status). Frontend foloseste PAGE_SIZE=20; resetare automata la pagina 1 cand se schimba filtrele.","citations":["frontend/src/pages/admin/Users.tsx:59","frontend/src/pages/admin/Users.tsx:13","backend/src/routes/admin.ts:178","backend/src/routes/admin.ts:63"]},{"name":"Provisionare utilizatori din UI (v2.42.0)","what":"Adminul creeaza conturi individual, cu nume, email si rol (roluri creabile din UI: doar Utilizator si Admin). Emailul este canonicalizat printr-un UNIC normalizator (acelasi la creare, import, seed si bridge oauth2), iar migratia 0040 adauga un index unic case-insensitive (NOCASE) pe email. Re-adaugarea emailului unui cont STERS nu mai e blocata: randul existent este REACTIVAT (acelasi id, nume/rol din input, password_hash curatat, audit reactivated:true); conturile active/suspendate raman duplicate refuzate.","how":"POST /api/v1/admin/users cu email validat Zod si transformat prin canonicalizeEmail; reactivateDeletedUser in userRepository. Guard-ul last-admin numara doar adminii ACTIVI — un admin suspendat nu mai conteaza ca fallback.","citations":["backend/src/routes/admin.ts:255","backend/src/db/userRepository.ts:22","backend/src/db/userRepository.ts:253","backend/src/db/migrations/0040_users_email_unique.up.sql:1"]},{"name":"Import utilizatori in masa (XLSX)","what":"Adminul descarca un template XLSX generat server-side, il completeaza si il incarca; parsarea e integral server-side: header exact, aliasuri de rol acceptate, dedup in interiorul fisierului, duplicatele din DB raportate per rand cu motivul. Limite: 500 randuri / 512KB. Insert-ul e tranzactional totul-sau-nimic; randurile care corespund unor conturi sterse sunt reactivate in aceeasi tranzactie.","how":"GET /api/v1/admin/users/import-template + POST /api/v1/admin/users/import; createUsersBulk in userRepository primeste si lista de reactivations si ruleaza totul intr-o singura tranzactie SQLite.","citations":["backend/src/routes/admin.ts:328","backend/src/routes/admin.ts:346","backend/src/db/userRepository.ts:270"]},{"name":"Schimbare rol utilizator","what":"Dropdown per rand pentru a schimba rolul intre Utilizator, Admin, Suport, Read-only, cu dialog de confirmare. Daca adminul isi schimba propriul rol, sidebar-ul se reimprospata.","how":"PATCH /api/v1/admin/users/:id/role. Guardrail server-side: refuza demotarea daca ar ramane zero admini ACTIVI (409 last_admin, audit admin.users.demote_blocked) — din v2.42.0 un admin suspendat nu mai conteaza ca fallback. UI ascunde si optiunea de auto-demotare ca nicety.","citations":["frontend/src/pages/admin/Users.tsx:98","backend/src/routes/admin.ts:214","backend/src/routes/admin.ts:231"]},{"name":"Schimbare status utilizator (activare/suspendare/stergere)","what":"Dropdown per rand pentru status: Activ, Suspendat, Sters, cu confirmare. Un admin nu isi poate dezactiva propriul cont.","how":"PATCH /api/v1/admin/users/:id/status. Guardrail: daca id === self si status != active -> 409 self_deactivation, audit admin.users.deactivate_blocked. Utilizatorii non-active esueaza si la requireRole (fail-closed).","citations":["frontend/src/pages/admin/Users.tsx:134","backend/src/routes/admin.ts:256","backend/src/routes/admin.ts:272","backend/src/middleware/requireRole.ts:39"]},{"name":"Jurnal de audit (Audit log)","what":"Vizualizare cronologica a actiunilor administrative si de securitate: cand, actiune, rezultat (OK/Refuzat/Eroare), owner, actor, tinta, IP. Din v2.42.0 owner-ul si actorul sunt afisati cu EMAILUL lor (ID-ul brut ramane in title; fallback la ID sau \"system\"). Fiecare rand se poate extinde pentru detalii JSON (diff before/after), Event ID si User-Agent.","how":"GET /api/v1/admin/audit. Citirile nu sunt auditate (zgomot), doar scrierile. Backend inregistreaza totusi 'audit.viewed' cand filtrele sunt 'tintite' (actor/target/since/until/actionLike/requestId).","citations":["frontend/src/pages/admin/Audit.tsx:47","backend/src/routes/admin.ts:293","backend/src/routes/admin.ts:668","backend/src/routes/admin.ts:9"]},{"name":"Filtrare audit avansata","what":"Filtre pentru audit: actiune (substring/prefix prin actionLike), Owner ID, Actor ID, tip tinta, rezultat, interval de date, plus buton Reseteaza. Din v2.42.0 filtrele text au debounce cu flush imediat pe Reseteaza, resetarea paginii se face inline (fara efect suplimentar), iar cererile concurente sunt protejate cu AbortController + guards si refreshTick. Paginarea e completa: 25-200 randuri per pagina.","how":"Frontend trimite actionLike (nu action exact) pentru cautari partiale. Datele YYYY-MM-DD sunt convertite in ISO local (inceput/sfarsit de zi). Backend accepta si filtru exact requestId (regex 8-128 caractere) pentru jump direct de la envelope.","citations":["frontend/src/pages/admin/Audit.tsx:82","frontend/src/pages/admin/Audit.tsx:23","backend/src/routes/admin.ts:100","backend/src/routes/admin.ts:85"]},{"name":"Export audit XLSX (v2.42.0)","what":"Raport XLSX al jurnalului de audit pe un interval ales, descarcat direct din tabul Audit. Refuza politicos rapoartele prea mari (413 peste 10.000 randuri) ca sa nu blocheze serverul; numele fisierului e datat.","how":"GET /api/v1/admin/audit/export cu aceleasi filtre ca listarea; toate celulele text trec prin escape-ul de formula-injection (prefix ' la =+-@\\t\\r), inclusiv coloana IP.","citations":["backend/src/routes/admin.ts:662","frontend/src/pages/admin/Audit.tsx:225"]},{"name":"Cote / Quota (pool AI unic + captcha per utilizator)","what":"Override-uri de limita per utilizator pe fereastra rolling (zilnic/saptamanal/lunar). Din v2.42.0 exista un singur pool de buget AI (\"ai\", limita in USD) care acopera si analiza simpla si cea multi-agent; captcha.rnpm ramane cu semantica de numar de captcha-uri. Bifa \"Nelimitat\" scoate capul (NULL = pass-through). Formularul foloseste enum-ul de feature-uri (nu camp text liber), se pre-populeaza la Editeaza si se reseteaza la schimbarea feature-ului.","how":"PUT/DELETE /api/v1/admin/users/:id/quota pe QUOTA_FEATURES = [\"ai\", \"captcha.rnpm\"]. quotaGuard citeste limita mereu pe pool-ul \"ai\" si insumeaza consumul TUTUROR feature-urilor AI istorice prin quotaFeatureAliases(\"ai\") — istoricul ai.single/ai.multi ramane valid. UI converteste USD<->milli (1 USD = 1000 milli).","citations":["backend/src/middleware/quotaGuard.ts:29","backend/src/db/aiUsageRepository.ts:357","frontend/src/lib/quotaFeatureLabels.ts:8","backend/src/routes/admin.ts:492"]},{"name":"Consolidarea pool-ului AI (migratiile 0041 + 0042)","what":"Migratia 0041 consolideaza override-urile istorice ai.single + ai.multi intr-un singur rand \"ai\", pastrand RATA CEA MAI RESTRICTIVA dintre cele doua (utilizatorii cu limite asimetrice pot vedea 429 pe multi-agent dupa upgrade — adminul trebuie sa revada limitele). Migratia 0042 backfill-uieste expirarile granturilor legacy la UTC.","how":"Ambele migratii au down de rollback si trec prin backup-ul pre-migration generic. Granturile si \"Nelimitat\" se exclud reciproc: grant pe user cu buget nelimitat raspunde 422 unlimited_budget (baza include si default-ul din env).","citations":["backend/src/db/migrations/0041_unified_ai_quota.up.sql:1","backend/src/db/migrations/0042_grants_expires_utc.up.sql:1","backend/src/routes/admin.ts:967"]},{"name":"Granturi extra buget","what":"Aloca buget suplimentar one-shot peste limita de baza, cu data de expirare si motiv optional — din v2.42.0 pe pool-ul AI unic \"ai\" (nu mai exista granturi separate single/multi). Limita efectiva = baza + suma granturilor active. Granturile au stare Activ/Expirat/Revocat si pot fi revocate inclusiv din vederea globala (scade limita imediat). Grant pe un user cu buget nelimitat e refuzat cu 422 unlimited_budget.","how":"POST /api/v1/admin/users/:id/grants (extraUsdMilli > 0, expiresAt in viitor si max 365 zile), DELETE /api/v1/admin/grants/:id sau POST /api/v1/admin/grants/:id/revoke pentru revocare. Audit la create/revoke cu detalii (grantId, feature, extra, motiv truncat la 200).","citations":["frontend/src/pages/admin/Grants.tsx:45","backend/src/routes/admin.ts:577","backend/src/routes/admin.ts:1041","backend/src/routes/admin.ts:967"]},{"name":"Vederi globale Cote & Granturi + UserPicker (v2.41.0)","what":"Paginile Cote si Granturi nu mai cer o cautare prealabila: la deschidere afiseaza vederea globala — toate override-urile de cota, respectiv toate granturile active, ale tuturor utilizatorilor. Selectarea unui utilizator se face dintr-un UserPicker (dropdown cu toti userii activi) cu buton \"Schimba utilizatorul\" pentru revenire la vederea globala.","how":"GET /api/v1/admin/quota/overrides si GET /api/v1/admin/grants/active pentru vederile globale; UserPicker e componenta comuna refolosita de ambele pagini.","citations":["backend/src/routes/admin.ts:806","backend/src/routes/admin.ts:923","frontend/src/components/UserPicker.tsx:22"]},{"name":"Consum per utilizator (tab Consum, v2.42.0)","what":"Tabul Consum arata consumul TUTUROR utilizatorilor, pe sub-taburi AI si Captcha: per utilizator totaluri zilnic/saptamanal/total, coloanele Limita efectiva si Sursa limitei, rand expandabil cu detaliile de consum ca mini-celule scanabile, plus totalul intregii organizatii. Sumele apar in USD si EUR (curs BCE); conversia EUR e fail-closed — curs lipsa sau mai vechi de 48h afiseaza \"EUR indisponibil\" / badge stale in loc de un numar inselator.","how":"GET /api/v1/admin/usage/overview foloseste EXACT aceleasi functii de citire ca guard-urile de cota (acelasi reader si pentru captcha) — cifrele afisate coincid cu enforcementul. Sortare client-side (useClientSort + SortableTh) si paginare client-side cu clamp sincronizat.","citations":["backend/src/routes/admin.ts:1062","backend/src/routes/rnpmGuards.ts:30","frontend/src/pages/admin/Usage.tsx:110","frontend/src/pages/admin/Usage.tsx:18"]},{"name":"Chei API centralizate (tenant)","what":"Adminul tenantului configureaza si plateste toate cheile la nivel de organizatie: Anthropic, OpenAI, Google, OpenRouter, 2Captcha, CapSolver. Fiecare cheie arata doar statusul set/unset si ultimele 4 caractere — valoarea salvata nu se mai afiseaza inapoi. Butoane Salveaza si Sterge per cheie.","how":"GET /api/v1/admin/keys (status + last4), PUT /api/v1/admin/keys/:field. La salvare cheia e validata online; daca providerul o respinge -> 422 INVALID_KEY, daca providerul e indisponibil cheia se salveaza cu validationSkipped=true. Valoarea e trim-uita; string gol = stergere (cleared).","citations":["frontend/src/pages/admin/Keys.tsx:11","frontend/src/pages/admin/Keys.tsx:30","backend/src/routes/admin.ts:428","backend/src/routes/admin.ts:440","backend/src/services/keyValidation.ts:11"]},{"name":"Setari captcha tenant","what":"Selectarea providerului captcha (2Captcha sau CapSolver) si a modului de operare (Sequential sau Race) pentru intregul tenant, cu buton dedicat de salvare.","how":"PUT /api/v1/admin/keys/captcha cu {provider, mode}. Audit admin.tenantKeys.captchaSettings.update pastreaza provider/mode anterior (enums non-secrete), valorile cheilor raman redactate.","citations":["frontend/src/pages/admin/Keys.tsx:61","backend/src/routes/admin.ts:400","backend/src/routes/admin.ts:164"]}],"settings":[{"name":"Rol utilizator","where":"UI /admin/users (dropdown per rand) + PATCH users/:id/role","effect":"Determina permisiunile; doar 'admin' vede suita Admin","options":"user (Utilizator), admin (Admin), support (Suport), readonly (Read-only)","default":"user (desktop local user e 'user' implicit)","citations":["frontend/src/pages/admin/Users.tsx:15","backend/src/routes/admin.ts:6"]},{"name":"Status utilizator","where":"UI /admin/users (dropdown per rand) + PATCH users/:id/status","effect":"Cont non-active (suspended/deleted) esueaza fail-closed la requireRole","options":"active (Activ), suspended (Suspendat), deleted (Sters)","default":"active","citations":["frontend/src/pages/admin/Users.tsx:22","backend/src/middleware/requireRole.ts:39"]},{"name":"Feature cota","where":"UI /setari?tab=cote (dropdown pe enum) / backend QUOTA_FEATURES","effect":"Defineste ce consum e plafonat","options":"ai (pool unic de buget AI, in USD — acopera single + multi), captcha.rnpm (numar de captcha-uri)","default":"—","citations":["backend/src/middleware/quotaGuard.ts:29","frontend/src/lib/quotaFeatureLabels.ts:8"]},{"name":"Perioada cota (rolling window)","where":"UI /admin/quota (dropdown Perioada)","effect":"Fereastra pe care se aplica limita","options":"day (Zilnic), week (Saptamanal), month (Lunar)","default":"day","citations":["frontend/src/pages/admin/Quota.tsx:60","backend/src/routes/admin.ts:114","backend/src/routes/admin.ts:510"]},{"name":"Limita cota (limitUsdMilli)","where":"UI /admin/quota (camp Limita + checkbox Nelimitat)","effect":"Plafonul de buget; NULL = nelimitat (pass-through fara cap)","options":"intreg 0..1.000.000.000 milli-USD, sau null (Nelimitat); pentru captcha.* numar intreg de captcha-uri","default":"fara override = limita default a sistemului","citations":["backend/src/routes/admin.ts:115","frontend/src/pages/admin/Quota.tsx:332"]},{"name":"Grant feature","where":"UI /setari?tab=granturi","effect":"Feature-ul caruia i se adauga buget extra; din v2.42.0 exista doar pool-ul unic","options":"ai (pool unic)","default":"ai","citations":["backend/src/middleware/quotaGuard.ts:29","frontend/src/lib/quotaFeatureLabels.ts:8"]},{"name":"Grant extra (extraUsdMilli)","where":"UI /admin/grants (camp Extra USD)","effect":"Suma adaugata peste limita de baza pe durata grantului","options":"> 0 USD; backend valideaza intreg 1..1.000.000.000 milli","default":"—","citations":["frontend/src/pages/admin/Grants.tsx:276","backend/src/routes/admin.ts:131"]},{"name":"Grant expirare (expiresAt)","where":"UI /admin/grants (datetime-local)","effect":"Cand expira grantul; dupa expirare nu mai contribuie la limita","options":"data ISO 8601 in viitor, maximum 365 zile de la creare","default":"—","citations":["backend/src/routes/admin.ts:132","backend/src/routes/admin.ts:140"]},{"name":"Grant motiv (reason)","where":"UI /admin/grants (camp text) + DELETE grants (motiv revocare)","effect":"Justificare libera, pastrata in audit","options":"text; UI maxLength 500, backend trunchiaza/limiteaza la 200 caractere","default":"null","citations":["frontend/src/pages/admin/Grants.tsx:306","backend/src/routes/admin.ts:133","backend/src/routes/admin.ts:605"]},{"name":"Cheie API tenant (field)","where":"UI /admin/keys (input password per provider) + PUT keys/:field","effect":"Cheia centralizata folosita de tenant pentru AI/captcha; gol = stergere","options":"anthropic, openai, google, openrouter, twocaptcha, capsolver; valoare max 4096 caractere, trim-uita","default":"unset","citations":["frontend/src/pages/admin/Keys.tsx:11","backend/src/routes/admin.ts:151","backend/src/routes/admin.ts:159"]},{"name":"Captcha provider","where":"UI /admin/keys (toggle) + PUT keys/captcha","effect":"Ce serviciu rezolva captcha pentru tenant","options":"2captcha, capsolver","default":"2captcha (selectie initiala UI)","citations":["frontend/src/pages/admin/Keys.tsx:20","backend/src/routes/admin.ts:165"]},{"name":"Captcha mode","where":"UI /admin/keys (toggle) + PUT keys/captcha","effect":"Strategia de rezolvare captcha","options":"sequential, race","default":"sequential (selectie initiala UI)","citations":["frontend/src/pages/admin/Keys.tsx:25","backend/src/routes/admin.ts:166"]},{"name":"Limita body admin","where":"backend (constanta ADMIN_BODY_LIMIT)","effect":"Respinge payload-uri > 4 KiB pe rutele admin cu 413","options":"4096 bytes","default":"4096","citations":["backend/src/routes/admin.ts:57"]},{"name":"pageSize lista utilizatori","where":"backend ListUsersQuerySchema / UI","effect":"Numar randuri per pagina la utilizatori","options":"1..100","default":"20","citations":["backend/src/routes/admin.ts:66","frontend/src/pages/admin/Users.tsx:13"]},{"name":"pageSize audit","where":"backend ListAuditQuerySchema / UI","effect":"Numar evenimente per pagina la audit","options":"1..200","default":"50","citations":["backend/src/routes/admin.ts:88","frontend/src/pages/admin/Audit.tsx:11"]},{"name":"Filtru rezultat audit (outcome)","where":"UI /admin/audit (dropdown)","effect":"Filtreaza evenimentele dupa rezultat","options":"all (Toate), ok (OK), denied (Refuzat), error (Eroare)","default":"all","citations":["frontend/src/pages/admin/Audit.tsx:13","backend/src/routes/admin.ts:95"]},{"name":"Prag stale curs valutar EUR","where":"frontend Usage (FX_STALE_BADGE_HOURS)","effect":"Daca rate-ul BCE e mai vechi, afisarea EUR e blocata si apare badge stale","options":"48 ore","default":"48","citations":["frontend/src/pages/admin/Usage.tsx:18","frontend/src/pages/admin/Usage.tsx:33"]}],"keyFacts":[{"fact":"Limita body payload pe rutele admin","value":"4096 bytes (4 KiB), 413 la depasire","citation":"backend/src/routes/admin.ts:57"},{"fact":"pageSize utilizatori (default/max)","value":"default 20, max 100","citation":"backend/src/routes/admin.ts:66"},{"fact":"pageSize audit (default/max)","value":"default 50, max 200","citation":"backend/src/routes/admin.ts:88"},{"fact":"Feature-uri de cota suportate","value":"ai (pool unic, USD) + captcha.rnpm (count) — din v2.42.0; istoricul ai.single/ai.multi ramane citibil prin aliasuri","citation":"backend/src/middleware/quotaGuard.ts:29"},{"fact":"Roluri utilizator","value":"user, admin, support, readonly","citation":"frontend/src/pages/admin/Users.tsx:15"},{"fact":"Statusuri utilizator","value":"active, suspended, deleted","citation":"frontend/src/pages/admin/Users.tsx:22"},{"fact":"Limita cota (limitUsdMilli)","value":"0..1.000.000.000 milli-USD, nullable (NULL=nelimitat)","citation":"backend/src/routes/admin.ts:115"},{"fact":"Conversie USD<->milli","value":"1 USD = 1000 milli ($0.001 = 1 milli)","citation":"frontend/src/pages/admin/Quota.tsx:16"},{"fact":"Grant extraUsdMilli","value":"min 1, max 1.000.000.000 milli","citation":"backend/src/routes/admin.ts:131"},{"fact":"Grant expirare maxima","value":"365 zile de la creare, trebuie in viitor","citation":"backend/src/routes/admin.ts:140"},{"fact":"Grant reason limita","value":"UI maxLength 500, backend max/trunchiat 200","citation":"backend/src/routes/admin.ts:133"},{"fact":"Camp cheie tenant","value":"anthropic, openai, google, openrouter, twocaptcha, capsolver; valoare max 4096 char","citation":"backend/src/routes/admin.ts:159"},{"fact":"Captcha provideri / moduri","value":"provider: 2captcha|capsolver; mode: sequential|race","citation":"backend/src/routes/admin.ts:165"},{"fact":"Validare cheie respinsa","value":"HTTP 422 cod INVALID_KEY; provider indisponibil -> salvare cu validationSkipped","citation":"backend/src/routes/admin.ts:442"},{"fact":"Prag stale curs EUR (BCE)","value":"48 ore","citation":"frontend/src/pages/admin/Usage.tsx:18"},{"fact":"Filtru requestId audit","value":"regex [A-Za-z0-9_-], 8-128 caractere","citation":"backend/src/routes/admin.ts:103"},{"fact":"pageSize cautare user in Quota/Grants","value":"25","citation":"frontend/src/pages/admin/Quota.tsx:72"},{"fact":"Mount API admin","value":"/api/v1/admin (backend/src/index.ts:363)","citation":"backend/src/index.ts:363"},{"fact":"Import utilizatori (limite)","value":"max 500 randuri / 512KB, insert tranzactional totul-sau-nimic","citation":"backend/src/routes/admin.ts:346"},{"fact":"Export audit (limita)","value":"max 10.000 randuri, 413 la depasire","citation":"backend/src/routes/admin.ts:662"},{"fact":"Migratii v2.41-v2.42","value":"0040 email unic NOCASE, 0041 pool AI unic (pastreaza rata cea mai restrictiva), 0042 expirari granturi la UTC","citation":"backend/src/db/migrations/0041_unified_ai_quota.up.sql:1"},{"fact":"Taburi Setari (v2.42.0)","value":"general (toti) + utilizatori, chei, cote, granturi, consum, audit (doar admin)","citation":"frontend/src/pages/Settings.tsx:26"}],"notes":"Securitate si arhitectura: (1) Dubla protectie — AdminGate e doar cosmetic (UX 403), autoritatea e requireRole('admin') aplicat pe '*' in adminRouter; non-adminii primesc 403, nu 404, iar incercarile sunt logate ca 'auth.denied'. (2) Fail-closed: utilizatorii cu status != active esueaza guardul chiar daca au rol admin. (3) Guardrails anti-lockout: nu se poate demota ultimul admin (409 last_admin) si nu se poate auto-dezactiva propriul cont (409 self_deactivation), ambele auditate. (4) Audit asimetric: GET nu se auditeaza (zgomot), scrierile produc un eveniment cu diff before/after in detail_json; exceptie 'audit.viewed' la filtre tintite. (5) Secrete: cheile tenant nu se afiseaza niciodata inapoi (doar set + last4); auditul pe chei pastreaza doar last4After si flag cleared, nu valoarea; pentru captcha doar enums non-secrete (provider/mode). (6) Modelul de buget e centralizat per tenant in modul web (adminul plateste cheile), spre deosebire de desktop care e BYOK. (7) Idempotenta: DELETE pe quota si grants returneaza 200 indiferent daca au sters ceva, dar auditeaza doar la schimbare reala. (8) Conversia EUR e fail-closed la curs vechi/lipsa pentru a nu induce in eroare adminul. (9) Provisionare: emailul e canonicalizat o singura data (canonicalizeEmail e UNICUL normalizator — creare, import, seed, bridge oauth2) si unic case-insensitive prin migratia 0040; re-adaugarea unui cont sters REACTIVEAZA randul existent, deci id-ul si istoricul raman. (10) Guard-ul last-admin numara doar adminii ACTIVI — un admin suspendat nu mai conteaza ca fallback. (11) Cifrele din tabul Consum coincid cu enforcementul pentru ca /usage/overview foloseste aceleasi functii de citire ca guard-urile de cota si captcha. (12) Inainte de upgrade pe un tenant web, ruleaza pre-flight-ul de duplicate de email din RUNBOOK — migratia 0040 opreste boot-ul pe duplicate istorice case-insensitive.","key":"admin"},{"module":"Autentificare & Sesiuni","icon":"🔐","overview":"Modulul de autentificare decide cine are voie sa foloseasca aplicatia si in ce rol, functionand in doua moduri complet diferite. In modul desktop (Electron) utilizatorul este intotdeauna un administrator local unic, fara parola, fara cookie, fara handshake de retea — totul ruleaza local. In modul web (browser, deploy server), accesul se face prin Google OAuth via un sidecar oauth2-proxy: backendul transforma identitatea verificata de proxy intr-un token JWT propriu (HS256), pastrat intr-un cookie de sesiune HttpOnly. Frontendul stabileste sesiunea la pornire (bootstrap), o mentine vie automat (keep-alive la 50 min, la revenirea in tab, la revenirea retelei) si o reface transparent la expirare (recovery pe 401). Securitatea include revocarea token-urilor la logout (denylist jti), cookie SameSite=Strict si validare stricta a semnaturii/expirarii/issuer/audience.","routes":["UI: gate de bootstrap in App.tsx (shell-ul autentificat nu se monteaza pana cand sesiunea web nu e stabilita)","API mount: /api/v1/auth (login, logout, oauth2/sync, refresh)","API mount: /api/v1/me (profil + setari user)"],"endpoints":[{"method":"POST","path":"/api/v1/auth/login","purpose":"Login first-party NU este livrat — raspunde mereu 501 not_implemented. In web, JWT-urile vin extern prin IdP/SSO."},{"method":"POST","path":"/api/v1/auth/logout","purpose":"Inchide sesiunea: verifica token-ul, il revoca server-side prin denylist (jti), sterge cookie-ul si scrie audit. Best-effort: logout reuseste chiar daca revocarea esueaza."},{"method":"POST","path":"/api/v1/auth/oauth2/sync","purpose":"Bridge oauth2-proxy (doar web): valideaza shared secret timing-safe, citeste email-ul din header-ul X-Auth-Request-Email, cauta user activ in DB si mintea cookie-ul JWT nativ. 503 daca bridge neconfigurat, 403 daca secret gresit / user neprovizionat / inactiv."},{"method":"POST","path":"/api/v1/auth/refresh","purpose":"Reinnoieste cookie-ul unei sesiuni deja valide (roteste jti + exp). In desktop e no-op (mode desktop, refreshed:false). NU poate bootstrap-a o sesiune noua."},{"method":"GET","path":"/api/v1/me","purpose":"Profilul user-ului curent: id, email, displayName, role, status, createdAt, lastLoginAt. Frontendul decide din role daca afiseaza sectiunea Admin."},{"method":"GET","path":"/api/v1/me/key-status","purpose":"In web: indica ce chei AI/captcha la nivel de tenant sunt configurate. In desktop/non-web: toate false."}],"features":[{"name":"Mod desktop — admin local automat","what":"In aplicatia desktop nu exista login: utilizatorul e mereu acelasi cont local cu drepturi de administrator, fara parola, fara cookie. Aplicatia se deschide instant.","how":"useAuthMode detecteaza window.desktopApi (injectat de preload Electron) si returneaza 'desktop'. Backendul foloseste DesktopAuthProvider care intoarce ownerId='local'/actorId='local' fara verificare de token. Bootstrap-ul marcheaza ready sincron, fara fetch.","citations":["frontend/src/hooks/useAuthMode.ts:3","backend/src/auth/authProvider.ts:47","frontend/src/hooks/useSessionBootstrap.ts:28"]},{"name":"Mod web — autentificare prin cookie JWT","what":"Pe deploy web, accesul e protejat: fiecare cerere trebuie sa poarte un cookie de sesiune valid, altfel primeste 401. Identitatea vine din Google OAuth prin oauth2-proxy.","how":"WebJwtAuthProvider citeste token-ul (Bearer sau cookie legal_dashboard_session), verifica semnatura HS256, expirarea, issuer/audience, denylist jti, apoi cauta user-ul activ in DB. Esecul oricarei verificari => 401.","citations":["backend/src/auth/authProvider.ts:60","backend/src/auth/authProvider.ts:11","frontend/src/hooks/useAuthMode.ts:4"]},{"name":"Bridge oauth2-proxy (sync sesiune)","what":"Puntea care transforma login-ul Google (verificat de proxy) intr-o sesiune nativa a aplicatiei. Utilizatorul nu vede acest pas — se intampla automat la deschiderea aplicatiei web.","how":"oauth2-proxy injecteaza X-Auth-Request-Email + X-Proxy-Auth (shared secret). Endpoint-ul /oauth2/sync valideaza secret-ul timing-safe, cauta user-ul dupa email (lowercase, max 254 char), verifica status='active', apoi mintea JWT HS256 si scrie cookie-ul. Userii NU sunt provizionati automat — trebuie sa existe deja in DB (seed-admin / admin UI).","citations":["backend/src/routes/auth.ts:171","backend/src/routes/auth.ts:198","backend/src/routes/auth.ts:210","backend/src/auth/config.ts:55"]},{"name":"Session bootstrap la pornire","what":"La deschiderea aplicatiei web, sesiunea se stabileste o singura data inainte ca interfata autentificata (sidebar /me, cautare, alerte SSE) sa se monteze, ca prima cerere sa poarte deja cookie-ul si sa nu esueze cu 401.","how":"useSessionBootstrap apeleaza syncWebSession() exact o data (ref guard, sigur sub StrictMode). Desktop: ready=true sincron, zero fetch. App.tsx tine shell-ul in asteptare pana cand ready devine true.","citations":["frontend/src/hooks/useSessionBootstrap.ts:24","frontend/src/hooks/useSessionBootstrap.ts:33","frontend/src/App.tsx:469"]},{"name":"Keep-alive sesiune","what":"Sesiunea web ramane vie cat timp aplicatia e deschisa, astfel incat utilizatorul sa nu fie nevoit niciodata sa dea refresh sau sa se reautentifice in timpul lucrului.","how":"useSessionKeepAlive re-mintea cookie-ul prin ensureWebSession() pe 3 declansatoare: interval la 50 min (sub TTL-ul de 1h al cookie-ului), la revenirea tab-ului in focus (visibilitychange), si la revenirea retelei (online). Desktop: no-op. Cleanup pe unmount (clearInterval + removeEventListener).","citations":["frontend/src/hooks/useSessionKeepAlive.ts:15","frontend/src/hooks/useSessionKeepAlive.ts:13","frontend/src/hooks/useSessionKeepAlive.ts:26"]},{"name":"Recovery automat pe 401","what":"Daca o cerere esueaza pentru ca sesiunea a expirat, aplicatia reface sesiunea transparent si reincearca cererea o singura data, fara ca utilizatorul sa observe blocajul.","how":"In apiFetch, un 401 in web (exceptand rutele /api/v1/auth/) declanseaza ensureWebSession(); daca rezultatul e 'ok', cererea originala e reincercata o data prin fetch raw (fara reintrare in interceptor). ensureWebSession dedupe-eaza re-mint-urile concurente printr-un singur promise in zbor.","citations":["frontend/src/lib/api.ts:65","frontend/src/lib/api.ts:106","frontend/src/lib/api.ts:44"]},{"name":"Logout cu revocare token","what":"La delogare, token-ul curent este invalidat imediat pe server (nu mai poate fi reutilizat), iar cookie-ul de sesiune este sters.","how":"/auth/logout verifica token-ul, iar daca are jti si exp il adauga in tabela jwt_denylist (revokeJti), apoi sterge cookie-ul. Tokenele pre-v2.38.0 fara jti nu pot fi revocate server-side si expira la TTL (warn loggat). Esecul revocarii e loggat dar nu blocheaza logout-ul.","citations":["backend/src/routes/auth.ts:53","backend/src/routes/auth.ts:73","backend/src/db/jwtDenylistRepository.ts:4"]},{"name":"Denylist JWT (jti) anti-replay","what":"Token-urile revocate la logout sunt respinse la urmatoarea folosire, prevenind reutilizarea unui token furat sau delogat.","how":"La fiecare verificare, daca payload.jti exista si isJtiRevoked(jti) e true, cererea e respinsa cu 401 si se scrie audit auth.jwt_revoked. Tabela jwt_denylist (migration 0038) e purjata zilnic de intrarile expirate (purgeExpiredJti).","citations":["backend/src/auth/authProvider.ts:85","backend/src/db/jwtDenylistRepository.ts:15","backend/src/db/jwtDenylistRepository.ts:19"]},{"name":"Refresh sesiune (rotire cookie)","what":"Reinnoieste o sesiune web deja valida, prelungind durata fara reautentificare.","how":"/auth/refresh ia user-ul autentificat (getAuthUser), genereaza un nou JWT cu jti+exp noi si rescrie cookie-ul. In desktop e no-op (refreshed:false). Nu poate crea o sesiune din nimic — doar bridge-ul /oauth2/sync poate bootstrap-a.","citations":["backend/src/routes/auth.ts:276","backend/src/routes/auth.ts:281"]},{"name":"Profil utilizator (/me) si gating Admin","what":"Aplicatia stie cine e utilizatorul logat si ce rol are, ca sa afiseze sau sa ascunda sectiunea de administrare.","how":"useCurrentUser face fetch o data la montare (+ refresh la cerere) catre GET /api/v1/me, returnand id/email/role/status. Sidebar si App.tsx folosesc role pentru a randa sectiunea Admin si a gata rutele /admin/*; pe eroare/401 user devine null si UI degradeaza gratios.","citations":["frontend/src/hooks/useCurrentUser.ts:21","backend/src/routes/me.ts:82","backend/src/routes/me.ts:95"]},{"name":"Detectare mod desktop vs web (client)","what":"Frontendul stie singur in ce mediu ruleaza si adapteaza tot comportamentul de sesiune.","how":"useAuthMode returneaza 'desktop' daca window.desktopApi e prezent (preload Electron), altfel 'web'. Toate hook-urile de sesiune (bootstrap, keep-alive) verifica acelasi semnal pentru a deveni no-op pe desktop.","citations":["frontend/src/hooks/useAuthMode.ts:3","frontend/src/hooks/useSessionBootstrap.ts:20"]},{"name":"Validare configuratie auth la boot (web)","what":"In modul web, aplicatia refuza sa porneasca daca lipsesc setarile critice de securitate, prevenind un deploy nesigur.","how":"validateAuthConfig cere JWT_SECRET (min 32 char), JWT_ISSUER si JWT_AUDIENCE obligatorii in web; valideaza TTL-ul; arunca eroare daca AUTH_COOKIE_SECURE=0 in productie. Desktop nu impune nimic din acestea.","citations":["backend/src/auth/config.ts:77","backend/src/auth/config.ts:67","backend/src/auth/config.ts:88"]},{"name":"Fail-closed pe headere de identitate conflictuale (v2.41.0)","what":"Bridge-ul oauth2 respinge cererile in care cele doua headere de identitate (X-Auth-Request-Email si X-Forwarded-Email) exista si difera, in loc sa aleaga tacit unul dintre ele — o cerere ambigua nu mai poate impersona alt cont.","how":"X-Forwarded-Email e sursa PRIMARA conform contractului cu oauth2-proxy; conflictul raspunde cu refuz si audit cu reason \"conflicting_identity_headers\".","citations":["backend/src/routes/auth.ts:228","backend/src/routes/auth.ts:242"]}],"settings":[{"name":"LEGAL_DASHBOARD_AUTH_MODE / APP_MODE","where":"env backend","effect":"Alege modul de autentificare: desktop (admin local, fara token) sau web (cookie JWT + roluri). Valoare invalida => eroare la boot.","options":"desktop | web","default":"desktop","citations":["backend/src/auth/config.ts:13","backend/src/auth/config.ts:19"]},{"name":"LEGAL_DASHBOARD_JWT_SECRET / JWT_SECRET","where":"env backend","effect":"Secretul HS256 cu care se semneaza si verifica token-urile. Obligatoriu in web, minim 32 caractere.","options":"string >=32 char","default":"(niciun default; obligatoriu in web)","citations":["backend/src/auth/config.ts:22","backend/src/auth/config.ts:67"]},{"name":"LEGAL_DASHBOARD_JWT_ISSUER / JWT_ISSUER","where":"env backend","effect":"Issuer-ul (iss) inclus si validat in token. Obligatoriu in web.","options":"string","default":"(niciun default; obligatoriu in web)","citations":["backend/src/auth/config.ts:26","backend/src/auth/config.ts:81"]},{"name":"LEGAL_DASHBOARD_JWT_AUDIENCE / JWT_AUDIENCE","where":"env backend","effect":"Audience-ul (aud) inclus si validat in token. Obligatoriu in web.","options":"string","default":"(niciun default; obligatoriu in web)","citations":["backend/src/auth/config.ts:30","backend/src/auth/config.ts:84"]},{"name":"LEGAL_DASHBOARD_JWT_TTL_SECONDS / LEGAL_DASHBOARD_AUTH_TOKEN_TTL_SECONDS","where":"env backend","effect":"Durata de viata a token-ului/cookie-ului de sesiune. Trebuie intre 60 si 86400 secunde, altfel eroare la boot.","options":"60–86400 (secunde)","default":"3600 (1 ora)","citations":["backend/src/auth/config.ts:38","backend/src/auth/config.ts:42"]},{"name":"LEGAL_DASHBOARD_AUTH_COOKIE_SECURE / AUTH_COOKIE_SECURE","where":"env backend","effect":"Pe '0' dezactiveaza flag-ul Secure al cookie-ului (permite HTTP). Interzis in productie web (arunca eroare); altfel doar warn.","options":"0 = dezactiveaza Secure","default":"(neset) — Secure activ in web","citations":["backend/src/auth/config.ts:34","backend/src/auth/config.ts:88","backend/src/routes/auth.ts:27"]},{"name":"LEGAL_DASHBOARD_OAUTH2_PROXY_SECRET / OAUTH2_PROXY_SHARED_SECRET","where":"env backend","effect":"Shared secret pentru bridge-ul oauth2-proxy. Lipsa sau <32 char => bridge dezactivat (503). Validat timing-safe la fiecare sync.","options":"string >=32 char","default":"(neset) — bridge dezactivat","citations":["backend/src/auth/config.ts:55","backend/src/auth/config.ts:58","backend/src/routes/auth.ts:176"]},{"name":"Cookie SameSite","where":"setat de backend pe cookie-ul de sesiune","effect":"Cookie-ul legal_dashboard_session e SameSite=Strict (anti-CSRF), HttpOnly, Path=/, Secure in web. Strans de la Lax in v2.38.0.","options":"Strict (hardcodat)","default":"Strict","citations":["backend/src/routes/auth.ts:36","backend/src/routes/auth.ts:33"]},{"name":"REFRESH_INTERVAL_MS (keep-alive)","where":"constanta frontend useSessionKeepAlive","effect":"Intervalul la care sesiunea web e re-mintita automat cat timp tab-ul e activ.","options":"hardcodat","default":"3000000 ms (50 min, sub TTL-ul de 1h)","citations":["frontend/src/hooks/useSessionKeepAlive.ts:13"]},{"name":"Timeout sync sesiune","where":"frontend syncWebSession (api.ts)","effect":"Limita de timp pentru apelul POST /oauth2/sync de bootstrap/recovery; depasire => rezultat 'error'.","options":"hardcodat","default":"10000 ms (10s)","citations":["frontend/src/lib/api.ts:90"]},{"name":"Nume cookie sesiune","where":"backend authProvider","effect":"Numele cookie-ului de sesiune folosit pentru transportul JWT.","options":"constant","default":"legal_dashboard_session","citations":["backend/src/auth/authProvider.ts:11"]},{"name":"Provizionare useri web","where":"DB users (seed-admin.mjs / admin UI)","effect":"In web userii NU sunt creati automat la login — trebuie sa existe in DB cu status='active', altfel sync raspunde 403 not_provisioned/account_inactive.","options":"status: active / (inactiv/suspendat)","default":"—","citations":["backend/src/routes/auth.ts:211","backend/src/routes/auth.ts:227"]}],"keyFacts":[{"fact":"Lungime minima JWT secret (web)","value":"32 caractere","citation":"backend/src/auth/config.ts:3"},{"fact":"TTL token implicit","value":"3600 s (1 ora)","citation":"backend/src/auth/config.ts:40"},{"fact":"Interval valid TTL token","value":"60–86400 s","citation":"backend/src/auth/config.ts:42"},{"fact":"Interval keep-alive re-mint","value":"50 min (3.000.000 ms)","citation":"frontend/src/hooks/useSessionKeepAlive.ts:13"},{"fact":"Timeout sync sesiune","value":"10.000 ms","citation":"frontend/src/lib/api.ts:90"},{"fact":"Lungime minima shared secret oauth2-proxy","value":"32 caractere","citation":"backend/src/auth/config.ts:53"},{"fact":"Lungime maxima email acceptata la sync","value":"254 caractere","citation":"backend/src/routes/auth.ts:200"},{"fact":"Algoritm JWT","value":"HS256 (singurul acceptat la verify)","citation":"backend/src/auth/jwt.ts:77"},{"fact":"Cookie SameSite","value":"Strict","citation":"backend/src/routes/auth.ts:36"},{"fact":"Nume cookie sesiune","value":"legal_dashboard_session","citation":"backend/src/auth/authProvider.ts:11"},{"fact":"Migration tabela denylist jti","value":"0038 (jwt_denylist)","citation":"backend/src/db/jwtDenylistRepository.ts:8"},{"fact":"Limita body /me","value":"4096 bytes","citation":"backend/src/routes/me.ts:43"},{"fact":"Login first-party","value":"nelivrat (501 not_implemented)","citation":"backend/src/routes/auth.ts:42"},{"fact":"ownerId in mod desktop","value":"'local'","citation":"backend/src/auth/authProvider.ts:52"}],"notes":"Diferente desktop vs web (setari de mediu): (1) Identitate — desktop: user 'local' auto-admin fara token; web: JWT din DB prin Google OAuth. (2) Cookie — desktop: inexistent; web: legal_dashboard_session HttpOnly+Secure+SameSite=Strict, TTL 1h. (3) Bootstrap/keep-alive/recovery — toate no-op pe desktop, active doar in web. (4) /auth/refresh — desktop no-op (refreshed:false), web roteste cookie-ul. (5) /oauth2/sync — 400 desktop_only pe desktop. (6) Config la boot — web impune JWT_SECRET/ISSUER/AUDIENCE, desktop nu. Securitate notabila: shared secret oauth2-proxy validat timing-safe (timingSafeEqual), fallback pe x-forwarded-email eliminat in v2.34.0 (anti-bypass daca backendul e expus direct), semnatura JWT comparata timing-safe, audit owner-scoped pe logout/sync/jwt_revoked cu email doar ca hash SHA-256 (niciodata plaintext). Tokenele pre-v2.38.0 fara jti nu pot fi revocate server-side si se bazeaza pe expirarea la TTL. ACK_NO_AUTH gate a fost retras in v2.38.0; web auth (auth_mode=web + JWT valid) e gate-ul suficient pentru bind remote. Bridge-ul foloseste DOAR header-ul canonical X-Auth-Request-Email (Caddy strip-uieste si re-injecteaza headerele inainte de oauth2-proxy).","key":"auth"},{"module":"Interfata & Setari globale","icon":"🎨","overview":"Modulul \"ui-chrome\" cuprinde elementele de cadru ale interfetei si setarile globale care se aplica in toata aplicatia: tema inchis/luminos, dimensiunea fontului (4 trepte), colapsarea meniului lateral, istoricul cautarilor (instante + RNPM), igienizarea HTML-ului generat de AI (DOMPurify), bariera de erori (ErrorBoundary) si paginarea tabelelor. Din v2.41-v2.42 se adauga infrastructura de UX transversala: sistemul de toast-uri in-house, confirmarile centralizate pentru actiunile ireversibile, sortarea pe coloane, componenta Select custom tematizata, layout-ul web fara chrome-ul Electron si politica de cache pe fisierele statice.","features":[{"name":"Comutare temă închis / luminos","what":"Un buton în subsolul meniului lateral schimbă între Mod Luminos și Mod Inchis. Pictograma se schimbă (Soare cand e tema dark, Luna cand e tema light), iar eticheta indica modul in care se va comuta.","how":"Hook-ul useTheme tine starea 'light'|'dark'. La initializare citeste localStorage 'theme'; daca lipseste, foloseste preferinta sistemului via window.matchMedia('(prefers-color-scheme: dark)'). useEffect adauga/scoate clasa 'dark' pe documentElement, salveaza in localStorage si sincronizeaza title/menu bar nativ Electron via window.desktopApi.setWindowTheme (fire-and-forget, indisponibil in web).","settings":"Persistenta in localStorage cheia 'theme'. Default: preferinta sistemului de operare.","citations":["frontend/src/hooks/useTheme.ts:6-26","frontend/src/components/sidebar-footer.tsx:100-113"]},{"name":"Dimensiune text (4 trepte)","what":"Control in subsolul meniului care regleaza marimea fontului intregii aplicatii pe 4 trepte: Mic, Normal, Mare, Extra. In modul extins exista butoane minus/plus plus 4 puncte indicatoare pe care se poate da click direct; in modul colapsat un singur buton cicleaza prin trepte. Tooltip-ul arata eticheta + valoarea in px.","how":"Hook-ul useFontSize tine indexul treptei (0-3). Aplica marimea setand documentElement.style.fontSize = '<value>px'. increase/decrease cu clamp la capete; cycle trece circular prin trepte; setStep sare direct la o treapta. canIncrease/canDecrease dezactiveaza butoanele la capete.","settings":"Trepte: Mic=16px, Normal=18px, Mare=20px, Extra=22px. Persistenta localStorage cheia 'portaljust-font-size' (indexul treptei ca string). Default: treapta 1 (Normal=18px). Comentariul din cod spune eronat '16px' pentru default, dar valoarea reala a treptei 1 e 18px.","citations":["frontend/src/hooks/useFontSize.ts:3-52","frontend/src/components/sidebar-footer.tsx:21-68"]},{"name":"Colapsare meniu lateral","what":"Buton care inchide/deschide meniul lateral. Cand e colapsat, butoanele afiseaza doar pictograme cu tooltip; cand e extins, afiseaza si etichete text. Eticheta butonului: 'Inchide meniu' / 'Deschide meniu'.","how":"Starea 'collapsed' e un useState(false) detinut de componenta Sidebar; onToggleCollapsed inverseaza valoarea. Toate elementele din subsol (font, Setari API, tema, colaps) isi adapteaza layout-ul in functie de aceasta stare.","settings":"NU este persistat: useState(false) — la fiecare repornire meniul porneste extins (in-memory only).","citations":["frontend/src/components/Sidebar.tsx:85","frontend/src/components/Sidebar.tsx:448","frontend/src/components/sidebar-footer.tsx:115-133"]},{"name":"Indicator Setari API","what":"Buton in subsol care deschide dialogul de configurare chei API. Pictograma robot e verde cand exista cheie configurata si gri altfel; in modul extins afiseaza un badge 'Activ' (verde) sau 'Neconfigurat' (portocaliu).","how":"Primeste prop-urile hasApiKey si onConfigureApiKey de la parinte; randeaza conditional badge-ul pe baza hasApiKey.","citations":["frontend/src/components/sidebar-footer.tsx:70-98"]},{"name":"Istoric cautari instante (dosare/termene)","what":"Salveaza automat ultimele cautari pe instante (inclusiv ICCJ). Fiecare intrare are o eticheta construita din parametri (nume parte, numar dosar, obiect, sau data sedintei ICCJ), tip, numar rezultate si timestamp. Utilizatorul poate da click pentru a re-rula, sterge o intrare sau goli tot istoricul.","how":"Hook-ul useSearchHistory persista o lista FIFO in localStorage. La adaugare elimina duplicatele cu acelasi label+tip+sursa (PortalJust vs ICCJ raman distincte) si taie lista la maximul de intrari. Citire/scriere protejate try/catch prin helperul _localStorageList.","settings":"Persistenta localStorage cheia 'portaljust-search-history'. Maxim 15 intrari (FIFO).","citations":["frontend/src/hooks/useSearchHistory.ts:5-6","frontend/src/hooks/useSearchHistory.ts:46-51"]},{"name":"Istoric cautari RNPM","what":"Istoric separat pentru cautarile in Registrul National de Publicitate Mobiliara. Eticheta construita din tipul cautarii plus identificator/debitor/creditor (denumire, CUI, CNP). Click pentru re-rulare, stergere individuala sau golire totala.","how":"Hook-ul useRnpmHistory, identic ca mecanism cu useSearchHistory: lista FIFO in localStorage, dedup pe label+tip, taiere la maxim, helper comun _localStorageList.","settings":"Persistenta localStorage cheia 'legal-dashboard-rnpm-history'. Maxim 15 intrari (FIFO).","citations":["frontend/src/hooks/useRnpmHistory.ts:5-6","frontend/src/hooks/useRnpmHistory.ts:37-40"]},{"name":"Igienizare HTML AI (SanitizedHtml / DOMPurify)","what":"Toate textele generate de AI care contin formatare sunt afisate prin componenta SanitizedHtml, care curata HTML-ul cu DOMPurify inainte de randare, prevenind injectarea de cod malitios. Permite doar formatare minima (bold/italic).","how":"sanitizeAiHtml ruleaza DOMPurify cu ALLOWED_TAGS = ['strong','em','b','i'] si ALLOWED_ATTR = [] (niciun atribut permis). formatAiMarkdownLine transforma **text** in <strong>. Componenta randeaza prin dangerouslySetInnerHTML doar dupa igienizare; element configurabil 'span' (default) sau 'p'.","settings":"Etichete HTML permise: strong, em, b, i. Atribute permise: niciunul.","citations":["frontend/src/components/SanitizedHtml.tsx:4-8","frontend/src/components/SanitizedHtml.tsx:22-40"]},{"name":"Bariera de erori (ErrorBoundary)","what":"Previne ecranul alb total: daca o sectiune crapa la randare, in loc sa dispara toata aplicatia, se afiseaza un card de eroare cu buton de recuperare. Doua variante: 'app' (in jurul intregii aplicatii, buton 'Reincarca aplicatia' care face reload complet) si 'page' (in jurul fiecarei pagini/sidebar/dialog, buton 'Reincearca' care reseteaza fara reload, restul aplicatiei ramane utilizabil).","how":"Clasa React cu getDerivedStateFromError + componentDidCatch. componentStack se logheaza DOAR in consola (nu in DOM). Mesajul tehnic al erorii se arata doar in dev (import.meta.env.DEV, tree-shaken in productie). Prinde doar erori din render/lifecycle/constructori, NU din event handlers sau cod async. Wrapper subtire PageBoundary pentru lizibilitate in App.tsx.","citations":["frontend/src/components/ErrorBoundary.tsx:47-71","frontend/src/components/ErrorBoundary.tsx:82","frontend/src/components/ErrorBoundary.tsx:139-145"]},{"name":"Paginare tabele (TablePagination)","what":"Bara de paginare reutilizabila pentru tabele: butoane prima/ultima pagina, inapoi/inainte, numere de pagina cu elipsa pentru salt rapid, camp numeric pentru a sari direct la o pagina, selector pentru numar de rezultate pe pagina, plus optional buton 'Incarca mai multe' pentru paginare de tip cursor (RNPM) si stare disabled cu spinner pentru fetch server-side.","how":"getPageNumbers afiseaza toate paginile daca sunt <=7, altfel comprima cu '...' pastrand pagina curenta +/-1 plus prima si ultima. Index pagina e 0-based intern, afisat 1-based in UI. Campul numeric valideaza intervalul 1..totalPages inainte de schimbare.","settings":"Marimi de pagina implicite: [10, 15, 25, 50, 100] (configurabile prin prop pageSizes). Prag de comprimare a numerelor de pagina: peste 7 pagini.","citations":["frontend/src/components/table-pagination.tsx:4-21","frontend/src/components/table-pagination.tsx:40-53"]},{"name":"Layout web fara chrome-ul Electron (v2.41.0)","what":"In browser aplicatia nu mai afiseaza banda de titlu si compensatorul pentru butoanele ferestrei — acestea exista doar pe desktop; in web nu mai ramane o banda alba moarta sus. Trepte de font ajustate per platforma.","how":"Detectie isDesktop = !!window.desktopApi; drag strip-ul de 32px (inaltimea titleBarOverlay) si padding-ul compensator se randeaza doar cand exista API-ul desktop.","citations":["frontend/src/App.tsx:147","frontend/src/App.tsx:154"]},{"name":"Sistem de toast-uri in-house (v2.42.0)","what":"Notificari scurte de succes/eroare pe toate mutatiile din aplicatie, fara dependinte externe: maximum 4 toast-uri simultan cu evictie FIFO, timerele curatate la unmount. Exporturile PDF Changelog/Manual primesc toast de EROARE — inainte esuau silentios.","how":"ToastProvider + hook-ul useToast; randare in portal, cap MAX=4, testare dedicata pe curatarea timerelor.","citations":["frontend/src/components/ui/toast.tsx:56","frontend/src/components/ui/toast.tsx:32"]},{"name":"Confirmari centralizate (ConfirmProvider, v2.42.0)","what":"TOATE actiunile ireversibile cer confirmare printr-un dialog unic si tematizat: stergere cheie tenant, inchidere alerta, bulk dismiss (cu count-ul real), revocare toate tokenurile API, schimbare rol/status, stergere cota, revocare grant. Zero window.confirm ramas in aplicatie.","how":"ConfirmProvider expune useConfirm() care returneaza o promisiune; dialogul e randat o singura data la radacina.","citations":["frontend/src/components/ui/confirm-dialog.tsx:26","frontend/src/components/ui/confirm-dialog.tsx:18"]},{"name":"Sortare pe coloane (useClientSort + SortableTh, v2.42.0)","what":"Tabelele Utilizatori, Audit, Consum si Monitorizare se sorteaza pe coloane cu un click pe antet; sortarea se face pe ETICHETELE umane afisate (nu pe token-urile brute), iar antetele au aria-sort si aria-label pentru screen-readere.","how":"Hook-ul generic useClientSort(rows, config) + componenta SortableTh; sortare client-side pe datele paginii.","citations":["frontend/src/hooks/useClientSort.ts:27","frontend/src/components/ui/sortable-th.tsx:18"]},{"name":"Select custom tematizat (v2.42.0)","what":"Select-urile native au fost inlocuite cu o componenta Select proprie: popup-ul de optiuni respecta tema (inclusiv dark mode, unde dropdown-urile native ramaneau albe pe unele platforme).","how":"Componente Select/SelectTrigger/SelectContent/SelectItem cu stilizare Tailwind si suport de tastatura.","citations":["frontend/src/components/ui/select.tsx:46","frontend/src/components/ui/select.tsx:119"]},{"name":"Etichete umane din surse unice (v2.42.0)","what":"Toate enum-urile backend afisate in UI trec prin helpere pure cu teste: statusul rularilor de monitorizare, rolurile si statusurile de utilizator, feature-urile de cota. Niciun token brut (ex. \"ai.single\", \"suspended\") nu mai ajunge in DOM.","how":"Pattern-ul stabilit de rnpmGapReason/rnpmProgressPhase extins: monitoringRunStatus, userLabels (userRoleLabel/userStatusLabel), quotaFeatureLabels.","citations":["frontend/src/lib/userLabels.ts:18","frontend/src/lib/quotaFeatureLabels.ts:29","frontend/src/lib/monitoringRunStatus.ts:1"]},{"name":"Fix focus useDialog (v2.42.0)","what":"Dialogurile nu mai fura focusul la fiecare re-render (bug care facea imposibila completarea formularelor din modale in anumite conditii); modalele de export au fost mutate pe acelasi hook.","how":"onClose tinut in ref, efectul de focus/escape ruleaza doar pe schimbarea lui [open], nu la fiecare render.","citations":["frontend/src/hooks/useDialog.ts:9"]},{"name":"Cache static corect + chunk-reload la deploy (v2.42.0)","what":"Dupa un rebuild pe server, browserul nu mai serveste bundle-uri vechi: HTML-ul se livreaza cu no-cache, iar asset-urile fingerprinted din /assets cu public, max-age=1 an, immutable. Daca un chunk lazy dispare la deploy (utilizator cu tab vechi), aplicatia face un reload o singura data.","how":"Cache-Control diferentiat in middleware-ul de static; guard-ul de chunk-reload foloseste sessionStorage in try/catch (nu crapa in medii fara storage) si un timestamp anti-bucla.","citations":["backend/src/middleware/static-frontend.ts:67","frontend/src/main.tsx:16"]}],"settings":[{"name":"Tema (light/dark)","where":"Buton in subsolul meniului lateral (sidebar-footer)","effect":"Comuta intregul aspect intre Mod Luminos si Mod Inchis (clasa 'dark' pe documentElement) si sincronizeaza title bar nativ Electron.","options":"light | dark","default":"Preferinta sistemului de operare (prefers-color-scheme); fallback light","citations":["frontend/src/hooks/useTheme.ts:6-10","frontend/src/hooks/useTheme.ts:19"]},{"name":"Persistenta tema (localStorage 'theme')","where":"localStorage, cheia 'theme'","effect":"Memoreaza tema aleasa intre sesiuni.","options":"light | dark","default":"negat (cade pe preferinta sistemului daca lipseste)","citations":["frontend/src/hooks/useTheme.ts:7","frontend/src/hooks/useTheme.ts:19"]},{"name":"Dimensiune font","where":"Control trepte in subsolul meniului lateral (butoane +/-, puncte, sau ciclare in mod colapsat)","effect":"Seteaza documentElement.style.fontSize, scaland tot textul aplicatiei (unitati rem).","options":"Mic=16px | Normal=18px | Mare=20px | Extra=22px","default":"Treapta 1 = Normal (18px)","citations":["frontend/src/hooks/useFontSize.ts:4-9","frontend/src/hooks/useFontSize.ts:21-25"]},{"name":"Persistenta font (localStorage 'portaljust-font-size')","where":"localStorage, cheia 'portaljust-font-size'","effect":"Memoreaza indexul treptei de font (validat 0..3) intre sesiuni.","options":"'0'..'3'","default":"1 (Normal)","citations":["frontend/src/hooks/useFontSize.ts:3","frontend/src/hooks/useFontSize.ts:11-22"]},{"name":"Colaps meniu lateral","where":"Buton in subsolul meniului lateral","effect":"Comuta intre meniu extins (cu etichete) si colapsat (doar pictograme + tooltip).","options":"extins | colapsat","default":"extins (collapsed=false), NU se persista","citations":["frontend/src/components/Sidebar.tsx:85","frontend/src/components/Sidebar.tsx:448"]},{"name":"Maxim intrari istoric cautari instante","where":"Cod, useSearchHistory (localStorage 'portaljust-search-history')","effect":"Limiteaza lista FIFO de istoric cautari dosare/termene; intrarile vechi sunt eliminate la depasire.","options":"constanta MAX_ENTRIES","default":"15","citations":["frontend/src/hooks/useSearchHistory.ts:5-6","frontend/src/hooks/useSearchHistory.ts:50"]},{"name":"Maxim intrari istoric RNPM","where":"Cod, useRnpmHistory (localStorage 'legal-dashboard-rnpm-history')","effect":"Limiteaza lista FIFO de istoric cautari RNPM.","options":"constanta MAX_ENTRIES","default":"15","citations":["frontend/src/hooks/useRnpmHistory.ts:5-6","frontend/src/hooks/useRnpmHistory.ts:39"]},{"name":"DOMPurify ALLOWED_TAGS (AI HTML)","where":"Cod, SanitizedHtml.tsx (AI_SANITIZE_CONFIG)","effect":"Restrange etichetele HTML permise in output-ul AI randat; restul sunt stripate.","options":"strong, em, b, i","default":"['strong','em','b','i']; ALLOWED_ATTR = [] (niciun atribut)","citations":["frontend/src/components/SanitizedHtml.tsx:4-8"]},{"name":"Marimi de pagina (TablePagination)","where":"Cod, table-pagination.tsx (DEFAULT_PAGE_SIZES), override prin prop pageSizes","effect":"Optiunile selectorului 'Rezultate pe pagina'.","options":"10, 15, 25, 50, 100 (configurabil per tabel)","default":"[10, 15, 25, 50, 100]","citations":["frontend/src/components/table-pagination.tsx:21","frontend/src/components/table-pagination.tsx:45"]},{"name":"Prag comprimare numere pagina","where":"Cod, table-pagination.tsx (getPageNumbers)","effect":"Sub acest numar de pagini se afiseaza toate; peste, se comprima cu '...' pastrand prima/ultima si curenta +/-1.","options":"numeric","default":"7","citations":["frontend/src/components/table-pagination.tsx:6"]},{"name":"ErrorBoundary variant","where":"Cod, ErrorBoundary.tsx (prop variant) — montat in main.tsx (app) si in jurul paginilor (page)","effect":"'app' = card full-screen cu reload complet; 'page' = card local cu buton Reincearca (reset fara reload), restul aplicatiei ramane functional.","options":"app | page","default":"n/a (obligatoriu la montare)","citations":["frontend/src/components/ErrorBoundary.tsx:29-33","frontend/src/components/ErrorBoundary.tsx:84-145"]},{"name":"Afisare mesaj eroare in dev","where":"Cod, ErrorBoundary.tsx (import.meta.env.DEV)","effect":"Mesajul tehnic al erorii apare doar in build dev; in productie e ascuns (tree-shaken de Vite).","options":"DEV | productie","default":"ascuns in productie","citations":["frontend/src/components/ErrorBoundary.tsx:82"]}],"keyFacts":[{"fact":"Trepte font","value":"4 (Mic/Normal/Mare/Extra)","citation":"frontend/src/hooks/useFontSize.ts:4-9"},{"fact":"Font Mic","value":"16px","citation":"frontend/src/hooks/useFontSize.ts:5"},{"fact":"Font Normal (default)","value":"18px","citation":"frontend/src/hooks/useFontSize.ts:6"},{"fact":"Font Mare","value":"20px","citation":"frontend/src/hooks/useFontSize.ts:7"},{"fact":"Font Extra","value":"22px","citation":"frontend/src/hooks/useFontSize.ts:8"},{"fact":"Treapta font implicita","value":"1 (Normal=18px)","citation":"frontend/src/hooks/useFontSize.ts:21"},{"fact":"Max intrari istoric cautari instante","value":"15","citation":"frontend/src/hooks/useSearchHistory.ts:6"},{"fact":"Max intrari istoric RNPM","value":"15","citation":"frontend/src/hooks/useRnpmHistory.ts:6"},{"fact":"DOMPurify ALLOWED_TAGS","value":"strong, em, b, i","citation":"frontend/src/components/SanitizedHtml.tsx:4"},{"fact":"DOMPurify ALLOWED_ATTR","value":"[] (niciunul)","citation":"frontend/src/components/SanitizedHtml.tsx:7"},{"fact":"Marimi pagina implicite","value":"10, 15, 25, 50, 100","citation":"frontend/src/components/table-pagination.tsx:21"},{"fact":"Prag comprimare numere pagina","value":"7","citation":"frontend/src/components/table-pagination.tsx:6"},{"fact":"Index pagina intern","value":"0-based, afisat 1-based","citation":"frontend/src/components/table-pagination.tsx:116-119"},{"fact":"Cheie localStorage tema","value":"theme","citation":"frontend/src/hooks/useTheme.ts:7"},{"fact":"Cheie localStorage font","value":"portaljust-font-size","citation":"frontend/src/hooks/useFontSize.ts:3"},{"fact":"Cheie localStorage istoric cautari","value":"portaljust-search-history","citation":"frontend/src/hooks/useSearchHistory.ts:5"},{"fact":"Cheie localStorage istoric RNPM","value":"legal-dashboard-rnpm-history","citation":"frontend/src/hooks/useRnpmHistory.ts:5"}],"routes":["Subsol sidebar (SidebarFooter) — prezent pe toate paginile","ErrorBoundary variant=app montat in main.tsx in jurul intregului <App/>","PageBoundary (variant=page) in jurul fiecarui slot de pagina + Sidebar + ApiKeyDialog"],"notes":"Setarile globale persistente (tema, font, ambele istoricuri) folosesc EXCLUSIV localStorage, fara backend — deci sunt per-browser/per-dispozitiv, nu per-cont. Toate accesele la localStorage pentru istoric sunt protejate try/catch prin helperul comun _localStorageList (gestioneaza mod privat Safari / quota exceeded fara a sparge UI-ul). Colapsarea meniului NU se persista (in-memory useState, porneste mereu extins). ErrorBoundary prinde doar erori de render/lifecycle/constructor — NU event handlers sau cod async; componentStack ramane doar in consola (nu in DOM) pentru a nu scapa detalii interne. Mesajul tehnic al erorii e ascuns in productie (import.meta.env.DEV tree-shaken de Vite). DOMPurify aplicat pe tot output-ul AI (defense-in-depth XSS) cu lista alba minimala de etichete si zero atribute. Inconsistenta minora: comentariul din useFontSize.ts:21 spune eronat 'Normal (16px)' desi valoarea reala a treptei default e 18px.","key":"ui-chrome"},{"module":"Export (Excel & PDF)","icon":"📤","overview":"Modulul de export este o capabilitate transversala care permite descarcarea rezultatelor din aplicatie ca fisiere Excel (.xlsx) stilizate sau PDF profesionale. Acopera dosare, termene, avize RNPM, joburi de monitorizare, alerte, raportul dashboard, analizele AI, manualul de utilizare si changelog-ul. Pentru fisierele mari, exporturile Excel ruleaza server-side prin streaming (ExcelJS WorkbookWriter / PDFKit) ca sa nu blocheze sau sa duca la OOM rendererul Electron, iar exporturile PDF client-side ruleaza intr-un Web Worker dedicat ca sa pastreze UI-ul responsiv. Toate exporturile Excel aplica o protectie anti formula-injection, iar toate PDF-urile strip-uiesc diacriticele (fontul Helvetica din jsPDF/PDFKit nu are glife pentru ele).","features":[{"name":"Export dosare Excel","what":"Descarca lista de dosare (sau doar selectia) intr-un fisier Excel cu doua foi: una cu informatiile de baza si una cu toate sedintele. Coloana numar dosar contine hyperlink catre portal.just.ro / scj.ro.","how":"Frontend deleaga la backend POST /api/dosare/export.xlsx; serverul construieste workbook-ul prin ExcelJS stream WorkbookWriter intr-un fisier temporar, apoi il streamuieste ca attachment. Body limit 25MB, max 5000 dosare.","settings":"Export selectiv: daca exista checkbox-uri bifate, butonul arata numarul selectat si exporta doar acele dosare; altfel exporta tot.","citations":["frontend/src/lib/export-dosare.ts:152","backend/src/routes/dosare.ts:92","backend/src/services/dosareExportXlsx.ts:1"]},{"name":"Export dosare PDF","what":"Genereaza un PDF Landscape A4 cu tabel colorat (8 coloane: #, Numar Dosar, Data, Institutie, Categorie/Stadiu, Obiect, Parti, Sedinte), header albastru, paginare automata si link clicabil pe numarul de dosar.","how":"Builder-ul buildDosarePdf ruleaza in Web Worker (export.worker.ts) prin jsPDF + jsPDF-autotable; orchestratorul triggeruieste download-ul pe main thread. Source-aware: ICCJ linkeaza la scj.ro, restul la portal.just.ro.","citations":["frontend/src/lib/export-dosare.ts:56","frontend/src/lib/export-dosare.ts:157"]},{"name":"Export termene Excel","what":"Descarca termenele intr-o foaie Excel cu 7 coloane (numar dosar, data, ora, institutie, complet, solutie, sumar), auto-dimensionate, cu hyperlink pe coloana dosar.","how":"Frontend deleaga la POST /api/termene/export.xlsx; backend foloseste ExcelJS streaming. Body limit 25MB, max 100.000 termene.","citations":["frontend/src/lib/export-termene.ts:121","backend/src/routes/termene.ts:24","backend/src/services/termeneExportXlsx.ts:1"]},{"name":"Export termene PDF","what":"PDF Landscape A4 cu tabel de 8 coloane (#, Numar Dosar, Data, Ora, Institutie, Complet, Solutie, Sumar), header albastru, link pe numarul de dosar catre portal.just.ro.","how":"buildTermenePdf ruleaza in Web Worker prin jsPDF + autotable, triggerDownload pe main thread.","citations":["frontend/src/lib/export-termene.ts:34","frontend/src/lib/export-termene.ts:126"]},{"name":"Export avize RNPM Excel","what":"Workbook multi-foaie pentru avizele RNPM salvate: foaia principala Avize plus foile copil Creditori, Parti, Bunuri, Istoric, cu hyperlink-uri interne de navigare intre aviz si detaliile sale (si inapoi). Pentru cautari de tip specifice, foaia Creditori si coloana aferenta sunt omise.","how":"Builderul buildRnpmXlsx exista atat client-side (rnpmExport.ts) cat si server-side (rnpmExportXlsx.ts). In productie ruleaza server-side prin POST /api/rnpm/saved/export.xlsx (ExcelJS streaming) pentru ca pe ~150 avize heap-ul client atingea ~2.7GB si rendererul Electron primea OOM. Max 5000 avize, body limit 256KB.","settings":"Layout-ul depinde de searchType (specifice vs general). Numele fisierului: identificatorul avizului daca e unul singur, altfel rnpm_<searchType>_<data>.","citations":["frontend/src/lib/rnpmExport.ts:75","frontend/src/lib/rnpmExport.ts:514","backend/src/routes/rnpm.ts:998","backend/src/services/rnpmExportXlsx.ts:1"]},{"name":"Export avize RNPM PDF","what":"PDF Landscape A4 cu avizele RNPM si detaliile lor (parti, bunuri).","how":"buildRnpmPdf server-side prin PDFKit streaming, POST /api/rnpm/saved/export.pdf; max 5000 avize, body limit 256KB.","citations":["backend/src/routes/rnpm.ts:1037","backend/src/services/rnpmExportPdf.ts:1","frontend/src/lib/rnpmExport.ts:535"]},{"name":"Export joburi monitorizare (Excel + PDF)","what":"Exporta joburile de monitorizare (sau selectia) cu 8 coloane: #, Tinta, Tip, Cadenta, Ultima rulare, Urmatoarea verificare, Status, Note. Coloana Tinta are link catre portal.just.ro pentru joburi dosar_soap si name_soap.","how":"buildMonitoringXlsx / buildMonitoringPdf ruleaza in Web Worker (xlsx-js-style / jsPDF). Cadenta se formateaza in z/h/min, tipul tradus (Dosar/Nume/Aviz RNPM/ICCJ).","citations":["frontend/src/lib/export-monitoring.ts:93","frontend/src/lib/export-monitoring.ts:143","frontend/src/lib/export-monitoring.ts:239"]},{"name":"Export alerte (modal AlertsExportModal)","what":"Modal pe pagina /alerts cu trei surse de randuri: doar selectia (checkbox-uri), toate cele filtrate (filtrele din toolbar), sau un interval custom de date. Fisierul contine link-uri catre dosare pe portal.just.ro.","how":"Backend construieste direct XLSX (ExcelJS WorkbookWriter streaming) sau PDF (PDFKit streaming) prin POST /api/v1/alerts/export.xlsx / export.pdf. Probe pe total inainte de generare; daca depaseste 10.000 randuri returneaza 413. Modul implicit: ids daca exista selectie, altfel filters.","settings":"Sursa randuri: ids / filters / range. Format: xlsx sau pdf (default pdf). Interval custom: doua campuri de tip date (de la / pana la), validare ca inceputul e inainte de sfarsit.","citations":["frontend/src/components/AlertsExportModal.tsx:66","backend/src/routes/alerts.ts:639","backend/src/routes/alerts.ts:66","backend/src/services/alertsExportXlsx.ts:121","backend/src/services/alertsExportPdf.ts:171"]},{"name":"Export raport dashboard (modal ReportExportModal)","what":"Modal din Quick Actions care exporta un snapshot consistent al dashboard-ului (KPI 24h + activitate zilnica + cronologie) pentru ultimele 7 sau 30 zile, in Excel (3 foi: Sumar, Activitate zilnica, Cronologie) sau PDF Landscape (3 tabele).","how":"Cere snapshot-ul atomic via dashboardApi.report (un singur round-trip sub withMaintenanceRead), apoi deleaga buildReportXlsx/buildReportPdf in Web Worker. AbortController anuleaza request-ul la inchiderea modalului.","settings":"Interval: 7d (Ultimele 7 zile) / 30d (Ultimele 30 zile), default 7d. Format: xlsx (default) / pdf.","citations":["frontend/src/components/dashboard/ReportExportModal.tsx:27","frontend/src/lib/export-report.ts:88","frontend/src/lib/export-report.ts:271"]},{"name":"Export analiza AI PDF","what":"Dupa generarea unei analize AI (simpla sau avansata multi-agent), exporta un PDF Portrait A4 cu header, card de informatii dosar, continut formatat tip markdown (titluri, liste, paragrafe) si footer pe fiecare pagina. Pentru analiza avansata include mentiunea modelului judecator.","how":"buildAnalysisPdf ruleaza in Web Worker prin jsPDF; renderContent parseaza linii markdown-like. Numele fisierului: analiza-<numarDosar>.pdf.","settings":"type: simple / advanced; judgeModel optional (afisat doar la advanced).","citations":["frontend/src/lib/export-analysis.ts:22","frontend/src/lib/export-analysis.ts:247"]},{"name":"Export manual de utilizare PDF","what":"Genereaza manualul complet al aplicatiei ca PDF Portrait A4 cu coperta, cuprins si 14 capitole (prezentare, dashboard, cautare, termene, load more, export, AI, multi-agent, chei API, sidebar, personalizare, securitate, monitorizare, alerte), cu footer si numerotare pe fiecare pagina.","how":"buildManualPdf ruleaza in Web Worker prin jsPDF; continutul capitolelor e hardcodat in builder. Numele: Legal-Dashboard-Manual-v<versiune>.pdf.","citations":["frontend/src/lib/export-manual.ts:12","frontend/src/lib/export-manual.ts:510"]},{"name":"Export changelog PDF","what":"Exporta changelog-ul complet al aplicatiei ca PDF Portrait A4 cu coperta colorata (versiune curenta, numar versiuni documentate, data, cuprins cu max 16 versiuni) si pagini de continut cu bannere colorate per versiune, sectiuni si bullet-uri.","how":"exportChangelogPdf incarca jsPDF on-demand si itereaza peste versions din changelog-entries; paleta de culori se deriva din clasa Tailwind borderColor a fiecarei versiuni. Mapeaza unicode/diacritice la Latin-1 inainte de randare. Numele: legal-dashboard-changelog-v<versiune>.pdf.","citations":["frontend/src/lib/changelog-pdf.ts:55","frontend/src/lib/changelog-pdf.ts:171","frontend/src/lib/changelog-pdf.ts:285"]},{"name":"Protectie anti formula-injection (Excel)","what":"Orice celula text care incepe cu =, +, -, @, tab sau CR este prefixata cu apostrof, ca Excel/LibreOffice sa o trateze ca text simplu si sa nu execute formula. Protejeaza impotriva CSV/formula injection.","how":"Functia sanitizeFormulaCells (client) si helper-ul safeCell (server) aplica regex-ul /^[=+\\-@\\t\\r]/ pe toate celulele de tip string inainte de scriere.","citations":["frontend/src/lib/excel-helpers.ts:33","backend/src/services/alertsExportXlsx.ts:27"]},{"name":"Strip diacritice in PDF","what":"Toate exporturile PDF inlocuiesc diacriticele romanesti cu echivalente fara diacritice, pentru ca fontul Helvetica (jsPDF/PDFKit) foloseste WinAnsi/Latin-1 si nu are glife pentru ele (altfel apar artefacte de spatiere). Exporturile Excel pastreaza diacriticele.","how":"stripDiacritics (jsPDF) face replace pe ăâîșț etc; varianta PDFKit foloseste normalize NFD + strip combining marks. Changelog-ul foloseste in plus un CHAR_MAP pentru punctuatie unicode (—, –, →, ghilimele).","citations":["frontend/src/lib/pdf-helpers.ts:21","backend/src/services/alertsExportPdf.ts:41","frontend/src/lib/changelog-pdf.ts:6"]},{"name":"Generare in Web Worker (client)","what":"Exporturile construite pe client (PDF dosare/termene/monitorizare/analiza/manual, plus XLSX/PDF raport si XLSX monitorizare) ruleaza intr-un worker dedicat ca UI-ul sa ramana responsiv pe rezultate mari.","how":"runExportInWorker instantiaza export.worker.ts, trimite job-ul, primeste ArrayBuffer-ul transferabil si termina worker-ul; main thread doar declanseaza download-ul.","citations":["frontend/src/lib/export.worker.ts:1","frontend/src/lib/exportRunner.ts:3"]},{"name":"Streaming server-side cu cleanup","what":"Exporturile server-side scriu intr-un fisier temporar, il streamuiesc ca attachment cu Content-Disposition (filename ASCII + filename* UTF-8) si Cache-Control no-store, apoi sterg fisierul cand stream-ul se inchide.","how":"streamExportResult / handlerele rnpm folosesc createReadStream + Readable.toWeb; unlink pe evenimentul close al stream-ului ca sa nu stearga inainte de consumarea raspunsului.","citations":["backend/src/routes/dosare.ts:68","backend/src/routes/rnpm.ts:1018"]}],"settings":[{"name":"Interval raport dashboard","where":"ReportExportModal (dialog Export raport)","effect":"Selecteaza fereastra de timp a snapshot-ului exportat","options":"7d / 30d","default":"7d","citations":["frontend/src/components/dashboard/ReportExportModal.tsx:28","frontend/src/components/dashboard/ReportExportModal.tsx:138"]},{"name":"Format raport dashboard","where":"ReportExportModal","effect":"Alege tipul fisierului generat","options":"xlsx (Excel) / pdf","default":"xlsx","citations":["frontend/src/components/dashboard/ReportExportModal.tsx:29"]},{"name":"Sursa randuri alerte","where":"AlertsExportModal","effect":"Determina ce randuri intra in export: selectia curenta, rezultatul filtrelor din toolbar sau un interval custom","options":"ids / filters / range","default":"ids daca exista selectie, altfel filters","citations":["frontend/src/components/AlertsExportModal.tsx:73","frontend/src/components/AlertsExportModal.tsx:89"]},{"name":"Format export alerte","where":"AlertsExportModal","effect":"Tipul fisierului generat","options":"xlsx / pdf","default":"pdf","citations":["frontend/src/components/AlertsExportModal.tsx:74","frontend/src/components/AlertsExportModal.tsx:85"]},{"name":"Interval custom alerte (de la / pana la)","where":"AlertsExportModal (mod range)","effect":"Defineste intervalul de date; include si alertele inchise; valideaza ca de la <= pana la","options":"doua campuri date (ISO local -> UTC)","default":"gol","citations":["frontend/src/components/AlertsExportModal.tsx:283","frontend/src/components/AlertsExportModal.tsx:139"]},{"name":"Export selectiv dosare/termene","where":"Butoane export din tabelele Dosare / Termene","effect":"Daca exista randuri bifate exporta doar selectia (butonul arata numarul), altfel exporta toate rezultatele","options":"selectie / tot","default":"tot (cand nu e nimic bifat)","citations":["frontend/src/lib/export-manual.ts:329"]},{"name":"searchType RNPM","where":"Parametru intern al exportului RNPM (POST /saved/export.xlsx|pdf)","effect":"Controleaza layout-ul: la searchType=specifice se omit foaia Creditori si coloana aferenta; influenteaza si numele fisierului","options":"string <= 64 caractere (ex. specifice)","default":"undefined","citations":["frontend/src/lib/rnpmExport.ts:80","backend/src/routes/rnpm.ts:1006"]},{"name":"Limita randuri export alerte","where":"Backend constanta (alerts.ts)","effect":"Probe pe total inainte de generare; peste limita returneaza 413 cu count real","options":"numeric","default":"10000 (ALERT_EXPORT_MAX_ROWS)","citations":["backend/src/routes/alerts.ts:66","backend/src/routes/alerts.ts:414"]},{"name":"Limita body export alerte","where":"Backend bodyLimit (alerts.ts)","effect":"Respinge payload-ul de export prea mare cu 413","options":"bytes","default":"256KB (ALERT_EXPORT_BODY_LIMIT)","citations":["backend/src/routes/alerts.ts:67"]},{"name":"Limita dosare per export","where":"Backend (dosare.ts + validation.ts)","effect":"Respinge exportul cu peste 5000 dosare (400)","options":"numeric","default":"5000 (MAX_DOSARE_RESPONSE)","citations":["backend/src/routes/dosare.ts:58","backend/src/util/validation.ts:7"]},{"name":"Limita body export dosare","where":"Backend bodyLimit (dosare.ts)","effect":"Hard cap inainte de incarcarea payload-ului in RAM (413)","options":"bytes","default":"25MB (EXPORT_BODY_LIMIT)","citations":["backend/src/routes/dosare.ts:22"]},{"name":"Limita termene per export","where":"Backend (termene.ts)","effect":"Respinge exportul cu peste 100.000 termene (400)","options":"numeric","default":"100000 (MAX_TERMENE_EXPORT)","citations":["backend/src/routes/termene.ts:24","backend/src/routes/termene.ts:64"]},{"name":"Limita avize RNPM per export","where":"Backend (rnpm.ts handlers export.xlsx/pdf)","effect":"Respinge exportul cu peste 5000 avize (invalidParams)","options":"numeric","default":"5000","citations":["backend/src/routes/rnpm.ts:1005","backend/src/routes/rnpm.ts:1044"]},{"name":"Limita body export RNPM","where":"Backend bodyLimit (rnpm.ts)","effect":"Respinge payload-ul de export prea mare (413); acopera pana la ~5000 id-uri numerice","options":"bytes","default":"256KB (EXPORT_BODY_LIMIT)","citations":["backend/src/routes/rnpm.ts:42","backend/src/routes/rnpm.ts:60"]},{"name":"Versiuni afisate pe coperta changelog","where":"Builder changelog-pdf.ts (cuprins coperta)","effect":"Limiteaza cate versiuni apar in cuprinsul de pe coperta (continutul complet ramane in pagini)","options":"numeric","default":"16 (maxCoverVersions = min(versions.length,16))","citations":["frontend/src/lib/changelog-pdf.ts:171"]}],"keyFacts":[{"fact":"Regex protectie formula-injection Excel (prefix cu apostrof)","value":"/^[=+\\-@\\t\\r]/","citation":"frontend/src/lib/excel-helpers.ts:33"},{"fact":"Limita randuri export alerte (ALERT_EXPORT_MAX_ROWS)","value":"10000","citation":"backend/src/routes/alerts.ts:66"},{"fact":"Limita body export alerte (ALERT_EXPORT_BODY_LIMIT)","value":"256 KB","citation":"backend/src/routes/alerts.ts:67"},{"fact":"Limita dosare per export (MAX_DOSARE_RESPONSE)","value":"5000","citation":"backend/src/util/validation.ts:7"},{"fact":"Limita body export dosare/termene (EXPORT_BODY_LIMIT)","value":"25 MB","citation":"backend/src/routes/dosare.ts:22"},{"fact":"Limita termene per export (MAX_TERMENE_EXPORT)","value":"100000","citation":"backend/src/routes/termene.ts:24"},{"fact":"Limita avize RNPM per export","value":"5000","citation":"backend/src/routes/rnpm.ts:1005"},{"fact":"Limita body export RNPM","value":"256 KB","citation":"backend/src/routes/rnpm.ts:42"},{"fact":"Versiuni max pe coperta changelog","value":"16","citation":"frontend/src/lib/changelog-pdf.ts:171"},{"fact":"Capitole in manualul de utilizare PDF","value":"14","citation":"frontend/src/lib/export-manual.ts:136"},{"fact":"PDF alerte/RNPM dimensiune pagina (A4 landscape, px)","value":"842 x 595","citation":"backend/src/services/alertsExportPdf.ts:20"},{"fact":"Detalii timeline truncate in celula Excel raport","value":"800 caractere","citation":"frontend/src/lib/export-report.ts:214"},{"fact":"Foi in workbook-ul RNPM Excel","value":"Avize + Creditori + Parti + Bunuri + Istoric (Creditori omis la searchType=specifice)","citation":"frontend/src/lib/rnpmExport.ts:478"},{"fact":"Foi in raportul dashboard Excel","value":"Sumar, Activitate zilnica, Cronologie","citation":"frontend/src/lib/export-report.ts:245"},{"fact":"MIME Excel","value":"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet","citation":"frontend/src/lib/rnpmExport.ts:71"},{"fact":"Header culoare titlu/header Excel","value":"BLUE_DARK 1E40AF / BLUE_MAIN 2563EB","citation":"frontend/src/lib/excel-helpers.ts:68"},{"fact":"Lungime max searchType RNPM acceptata","value":"64 caractere","citation":"backend/src/routes/rnpm.ts:1007"}],"endpoints":[{"method":"POST","path":"/api/dosare/export.xlsx","purpose":"Genereaza si streamuieste Excel cu dosarele (server-side, ExcelJS streaming)"},{"method":"POST","path":"/api/termene/export.xlsx","purpose":"Genereaza si streamuieste Excel cu termenele (server-side streaming)"},{"method":"POST","path":"/api/rnpm/saved/export.xlsx","purpose":"Export Excel multi-foaie pentru avizele RNPM salvate (max 5000)"},{"method":"POST","path":"/api/rnpm/saved/export.pdf","purpose":"Export PDF pentru avizele RNPM salvate (PDFKit streaming)"},{"method":"POST","path":"/api/v1/alerts/export.xlsx","purpose":"Export Excel alerte (moduri ids/filters/range, cap 10k randuri)"},{"method":"POST","path":"/api/v1/alerts/export.pdf","purpose":"Export PDF alerte (PDFKit streaming, cap 10k randuri)"},{"method":"GET","path":"/api/v1/dashboard/report","purpose":"Snapshot atomic (summary+charts+timeline) consumat de exportul raportului dashboard"}],"routes":["/alerts (AlertsExportModal)","/dashboard (ReportExportModal din Quick Actions)","/changelog (export changelog PDF)","Dosare / Termene (butoane export Excel+PDF in tabele)","RNPM avize salvate (export Excel/PDF)","Monitorizare (export Excel/PDF joburi)"],"notes":"Securitate: toate exporturile Excel aplica anti formula-injection (prefix apostrof pe celule care incep cu =,+,-,@,tab,CR) identic pe client (sanitizeFormulaCells) si server (safeCell). Exporturile mari ruleaza server-side cu streaming (ExcelJS WorkbookWriter / PDFKit) in fisier temporar curatat la inchiderea stream-ului, decizie luata dupa un OOM al rendererului Electron pe ~150 avize RNPM (heap ~2.7GB) — vezi nota din rnpmExport.ts:514. Exporturile client-side ruleaza in Web Worker (export.worker.ts) pentru a nu bloca main thread-ul, cu ArrayBuffer transferat (zero-copy). Toate PDF-urile strip-uiesc diacriticele (Helvetica WinAnsi/Latin-1); Excel-ul le pastreaza. Content-Disposition include filename ASCII si filename* UTF-8 (RFC 5987), Cache-Control: no-store. Limitele de payload/randuri sunt aplicate fail-fast la nivel de framework (bodyLimit) si prin probe pe total inainte de generare (413 cu count real).","key":"exports"},{"module":"Desktop, Securitate & ENV","icon":"🛡️","overview":"Acest modul reprezinta \"carcasa
