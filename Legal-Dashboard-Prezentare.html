-ai"},{"module":"Termene & Calendar","icon":"📅","overview":"Modulul Termene & Calendar (ruta /termene) afiseaza toate sedintele (termenele) asociate dosarelor gasite intr-o cautare. Utilizatorul cauta cu acelasi formular ca la Dosare (numar dosar, parte, obiect, institutie, interval de date, sursa PortalJust sau ICCJ), iar aplicatia extrage server-side toate sedintele din dosarele rezultate si le prezinta in doua moduri comutabile: un Tabel sortabil/paginabil cu rand expandabil si un Calendar lunar cu detalii pe zi. Deasupra rezultatelor exista carduri de metrici (Viitoare / Trecute / Cu Solutie) care functioneaza si ca filtre rapide, plus un grafic de distributie pe luni. Rezultatele pot fi exportate in Excel (server-side) si PDF (in worker), individual sau pe selectie, iar fiecare termen permite adaugarea dosarului la monitorizare automata.","routes":["/termene (pagina UI, comutator Tabel/Calendar)","GET /api/termene (cautare termene PortalJust)","POST /api/termene/load-more (SSE incarcare extinsa)","GET /api/termene-iccj (cautare termene ICCJ scj.ro)","POST /api/v1/termene/export.xlsx (export Excel server-side)"],"endpoints":[{"method":"GET","path":"/api/termene","purpose":"Cauta dosare in PortalJust (SOAP) si returneaza toate sedintele extrase, sortate descrescator dupa data; raspuns { data, total, dosareCount }. Necesita cel putin numarDosar, obiectDosar sau numeParte."},{"method":"POST","path":"/api/termene/load-more","purpose":"Stream SSE care reia cautarea pe intervale lunare cand prima cautare a atins plafonul de 1000 dosare; emite evenimente start/progress/batch/done/error si deduplica dosarele deja aduse."},{"method":"GET","path":"/api/termene-iccj","purpose":"Cauta dosare la Inalta Curte (scraping scj.ro) si returneaza toate sedintele lor; raspuns include dosareCount si truncated cand s-au gasit mai multe dosare decat limita procesata."},{"method":"POST","path":"/api/v1/termene/export.xlsx","purpose":"Construieste fisierul Excel al termenelor server-side si il livreaza ca stream descarcabil (Content-Disposition attachment)."}],"features":[{"name":"Formular de cautare identic cu Dosare","what":"Utilizatorul cauta termene folosind exact aceleasi campuri ca la cautarea de dosare: numar dosar, nume parte, obiect, institutie, plus interval de date si comutator de sursa (PortalJust / ICCJ).","how":"Pagina rendareaza acelasi <SearchForm> cu showDateRange si showSourceToggle activate; la submit, handleSearch ruteaza catre api.termene.searchIccj (sursa iccj) sau api.termene.search (PortalJust). Categorii si stadii sunt scoase din params si folosite ca filtre client-side.","citations":["frontend/src/pages/Termene.tsx:126","frontend/src/pages/Termene.tsx:305","frontend/src/pages/Termene.tsx:143","frontend/src/pages/Termene.tsx:163"]},{"name":"Comutator Tabel / Calendar","what":"Doua butoane in antetul paginii comuta intre vizualizarea tabelara si calendarul lunar al termenelor. Comutatorul apare doar cand exista rezultate.","how":"Stare locala viewMode ('table' | 'calendar'), default 'table'; butoanele apar conditionat cand state.allTermene.length > 0 si schimba componenta randata (TermeneTable vs CalendarView).","citations":["frontend/src/pages/Termene.tsx:16","frontend/src/pages/Termene.tsx:101","frontend/src/pages/Termene.tsx:289","frontend/src/pages/Termene.tsx:394"]},{"name":"Carduri de metrici cu filtrare (Viitoare / Trecute / Cu Solutie)","what":"Patru carduri arata Total Termene, Termene Viitoare, Termene Trecute si Cu Solutie. Click pe Viitoare/Trecute/Cu Solutie filtreaza lista (logica OR, se pot combina); click pe Total anuleaza toate filtrele.","how":"TermeneMetrics calculeaza viitoare/trecute folosind start-of-day (un termen de azi conteaza ca viitor) si solvedCount (solutie ne-goala). Filtrele active sunt ridicate in Termene.tsx prin filterByMetrics; cardurile active primesc inel vizual. Metricile nu apar pentru sursa ICCJ.","citations":["frontend/src/components/TermeneMetrics.tsx:38","frontend/src/components/TermeneMetrics.tsx:67","frontend/src/components/TermeneMetrics.tsx:99","frontend/src/pages/Termene.tsx:68","frontend/src/pages/Termene.tsx:381"],"settings":"Lazy-loaded (recharts e greu, se monteaza doar cand exista rezultate); cardul Total devine clickabil doar cand exista filtre active."},{"name":"Grafic distributie termene viitoare pe luni","what":"Sub carduri, un grafic cu bare arata cate termene viitoare cad pe fiecare luna (maxim 8 luni). Poate fi ascuns/aratat.","how":"BarChart din recharts pe monthData (grupate dupa an-luna, sortate, primele 8), cu tooltip personalizat. Buton Ascunde/Arata controleaza starea expanded (default expandat).","citations":["frontend/src/components/TermeneMetrics.tsx:61","frontend/src/components/TermeneMetrics.tsx:143","frontend/src/components/TermeneMetrics.tsx:34","frontend/src/components/TermeneMetrics.tsx:152"],"settings":"expanded default true; maxim 8 luni afisate; maxBarSize 40."},{"name":"Tabel termene cu coloane fixe","what":"Tabelul afiseaza coloanele: checkbox selectie, Numar Dosar (link extern), Data, Ora, Institutie, Complet, Solutie. Randurile viitoare sunt evidentiate cu fundal usor.","how":"Capul de tabel itereaza ['Numar Dosar','Data','Ora','Institutie','Complet','Solutie']; randurile viitoare (isViitor, data >= azi) primesc bg-primary/5; institutia e normalizata prin normalizeInstitutie; solutia arata si solutieSumar trunchiat.","citations":["frontend/src/components/TermeneTable.tsx:248","frontend/src/components/TermeneTable.tsx:280","frontend/src/components/TermeneTable.tsx:163","frontend/src/components/TermeneTable.tsx:347"]},{"name":"Badge Viitor","what":"Termenele cu data in viitor (azi sau ulterior) primesc un badge verde 'Viitor' langa data.","how":"isViitor(t.data) compara data parsata cu today (setat la 00:00:00); daca >= azi, rendareaza <Badge variant=success> 'Viitor'.","citations":["frontend/src/components/TermeneTable.tsx:160","frontend/src/components/TermeneTable.tsx:331"]},{"name":"Rand expandabil cu detalii termen","what":"Click pe un rand il extinde si arata detalii: buton de monitorizare, categorie caz, stadiu procesual, obiect, solutia completa cu sumar si lista partilor (cu evidentierea numelui cautat). Aplicatia deruleaza automat la detaliul deschis.","how":"toggleRow tine un singur rand deschis (Set cu o cheie); TermeneExpandedDetail rendareaza badge-urile si partile, evidentiind searchedName via HighlightName. Un useEffect deruleaza smooth catre randul expandat dupa 50ms.","citations":["frontend/src/components/TermeneTable.tsx:86","frontend/src/components/TermeneTable.tsx:365","frontend/src/components/termene-table-detail-row.tsx:15","frontend/src/components/TermeneTable.tsx:99"]},{"name":"Marcaj vizualizat / nevizualizat","what":"Fiecare dosar nevizualizat are un punct albastru pulsatil; dupa ce randul a fost deschis o data, marcajul devine o pictograma de ochi 'Vizualizat'. Starea se pastreaza pe durata sesiunii.","how":"viewedTermene este un Set persistat in sessionStorage sub cheia 'viewedTermene'; markAsViewed adauga numarDosar la prima expandare; UI alege intre punct ping si iconul Eye.","citations":["frontend/src/components/TermeneTable.tsx:36","frontend/src/components/TermeneTable.tsx:72","frontend/src/components/TermeneTable.tsx:298"]},{"name":"Monitorizare dosar din termen","what":"Din randul expandat, butonul 'Monitorizeaza schimbari' adauga dosarul la monitorizarea automata. Feedback: 'Se adauga...', 'Adaugat la monitorizare' sau 'Deja monitorizat', partajat intre termenele aceluiasi dosar.","how":"handleMonitor apeleaza monitoring.createDosar cu un client_request_id idempotent; daca created_at e mai vechi de 5s, considera ca dosarul exista deja ('exists'), altfel 'added'. Starea e cheiata pe numarDosar.","citations":["frontend/src/components/TermeneTable.tsx:49","frontend/src/components/TermeneTable.tsx:59","frontend/src/components/termene-table-detail-row.tsx:25"]},{"name":"Selectie multipla si paginare","what":"Utilizatorul poate bifa termene individuale sau toata pagina (checkbox in cap), cu buton 'Deselecteaza tot'; selectia se foloseste la export. Tabelul are paginare cu marimi 10/20/50/100 (default 20).","how":"selected este un Set de chei compuse stabile (numarDosar|data|ora|complet) ca sa supravietuiasca filtrarii/sortarii; paged taie lista dupa page*pageSize; un useEffect reseteaza pagina cand lista se micsoreaza sub pagina curenta.","citations":["frontend/src/components/TermeneTable.tsx:136","frontend/src/components/TermeneTable.tsx:138","frontend/src/components/TermeneTable.tsx:29","frontend/src/components/TermeneTable.tsx:398","frontend/src/components/TermeneTable.tsx:173"],"settings":"pageSize default 20; optiuni [10,20,50,100]; paginarea apare doar cand totalPages > 1."},{"name":"Export Excel si PDF","what":"Doua butoane exporta termenele in Excel si PDF. Daca exista randuri selectate, exporta doar selectia (numarul apare pe buton, ex. 'Excel (3)'), altfel exporta toate termenele afisate.","how":"Excel se genereaza server-side (api.termene.exportXlsxBlob -> POST /v1/termene/export.xlsx) si se descarca ca blob; PDF se construieste intr-un worker (buildTermenePdf, jsPDF landscape A4) cu coloane #, Numar Dosar (link PortalJust), Data, Ora, Institutie, Complet, Solutie, Sumar. Butoanele arata spinner in timpul exportului.","citations":["frontend/src/components/TermeneTable.tsx:197","frontend/src/components/TermeneTable.tsx:213","frontend/src/lib/export-termene.ts:121","frontend/src/lib/export-termene.ts:34","backend/src/routes/termene.ts:98"],"settings":"Maxim 100.000 termene per export (MAX_TERMENE_EXPORT); limita body export 25MB."},{"name":"Vizualizare Calendar lunar","what":"Calendarul arata o grila lunara (luni-duminica) cu puncte sub zilele care au termene (sau '{n} term.' cand sunt peste 3), evidentiaza ziua curenta si permite navigarea intre luni. Click pe o zi deschide un panou lateral cu termenele acelei zile.","how":"CalendarView grupeaza termenele dupa zi pentru luna/anul curent (termeneByDay); construieste grila cu startDow (luni=0) si celule goale de padding; prevMonth/nextMonth schimba luna/anul si reseteaza ziua selectata. Panoul lateral listeaza cardurile zilei selectate.","citations":["frontend/src/components/CalendarView.tsx:70","frontend/src/components/CalendarView.tsx:83","frontend/src/components/CalendarView.tsx:53","frontend/src/components/CalendarView.tsx:148"],"settings":"Luni in romana (MONTHS_RO); zile Lu-Du; prag de 3 termene/zi pentru a comuta de la puncte la text '{n} term.'."},{"name":"Card termen expandabil in Calendar","what":"In panoul zilei, fiecare termen e un card cu numar dosar (link extern), ora, institutie, complet si solutie (badge). Click extinde cardul cu solutia completa + sumar si lista partilor (cu calitatea fiecareia).","how":"expandedCards (Set de indici) controleaza expandarea; hasDetails verifica existenta solutiei/sumarului/partilor; linkul foloseste getDosarExternalUrl (PortalJust sau scj.ro dupa sursa).","citations":["frontend/src/components/CalendarView.tsx:44","frontend/src/components/CalendarView.tsx:183","frontend/src/components/CalendarView.tsx:227","frontend/src/components/CalendarView.tsx:199"]},{"name":"Linkuri externe catre portal","what":"Numarul de dosar (in tabel si calendar) e link catre pagina sursei: PortalJust pentru dosare obisnuite, scj.ro pentru dosare ICCJ (detaliu daca exista id, altfel pagina de cautare ICCJ).","how":"getDosarExternalUrl ruteaza dupa source: pentru iccj -> getIccjUrl(iccjId) sau ICCJ_SEARCH_URL, altfel getPortalJustUrl(numar). Se deschide in tab nou cu rel noopener.","citations":["frontend/src/components/dosare-table-helpers.ts:68","frontend/src/components/TermeneTable.tsx:310","frontend/src/components/CalendarView.tsx:199"]},{"name":"Filtrare client-side dupa data, categorie si stadiu","what":"Rezultatele PortalJust pot fi restranse dupa interval de date, categorii de caz (Penal, Civil, Contencios, etc., plus 'Altele') si stadii procesuale, fara o noua cautare. Pentru ICCJ aceste filtre nu se aplica (termenele vin deja filtrate server-side).","how":"filterByDate, filterTermeneByCategorii (cu set KNOWN_CATS si bucket 'Altele') si filterTermeneByStadii ruleaza in lant pe state.allTermene; rezultatul trece apoi prin filterByMetrics. Pentru isIccj se foloseste direct allTermene.","citations":["frontend/src/pages/Termene.tsx:58","frontend/src/pages/Termene.tsx:20","frontend/src/pages/Termene.tsx:32","frontend/src/pages/Termene.tsx:114","frontend/src/pages/Termene.tsx:120"]},{"name":"Incarca mai multe (load-more SSE)","what":"Cand cautarea a atins plafonul de 1000 dosare, un mesaj avertizeaza ca termenele pot fi incomplete si ofera butonul 'Incarca mai multe' care aduce restul termenelor in flux, cu progres, posibilitate de oprire si avertismente la final.","how":"Apare cand initialDosareCount >= 1000; handleLoadMore deschide un stream SSE (api.termene.loadMore) care reia cautarea pe intervale lunare, deduplica dupa cheie compusa si dupa numar dosar, si actualizeaza incremental lista. Se poate opri prin AbortController.","citations":["frontend/src/pages/Termene.tsx:313","frontend/src/pages/Termene.tsx:194","frontend/src/pages/Termene.tsx:206","backend/src/routes/termene.ts:215"],"settings":"Prag declansare 1000 dosare; timeout SSE 900000ms (15 min); maxim 120 intervale lunare; maxim 500 apeluri SOAP per cerere; chunk SSE de 50 termene."},{"name":"Nota ICCJ trunchiere","what":"La cautarea ICCJ, daca s-au gasit mai multe dosare decat limita procesata, un mesaj galben avertizeaza ca termenele pot fi incomplete si recomanda restrangerea cautarii.","how":"searchIccj returneaza truncated + dosareCount; cand truncated e adevarat, se seteaza iccjNote cu mesajul si numarul de dosare afisate.","citations":["frontend/src/pages/Termene.tsx:154","frontend/src/pages/Termene.tsx:366","frontend/src/lib/api.ts:359"]},{"name":"Stari de incarcare, eroare si gol","what":"Pagina arata spinner cu eticheta specifica sursei ('Se cauta sedinte ICCJ' vs 'Se cauta termene in PortalJust'), un panou rosu de eroare, si un mesaj gol ('Niciun termen gasit') cand dosarele nu au sedinte.","how":"loadingSource determina eticheta spinnerului; state.error rendareaza panoul rosu; cand searched && allTermene.length===0 se afiseaza mesajul gol; starea initiala invita la cautare.","citations":["frontend/src/pages/Termene.tsx:347","frontend/src/pages/Termene.tsx:356","frontend/src/pages/Termene.tsx:373","frontend/src/pages/Termene.tsx:407"]},{"name":"Re-cautare din istoric","what":"O cautare salvata in istoric poate re-declansa automat cautarea de termene la deschiderea paginii, fara reintroducere manuala.","how":"useEffect monitorizeaza pendingSearch; cand exista si nu se incarca deja, consuma valoarea si apeleaza handleSearch.","citations":["frontend/src/pages/Termene.tsx:275"]}],"settings":[{"name":"Sursa cautare (PortalJust / ICCJ)","where":"Comutator de sursa in SearchForm (showSourceToggle)","effect":"Schimba endpointul si pipeline-ul: ICCJ aduce toate sedintele dosarelor de la Inalta Curte (fara filtre categorie/stadiu, fara metrici), PortalJust extrage sedintele din dosare cu filtre client-side complete.","options":"portaljust | iccj","default":"portaljust","citations":["frontend/src/pages/Termene.tsx:309","frontend/src/pages/Termene.tsx:114","frontend/src/pages/Termene.tsx:120"]},{"name":"Mod vizualizare","where":"Butoanele Tabel / Calendar din antetul paginii","effect":"Comuta intre tabelul de termene si calendarul lunar.","options":"table | calendar","default":"table","citations":["frontend/src/pages/Termene.tsx:101","frontend/src/pages/Termene.tsx:291"]},{"name":"Filtru metrici (Viitoare / Trecute / Cu Solutie)","where":"Cardurile de metrici clickabile","effect":"Filtreaza lista de termene (logica OR, combinabile); click pe Total anuleaza filtrele.","options":"viitoare | trecute | cuSolutie","default":"niciun filtru activ","citations":["frontend/src/pages/Termene.tsx:122","frontend/src/components/TermeneMetrics.tsx:8","frontend/src/pages/Termene.tsx:68"]},{"name":"Interval de date (dataStart / dataStop)","where":"Selector de date in SearchForm (showDateRange)","effect":"La PortalJust filtreaza rezultatele client-side dupa data; la ICCJ filtreaza rezultatul deja adus; in load-more determina intervalele lunare reluate.","options":"doua date calendaristice","default":"gol (fara filtru); load-more foloseste defaultDateRange daca lipseste","citations":["frontend/src/pages/Termene.tsx:308","frontend/src/pages/Termene.tsx:58","backend/src/routes/termene.ts:239"]},{"name":"Filtru categorii de caz","where":"Selector categorii in SearchForm (onCategoriiChange)","effect":"Pastreaza doar termenele a caror categorieCaz contine una din categoriile alese; 'Altele' include orice categorie din afara setului cunoscut.","options":"Penal, Civil, Contencios, Litigii de munca, Faliment, Litigii cu profesionisti, Altele","default":"gol (toate categoriile)","citations":["frontend/src/pages/Termene.tsx:18","frontend/src/pages/Termene.tsx:20","frontend/src/pages/Termene.tsx:311"]},{"name":"Filtru stadii procesuale","where":"Selector stadii in SearchForm (onStadiiChange)","effect":"Pastreaza doar termenele al caror stadiuProcesual contine unul din stadiile alese.","options":"stadii procesuale","default":"gol (toate stadiile)","citations":["frontend/src/pages/Termene.tsx:32","frontend/src/pages/Termene.tsx:312"]},{"name":"Marime pagina tabel","where":"Controlul de paginare (TablePagination)","effect":"Cate termene se afiseaza pe pagina.","options":"10 | 20 | 50 | 100","default":"20","citations":["frontend/src/components/TermeneTable.tsx:29","frontend/src/components/TermeneTable.tsx:398"]},{"name":"Afisare grafic metrici (Ascunde / Arata)","where":"Buton in antetul TermeneMetrics","effect":"Ascunde sau arata graficul de distributie pe luni.","options":"expandat | colapsat","default":"expandat","citations":["frontend/src/components/TermeneMetrics.tsx:34","frontend/src/components/TermeneMetrics.tsx:79"]},{"name":"Domeniu export (selectie vs tot)","where":"Implicit, in functie de bifele din tabel","effect":"Daca exista randuri selectate, exportul (Excel/PDF) include doar selectia; altfel toate termenele afisate.","options":"selectie | toate","default":"toate (cand nimic nu e selectat)","citations":["frontend/src/components/TermeneTable.tsx:152","frontend/src/pages/Termene.tsx:399"]},{"name":"MAX_TERMENE_EXPORT","where":"Backend routes/termene.ts (constanta)","effect":"Numarul maxim de termene acceptate intr-un export Excel; peste limita raspunde cu eroare.","options":"numar","default":"100000","citations":["backend/src/routes/termene.ts:24","backend/src/routes/termene.ts:64"]},{"name":"EXPORT_BODY_LIMIT","where":"Backend routes/termene.ts (bodyLimit export.xlsx)","effect":"Dimensiunea maxima a body-ului la export inainte de 413.","options":"bytes","default":"25MB (25*1024*1024)","citations":["backend/src/routes/termene.ts:23","backend/src/routes/termene.ts:25"]},{"name":"MAX_LOADMORE_BODY","where":"Backend util/validation.ts (limita body load-more)","effect":"Dimensiunea maxima a body-ului POST la /load-more.","options":"bytes","default":"512000","citations":["backend/src/util/validation.ts:10","backend/src/routes/termene.ts:32"]},{"name":"MAX_DOSARE_RESPONSE","where":"Backend util/validation.ts","effect":"Plafon de dosare inainte de a expanda in termene; peste limita raspunde 413.","options":"numar","default":"5000","citations":["backend/src/util/validation.ts:7","backend/src/routes/termene.ts:165"]},{"name":"MAX_INSTITUTII","where":"Backend util/validation.ts","effect":"Numarul maxim de institutii acceptate per cerere de cautare termene.","options":"numar","default":"50","citations":["backend/src/util/validation.ts:5","backend/src/routes/termene.ts:115"]},{"name":"MAX_SOAP_FANOUT","where":"Backend util/validation.ts","effect":"Plafon de apeluri SOAP catre portal.just.ro generate de o singura cerere (institutii x intervale).","options":"numar","default":"500","citations":["backend/src/util/validation.ts:6","backend/src/routes/termene.ts:121","backend/src/routes/termene.ts:259"]},{"name":"MAX_SSE_INTERVALS","where":"Backend util/validation.ts","effect":"Numarul maxim de intervale lunare la load-more; peste limita respinge cererea.","options":"numar","default":"120","citations":["backend/src/util/validation.ts:11","backend/src/routes/termene.ts:249"]},{"name":"SSE_TIMEOUT_MS","where":"Backend util/validation.ts","effect":"Timpul maxim al stream-ului load-more inainte de abort + eveniment timeout.","options":"milisecunde","default":"900000 (15 min)","citations":["backend/src/util/validation.ts:12","backend/src/routes/termene.ts:274"]}],"keyFacts":[{"fact":"Prag declansare 'Incarca mai multe' (cap dosare PortalJust)","value":"1000 dosare","citation":"frontend/src/pages/Termene.tsx:313"},{"fact":"pageSize implicit tabel termene","value":"20","citation":"frontend/src/components/TermeneTable.tsx:29"},{"fact":"Optiuni marime pagina","value":"[10, 20, 50, 100]","citation":"frontend/src/components/TermeneTable.tsx:398"},{"fact":"Maxim luni afisate in graficul de distributie","value":"8","citation":"frontend/src/components/TermeneMetrics.tsx:63"},{"fact":"Prag puncte vs text in celula de zi calendar","value":"3 termene/zi","citation":"frontend/src/components/CalendarView.tsx:150"},{"fact":"Prag detectare dosar 'deja monitorizat' (created_at)","value":"< 5000 ms (5s)","citation":"frontend/src/components/TermeneTable.tsx:59"},{"fact":"Delay auto-scroll la randul expandat","value":"50 ms","citation":"frontend/src/components/TermeneTable.tsx:101"},{"fact":"MAX_TERMENE_EXPORT","value":"100000","citation":"backend/src/routes/termene.ts:24"},{"fact":"EXPORT_BODY_LIMIT","value":"25 MB (25*1024*1024)","citation":"backend/src/routes/termene.ts:23"},{"fact":"MAX_LOADMORE_BODY","value":"512000 bytes","citation":"backend/src/util/validation.ts:10"},{"fact":"MAX_DOSARE_RESPONSE","value":"5000","citation":"backend/src/util/validation.ts:7"},{"fact":"MAX_INSTITUTII","value":"50","citation":"backend/src/util/validation.ts:5"},{"fact":"MAX_SOAP_FANOUT","value":"500","citation":"backend/src/util/validation.ts:6"},{"fact":"MAX_SSE_INTERVALS","value":"120 luni","citation":"backend/src/util/validation.ts:11"},{"fact":"SSE_TIMEOUT_MS","value":"900000 ms (15 min)","citation":"backend/src/util/validation.ts:12"},{"fact":"Dimensiune chunk SSE termene la load-more","value":"50 termene per eveniment batch","citation":"backend/src/routes/termene.ts:326"},{"fact":"Cheie sessionStorage pentru termene vizualizate","value":"viewedTermene","citation":"frontend/src/components/TermeneTable.tsx:38"},{"fact":"Sortare implicita termene PortalJust","value":"descrescator dupa data","citation":"backend/src/routes/termene.ts:194"},{"fact":"Format PDF export termene","value":"A4 landscape, jsPDF + autoTable, font 7.5","citation":"frontend/src/lib/export-termene.ts:37"}],"notes":"Termenele nu au tabel propriu in DB: endpointul GET /api/termene apeleaza cautarea SOAP de dosare si extrage (flatMap) toate sedintele cu metadatele dosarului (categorie, stadiu, obiect, parti), sortate descrescator dupa data. ICCJ foloseste un endpoint separat (/termene-iccj) cu scraping scj.ro si ocoleste pipeline-ul de filtrare client-side (categorie/stadiu/metrici), pentru ca rezultatele vin deja filtrate server-side (data + sectie). Cheia stabila numarDosar|data|ora|complet e folosita consecvent pentru selectie, deduplicare la load-more si maparea la export, ca sa supravietuiasca filtrarii/sortarii. Securitate: capuri defensive multiple (MAX_DOSARE_RESPONSE, MAX_SOAP_FANOUT, MAX_SSE_INTERVALS, timeout 15 min, body limits) pentru a preveni amplificarea cererilor catre portal.just.ro; export-ul Excel ruleaza server-side si stream-uieste fisierul cu cleanup (unlink) dupa descarcare; PDF-ul ruleaza intr-un web worker. Monitorizarea foloseste client_request_id idempotent. Metricile (recharts) sunt lazy-loaded pentru a nu ingreuna bundle-ul initial.","key":"termene"},{"module":"Modul ICCJ","icon":"⚖️","overview":"Modulul ICCJ permite cautarea si monitorizarea dosarelor de la Inalta Curte de Casatie si Justitie, care nu sunt acoperite de portalul SOAP PortalJust. Datele se obtin prin scraping live de pe site-ul public www.scj.ro (formularele /738 dosare, /737 sedinte, /1094 detaliu dosar), fara captcha si fara autentificare. Utilizatorul alege sursa \"ICCJ\" in pagina Dosare sau Termene si cauta dupa numar de dosar, parte, obiect, sectie sau interval de date; rezultatele sunt imbogatite server-side (categorie juridica, roluri parti, sedinte) inainte de afisare. Dosarele pot fi adaugate la monitorizarea automata recurenta (tip job \"iccj\"), care detecteaza termene noi, solutii si disparitii cu alerte si email.","routes":["UI: /dosare (sursa ICCJ, tab in SearchForm)","UI: /termene (sursa ICCJ)","UI: /monitorizare (joburi kind=iccj)","UI: /alerts (alerte din joburi iccj)","API mount: /api/dosare-iccj","API mount: /api/dosare-iccj/detaliu/:id","API mount: /api/termene-iccj","API mount: /api/v1/monitoring/jobs (kind=iccj)"],"endpoints":[{"method":"GET","path":"/api/dosare-iccj","purpose":"Cauta dosare ICCJ (numarDosar/obiectDosar/numeParte/sectie/dataStart/dataStop/page) si le imbogateste server-side cu detaliul /1094 inainte de raspuns. Returneaza { data, total, page }."},{"method":"GET","path":"/api/dosare-iccj/detaliu/:id","purpose":"Detaliul complet al unui dosar (lazy, la expandare rand). :id este numeric-only. Returneaza { data }."},{"method":"GET","path":"/api/termene-iccj","purpose":"Cauta dosare (numar/parte/obiect/sectie) si returneaza TOATE sedintele lor aplatizate ca termene; dataStart/dataStop sunt filtre optionale pe data sedintei. Returneaza { data, total, dosareCount, truncated }."},{"method":"POST","path":"/api/v1/monitoring/jobs","purpose":"Creeaza job de monitorizare cu kind=iccj (target { numar_dosar, iccj_id? }); ruleaza periodic runner-ul ICCJ."}],"features":[{"name":"Cautare dosare ICCJ","what":"Cauta dosare la Inalta Curte dupa numar dosar, obiect, nume parte, sectie si interval de date. Selectarea tab-ului 'ICCJ' in formular schimba sursa de la PortalJust la scj.ro.","how":"GET /api/dosare-iccj -> searchIccj() face POST pe formularul /738 al scj.ro (envelope JSON cu Items = string HTML de tabel), parseaza randurile cu regex, rezultate sortate date-DESC, ~50/pagina, cap 1000. Necesar cel putin numarDosar, obiectDosar, numeParte sau dataStart.","citations":["backend/src/routes/dosareIccj.ts:76","backend/src/services/iccj/iccjClient.ts:551","frontend/src/components/SearchForm.tsx:178","frontend/src/lib/api.ts:325"],"settings":"Sursa ICCJ vs PortalJust (toggle in SearchForm), filtru Sectie (dropdown), interval de date optional"},{"name":"Imbogatire server-side (enrich)","what":"Fiecare dosar din lista primeste automat detaliul complet (categorie/materie juridica, roluri parti, sedinte) inainte de afisare, fara pas separat de incarcare in interfata.","how":"searchIccjEnriched() ia rezultatele din /738 si fetch-uieste /1094 pentru fiecare dosar in batch-uri de 5 concurente, cu buget global de timp (ICCJ_ENRICH_BUDGET_MS=45s). Randurile neatinse la deadline se intorc ne-imbogatite (degradare gratioasa), nu eroare. Merge-ul pastreaza identitatea din lista si completeaza din detaliu.","citations":["backend/src/services/iccj/iccjClient.ts:838","backend/src/routes/dosareIccj.ts:103","backend/src/services/iccj/iccjClient.ts:46"]},{"name":"Detaliu dosar la expandare (lazy)","what":"La expandarea unui rand ICCJ in tabel se incarca detaliul complet de la scj.ro: parti cu rol, sedinte/termene cu solutii, cai de atac, numar vechi, obiecte secundare.","how":"DosareTable.ensureIccjDetail() cheama GET /api/dosare-iccj/detaliu/:id -> fetchIccjDetail() face GET pe /1094, parseaza lista <dl class=docket_details>, tabelele de sedinte si cai de atac. Cache local in iccjDetails pe iccjId.","citations":["frontend/src/components/DosareTable.tsx:82","frontend/src/components/DosareTable.tsx:91","backend/src/services/iccj/iccjClient.ts:586"]},{"name":"Cautare termene ICCJ","what":"In pagina Termene, cautarea ICCJ returneaza TOATE datele la care un dosar a aparut sau va aparea, pe baza unei cautari dupa numar/parte/obiect. Nu necesita data; intervalul de date filtreaza rezultatul.","how":"GET /api/termene-iccj -> searchTermeneByDosarIccj() cauta dosare (max 20), fetch-uieste detaliul fiecaruia in batch-uri de 5 si aplatizeaza toate sedintele in randuri de termen. Filtrul de data se aplica pe data sedintei (string compare ISO). Daca au fost mai multe dosare decat 20, raspunsul are truncated=true si UI afiseaza o nota.","citations":["backend/src/routes/dosareIccj.ts:153","backend/src/services/iccj/iccjClient.ts:763","backend/src/services/iccj/iccjClient.ts:749","frontend/src/pages/Termene.tsx:143"]},{"name":"Paginare 'Incarca mai multe' (ICCJ)","what":"Rezultatele ICCJ se incarca pagina cu pagina; butonul 'Incarca mai multe' aduce pagina urmatoare si o adauga, cu dedup pe iccjId. Statusul arata 'X din N rezultate (pagina K)'.","how":"Frontend Dosare.tsx gestioneaza iccjPaging { page, hasMore, total }; handleIccjNextPage cheama searchIccj(params, page+1). hasMore se deriva din loadedSoFar < total (nu fixed page-size). Pagina e validata 1-20 in backend.","citations":["frontend/src/pages/Dosare.tsx:135","frontend/src/pages/Dosare.tsx:334","backend/src/routes/dosareIccj.ts:94"]},{"name":"Facete dinamice Stadiu/Categorie (ICCJ)","what":"Chip-urile de filtrare pe Stadiu procesual si Categorie caz sunt construite din valorile reale aparute in rezultatele ICCJ incarcate, nu din vocabularul static PortalJust.","how":"Dosare.tsx calculeaza iccjStadiiOptions si iccjCategoriiOptions cu useMemo din valorile distincte ale setului incarcat; SearchForm foloseste aceste liste cand source=iccj. Filtrarea pe institutii e sarita pentru ICCJ (institutie unica).","citations":["frontend/src/pages/Dosare.tsx:161","frontend/src/pages/Dosare.tsx:170","frontend/src/components/SearchForm.tsx:154"]},{"name":"Monitorizare dosar ICCJ","what":"Un dosar ICCJ poate fi adaugat la monitorizarea automata recurenta. Sistemul verifica periodic dosarul si emite alerte la termene noi, solutii sau disparitia dosarului, inclusiv email.","how":"Buton 'Monitorizeaza' -> monitoring.createIccj({ numar_dosar, iccjId }) -> POST jobs cu kind=iccj. Runner-ul iccjRunner ruleaza search->detail->diff (diffDosarSoap, acelasi ca dosar_soap), scrie snapshot si alerte in tranzactie atomica. Identitatea se face pe iccj_id stabil (markerele */** de pe scj.ro nu mai produc fals 'disparut').","citations":["frontend/src/hooks/useMonitorRowState.ts:26","frontend/src/lib/monitoringApi.ts:119","backend/src/services/monitoring/iccjRunner.ts:45","backend/src/services/monitoring/iccjFetchCurrent.ts:26"]},{"name":"Deep-link catre scj.ro","what":"Randurile ICCJ (in tabel, monitorizare, alerte, calendar) au link direct catre pagina dosarului pe scj.ro cand exista iccjId; altfel link catre cautarea ICCJ.","how":"getIccjUrl(iccjId) construieste URL /1094/Detalii-dosar?...id. getDosarExternalUrl alege deep-link sau ICCJ_SEARCH_URL dupa source/iccjId.","citations":["frontend/src/components/dosare-table-helpers.ts:57","frontend/src/components/dosare-table-helpers.ts:69","frontend/src/pages/Monitorizare.tsx:626"]},{"name":"Protectie anti-alerte-false (false-empty guard)","what":"Sistemul nu confunda o cadere temporara a scj.ro cu 'dosar disparut' sau '0 rezultate', evitand alerte false de disparitie.","how":"classifyEnvelope returneaza 'empty' DOAR cu marcajul exact 'Nu sunt rezultate.'; orice altceva = source error. La empty/error se reincearca o data cu sesiune proaspata. fetchCurrentDosar arunca pe IccjSourceError/IccjParseError si runner-ul NU scrie snapshot pe throw. Parserul de sedinte fail-loud daca <table> exista fara <tbody> (markup drift).","citations":["backend/src/services/iccj/iccjClient.ts:423","backend/src/services/iccj/iccjClient.ts:561","backend/src/services/monitoring/iccjRunner.ts:82","backend/src/services/iccj/iccjClient.ts:310"]},{"name":"Warm-up sesiune + retry","what":"Inainte de cautare se face un GET de incalzire pentru a stabili afinitatea de sesiune si a captura cookie-ul, evitand raspunsuri false-empty de pe un IP rece.","how":"warmSession() face GET pe pagina de cautare, captureaza Set-Cookie (TTL 10 min), single-flight ca un batch de fetch-uri concurente sa imparta un singur warm-up. POST-ul functioneaza si fara cookie. La source error pe detaliu se reincearca o data cu sesiune fortata.","citations":["backend/src/services/iccj/iccjClient.ts:457","backend/src/services/iccj/iccjClient.ts:49","backend/src/services/iccj/iccjClient.ts:479"]},{"name":"Normalizare date DD.MM.YYYY <-> ISO","what":"Datele ICCJ (afisate ca DD.MM.YYYY pe scj.ro) sunt convertite la ISO la ingestie pentru sortare/filtrare uniforma, si invers la trimiterea spre scj.ro.","how":"iccjDateToIso normalizeaza la ingestie; isoToIccjDate converteste input-ul <input type=date> in DD.MM.YYYY pentru body-ul scj.ro (StartDate/EndDate), altfel filtrul de data e ignorat silentios.","citations":["backend/src/services/iccj/iccjClient.ts:200","backend/src/services/iccj/iccjClient.ts:207","backend/src/services/iccj/iccjClient.ts:508"]},{"name":"Validare parametri si erori prietenoase","what":"Cautarile valideaza lungimea campurilor, formatul datelor calendaristice, sectia si pagina; erorile de upstream sunt traduse in mesaje clare in romana (502 sursa, 504 timeout, 503 dezactivat).","how":"badDate (isValidDate respinge si date imposibile precum 2026-02-31), badSectie (contra ICCJ_SECTII_IDS), tooLong (max 200 char), page 1-20. mapError mapeaza IccjSourceError/IccjParseError->502, TimeoutError->504, restul->500. 504 si 503 emit header Retry-After.","citations":["backend/src/routes/dosareIccj.ts:60","backend/src/routes/dosareIccj.ts:88","backend/src/routes/dosareIccj.ts:91","backend/src/routes/dosareIccj.ts:40"]}],"settings":[{"name":"Sursa cautare (PortalJust / ICCJ)","where":"Tab in SearchForm (pagina Dosare si Termene)","effect":"Comuta intre cautarea SOAP PortalJust si cautarea live-proxy ICCJ (scj.ro); cand e ICCJ, apare dropdown-ul Sectie si dispare selectorul Institutie","options":"portaljust | iccj","default":"portaljust","citations":["frontend/src/components/SearchForm.tsx:132","frontend/src/components/SearchForm.tsx:178"]},{"name":"Sectie (Department)","where":"Dropdown in SearchForm cand source=iccj","effect":"Filtreaza cautarea pe sectia ICCJ; valoarea este id-ul CMS Department trimis catre scj.ro","options":"'' (Toate sectiile), 154 (Sectia I civila), 155 (Sectia a II-a civila), 157 (Penala), 158 (Contencios Administrativ si Fiscal), 163 (Sectiile Unite), 182 (Completul de 9 Judecatori), 183 (Completul de 9 jud. L304/2004), 190 (Completurile de 5 jud.), 202 (Dezlegarea unor chestiuni de drept), 210 (Recursuri in interesul legii)","default":"'' (Toate sectiile)","citations":["frontend/src/lib/iccjSectii.ts:12","backend/src/services/iccj/iccjSectiiIds.ts:5"]},{"name":"ICCJ_ROUTES_DISABLED","where":"Env var (kill switch operational)","effect":"Cand =1, rutele interactive ICCJ (/api/dosare-iccj, /api/termene-iccj) raspund 503 cu cod ICCJ_DISABLED si Retry-After:300, fara redeploy. Separat de scheduler-ul de monitoring.","options":"1 = dezactivat / neset = activ","default":"neset (activ)","citations":["backend/src/routes/dosareIccj.ts:22","backend/src/routes/dosareIccj.ts:36"]},{"name":"ICCJ_TIMEOUT_MS","where":"Env var","effect":"Timeout per request HTTP catre scj.ro (AbortSignal.timeout); expirarea -> 504","options":"intreg pozitiv (ms)","default":"30000 (30s)","citations":["backend/src/services/iccj/iccjClient.ts:39"]},{"name":"ICCJ_MAX_RESPONSE_BYTES","where":"Env var","effect":"Cap pe dimensiunea unui raspuns scj.ro (pagina de cautare sau detaliu); depasirea -> IccjSourceError","options":"intreg pozitiv (bytes)","default":"20971520 (20 MB)","citations":["backend/src/services/iccj/iccjClient.ts:42"]},{"name":"ICCJ_ENRICH_BUDGET_MS","where":"Env var","effect":"Buget global de timp pentru bucla de imbogatire server-side; la depasire randurile ramase se intorc ne-imbogatite (nu eroare)","options":"intreg pozitiv (ms)","default":"45000 (45s)","citations":["backend/src/services/iccj/iccjClient.ts:46"]},{"name":"MONITORING_DISABLED_KINDS","where":"Env var (kill switch scheduler)","effect":"Exclude tipuri de joburi din claim-ul scheduler-ului de monitorizare; poate include 'iccj' ca sa opreasca monitorizarea ICCJ fara modificari in DB","options":"lista separata prin virgula (ex. iccj,dosar_soap)","default":"neset","citations":["frontend/src/data/changelog-entries.tsx:146"]},{"name":"Cadenta job monitorizare (cadence_sec)","where":"Payload creare/editare job monitorizare ICCJ","effect":"Intervalul de verificare automata a dosarului","options":"600-86400 secunde","default":"14400 (4 ore)","citations":["backend/src/schemas/monitoring.ts:114"]},{"name":"notify_days_before","where":"alert_config job monitorizare","effect":"Zilele inainte de termen la care se trimite notificare","options":"array de intregi 0-365 (max 10)","default":"[14, 7, 3, 1]","citations":["backend/src/schemas/monitoring.ts:99"]},{"name":"notify_on_new_termen","where":"alert_config job monitorizare","effect":"Alerta la aparitia unui termen nou","options":"true/false","default":"true","citations":["backend/src/schemas/monitoring.ts:100"]},{"name":"notify_on_solution","where":"alert_config job monitorizare","effect":"Alerta la aparitia unei solutii","options":"true/false","default":"true","citations":["backend/src/schemas/monitoring.ts:101"]},{"name":"notify_on_dosar_disappeared","where":"alert_config job monitorizare","effect":"Alerta cand dosarul nu mai este gasit","options":"true/false","default":"false","citations":["backend/src/schemas/monitoring.ts:102"]},{"name":"Filtru kind=iccj (lista joburi)","where":"Tab JobKindTabs in pagina Monitorizare","effect":"Filtreaza lista de joburi de monitorizare pe tipul ICCJ","options":"all | dosar_soap | name_soap | iccj","default":"all","citations":["frontend/src/components/monitoring/JobKindTabs.tsx:4"]}],"keyFacts":[{"fact":"Timeout per request scj.ro (ICCJ_TIMEOUT_MS)","value":"30000 ms","citation":"backend/src/services/iccj/iccjClient.ts:39"},{"fact":"Cap dimensiune raspuns (ICCJ_MAX_RESPONSE_BYTES)","value":"20 MB (20971520 bytes)","citation":"backend/src/services/iccj/iccjClient.ts:42"},{"fact":"Buget enrich server-side (ICCJ_ENRICH_BUDGET_MS)","value":"45000 ms","citation":"backend/src/services/iccj/iccjClient.ts:46"},{"fact":"TTL cookie sesiune (SESSION_TTL_MS)","value":"10 minute (600000 ms)","citation":"backend/src/services/iccj/iccjClient.ts:49"},{"fact":"Max dosare cu termene colectate per cautare termene (MAX_TERMENE_DOSARE)","value":"20","citation":"backend/src/services/iccj/iccjClient.ts:749"},{"fact":"Concurenta fetch detaliu (TERMENE_DETAIL_CONCURRENCY)","value":"5","citation":"backend/src/services/iccj/iccjClient.ts:750"},{"fact":"Lungime maxima camp cautare (MAX_FIELD)","value":"200 caractere","citation":"backend/src/routes/dosareIccj.ts:40"},{"fact":"Interval valid pagina","value":"1-20","citation":"backend/src/routes/dosareIccj.ts:95"},{"fact":"Retry-After pentru 503 ICCJ_DISABLED","value":"300 secunde","citation":"backend/src/routes/dosareIccj.ts:30"},{"fact":"Retry-After pentru 504 timeout upstream","value":"60 secunde","citation":"backend/src/routes/dosareIccj.ts:34"},{"fact":"Pagina rezultate scj.ro (aprox)","value":"~50/pagina, cap ~1000","citation":"backend/src/services/iccj/iccjClient.ts:17"},{"fact":"Buget wall-clock runner monitorizare ICCJ (DEFAULT_BUDGET_MS)","value":"10 minute (600000 ms)","citation":"backend/src/services/monitoring/iccjRunner.ts:31"},{"fact":"Cadenta default job monitorizare","value":"14400 secunde (4 ore)","citation":"backend/src/schemas/monitoring.ts:114"},{"fact":"Numar sectii ICCJ in dropdown (inclusiv 'Toate')","value":"11","citation":"frontend/src/lib/iccjSectii.ts:12"},{"fact":"Migrare care adauga kind='iccj'","value":"0034_iccj_job_kind","citation":"backend/src/db/migrations/0034_iccj_job_kind.up.sql:2"},{"fact":"Origine scrapata","value":"https://www.scj.ro (paginile /738 dosare, /737 sedinte, /1094 detaliu)","citation":"backend/src/services/iccj/iccjClient.ts:21"},{"fact":"Coduri eroare runner monitorizare","value":"ICCJ_SOURCE_FAIL / ICCJ_PARSE_FAIL / ICCJ_FAIL","citation":"backend/src/services/monitoring/iccjRunner.ts:82"}],"notes":"ICCJ nu expune un web service JSON public utilizabil (api.scj.ro:97 e doar in fereastra 3:30-6:30 AM si neconfirmat), deci modulul proxy-eaza formularele CMS ale site-ului, care intorc un envelope JSON cu campul Items = string HTML de tabel, parsat cu regex (fara DOM parser). Accesul e prin HTTPS, fara captcha si fara autentificare (date publice). Securitate: www.scj.ro este in whitelist-ul de URL-uri externe; rutele mostenesc lantul global de middleware (preAuthRateLimit -> ownerContext -> rateLimit -> originGuard), iar in web mode ownerContext esueaza inchis. :id la detaliu si iccj_id sunt validate numeric-only ca sa nu se forwardeze id-uri arbitrare. Identitatea de monitorizare se face pe iccj_id stabil pentru a evita fals 'disparut' cauzat de marcajele */** pe care scj.ro le ataseaza numerelor de dosar. Parser fail-loud la markup drift (IccjParseError) ca monitorizarea sa inregistreze eroare in loc sa scrie un snapshot gol care ar sterge istoricul de sedinte. Listele de sectii sunt mirror-uite in doua fisiere (frontend iccjSectii.ts + backend iccjSectiiIds.ts) si trebuie tinute sincronizate la drift; exista test iccjSectiiDrift.test.ts.","key":"iccj"},{"module":"Cautare RNPM","icon":"🔍","overview":"Modulul de cautare RNPM permite avocatului sa interogheze Registrul National de Publicitate Mobiliara prin formulare specifice pentru cele 5 categorii de avize (ipoteca mobiliara, fiducie, aviz specific, creante securitizate, obligatiuni ipotecare). Fiecare cautare rezolva automat un captcha (2Captcha sau CapSolver) si interogheaza RNPM, descarcand detaliile complete ale avizelor gasite (concurenta 12 fetch-uri) si salvandu-le in baza locala. UI-ul are 3 tab-uri (Cautare, Bulk, Baza locala); tab-ul Cautare incarca primele 25 rezultate cu buton optional \"Incarca tot\", buton Stop care anuleaza cap-coada (AbortController), si un dialog de split cand cautarea depaseste limita RNPM de 1500 rezultate.","routes":["/rnpm (pagina UI, tab \"Cautare\")","POST /api/rnpm/search","POST /api/rnpm/search-split (SSE)","POST /api/rnpm/bulk (SSE)","POST /api/rnpm/captcha/balance","POST /api/rnpm/search/:searchId/filter","GET /api/rnpm/saved","GET /api/rnpm/searches"],"endpoints":[{"method":"POST","path":"/api/rnpm/search","purpose":"Cautare RNPM single: rezolva captcha, interogheaza RNPM pe categoria/parametrii dati, descarca detaliile primelor batchSize (25) avize si le salveaza; returneaza gcode + nextRnpmPage pentru paginare incrementala. 400 LIMIT_EXCEEDED daca total > 1500."},{"method":"POST","path":"/api/rnpm/search-split","purpose":"Split search (SSE stream): ruleaza N sub-cautari separate (cate una pe tip de inscriere) pentru a depasi limita de 1500; emite progress per sub-tip si, daca un sub-tip depaseste tot capul, incearca tier-2 split pe destinatie. Max 50 sub-tipuri."},{"method":"POST","path":"/api/rnpm/captcha/balance","purpose":"Returneaza soldul contului captcha (2Captcha/CapSolver). In web mode doar adminul tenantului poate citi soldul (403 altfel)."},{"method":"POST","path":"/api/rnpm/search/:searchId/filter","purpose":"Filtru text server-side peste rezultatele unei cautari salvate (min 2 caractere, max 200, timeout 5s); kill switch RNPM_RESULTS_FILTER_DISABLED."}],"features":[{"name":"Cele 5 categorii de cautare (taburi)","what":"Utilizatorul alege intre 5 tipuri de avize RNPM: Aviz de ipoteca mobiliara (ipoteci), Fiducie, Aviz specific, Aviz de ipoteca - creante securitizate, Aviz de ipoteca - obligatiuni ipotecare. Fiecare categorie afiseaza campuri specifice de cautare.","how":"CATEGORIES array randeaza butoanele de tab; activeType (state) comuta formularul. La schimbarea categoriei se reseteaza doar campul tipInscriere.","citations":["frontend/src/components/rnpm/rnpm-form-constants.ts:121","frontend/src/components/rnpm/RnpmSearchForm.tsx:447","frontend/src/components/rnpm/RnpmSearchForm.tsx:451"],"settings":"5 valori fixe: ipoteci, fiducii, specifice, creante, obligatiuni"},{"name":"Campuri comune tuturor categoriilor","what":"Indiferent de categorie, exista: Identificator inscriere (text liber), un dropdown de tip de inregistrare cu eticheta variabila per categorie, Perioada start si Perioada final (selectoare de data), plus doua bife: \"Numai active\" si \"Nemodificate de alte inscrieri\".","how":"Campurile comune sunt in grid-ul de sus al formularului; tipInscriere are toggle SI/SAU si se trimite ca index 1-based in lista TIP_AVIZ_BY_CATEGORY. Perioada start/final sunt filtre client-side (RNPM ignora intervalul, confirmat empiric).","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:468","frontend/src/components/rnpm/RnpmSearchForm.tsx:716","backend/src/services/rnpmSearchService.ts:164","frontend/src/components/rnpm/RnpmSearchForm.tsx:148"],"settings":"Numai active (default bifat), Nemodificate de alte inscrieri (default bifat), dropdown tip inscriere"},{"name":"Eticheta dropdown tip variabila per categorie","what":"Dropdown-ul de tip de inregistrare are eticheta diferita: \"Tipul inregistrarii\" (ipoteci, creante), \"Tipul fiduciei\" (fiducii), \"Tipul avizului\" (specifice, obligatiuni). Lista optiunilor difera de asemenea per categorie.","how":"TIP_LABEL_BY_CATEGORY mapeaza eticheta; TIP_AVIZ_BY_CATEGORY furnizeaza optiunile (ipoteci 18, specifice 7, fiducii 7, creante 9, obligatiuni 9).","citations":["frontend/src/components/rnpm/rnpm-form-constants.ts:113","frontend/src/components/rnpm/rnpm-form-constants.ts:49","frontend/src/components/rnpm/RnpmSearchForm.tsx:483"]},{"name":"Campuri specifice - Ipoteci","what":"Categoria ipoteci ofera: Debitor (PJ/PF), Creditor (PJ/PF), Destinatia inscrierii (10 valori), Vehicul (bun garantat - colapsabil), si sectiunea colapsabila \"Bun (alt tip) & Tert cedat\" cu selector de categorie bun (11 valori) + identificare (SI/SAU) + Tert cedat (PJ/PF cu Reg. Com.).","how":"Branch-ul else (activeType ipoteci) randeaza PartyFieldset pentru Debitor/Creditor, DestinatieSelect cu DESTINATIE_IPOTECI, VehiculFieldset colapsabil, si CollapsibleFieldset cu bunA.categorie (index 1..11) + bunAIdentificare + tertPJ/tertPF.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:640","frontend/src/components/rnpm/RnpmSearchForm.tsx:660","frontend/src/components/rnpm/RnpmSearchForm.tsx:669","frontend/src/components/rnpm/rnpm-form-constants.ts:5"]},{"name":"Campuri specifice - Fiducii","what":"Categoria fiducii ofera: Constituitor (PJ/PF), Fiduciar (doar PJ), Beneficiar (PJ/PF) si Vehicul (bun garantat).","how":"Branch activeType fiducii randeaza PartyFieldset pentru Constituitor si Beneficiar, PJBlock pentru Fiduciar, si VehiculFieldset.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:554","frontend/src/components/rnpm/RnpmSearchForm.tsx:181"]},{"name":"Campuri specifice - Aviz specific","what":"Categoria specifice ofera: Destinatia inscrierii (14 valori), Parte (PJ/PF cu prenume) si Bun (descriere text).","how":"Branch activeType specifice randeaza DestinatieSelect cu DESTINATIE_INSCRIERII (14 valori), PartyFieldset \"Parte\" cu pfShowPrenume, si input Bun descriere (bunA.descriere). PF declanseaza pe nume SAU CNP.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:526","frontend/src/components/rnpm/RnpmSearchForm.tsx:156","frontend/src/components/rnpm/rnpm-form-constants.ts:32"]},{"name":"Campuri specifice - Creante securitizate","what":"Categoria creante ofera: Reprezentant Creditor (PJ cu Nr. Reg. Comertului), Debitor (PJ/PF cu Reg. Com. si prenume) si Bun (descriere).","how":"Branch activeType creante randeaza PJBlock cu showReg pentru reprezentantCreditor, PartyFieldset Debitor cu pjShowReg+pfShowPrenume (debitorJ/debitorF), si input creante.descriere. PF declanseaza pe nume SAU prenume SAU CNP.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:582","frontend/src/components/rnpm/RnpmSearchForm.tsx:227"]},{"name":"Campuri specifice - Obligatiuni ipotecare","what":"Categoria obligatiuni ofera: Agent (PJ/PF cu Reg. Com. si prenume), Emitent (PJ cu Reg. Com.) si Creante (descriere).","how":"Branch activeType obligatiuni randeaza PartyFieldset Agent (agentPJ/agentPF), PJBlock Emitent cu showReg, si input bunGarantie.descriere.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:611","frontend/src/components/rnpm/RnpmSearchForm.tsx:263"]},{"name":"Toggle Persoana Juridica / Persoana Fizica","what":"Pentru partile cautate (debitor, creditor, constituitor, beneficiar, parte, agent, tert) utilizatorul comuta intre cautare dupa Persoana Juridica (Denumire, CUI, optional Nr. Reg. Comertului) si Persoana Fizica (Nume, optional Prenume, CNP).","how":"PJPFToggle in PartyFieldset comuta tip PJ/PF; PJBlock afiseaza denumire/cui/reg, PFBlock afiseaza nume/prenume/cnp. State-ul PJ si PF persista separat dupa comutare.","citations":["frontend/src/components/rnpm/rnpm-form-fields.tsx:73","frontend/src/components/rnpm/rnpm-form-fields.tsx:178","frontend/src/components/rnpm/rnpm-form-fields.tsx:93"]},{"name":"Combinator SI / SAU pe campuri","what":"Multe campuri (tip inscriere, CUI, CNP, prenume, Nr. Reg. Comertului, serie sasiu, nr. inmatriculare, identificare bun, destinatie) au un comutator mic SI/SAU care controleaza modul de combinare logica la interogarea RNPM.","how":"SiSauToggle randeaza butoanele SI(=1)/SAU(=2); useSiSauField pastreaza value+op, toParam() trimite {type: op, value}. Default op = \"1\" (SI).","citations":["frontend/src/components/rnpm/rnpm-form-fields.tsx:53","frontend/src/components/rnpm/rnpm-form-hooks.ts:18","frontend/src/components/rnpm/rnpm-form-hooks.ts:30"]},{"name":"Validare CUI non-numeric (avertisment ne-blocant)","what":"Daca un camp CUI contine caractere non-numerice, la apasarea \"Cauta\" apare un dialog de confirmare \"Atentie - CUI contine caractere non-numerice. Continui cautarea?\". Userul poate continua.","how":"findNonNumericCui parcurge params-ul construit (doar categoria activa) si cauta CUI cu \\D; daca gaseste, confirm() blocheaza pana userul aproba.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:31","frontend/src/components/rnpm/RnpmSearchForm.tsx:389"]},{"name":"Vehicul (bun garantat) - camp partajat","what":"Campurile Vehicul (Model, Serie sasiu, Nr. inmatriculare) se trimit indiferent de categorie, pentru ca state-ul persista dupa schimbarea de tab.","how":"bunV (model/serieSasiu/nrImatriculare) e construit la finalul handleSubmit, dupa branch-urile per-categorie, deci e atasat la orice tip.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:378","frontend/src/components/rnpm/rnpm-form-fields.tsx:212"]},{"name":"Persistenta UI a tab-ului si parametrilor","what":"Cand utilizatorul comuta intre tab-urile Cautare/Bulk/Baza locala, componentele raman montate (Bulk si Baza locala) astfel incat o cautare in curs nu este intrerupta. Parametrii ultimei cautari (lastType, lastParams) raman in formular.","how":"Tab-urile bulk si saved folosesc className hidden in loc de unmount; RnpmSearch pastreaza lastType/lastParams in state si le paseaza ca initialType/initialParams formularului.","citations":["frontend/src/pages/RnpmSearch.tsx:513","frontend/src/pages/RnpmSearch.tsx:525","frontend/src/pages/RnpmSearch.tsx:399"]},{"name":"Buton Cauta cu faze de progres","what":"Butonul \"Cauta\" porneste cautarea; in timpul executiei apare un text de faza (\"Rezolvare captcha...\", \"Interogare RNPM...\", \"Salvare in baza locala...\") cu spinner.","how":"runSearch seteaza phase prin setPhase la fiecare etapa; loadingPhase e afisat langa butoane. Cele 3 faze sunt setate secvential in runSearch.","citations":["frontend/src/pages/RnpmSearch.tsx:110","frontend/src/pages/RnpmSearch.tsx:116","frontend/src/components/rnpm/RnpmSearchForm.tsx:735"]},{"name":"Buton Stop (abort cap-coada)","what":"In timpul unei cautari sau a incarcarii batch-urilor, butonul rosu \"Stop\" anuleaza imediat operatiunea (captcha, fetch RNPM, descarcare detalii) fara a salva rezultate partiale neasteptate.","how":"handleStop seteaza stoppedRef si apeleaza abortRef.current.abort(); semnalul AbortController e propagat pana in fetch-urile RNPM si verificat inainte de orice scriere SQLite (throwIfAborted / signal.aborted).","citations":["frontend/src/pages/RnpmSearch.tsx:294","frontend/src/components/rnpm/RnpmSearchForm.tsx:741","backend/src/services/rnpmSearchService.ts:45","backend/src/services/rnpmSearchService.ts:295"]},{"name":"Incarcare incrementala (\"Incarca tot\")","what":"Dupa prima cautare (primele 25 rezultate), daca exista mai multe pagini apare butonul \"Incarca tot (X din Y)\" cu bara de progres; in timpul incarcarii butonul devine \"Opreste incarcarea\". Procesul ruleaza automat batch dupa batch pana se acopera totalul.","how":"loadNextBatch refoloseste gcode-ul si nextRnpmPage; un useEffect auto-loop trigger-uieste batch-ul urmator cat timp autoLoading e on si nextRnpmPage nu e null. Stop-ul opreste loop-ul.","citations":["frontend/src/pages/RnpmSearch.tsx:228","frontend/src/pages/RnpmSearch.tsx:284","frontend/src/pages/RnpmSearch.tsx:402","frontend/src/pages/RnpmSearch.tsx:27"]},{"name":"Dialog split la cautare prea larga (RnpmSplitDialog)","what":"Cand RNPM raporteaza peste 1500 rezultate, apare dialogul \"Cautare prea larga\" care explica ca se pot rula N cautari separate (cate una per tip de inscriere), cu estimare de cost (numar captcha x pret USD), durata estimata si provider. Userul confirma sau anuleaza.","how":"runSearch prinde RnpmLimitExceededError si seteaza pendingSplit; RnpmSplitDialog afiseaza n = numarul de sub-tipuri din TIP_AVIZ_BY_CATEGORY, calculeaza captchasMin/Max si cost USD. La confirm apeleaza runSplit cu subTypeLabels.","citations":["frontend/src/pages/RnpmSearch.tsx:144","frontend/src/components/rnpm/RnpmSplitDialog.tsx:32","frontend/src/components/rnpm/RnpmSplitDialog.tsx:36","backend/src/services/rnpmSearchService.ts:240"]},{"name":"Estimare cost si durata in dialogul split","what":"Dialogul arata numarul de captcha necesare inmultit cu pretul per captcha (~$0.003 la 2Captcha, ~$0.0008 la CapSolver), costul total in USD, si durata estimata (~17s per sub-tip). Pentru categoriile cu tier-2 disponibil (ipoteci, specifice) se arata un interval min-max.","how":"PER_CAPTCHA_USD si PER_SUBTYPE_SECONDS calculeaza costMinUsd/costMaxUsd si etaSec/etaSecMax. hasTier2 e true daca DESTINATIONS_BY_CATEGORY are valori pentru categorie.","citations":["frontend/src/components/rnpm/RnpmSplitDialog.tsx:25","frontend/src/components/rnpm/RnpmSplitDialog.tsx:30","frontend/src/components/rnpm/RnpmSplitDialog.tsx:45"]},{"name":"Flux split live cu overlay de progres","what":"In timpul unui split apare un overlay jos-dreapta \"Split RNPM X/Y\" care arata sub-tipul curent, faza (captcha/cautare/gata/blocat) si, daca se aplica tier-2, destinatia curenta. La final un banner ambra rezuma avizele agregate, sub-tipurile blocate si gap-urile nerecuperate.","how":"runSplit consuma SSE-ul prin rnpmSplitSearch; onProgress actualizeaza splitProgress (afisat in overlay) si phase. Banner-ul foloseste splitStats (status ok/recovered/partial/blocked/error) cu describeBlockedSubResult.","citations":["frontend/src/pages/RnpmSearch.tsx:157","frontend/src/pages/RnpmSearch.tsx:548","frontend/src/pages/RnpmSearch.tsx:436","backend/src/services/rnpmSearchService.ts:618"]},{"name":"Tier-2 split pe destinatie (best-effort)","what":"Daca un singur tip de inscriere depaseste tot limita de 1500, pentru categoriile ipoteci si specifice se incearca o a doua runda de split pe destinatia inscrierii. Inregistrarile fara destinatie atribuita pot ramane neacoperite (gap raportat in banner).","how":"executeNestedDestinationSplit itereaza DESTINATII_BY_CATEGORY[type], ruland executeSearch per destinatie (index 1-based). gap = tier1SubTotal - SUM(tier2 subTotal), marcat residual_unclassified.","citations":["backend/src/services/rnpmSearchService.ts:921","backend/src/services/rnpmSearchService.ts:780","backend/src/services/rnpmSearchService.ts:807"]},{"name":"Fail-fast pe refuzuri tacite consecutive","what":"In timpul unui split, daca RNPM returneaza 3 refuzuri tacite consecutive (total > 0 dar zero documente), restul sub-tipurilor sunt marcate ca sarite si cautarea se opreste, pentru a nu consuma inutil captcha.","how":"consecutiveSilentRefusals incrementeaza pe documents.length===0; la K_SILENT_REFUSAL_FAIL_FAST (3) se marcheaza restul ca error si break.","citations":["backend/src/services/rnpmSearchService.ts:88","backend/src/services/rnpmSearchService.ts:720"]},{"name":"Salvare automata in baza locala + reincarcare","what":"Fiecare aviz gasit este descarcat in detaliu si salvat automat in baza locala; dupa cautare se reimprospateaza tab-ul Baza locala.","how":"executeSearch descarca detaliile (concurenta 12) si apeleaza saveAvizFull sub maintenance lock; frontend incrementeaza savedRefreshKey dupa fiecare cautare/batch.","citations":["backend/src/services/rnpmSearchService.ts:302","backend/src/services/rnpmSearchService.ts:73","frontend/src/pages/RnpmSearch.tsx:139"]},{"name":"Reluare istoric cautare (pendingSearch)","what":"Cand utilizatorul reia o cautare din istoric, formularul comuta pe tab-ul Cautare, se completeaza tipul si parametrii, si cautarea porneste automat o singura data.","how":"useEffect pe pendingSearch seteaza tab/type/params, incrementeaza formResetKey si apeleaza runSearch o data, apoi consumePendingSearch.","citations":["frontend/src/pages/RnpmSearch.tsx:303"]},{"name":"Buton Reset formular","what":"Butonul \"Reset\" goleste toate campurile formularului (toate categoriile), readuce bifele la valorile implicite si sterge rezultatele afisate.","how":"handleReset apeleaza .reset() pe toate field-hooks, seteaza activ/nemodificat la true si apeleaza onReset care curata result/error/lastParams.","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:406","frontend/src/pages/RnpmSearch.tsx:394"]},{"name":"Configurare cheie captcha","what":"Daca nu este configurata o cheie captcha, in dreapta sus apare butonul \"Configureaza 2Captcha\" si orice incercare de cautare deschide dialogul de configurare in loc sa porneasca.","how":"runSearch verifica captchaKey; daca lipseste apeleaza onConfigureKey si iese. Butonul header e afisat conditionat de !captchaKey.","citations":["frontend/src/pages/RnpmSearch.tsx:98","frontend/src/pages/RnpmSearch.tsx:332"]}],"settings":[{"name":"Categorie cautare (tab)","where":"Tab-uri formular Cautare","effect":"Determina campurile afisate si tipul de aviz interogat la RNPM","options":"ipoteci, fiducii, specifice, creante, obligatiuni","default":"ipoteci","citations":["frontend/src/components/rnpm/rnpm-form-constants.ts:121","frontend/src/pages/RnpmSearch.tsx:76"]},{"name":"Numai active","where":"Bifa sub formular","effect":"Limiteaza rezultatele la avizele active (params.activ)","options":"bifat (true) / nebifat (undefined)","default":"bifat","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:75","frontend/src/components/rnpm/RnpmSearchForm.tsx:716"]},{"name":"Nemodificate de alte inscrieri","where":"Bifa sub formular","effect":"Filtreaza avizele nemodificate (params.nemodificat)","options":"bifat (true) / nebifat (undefined)","default":"bifat","citations":["frontend/src/components/rnpm/RnpmSearchForm.tsx:76","frontend/src/components/rnpm/RnpmSearchForm.tsx:725"]},{"name":"Comutator SI / SAU","where":"Langa campurile combinabile (tip, CUI, CNP, prenume, reg, vehicul, destinatie)","effect":"Controleaza combinarea logica a valorii la interogarea RNPM","options":"SI (1) / SAU (2)","default":"SI (1)","citations":["frontend/src/components/ rc/services/rnpmSearchService.ts:73"},{"fact":"Default batch size backend","value":"25","citation":"backend/src/services/rnpmSearchService.ts:74"},{"fact":"Numar tipuri de inscriere ipoteci","value":"18","citation":"backend/src/services/rnpmSearchService.ts:50"},{"fact":"Numar tipuri specifice / fiducii","value":"7 / 7","citation":"frontend/src/components/rnpm/rnpm-form-constants.ts:70"},{"fact":"Numar tipuri creante / obligatiuni","value":"9 / 9","citation":"frontend/src/components/rnpm/rnpm-form-constants.ts:88"},{"fact":"Numar categorii Bun (alt tip)","value":"11","citation":"frontend/src/components/rnpm/rnpm-form-constants.ts:5"},{"fact":"Numar destinatii ipoteci","value":"10","citation":"frontend/src/components/rnpm/rnpm-form-constants.ts:19"},{"fact":"Numar destinatii specifice (inscrierii)","value":"14","citation":"frontend/src/components/rnpm/rnpm-form-constants.ts:32"},{"fact":"Pret per captcha 2Captcha (USD)","value":"0.003","citation":"frontend/src/components/rnpm/RnpmSplitDialog.tsx:26"},{"fact":"Pret per captcha CapSolver (USD)","value":"0.0008","citation":"frontend/src/components/rnpm/RnpmSplitDialog.tsx:27"},{"fact":"Durata estimata per sub-tip split (secunde)","value":"17","citation":"frontend/src/components/rnpm/RnpmSplitDialog.tsx:30"},{"fact":"Prag fail-fast refuzuri tacite consecutive","value":"3","citation":"backend/src/services/rnpmSearchService.ts:88"},{"fact":"Limita body /search","value":"64 KB","citation":"backend/src/routes/rnpm.ts:40"},{"fact":"Cap maxim pageSize server","value":"200","citation":"backend/src/routes/rnpm.ts:49"},{"fact":"Timeout SSE split","value":"2700000 ms (45 min)","citation":"backend/src/routes/rnpm.ts:101"},{"fact":"Timeout SSE bulk","value":"5400000 ms (90 min)","citation":"backend/src/routes/rnpm.ts:96"},{"fact":"Max sub-tipuri per split","value":"50","citation":"backend/src/routes/rnpm.ts:569"},{"fact":"Max items per bulk","value":"200","citation":"backend/src/routes/rnpm.ts:442"},{"fact":"TTL idempotency /search","value":"900000 ms (15 min)","citation":"backend/src/routes/rnpm.ts:153"},{"fact":"Interval startRnpmPage acceptat","value":"1..500","citation":"backend/src/routes/rnpm.ts:226"},{"fact":"Lungime max camp string params (adancime max 4)","value":"500 caractere","citation":"backend/src/routes/rnpm.ts:75"},{"fact":"Min caractere filtru text rezultate","value":"2 (max 200, timeout 5s)","citation":"backend/src/routes/rnpm.ts:323"}],"notes":"Securitate/arhitectura: parametrii de cautare sunt curatati de diacritice doar pentru request-ul efectiv catre RNPM (input.params original se pastreaza in rnpm_searches.params_json). Logarea evita PII - se logheaza doar shape-ul campurilor (fieldsPresent), nu valorile (CUI/CNP/nume). tipInscriere si destinatieInscriere se trimit ca index 1-based in listele canonice (confirmat empiric prin Network capture; trimiterea label-ului literal returna 0 rezultate). Abort-ul (Stop) este propagat cap-coada via AbortSignal pana in fetch-urile RNPM si verificat explicit inainte de orice scriere SQLite, ca un user care opreste sa nu produca scrieri orfane. Perioada start/final sunt filtre client-side - RNPM ignora intervalul pe toate categoriile. Backend valideaza sub-tipurile prin allow-list canonica (validateSubTypeLabels) ca sa previna drift/tampering pe indexarea 1-based. Scrierile SQLite sunt bracketate de maintenance lock pentru a coopera cu restore-ul de backup. Paginarea /searches foloseste cursor (deviatie deliberata de la regula offset-based) pentru ca e un log de istoric monoton crescator.","key":"rnpm-search"},{"module":"RNPM — Date salvate & Bulk","icon":"🗃️","overview":"Submodulul rnpm-data acopera persistenta locala a avizelor din Registrul National de Publicitate Mobiliara: cautarea in masa (Bulk) pe liste de CUI/CNP/denumire cu progres live prin SSE, baza locala SQLite cu filtrare/paginare/sortare server-side, vizualizarea detaliata a fiecarui aviz (modal cu 5 tab-uri), statistici agregate si export PDF/Excel. Datele descarcate de la RNPM (creditori, debitori, parti, bunuri, istoric inscrieri) sunt scrise in SQLite cu izolare per owner_id si pot fi gestionate complet din UI: filtrare, stergere selectiva sau totala, compactare (VACUUM), backup zilnic automat si restaurare din snapshot. Modulul este proiectat sa functioneze identic in desktop (Electron) si in viitorul mod web (acces DB doar prin repository, paginare offset-based, fara stare singleton legata de utilizator).","routes":["UI: tab \"Bulk\" si tab \"Baza locala\" in pagina RNPM (componente RnpmBulkSearch, RnpmSavedData, RnpmSavedStats)","API mount: /api/rnpm/* (rnpmRouter)"],"features":[{"name":"Cautare bulk pe lista de valori","what":"Permite cautarea simultana a multor CUI/CNP/denumiri (una pe linie). Userul alege categoria si campul de cautare, lipeste lista de valori, porneste si vede progresul fiecarui item in timp real (captcha -> cauta -> detalii -> X rezultate / eroare). Avizele gasite se salveaza automat in baza locala.","how":"Construieste cate un RnpmBulkItem per valoare cu cheia corecta pe categorie, apeleaza rnpmBulkSearch care deschide un stream SSE catre POST /api/rnpm/bulk; fiecare eveniment 'progress' actualizeaza randul corespunzator dupa index. La phase 'done' cu resultCount>0 notifica parintele sa reincarce baza locala.","settings":"Categorie (5 optiuni), Camp cautare (depinde de categorie), textarea Valori, checkbox 'Numai active' (default ON), checkbox 'Nemodificate de alte inscrieri' (default ON), butoane Porneste/Opreste.","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:262-325","frontend/src/components/rnpm/RnpmBulkSearch.tsx:278-329","backend/src/routes/rnpm.ts:424-534"]},{"name":"Categorii si campuri de cautare specifice RNPM","what":"In functie de categoria de aviz, campurile disponibile difera (ex. la Ipoteci: CUI/CNP/denumire Debitor sau Creditor; la Fiducii: Constituitor/Fiduciar/Beneficiar; la Specifice: Parte; la Creante: Debitor/Reprezentant Creditor; la Obligatiuni: Agent/Emitent).","how":"FIELDS_BY_CATEGORY mapeaza fiecare categorie la lista de campuri, fiecare cu o functie build() care seteaza cheia corecta in params (ex. debitorPJ.CUI vs parteJ.CUI). Trimiterea unei chei gresite pentru categorie = 0 rezultate (RNPM nu o recunoaste).","settings":"5 categorii: ipoteci, fiducii, specifice, creante, obligatiuni.","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:27-220","frontend/src/components/rnpm/RnpmBulkSearch.tsx:10-16"]},{"name":"Progres live SSE + estimare timp/cost","what":"Sub formular se afiseaza estimarea de timp (~25s/item) si cost (~$0.003/item), iar in timpul rularii o lista cu starea fiecarui item si un contor agregat (X OK / Y erori).","how":"estimatedTimeMin = nr_valori*25; estimatedCost = nr_valori*0.003. Lista progress se randeaza din array-ul de evenimente SSE; iconite diferentiaza captcha/search/details (spinner) vs done (bifa) vs error (X).","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:339-345","frontend/src/components/rnpm/RnpmBulkSearch.tsx:447-485"]},{"name":"Limita batch + hint splitting","what":"Maxim 200 valori procesate per batch; daca lista depaseste, primele 200 sunt procesate si se afiseaza un avertisment. Pentru peste 150 valori se recomanda impartirea in 2-3 taburi paralele (fiecare stream SSE e independent).","how":"allValues e taiat la MAX_BATCH=200; overLimit afiseaza badge amber. Cap-ul server identic (max 200) returneaza eroare la depasire.","settings":"MAX_BATCH=200 (client), cap server 200.","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:254-260","frontend/src/components/rnpm/RnpmBulkSearch.tsx:400-405","backend/src/routes/rnpm.ts:441-442"]},{"name":"Anulare bulk + dedup idempotent","what":"Userul poate opri bulk-ul in curs (buton Opreste); schimbarea de tab/unmount anuleaza automat cautarea in zbor pentru a nu consuma credit captcha inutil. Cereri duplicate cu acelasi clientRequestId sunt respinse.","how":"AbortController.signal propagat pana in fetch; useEffect cleanup apeleaza abort la unmount. Pe server, inflightKey(owner, clientRequestId) blocheaza un al doilea bulk concurent (duplicateRequest).","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:327-337","backend/src/routes/rnpm.ts:472-477"]},{"name":"Baza locala: filtrare, paginare, sortare","what":"Tabel cu avizele salvate. Userul poate cauta text liber (numar aviz/identificator, contract, CUI, CNP, denumire), filtra dupa categorie, interval de date (De la / pana la), si 'Doar active'; poate sorta pe Identificator/Categorie/Data/Tip/Stare si pagina rezultatele.","how":"rnpmGetSaved trimite query params catre GET /api/rnpm/saved; backend ruleaza getAvize() cu WHERE pe owner_id + filtre, cautare diacritic-insensitive pe coloane _norm materializate (12 placeholders), conversie data dd.mm.yyyy->ISO pentru comparatie/ordonare, ORDER BY whitelisted cu tie-break pe id.","settings":"Filtre: q, searchType (6 incl. 'Toate categoriile'), dataStart, dataStop, activOnly. Sort: sortKey (identificator/search_type/data/tip/activ) + sortDir (default data/desc). pageSize implicit 25.","citations":["frontend/src/components/rnpm/RnpmSavedData.tsx:77-102","frontend/src/components/rnpm/RnpmSavedData.tsx:248-316","backend/src/db/avizRepository.ts:428-515","backend/src/routes/rnpm.ts:775-801"]},{"name":"Selectie multipla + stergere","what":"Checkbox pe fiecare rand si pe antet (selecteaza/deselecteaza vizibile). Userul poate sterge un aviz individual (cu confirmare) sau toate avizele selectate pe pagina (stergere batch cu confirmare). Dupa stergere tabelul se reincarca si sare la ultima pagina valida daca pagina curenta ar ramane goala.","how":"handleDelete -> rnpmDeleteAviz (DELETE /saved/:id); handleDeleteSelected -> rnpmDeleteAvizeBatch (POST /saved/delete-batch, max 500 id-uri). refreshAfterDelete recalculeaza ultima pagina. Stergerea ruleaza checkpoint WAL si curata descrierile orfane.","settings":"Max 500 avize per batch.","citations":["frontend/src/components/rnpm/RnpmSavedData.tsx:144-184","frontend/src/components/rnpm/RnpmSavedData.tsx:134-142","backend/src/routes/rnpm.ts:828-842","backend/src/db/avizRepository.ts:532-576"]},{"name":"Export PDF / Excel din baza locala","what":"Butoane Excel si PDF care exporta fie avizele selectate, fie intregul set filtrat (cu numar afisat pe buton). Numele fisierului reflecta categoria cand setul e omogen.","how":"Daca exista selectie, exporta randurile vizibile selectate; altfel rnpmGetAllSaved pagineaza tot setul filtrat (200/pagina) si trimite catre exportRnpmExcel/exportRnpmPDF, care apeleaza POST /saved/export.xlsx sau /saved/export.pdf (generare server-side, stream binar). Limita 5000 avize per export.","settings":"EXPORT_BLOB_MAX=5000; suffix nume = searchType cand toate randurile au aceeasi categorie, altfel 'local'.","citations":["frontend/src/components/rnpm/RnpmSavedData.tsx:186-218","frontend/src/lib/rnpmApi.ts:380-470","frontend/src/lib/rnpmApi.ts:472-488"]},{"name":"Modal detalii aviz (5 tab-uri)","what":"Click pe un rand deschide modalul cu detaliile complete: General (tip, destinatie, tip/numar act, date inregistrare/expirare, stadiu, utilizator autorizat, inscrieri legate, alte mentiuni), Creditori, Debitori, Bunuri (cu referinte constituitor/tert) si Istoric inscrieri. Pentru avizele 'specifice' se afiseaza 4 tab-uri (Creditori/Debitori inlocuite de un singur tab 'Parti').","how":"rnpmGetAvizDetail(id) -> GET /saved/:id -> getAvizById incarca avizul + copiii (creditori/debitori/bunuri/istoric) cu re-constrangere owner_id (defense in depth) si JOIN pe tabelul de descrieri dedup-uite. Tab-urile afiseaza count badge; istoricul coloreaza badge-ul dupa tipul inscrierii (initial/reducere/prelungire/modificare).","settings":"Tab-uri: general, creditori, debitori, bunuri, istoric (specifice: general, parti, bunuri, istoric).","citations":["frontend/src/components/rnpm/RnpmDetailModal.tsx:75-149","frontend/src/components/rnpm/RnpmDetailModal.tsx:151-178","backend/src/db/avizRepository.ts:343-403"]},{"name":"Evidentiere termeni cautati in detalii","what":"Cand modalul de detalii e deschis din rezultatele filtrate, termenii din filtru sunt evidentiati (highlight) in numele partilor, coduri, descrieri bunuri si istoric.","how":"filterTokens este propagat in RnpmAvizDetailContent si transmis catre highlightTokens in fiecare camp randat (PartyList, BunuriList, IstoricList).","citations":["frontend/src/components/rnpm/RnpmDetailModal.tsx:46-50","frontend/src/components/rnpm/RnpmResultsTable.tsx:568-572"]},{"name":"Statistici baza locala (Info baza locala)","what":"Buton care deschide un modal cu: numar total avize (active/inactive), distributie pe categorii (Ipoteci/Fiducii/Specifice/Creante/Obligatiuni), dimensiunea fisierului DB (date + jurnal) si calea pe disc (cu copiere).","how":"rnpmGetStats -> GET /api/rnpm/stats -> getAvizStats() agrega total/activ/inactiv + GROUP BY search_type; ruta adauga marimea fisierului citind asincron db, db-wal, db-shm. UI afiseaza badge per categorie in ordinea TYPE_ORDER.","citations":["frontend/src/components/rnpm/RnpmSavedStats.tsx:258-302","backend/src/routes/rnpm.ts:844-857","backend/src/db/avizRepository.ts:585-605"]},{"name":"Compactare baza (VACUUM)","what":"Buton Compacteaza care rescrie fisierul DB pentru a elibera spatiul lasat de stergeri. Pe durata operatiei se afiseaza un splash full-screen 'Nu inchide aplicatia' care blocheaza inchiderea modalului si ESC. La final afiseaza cati octeti s-au recuperat si in cat timp.","how":"rnpmCompactDb -> POST /api/rnpm/compact (admin) -> compactDb() ruleaza VACUUM + truncate WAL; returneaza beforeBytes/afterBytes/durationMs. VACUUM poate dura zeci de secunde pe baze de 100MB+ si blocheaza event loop-ul backend.","citations":["frontend/src/components/rnpm/RnpmSavedStats.tsx:164-191","frontend/src/components/rnpm/RnpmSavedStats.tsx:379-398","backend/src/routes/rnpm.ts:881-889"]},{"name":"Stergere totala baza locala","what":"Buton 'Sterge baza' care sterge TOATE avizele dupa confirmare cu numarul exact; elibereaza si spatiul pe disc.","how":"rnpmDeleteAllSaved -> DELETE /api/rnpm/saved/all (admin) -> deleteAllAvize() (CASCADE pe copii + stergere rnpm_searches) urmat de compactDb() pentru a micsora fisierul; actiunea e audit-logata.","citations":["frontend/src/components/rnpm/RnpmSavedStats.tsx:193-213","backend/src/routes/rnpm.ts:811-826","backend/src/db/avizRepository.ts:545-558"]},{"name":"Backup automat zilnic + foldere","what":"Aplicatia face zilnic un snapshot al bazei in folderul backups/. Userul poate deschide folderul bazei sau folderul de backup-uri, si poate sterge toate backup-urile.","how":"runDailyBackup() foloseste API-ul de backup online SQLite, scrie la .db.tmp + rename atomic, ruleaza la interval de 24h, pastreaza 7 backup-uri zilnice (plus 5 pre-restore si 5 pre-migration in pool-uri separate) si curata orphan .tmp la pornire. Optional, un hook offsite (env) urca fisierul. Deschiderea folderelor se face via Electron shell (desktop-only).","settings":"Retentie: 7 zilnice / 5 pre-restore / 5 pre-migration; interval 24h; hook offsite via LEGAL_DASHBOARD_BACKUP_OFFSITE_CMD.","citations":["backend/src/db/backup.ts:500-568","backend/src/db/backup.ts:52-62","frontend/src/components/rnpm/RnpmSavedStats.tsx:127-162"]},{"name":"Restaurare din backup","what":"Modal 'Restaurare' care listeaza backup-urile disponibile (nume, data, dimensiune) si permite restaurarea unuia. Inainte de suprascriere baza curenta e salvata automat ca snapshot pre-restore; dupa restore se recomanda repornirea aplicatiei.","how":"rnpmListBackups -> GET /backups; rnpmRestoreBackup -> POST /backups/restore (admin). restoreFromBackup() valideaza numele (anti path-traversal), checkpoint WAL, inchide handle-ul DB, copiaza snapshot pre-restore, sterge sidecar-urile WAL/SHM stale, face replace atomic (.restore.tmp + rename), apoi ruleaza PRAGMA integrity_check; daca pica, revine automat la pre-restore.","citations":["frontend/src/components/rnpm/RnpmRestoreModal.tsx:46-69","backend/src/routes/rnpm.ts:924-949","backend/src/db/backup.ts:186-391"]},{"name":"Tabel rezultate cautare (live) cu filtru incremental","what":"Tabelul de rezultate al unei cautari RNPM (nu baza locala) ofera: marcaj nevizualizat/vizualizat, sortare pe coloane, selectie + export, expandare in-line a detaliilor per rand, si un filtru text incremental peste rezultate care evidentiaza match-urile inclusiv 'match in detalii'.","how":"useRnpmResultsFilter apeleaza POST /api/rnpm/search/:searchId/filter (filterRnpmSearchResults, HARD_LIMIT 1500 id-uri) si filtreaza local pe Set<avizId>; tokenii sunt debounced 300ms pentru highlight. Detaliile expandate refolosesc RnpmAvizDetailContent.","settings":"pageSize implicit 15; filtru maxLength 200; debounce 300ms; cap filtru 1500.","citations":["frontend/src/components/rnpm/RnpmResultsTable.tsx:113-184","frontend/src/components/rnpm/RnpmResultsTable.tsx:362-397","backend/src/db/avizRepository.ts:706-756"]}],"settings":[{"name":"Categorie (Bulk)","where":"Dropdown in tab Bulk","options":"ipoteci, fiducii, specifice, creante, obligatiuni","default":"ipoteci","effect":"Determina endpoint-ul RNPM si setul de campuri de cautare disponibile","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:10-16","frontend/src/components/rnpm/RnpmBulkSearch.tsx:239"]},{"name":"Camp cautare (Bulk)","where":"Dropdown in tab Bulk","options":"Variaza pe categorie (ex. CUI/CNP/Denumire Debitor PJ/PF, Creditor, Parte, Fiduciar, Beneficiar, Agent, Emitent etc.)","default":"Primul camp al categoriei (ipoteci: debitorPJ.CUI)","effect":"Cheia sub care se trimite fiecare valoare catre RNPM","citations":["frontend/src/components/rnpm/RnpmBulkSearch.tsx:240","frontend/src/components/rnpm/RnpmBulkSearch.tsx:27-220"]},{"name":"Numai active (Bulk)","where":"Checkbox in tab Bulk","options":"true/false","default":"true","effect":"Cand e ON adauga params.activ=true; absenta cheii aduce active+inactive","citations":["frontend/src/components/r
