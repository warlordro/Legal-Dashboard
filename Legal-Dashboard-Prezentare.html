ainte de pruning","citations":["backend/src/db/backup.ts:52-61"]},{"name":"Interval backup zilnic","where":"backend/src/db/backup.ts","options":"-","default":"24h (86400000 ms)","effect":"Daca ultimul snapshot zilnic e mai recent decat 24h, se sare peste","citations":["backend/src/db/backup.ts:62","backend/src/db/backup.ts:529-530"]},{"name":"LEGAL_DASHBOARD_BACKUP_OFFSITE_CMD","where":"Env var (operator)","options":"comanda shell (sh -c / cmd /c)","default":"neset (no-op)","effect":"Hook optional de upload offsite al backup-ului; primeste calea via env LEGAL_DASHBOARD_BACKUP_PATH; timeout 10 min; cod arbitrar la privilegiile backend-ului","citations":["backend/src/db/backup.ts:417-435","backend/src/db/backup.ts:436-447"]},{"name":"Guard admin + desktop-only","where":"Rute mutatii globale RNPM","options":"requireRole('admin') + requireDesktopHeader","default":"-","effect":"DELETE /saved/all, POST /compact, DELETE/POST /backups*, open-*-folder cer rol admin si header desktop; deschiderea folderelor e desktop-only (501 in web)","citations":["backend/src/routes/rnpm.ts:811","backend/src/routes/rnpm.ts:881","backend/src/routes/rnpm.ts:895-951"]}],"keyFacts":[{"fact":"Limita batch bulk (client + server)","value":"200","citation":"frontend/src/components/rnpm/RnpmBulkSearch.tsx:254; backend/src/routes/rnpm.ts:442"},{"fact":"Hint splitting in taburi paralele peste","value":"150 CUI","citation":"frontend/src/components/rnpm/RnpmBulkSearch.tsx:400"},{"fact":"Estimare timp per item bulk","value":"~25 s","citation":"frontend/src/components/rnpm/RnpmBulkSearch.tsx:342"},{"fact":"Estimare cost per item bulk","value":"~$0.003","citation":"frontend/src/components/rnpm/RnpmBulkSearch.tsx:343"},{"fact":"pageSize implicit Baza locala","value":"25 (clamp 1..200)","citation":"frontend/src/components/rnpm/RnpmSavedData.tsx:49; backend/src/db/avizRepository.ts:431"},{"fact":"Sort implicit Baza locala","value":"data / desc","citation":"frontend/src/components/rnpm/RnpmSavedData.tsx:60-61"},{"fact":"Max id-uri per stergere batch","value":"500","citation":"backend/src/routes/rnpm.ts:835"},{"fact":"Max avize per export PDF/Excel","value":"5000 (EXPORT_BLOB_MAX)","citation":"frontend/src/lib/rnpmApi.ts:380"},{"fact":"Page size la export 'tot'","value":"200 (SAVED_ENUM_PAGE_SIZE)","citation":"frontend/src/lib/rnpmApi.ts:474"},{"fact":"Cap filtru incremental rezultate","value":"1500 (HARD_LIMIT)","citation":"backend/src/db/avizRepository.ts:707"},{"fact":"Coloane acoperite de filtrul rezultatelor","value":"24 per token","citation":"backend/src/db/avizRepository.ts:677"},{"fact":"Placeholders cautare text in getAvize","value":"12","citation":"backend/src/db/avizRepository.ts:475"},{"fact":"pageSize implicit tabel rezultate live","value":"15","citation":"frontend/src/components/rnpm/RnpmResultsTable.tsx:114"},{"fact":"Debounce highlight filtru","value":"300 ms","citation":"frontend/src/components/rnpm/RnpmResultsTable.tsx:163"},{"fact":"maxLength input filtru rezultate","value":"200","citation":"frontend/src/components/rnpm/RnpmResultsTable.tsx:373"},{"fact":"Tab-uri modal detalii","value":"5 (4 pentru 'specifice')","citation":"frontend/src/components/rnpm/RnpmDetailModal.tsx:75-88"},{"fact":"Retentie backup zilnic","value":"7 (BACKUP_RETAIN_COUNT)","citation":"backend/src/db/backup.ts:52"},{"fact":"Retentie pre-restore","value":"5 (PRE_RESTORE_RETAIN)","citation":"backend/src/db/backup.ts:56"},{"fact":"Retentie pre-migration","value":"5 (PRE_MIGRATION_RETAIN)","citation":"backend/src/db/backup.ts:61"},{"fact":"Interval backup zilnic","value":"24h (86400000 ms)","citation":"backend/src/db/backup.ts:62"},{"fact":"Timeout hook offsite backup","value":"10 minute","citation":"backend/src/db/backup.ts:435"},{"fact":"Categorii RNPM suportate","value":"5 (ipoteci, fiducii, specifice, creante, obligatiuni)","citation":"frontend/src/components/rnpm/RnpmBulkSearch.tsx:10-16"}],"endpoints":[{"method":"POST","path":"/api/rnpm/bulk","purpose":"Cautare bulk multi-item cu raspuns SSE (progress/complete/error/aborted/timeout); validare tip+params, cap 200 items, dedup clientRequestId"},{"method":"GET","path":"/api/rnpm/saved","purpose":"Listare paginata a avizelor salvate cu filtre (q, searchType, activ, dataStart/Stop) si sortare (sortKey/sortDir)"},{"method":"GET","path":"/api/rnpm/saved/:id","purpose":"Detaliile complete ale unui aviz (aviz + creditori/debitori/bunuri/istoric)"},{"method":"DELETE","path":"/api/rnpm/saved/all","purpose":"Sterge toate avizele owner-ului + VACUUM (admin, desktop header, audit)"},{"method":"POST","path":"/api/rnpm/saved/delete-batch","purpose":"Stergere batch dupa lista de id-uri (max 500, audit)"},{"method":"DELETE","path":"/api/rnpm/saved/:id","purpose":"Sterge un singur aviz (audit)"},{"method":"GET","path":"/api/rnpm/stats","purpose":"Statistici: total/active/inactive, distributie pe categorii, dimensiune si cale DB"},{"method":"POST","path":"/api/rnpm/compact","purpose":"Compactare DB (VACUUM + truncate WAL), returneaza beforeBytes/afterBytes/durationMs (admin)"},{"method":"GET","path":"/api/rnpm/backups","purpose":"Listare backup-uri cu meta (nume, dimensiune, mtime) (admin)"},{"method":"DELETE","path":"/api/rnpm/backups","purpose":"Sterge toate backup-urile (admin, audit)"},{"method":"POST","path":"/api/rnpm/backups/restore","purpose":"Restaurare din backup cu snapshot pre-restore + integrity_check (admin, audit)"},{"method":"POST","path":"/api/rnpm/open-db-folder","purpose":"Deschide folderul bazei in file manager (desktop-only, admin)"},{"method":"POST","path":"/api/rnpm/open-backups-folder","purpose":"Deschide folderul backups in file manager (desktop-only, admin)"},{"method":"POST","path":"/api/rnpm/saved/export.xlsx","purpose":"Generare server-side Excel pentru lista de id-uri (stream binar, cap 5000)"},{"method":"POST","path":"/api/rnpm/saved/export.pdf","purpose":"Generare server-side PDF pentru lista de id-uri (stream binar, cap 5000)"},{"method":"POST","path":"/api/rnpm/search/:searchId/filter","purpose":"Filtru text incremental peste rezultatele unei cautari, returneaza matchedAvizIds (cap 1500) + countere"}],"notes":"Izolare per owner_id pe toate tabelele si toate query-urile (defense in depth si in loadAvizChildren). Acces DB doar prin repository (raw SQL exclusiv in backend/src/db). Backup-ul foloseste un RWLock de mentenanta (writer exclusiv pentru restore + backup zilnic, reader partajat pentru scheduler). Restore-ul e robust: replace atomic (.restore.tmp + rename), curatare sidecar WAL/SHM stale inainte de rename, PRAGMA integrity_check pe DB-ul restaurat si auto-revert la pre-restore daca esueaza. ORDER BY si filtrele folosesc whitelist + parametrizare (fara interpolare de input). Cautarea text foloseste coloane _norm materializate (migration 0022) pentru match diacritic-insensitive fara overhead UDF. Hook-ul offsite backup ruleaza cod arbitrar (sh -c / cmd /c) la privilegiile backend-ului — risc de securitate documentat, trebuie setat doar de operatorul de incredere. Descrierile bunurilor sunt dedup-uite in rnpm_bunuri_descrieri (pool owner-agnostic, GC orfani la stergere).","key":"rnpm-data"},{"module":"Captcha RNPM","icon":"🧩","overview":"Modulul Captcha rezolva automat provocarile reCAPTCHA v2 cerute de portalul RNPM (mj.rnpm.ro) atunci cand utilizatorul face cautari in Registrul National de Publicitate Mobiliara. Suporta doi furnizori externi de rezolvare (2Captcha si CapSolver) si doua moduri de operare: secvential (primar cu fallback automat daca esueaza) sau paralel/race (porneste ambii furnizori simultan si castiga cel mai rapid, la cost dublu). In desktop, utilizatorul isi introduce propriile chei (BYOK), criptate local prin OS keystore; in web, adminul tenantului configureaza o cheie comuna server-side, iar rutele care apeleaza furnizorul sunt blocate cu 501 daca nu exista cheie. Exista verificare de sold (\"Verifica\") si o cota per-utilizator pe fereastra rolling pentru a limita consumul portofelului comun.","routes":["UI: dialog Configurare Chei API (sectiunea Captcha RNPM) - frontend/src/components/ApiKeyDialog.tsx","API: POST /api/v1/rnpm/search (rnpm.ts:199)","API: POST /api/v1/rnpm/bulk (rnpm.ts:425)","API: POST /api/v1/rnpm/search-split (rnpm.ts:544)","API: POST /api/v1/rnpm/captcha/balance (rnpm.ts:1110)"],"endpoints":[{"method":"POST","path":"/api/v1/rnpm/captcha/balance","purpose":"Returneaza soldul contului de captcha la furnizorul activ (verificare buget). In web mode doar adminul vede soldul (403 altfel); 402 INSUFFICIENT_FUNDS daca balanta e zero, 501 daca cheia tenant nu e configurata."},{"method":"POST","path":"/api/v1/rnpm/search","purpose":"Cautare RNPM care declanseaza rezolvarea captcha prin guard (withRnpmCaptchaGuards) inainte de apelul SOAP/HTTP."},{"method":"POST","path":"/api/v1/rnpm/bulk","purpose":"Cautare RNPM in masa; consuma captcha per item, cu provider/mode/fallback transmise din guard."},{"method":"POST","path":"/api/v1/rnpm/search-split","purpose":"Cautare RNPM impartita pe sub-tipuri; fiecare segment poate consuma un captcha cu acelasi provider/mode."}],"features":[{"name":"Rezolvare reCAPTCHA prin 2Captcha","what":"Trimite provocarea reCAPTCHA a paginii RNPM catre serviciul 2Captcha.com, care o rezolva (fallback uman) si returneaza un token folosit la cautarea RNPM.","how":"Foloseste SDK-ul @2captcha/captcha-solver: solver.recaptcha({ googlekey, pageurl }). SDK-ul nu accepta AbortSignal, deci se ruleaza un Promise.race intre solve si un abortPromise pentru a nu bloca UI-ul.","citations":["backend/src/services/captchaSolver.ts:54","backend/src/services/captchaSolver.ts:68"]},{"name":"Rezolvare reCAPTCHA prin CapSolver","what":"Alternativa AI-based, mai ieftina, care rezolva acelasi reCAPTCHA prin API-ul CapSolver.com.","how":"POST /createTask (type ReCaptchaV2TaskProxyLess) apoi polling pe /getTaskResult la 2s pana la status 'ready' (token in solution.gRecaptchaResponse) sau 'failed'; maxim 60 poll-uri (~120s).","citations":["backend/src/services/captchaSolver.ts:132","backend/src/services/captchaSolver.ts:139","backend/src/services/captchaSolver.ts:164"]},{"name":"Mod secvential cu fallback automat","what":"Incearca furnizorul ales ca primar; daca esueaza, comuta automat la celalalt furnizor (daca a doua cheie e setata), fara sa anunte utilizatorul.","how":"solveRnpmCaptcha cu mode='sequential' (default): solveWith(provider) intr-un try; pe eroare (non-abort), daca haveOther, reincearca cu otherProvider si cheia fallback.","citations":["backend/src/services/captchaSolver.ts:249","backend/src/services/captchaSolver.ts:268","backend/src/services/captchaSolver.ts:278"],"settings":"Activat din UI prin butonul 'Secvential (fallback)'; default cand nu sunt ambele chei."},{"name":"Mod paralel (race)","what":"Porneste ambii furnizori simultan; castiga primul care returneaza un token, celalalt este anulat. Mai rapid dar cost dublu (platesti potential la ambii).","how":"solveRace ruleaza Promise.any pe ambele slot-uri (A=primar, B=celalalt) cu AbortController per slot; la winner se abort-eaza perdantul. Daca ambele esueaza arunca CaptchaError cu mesajele combinate. Necesita ambele chei setate.","citations":["backend/src/services/captchaSolver.ts:196","backend/src/services/captchaSolver.ts:227","backend/src/services/captchaSolver.ts:264"],"settings":"Buton 'Paralel (race)' in UI; dezactivat (disabled) daca nu sunt setate AMBELE chei (2Captcha + CapSolver)."},{"name":"Verificare sold captcha ('Verifica')","what":"Afiseaza utilizatorului soldul ramas in contul furnizorului activ, ca sa stie cand sa-l reincarce.","how":"POST /captcha/balance -> getCaptchaBalance: pentru 2Captcha solver.balance() (cu race pe timeout 15s), pentru CapSolver POST /getBalance. Timeout 15s pentru a nu agata Settings la infinit.","citations":["backend/src/services/captchaSolver.ts:336","backend/src/services/captchaSolver.ts:298","backend/src/services/captchaSolver.ts:322","backend/src/routes/rnpm.ts:1110"]},{"name":"Selectie furnizor activ","what":"Utilizatorul alege care furnizor (2Captcha sau CapSolver) este folosit ca primar pentru cautarile RNPM, cu indicator vizual al cheilor active.","how":"Butoane in ApiKeyDialog care apeleaza setCaptchaProvider; valoarea se persista in localStorage (portaljust-captcha-provider) si se trimite cu request-urile.","citations":["frontend/src/components/ApiKeyDialog.tsx:277","frontend/src/hooks/useApiKey.ts:191","frontend/src/hooks/useApiKey.ts:23"],"settings":"Default '2captcha' (useApiKey.ts:78)."},{"name":"Stocare chei criptate local (BYOK desktop)","what":"In desktop, fiecare utilizator isi introduce propriile chei 2Captcha/CapSolver, salvate criptat pe calculatorul local prin OS keystore, niciodata in plaintext.","how":"useApiKey foloseste safeStorage IPC (DPAPI/Keychain/libsecret) prin window.desktopApi.encryptKeys; ciphertext in localStorage (portaljust-api-keys-enc). Daca keystore-ul nu e disponibil, refuza sa salveze (encryptionUnavailable).","citations":["frontend/src/hooks/useApiKey.ts:151","frontend/src/hooks/useApiKey.ts:22","frontend/src/components/ApiKeyDialog.tsx:393"]},{"name":"Cheie captcha comuna pe tenant (web mode)","what":"In modul web, adminul tenantului configureaza o singura cheie captcha la nivel de tenant; utilizatorii obisnuiti nu o vad si o consuma pe bugetul setat de admin.","how":"resolveCaptchaKeyForRoute citeste getTenantKeys() (cheie criptata AES-GCM in tabela tenant_api_keys, cache 60s). Daca request-ul trimite totusi captchaKey in body, e ignorat dar logat ca warning.","citations":["backend/src/routes/rnpmGuards.ts:192","backend/src/db/tenantKeysRepository.ts:68","backend/src/routes/rnpmGuards.ts:83"]},{"name":"Blocaj web-mode 501 (rejectCaptchaKeyInWebMode)","what":"In web, daca nu exista cheie captcha configurata de admin, cautarile care ar apela furnizorul raspund 501 'Cheia captcha nu e configurata. Contacteaza adminul' in loc sa esueze obscur. Rutele de date (/saved, /searches, /stats, /backups) raman functionale.","how":"resolveCaptchaKeyForRoute intoarce sursa 'tenant' cu ok:false + raspuns 501 CAPTCHA_NOT_CONFIGURED cand getAuthMode()==='web' si cheia tenant lipseste.","citations":["backend/src/routes/rnpmGuards.ts:187","backend/src/routes/rnpmGuards.ts:197","backend/src/routes/rnpmGuards.ts:201"]},{"name":"Cota captcha per utilizator (rolling window)","what":"Limiteaza cate captcha-uri poate consuma un utilizator intr-o fereastra de timp (zi/saptamana/luna), pentru a controla cheltuiala portofelului comun in web; la depasire intoarce 429 cu Retry-After.","how":"In web, withRnpmCaptchaGuards verifica override-ul din /admin/quota cu feature 'captcha.rnpm' (interpretat ca NUMAR de captcha-uri, nu USD) sau default-ul din env; numara consumul in fereastra si blocheaza cu 429 QUOTA_EXCEEDED daca used>=limit sau limit==0.","citations":["backend/src/routes/rnpmGuards.ts:89","backend/src/routes/rnpmGuards.ts:96","backend/src/routes/rnpmGuards.ts:100"],"settings":"Override per-user din /admin/quota (feature captcha.rnpm); default global din env LEGAL_DASHBOARD_DEFAULT_CAPTCHA_QUOTA."},{"name":"Auditare consum captcha tenant","what":"Fiecare captcha acceptat in web se inregistreaza ca o intrare de consum legata de utilizator, ca adminul sa poata atribui arderea portofelului comun pe persoane.","how":"recordCaptchaUsage({ownerId, provider, source:'tenant', requestId}) la model 'record-and-accept' (1 rand per request acceptat; risc de overcount niciodata undercount). Esecul inregistrarii e doar logat, nu blocheaza.","citations":["backend/src/routes/rnpmGuards.ts:124","backend/src/routes/rnpmGuards.ts:119"]},{"name":"Anulare (abort) propagata in rezolvare","what":"Daca utilizatorul anuleaza cautarea, rezolvarea captcha se opreste cat mai repede in loc sa astepte zecile de secunde de timeout.","how":"AbortSignal propagat: sleepAbortable reactioneaza imediat la abort intre poll-uri (CapSolver), iar pentru 2Captcha race cu abortPromise. Erorile AbortError sunt aruncate ca DOMException.","citations":["backend/src/services/captchaSolver.ts:99","backend/src/services/captchaSolver.ts:61","backend/src/services/captchaSolver.ts:257"]},{"name":"Hot-swap sitekey/pageurl fara rebuild","what":"Daca RNPM roteste cheia reCAPTCHA (sitekey) sau muta pagina, operatorul poate suprascrie valorile prin env vars fara recompilare.","how":"getRnpmSitekey/getRnpmPageUrl citesc process.env.RNPM_SITEKEY / RNPM_PAGEURL la fiecare apel (lazy), cu fallback la valorile default; citirea la apel evita problema ordinii de incarcare dotenv.","citations":["backend/src/services/captchaSolver.ts:11","backend/src/services/captchaSolver.ts:14","backend/src/services/captchaSolver.ts:8"]},{"name":"Mesaje de eroare clasificate","what":"Utilizatorul primeste mesaje clare in romana: cheie invalida, balanta insuficienta, timeout, in loc de erori brute.","how":"Erorile furnizorilor sunt mapate pe CaptchaError vs CaptchaInsufficientFundsError (regex pe ERROR_ZERO_BALANCE, ERROR_WRONG_USER_KEY etc.); ruta /captcha/balance le traduce in HTTP 402/400.","citations":["backend/src/services/captchaSolver.ts:80","backend/src/services/captchaSolver.ts:148","backend/src/routes/rnpm.ts:1142"]}],"settings":[{"name":"Furnizor captcha activ (captchaProvider)","where":"UI: ApiKeyDialog, sectiunea 'Captcha RNPM — provider activ' (butoane 2Captcha / CapSolver)","effect":"Alege furnizorul primar folosit la rezolvarea reCAPTCHA pentru cautarile RNPM.","options":"'2captcha' | 'capsolver'","default":"'2captcha'","citations":["frontend/src/components/ApiKeyDialog.tsx:277","frontend/src/hooks/useApiKey.ts:78","frontend/src/hooks/useApiKey.ts:23"]},{"name":"Mod captcha (captchaMode)","where":"UI: ApiKeyDialog, butoane 'Secvential (fallback)' / 'Paralel (race)'","effect":"Secvential = primar cu fallback la celalalt daca esueaza; Paralel = porneste ambii simultan, castiga cel mai rapid (cost dublu). Butonul Paralel e dezactivat daca nu sunt setate ambele chei.","options":"'sequential' | 'race'","default":"'sequential'","citations":["fronte ion":"backend/src/services/captchaSolver.ts:139"},{"fact":"Timeout verificare sold","value":"15000 ms (15s)","citation":"backend/src/services/captchaSolver.ts:92"},{"fact":"Perioade cota: zi","value":"86400 s","citation":"backend/src/routes/rnpmGuards.ts:20"},{"fact":"Perioade cota: saptamana","value":"604800 s","citation":"backend/src/routes/rnpmGuards.ts:21"},{"fact":"Perioade cota: luna","value":"2592000 s","citation":"backend/src/routes/rnpmGuards.ts:22"},{"fact":"Feature key cota captcha","value":"captcha.rnpm","citation":"backend/src/routes/rnpmGuards.ts:17"},{"fact":"Cost aproximativ 2Captcha (afisat UI)","value":"~$0.003/captcha, fallback uman","citation":"frontend/src/components/ApiKeyDialog.tsx:346"},{"fact":"Cost aproximativ CapSolver (afisat UI)","value":"~$0.0008/captcha, AI-based","citation":"frontend/src/components/ApiKeyDialog.tsx:375"},{"fact":"TTL cache chei tenant","value":"60000 ms (60s)","citation":"backend/src/db/tenantKeysRepository.ts:57"},{"fact":"Cod HTTP web fara cheie tenant","value":"501 CAPTCHA_NOT_CONFIGURED","citation":"backend/src/routes/rnpmGuards.ts:204"},{"fact":"Cod HTTP depasire cota captcha","value":"429 QUOTA_EXCEEDED + Retry-After","citation":"backend/src/routes/rnpmGuards.ts:113"},{"fact":"Cod HTTP balanta insuficienta","value":"402 INSUFFICIENT_FUNDS","citation":"backend/src/routes/rnpm.ts:1144"},{"fact":"Cheie localStorage provider captcha","value":"portaljust-captcha-provider","citation":"frontend/src/hooks/useApiKey.ts:23"},{"fact":"Cheie localStorage mod captcha","value":"portaljust-captcha-mode","citation":"frontend/src/hooks/useApiKey.ts:24"}],"notes":"Securitate/arhitectura: cheile captcha desktop sunt criptate prin OS keystore (safeStorage DPAPI/Keychain/libsecret), niciodata in plaintext; cheile tenant sunt criptate AES-GCM in tabela tenant_api_keys cu cache 60s (decryptField returneaza '' pe GCM auth failure, fara a expune ciphertext in loguri). In web mode, cheia captcha din body e ignorata (tenant key wins) dar logata ca warning (fact, nu valoare). Soldul captcha in web e vizibil doar adminilor (403 pentru non-admin) ca sa nu se scurga cheltuiala tenantului. Modelul de contorizare cota e 'record-and-accept' (1 rand per request acceptat de guard), deci risc de overcount, niciodata undercount, daca SOAP-ul ulterior nu mai consuma cheia. Furnizorii externi nu suporta nativ AbortSignal, deci anularea e implementata prin Promise.race cu abortPromise (2Captcha) sau sleepAbortable intre poll-uri (CapSolver) - promisiunea originala continua in background dar tokenul nu mai e folosit. Modul race poate plati la ambii furnizori (cost dublu) si e dezactivat in UI daca nu sunt setate ambele chei.","key":"captcha"},{"module":"Monitorizare","icon":"📡","overview":"Modulul de Monitorizare ruleaza joburi recurente care verifica automat, la cadenta aleasa, dosare existente sau subiecti (nume/firme) pe PortalJust (SOAP) si ICCJ (scj.ro), generand alerte la termene noi, solutii sau dosare aparute. Utilizatorul adauga tinte individual (tab Dosar / tab Nume) sau in masa dintr-un fisier XLSX/CSV, le filtreaza pe tipuri (Toate/Dosare/Nume/ICCJ), le pune in pauza, le sterge si exporta lista in Excel/PDF. Un scheduler de fundal revendica joburile scadente (tick la 60s), ruleaza runner-ul potrivit pe kind, scrie istoricul rularilor (runs/snapshots/alerts) si pastreaza retentie de 90 zile. Exista un buton global de oprire/reluare (master switch per-owner) plus un kill switch operational pe variabila de mediu MONITORING_DISABLED_KINDS.","routes":["/monitorizare (UI pagina Monitorizare)","/api/v1/monitoring/* (router monitoring)","/api/v1/name-lists/* (router import nume in masa)"],"endpoints":[{"method":"GET","path":"/api/v1/monitoring/jobs","purpose":"Listeaza joburile owner-scoped, cu paginare si filtre kind/active/q"},{"method":"GET","path":"/api/v1/monitoring/jobs/:id","purpose":"Detaliile unui job (404 daca nu apartine owner-ului)"},{"method":"POST","path":"/api/v1/monitoring/jobs","purpose":"Creeaza un job de monitorizare (dosar_soap/name_soap/iccj); aviz_rnpm respins 422"},{"method":"PATCH","path":"/api/v1/monitoring/jobs/:id","purpose":"Modifica cadence_sec, active, paused_until, alert_config, notes (kind/target imutabile)"},{"method":"DELETE","path":"/api/v1/monitoring/jobs/:id","purpose":"Sterge un job; refuza 409 daca jobul are rulare in curs"},{"method":"POST","path":"/api/v1/monitoring/jobs/bulk-delete","purpose":"Stergere in masa, max 100 ID-uri; raporteaza deleted/inflight/not_found (cere header desktop)"},{"method":"POST","path":"/api/v1/monitoring/jobs/:id/run","purpose":"Declanseaza manual o rulare; 202 + runId, 409 daca deja in executie, 503 daca scheduler indisponibil"},{"method":"GET","path":"/api/v1/monitoring/master-switch","purpose":"Citeste starea globala de monitorizare per-owner (default true)"},{"method":"PUT","path":"/api/v1/monitoring/master-switch","purpose":"Activeaza/dezactiveaza global claim-ul de joburi; raspunde {enabled, changed}"},{"method":"GET","path":"/api/v1/name-lists","purpose":"Listeaza listele de nume importate (paginat, optional includeArchived)"},{"method":"POST","path":"/api/v1/name-lists/preview","purpose":"Preview XLSX/CSV (multipart): valideaza randuri, totals ok/warn/rejected, sha256; fara persistenta"},{"method":"POST","path":"/api/v1/name-lists (si /commit)","purpose":"Commit lista nume; idempotent pe sha256; optional auto-creeaza joburi name_soap in batch-uri de max 100"}],"features":[{"name":"Adaugare job individual (Dosar / Nume)","what":"Formular cu doua tab-uri: 'Nr. Dosar' pentru un numar de dosar PortalJust si 'Nume' pentru un subiect (persoana/firma) cu institutii optionale. Alegi cadenta si poti adauga o notita.","how":"MonitoringAddForm valideaza local: numar dosar pe regex 1234/180/2024 (cu sufix optional), nume minim 2 caractere fortat UPPERCASE. Trimite POST /jobs prin monitoring.createDosarWithResult / createNameWithResult; backend raspunde 201 (nou) sau 200 (exista deja, dedup pe target_hash).","settings":"Cadenta (4h/8h/12h/24h, default 4h), Institutii (multi-select, gol = toate institutiile), Note (max 200 caractere).","citations":["frontend/src/components/monitoring/MonitoringAddForm.tsx:10","frontend/src/components/monitoring/MonitoringAddForm.tsx:43","frontend/src/components/monitoring/MonitoringAddForm.tsx:60","frontend/src/components/monitoring/MonitoringAddForm.tsx:80","backend/src/routes/monitoring.ts:195"]},{"name":"Tipuri de job (kind)","what":"Patru tipuri: dosar pe PortalJust (dosar_soap), nume pe PortalJust (name_soap), dosar ICCJ (iccj). RNPM (aviz_rnpm) este definit in schema dar nu are runner activ.","how":"Discriminated union Zod pe 'kind'. La creare, aviz_rnpm e respins explicit cu 422 kind_not_implemented; restul trec prin createJob si sunt revendicate de scheduler doar daca au runner inregistrat.","settings":"Kind nu se poate schimba dupa creare (target_hash unic).","citations":["backend/src/schemas/monitoring.ts:124","backend/src/services/monitoring/commands/createMonitoringJob.ts:48","backend/src/routes/monitoring.ts:178"]},{"name":"Import in masa din fisier (XLSX/CSV)","what":"Card pliabil 'Adaugare bulk din fisier': descarci template XLSX, completezi dosare si/sau nume, incarci fisierul, vezi un preview cu statusuri (ok/warn/respinse) si confirmi importul.","how":"MonitoringBulkImportCard parseaza fisierul client-side, separa randurile dosar de nume. Dosarele se creeaza prin POST /jobs in chunk-uri de 5 in paralel cu client_request_id idempotent. Numele trec prin /name-lists/preview apoi /name-lists commit cu autoCreateJobs=true, iterativ pana partial=false (batch-uri de 100, cap 50 iteratii).","settings":"Titlu lista, Filtru preview (toate/ok/warn/respinse), checkbox 'Exclude warn-urile automat', buton Exclude/Include per rand, paginare preview (25/50/100/250).","citations":["frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:170","frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:221","frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:457","backend/src/routes/nameLists.ts:261"]},{"name":"Validare preview nume (ok / warn / respinse)","what":"La preview, fiecare nume primeste un status: ok (valid), warn (duplicat in fisier sau nume prea lung pentru PortalJust), respins (gol, sub 2 sau peste 200 caractere, doar cifre). Respinse nu se importa niciodata.","how":"Serverul re-deriva validation + dedup independent de client (defense-in-depth) atat la preview cat si la commit prin validateRawItems; randurile duplicate sunt deduplicate automat, nu creeaza job in plus.","citations":["frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:392","backend/src/routes/nameLists.ts:208"]},{"name":"Filtrare pe tip (tab-uri kind) + cautare","what":"Tab-uri 'Toate / Dosare / Nume / ICCJ' deasupra listei plus un camp de cautare dupa nume sau numar dosar.","how":"JobKindTabs (role=tablist, navigabil cu sageti) seteaza kindFilter; cautarea e debounced si trimisa ca parametru q la GET /jobs (LIKE diacritic/case-insensitive pe target).","citations":["frontend/src/components/monitoring/JobKindTabs.tsx:6","frontend/src/pages/Monitorizare.tsx:402","backend/src/schemas/monitoring.ts:183"]},{"name":"Editare cadenta inline","what":"In tabel, fiecare job are un dropdown de cadenta (4h/8h/12h/24h). Cadentele non-standard sunt evidentiate cu galben si pot fi normalizate alegand o optiune.","how":"handleCadenceChange face update optimist in tabel apoi PATCH /jobs/:id cu cadence_sec; backend valideaza min 600s, max 86400s.","citations":["frontend/src/pages/Monitorizare.tsx:245","frontend/src/pages/Monitorizare.tsx:700","backend/src/schemas/monitoring.ts:164"]},{"name":"Note editor per job","what":"Fiecare rand permite adaugarea/editarea unei notite scurte (ex: 'Client X — apel'), afisata sub tinta.","how":"NoteEditor face PATCH /jobs/:id cu notes (sau null la stergere); contor 200/200, avertizare pentru notite legacy peste 200 caractere care trebuie scurtate inainte de salvare.","settings":"Notita max 200 caractere.","citations":["frontend/src/components/monitoring/NoteEditor.tsx:53","frontend/src/components/monitoring/NoteEditor.tsx:69"]},{"name":"Pauza / Reluare job individual","what":"Buton play/pause pe fiecare rand pentru a opri temporar un singur job fara sa-l stergi.","how":"handleToggleActive face PATCH /jobs/:id cu active inversat; cand master switch-ul global e oprit, iconita arata play indiferent de starea jobului.","citations":["frontend/src/pages/Monitorizare.tsx:236","frontend/src/pages/Monitorizare.tsx:763"]},{"name":"Master switch global (Opreste / Reia monitorizarea)","what":"Buton care opreste sau reia toata monitorizarea pentru utilizatorul curent, fara a modifica starea individuala a joburilor.","how":"useMonitoringMasterSwitch citeste GET /master-switch (default true cand randul lipseste) si scrie PUT /master-switch. Anti-join in claimDueJobs respecta monitoring_enabled=0; la re-enable joburile redevin claimable imediat (next_run_at ramane in trecut).","settings":"enabled: true/false, per-owner, persistat in owner_monitoring_settings; audit log scris doar la schimbare reala.","citations":["backend/src/routes/monitoring.ts:524","frontend/src/pages/Monitorizare.tsx:293"]},{"name":"Selectie + stergere in masa","what":"Checkbox-uri pe randuri si in header (select all/indeterminate); buton 'Sterge selectate (N)' pentru a sterge mai multe joburi odata.","how":"handleBulkDelete cheama POST /jobs/bulk-delete (max 100 ID-uri); raspunsul separa deleted_ids / inflight_ids (raman, retry mai tarziu) / not_found_ids; selectia opereaza doar pe pagina vizibila.","citations":["frontend/src/pages/Monitorizare.tsx:138","backend/src/routes/monitoring.ts:358"]},{"name":"Export Excel / PDF","what":"Butoane de export al listei de monitorizari in Excel sau PDF; daca exista selectie exporta doar randurile bifate, altfel toate paginile filtrate.","how":"handleExport foloseste exportMonitoringExcel/PDF; fetchAllJobsForExport itereaza paginile (100/pagina, guard 1000 pagini) aplicand filtrele kind/q active.","citations":["frontend/src/pages/Monitorizare.tsx:221","frontend/src/pages/Monitorizare.tsx:201"]},{"name":"Rulare manuala (run now)","what":"Posibilitatea de a declansa imediat o verificare pentru un job, fara a astepta cadenta.","how":"POST /jobs/:id/run preda jobul revendicat scheduler-ului (runJobNow); raspunde 202 + runId pentru polling, 409 daca o rulare e deja in curs, 503 daca scheduler-ul nu e disponibil.","citations":["backend/src/routes/monitoring.ts:457"]},{"name":"Scheduler de fundal (claim + run + retentie)","what":"Procesul care verifica periodic ce joburi sunt scadente, le ruleaza si curata istoricul vechi.","how":"Scheduler tick la 60s, revendica pana la 50 joburi/tick cu jitter de max 30s, ruleaza runner-ul pe kind. Dupa 5 esecuri consecutive (source_error) incetineste jobul la o data pe ora. Purga zilnica sterge monitoring_runs / ai_usage / audit_log mai vechi de 90 zile.","settings":"tickIntervalMs 60000, claimLimit 50, jitterSecMax 30, SOURCE_ERROR_THRESHOLD 5, backoff 3600s, retentie 90 zile.","citations":["backend/src/index.ts:686","backend/src/services/monitoring/scheduler.ts:44","backend/src/services/monitoring/scheduler.ts:365"]},{"name":"Detalii instante monitorizate (modal Info)","what":"Pentru joburile de tip Nume cu institutii selectate, o iconita Info deschide un modal cu lista institutiilor monitorizate.","how":"Coloana 'Detalii' apare doar daca exista joburi name_soap cu scope de institutii; modalul mapeaza codurile prin getInstitutieLabel.","citations":["frontend/src/pages/Monitorizare.tsx:483","frontend/src/pages/Monitorizare.tsx:812"]},{"name":"Status si link-uri pe rand","what":"Fiecare rand arata badge sursa (PJ/ICCJ), status (activ/pauza + last_status ok/error/partial/skipped), ultima rulare, urmatoarea verificare si link extern catre portal.just.ro / scj.ro plus buton 'Dosare' pentru a deschide tinta in pagina Cautare Dosare.","how":"Randul formateaza target pri notify_days_before","where":"alert_config job (PATCH/creare)","effect":"Cu cate zile inainte de termen se notifica","options":"array int 0-365, max 10 valori","default":"[14, 7, 3, 1]","citations":["backend/src/schemas/monitoring.ts:99"]},{"name":"alert_config.notify_on_new_termen","where":"alert_config job","effect":"Alerta la termen nou","options":"true/false","default":"true","citations":["backend/src/schemas/monitoring.ts:100"]},{"name":"alert_config.notify_on_solution","where":"alert_config job","effect":"Alerta la aparitia unei solutii","options":"true/false","default":"true","citations":["backend/src/schemas/monitoring.ts:101"]},{"name":"alert_config.notify_on_dosar_disappeared","where":"alert_config job","effect":"Alerta cand dosarul dispare din portal","options":"true/false","default":"false","citations":["backend/src/schemas/monitoring.ts:102"]},{"name":"alert_config.email_to","where":"alert_config job","effect":"Adresa de email pentru alerte","options":"email valid, max 254","default":"neсonfigurat (optional)","citations":["backend/src/schemas/monitoring.ts:105"]},{"name":"Master switch (enabled)","where":"Buton 'Opreste/Reia monitorizarea' + PUT /master-switch","effect":"Opreste/reia global claim-ul joburilor pentru owner","options":"true/false","default":"true (cand randul lipseste)","citations":["backend/src/routes/monitoring.ts:524","backend/src/routes/monitoring.ts:530"]},{"name":"MONITORING_DISABLED_KINDS","where":"Variabila de mediu (operational kill switch)","effect":"Exclude tipurile listate din claim-ul scheduler-ului fara modificari in DB","options":"lista separata prin virgula, ex: dosar_soap,name_soap","default":"gol (toate kind-urile active)","citations":["backend/src/db/monitoringJobsRepository.ts:391"]},{"name":"Filtru kind (tab-uri)","where":"JobKindTabs in pagina","effect":"Filtreaza lista pe tip de job","options":"all / dosar_soap / name_soap / iccj","default":"all (Toate)","citations":["frontend/src/components/monitoring/JobKindTabs.tsx:6"]},{"name":"Paginare lista joburi","where":"TablePagination + GET /jobs","effect":"Numar de randuri pe pagina","options":"10 / 25 / 50 / 100 (backend pageSize max 100)","default":"pageSize backend 20","citations":["frontend/src/pages/Monitorizare.tsx:801","backend/src/schemas/monitoring.ts:186"]},{"name":"Filtru preview bulk","where":"Select in MonitoringBulkImportCard","effect":"Filtreaza randurile din preview","options":"toate / ok / warn / respinse","default":"all","citations":["frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:457"]},{"name":"Exclude warn-urile automat","where":"Checkbox in cardul bulk","effect":"Exclude din import toate randurile cu validation=warn","options":"on/off","default":"off","citations":["frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:66"]},{"name":"maxJobs per commit","where":"Body /name-lists commit","effect":"Cate joburi name_soap se creeaza per cerere (batch)","options":"max 100","default":"100","citations":["backend/src/routes/nameLists.ts:264","frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:236"]},{"name":"includeArchived","where":"Query GET /name-lists","effect":"Include listele arhivate","options":"true/false","default":"false","citations":["backend/src/routes/nameLists.ts:120"]}],"keyFacts":[{"fact":"Cadenta UI 4h","value":"14400s","citation":"frontend/src/components/monitoring/MonitoringAddForm.tsx:13"},{"fact":"Cadenta UI 8h/12h/24h","value":"28800 / 43200 / 86400s","citation":"frontend/src/pages/Monitorizare.tsx:40"},{"fact":"Cadenta default","value":"14400s (4h)","citation":"backend/src/schemas/monitoring.ts:114"},{"fact":"cadence_sec interval valid","value":"min 600, max 86400","citation":"backend/src/schemas/monitoring.ts:164"},{"fact":"Nume subiect lungime","value":"min 2, max 200 caractere","citation":"backend/src/schemas/monitoring.ts:66"},{"fact":"Note max","value":"200 caractere","citation":"backend/src/schemas/monitoring.ts:120"},{"fact":"Institutii name_soap","value":"max 20 coduri, 2-200 char fiecare","citation":"backend/src/schemas/monitoring.ts:80"},{"fact":"notify_days_before default","value":"[14, 7, 3, 1]","citation":"backend/src/schemas/monitoring.ts:99"},{"fact":"Bulk delete max ID-uri","value":"100","citation":"backend/src/routes/monitoring.ts:358"},{"fact":"Body limit monitoring","value":"16 KB (16*1024)","citation":"backend/src/routes/monitoring.ts:39"},{"fact":"Body limit preview / commit name-lists","value":"10 MB / 15 MB","citation":"backend/src/routes/nameLists.ts:37"},{"fact":"maxJobs per commit (default si max)","value":"100","citation":"backend/src/routes/nameLists.ts:264"},{"fact":"Scheduler tick interval","value":"60000 ms","citation":"backend/src/index.ts:689"},{"fact":"Scheduler claimLimit / jitter","value":"50 joburi / 30s max","citation":"backend/src/index.ts:690"},{"fact":"Source error threshold / backoff","value":"5 esecuri / 3600s","citation":"backend/src/services/monitoring/scheduler.ts:44"},{"fact":"Retentie monitoring_runs / ai_usage / audit_log","value":"90 zile","citation":"backend/src/services/monitoring/scheduler.ts:46"},{"fact":"Interval purga retentie","value":"86400000 ms (zilnic)","citation":"backend/src/services/monitoring/scheduler.ts:47"},{"fact":"Bulk import parallelism chunk","value":"5 in flight","citation":"frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:170"},{"fact":"Bulk commit iteratii max","value":"50","citation":"frontend/src/components/monitoring/MonitoringBulkImportCard.tsx:221"},{"fact":"pageSize joburi (UI / backend max)","value":"10/25/50/100 ; backend default 20 max 100","citation":"backend/src/schemas/monitoring.ts:186"},{"fact":"Cautare q max","value":"100 caractere","citation":"backend/src/schemas/monitoring.ts:192"}],"notes":"Toate handler-ele sunt owner-scoped: PATCH/DELETE/run pe jobul altui owner returneaza 404 (nu 403) ca sa nu scurga existenta, dar diferentiaza denied vs not_found in audit_log via jobExistsForAnyOwner. Mutatiile (create/update/delete/bulk-delete/master-switch/import) scriu audit_log in aceeasi tranzactie SQLite cu mutatia (atomic). aviz_rnpm (RNPM) e validat de schema dar respins la creare cu 422 kind_not_implemented (nu are runner). DELETE refuza 409 cat timp un runner detine AbortController-ul jobului (F1, evita RUNNER_THREW). bulk-delete cere header desktop (requireDesktopHeader). Preview-ul de nume e stateless (nu persista nimic); commit-ul re-valideaza independent de client (defense-in-depth) si e idempotent pe (owner_id, sha256). Master switch-ul foloseste anti-join in claimDueJobs, deci pauza/reluare nu pierde context (next_run_at ramane in trecut). Kill switch-ul MONITORING_DISABLED_KINDS se intersecteaza cu enabledKinds (kind-urile cu runner inregistrat) — env-ul castiga.","key":"monitoring"},{"module":"Alerte","icon":"🔔","overview":"Modulul Alerte este inbox-ul central pentru notificarile generate de monitorizarea automata a dosarelor, termenelor si numelor (PortalJust SOAP, ICCJ, RNPM). Avocatul vede aici, pe pagina /alerte, fiecare schimbare detectata: dosar nou, termen nou sau modificat, solutie aparuta, eroare de sursa etc. Lista se actualizeaza in timp real printr-un stream SSE (server-sent events) — alertele noi apar fara refresh, iar bulina cu numarul de necitite din sidebar se sincronizeaza automat. Utilizatorul poate filtra, cauta, marca citit/necitit, inchide individual sau in masa, exporta in Excel/PDF cu link-uri catre dosare, si poate primi aceleasi alerte si pe email (SMTP) sau ca notificare nativa de sistem (Windows/macOS).","routes":["/alerte (pagina UI Alerts)","Sidebar badge necitite (alimentat de useAlertsStream)","GET /api/v1/alerts (lista paginata)","GET /api/v1/alerts/stream (SSE)","PATCH /api/v1/alerts/:id/seen|unseen|dismissed","POST /api/v1/alerts/seen-bulk","POST /api/v1/alerts/dismiss-bulk","POST /api/v1/alerts/export | export.xlsx | export.pdf","GET/PUT/POST /api/v1/me/email-settings (din me.ts, panou email)"],"endpoints":[{"method":"GET","path":"/api/v1/alerts","purpose":"Lista paginata owner-scoped cu filtre (page, pageSize max 100 default 20, jobKind, q, kind, severity, onlyUnread, includeDismissed, from, to). Intoarce {rows, total, page, pageSize, unread}."},{"method":"GET","path":"/api/v1/alerts/stream","purpose":"Stream SSE: evenimente ready, alert, alert_enriched, ping (heartbeat 25s), error. retry=3000ms. Cap 5 abonati per owner."},{"method":"PATCH","path":"/api/v1/alerts/:id/seen","purpose":"Marcheaza alerta ca citita (tranzactie + audit alert_seen). 404 daca nu exista pentru owner."},{"method":"PATCH","path":"/api/v1/alerts/:id/unseen","purpose":"Marcheaza alerta din nou ca necitita (audit alert_unseen)."},{"method":"PATCH","path":"/api/v1/alerts/:id/dismissed","purpose":"Inchide (dismiss) o alerta individuala (audit alert_dismissed). Definitiv."},{"method":"POST","path":"/api/v1/alerts/seen-bulk","purpose":"Marcheaza ca citite pana la 100 id-uri intr-un apel (audit alert_seen_bulk agregat)."},{"method":"POST","path":"/api/v1/alerts/dismiss-bulk","purpose":"Inchidere in masa, mode ids (max 10k) sau filters (max 10k, 413 daca depaseste). Necesita header desktop. includeDismissed respins."},{"method":"POST","path":"/api/v1/alerts/export","purpose":"Returneaza randuri decorate (numarDosar, dosarLink, labels) ca JSON; moduri ids/filters/range, cap 10k."},{"method":"POST","path":"/api/v1/alerts/export.xlsx","purpose":"Genereaza si streameaza fisier XLSX cu hyperlink-uri catre dosare; cap 10k; header optional x-export-context-label."},{"method":"POST","path":"/api/v1/alerts/export.pdf","purpose":"Genereaza si streameaza fisier PDF; aceleasi moduri/cap ca XLSX."},{"method":"GET/PUT/POST","path":"/api/v1/me/email-settings","purpose":"Citire/salvare setari email per owner si trimitere email de test (din routes/me.ts)."}],"features":[{"name":"Lista de alerte cu carduri","what":"Afiseaza alertele de monitorizare ca o lista de carduri, cele necitite evidentiate cu o bara colorata in stanga (border-l-primary) si badge 'Nou'; cele inchise apar estompate cu badge 'Inchisa'.","how":"Alerts.tsx incarca prin alertsApi.list() cu toate filtrele; fiecare card afiseaza badge severitate + tip, data, titlu (humanizat), numar dosar cu link extern, fapte (buildAlertContext), hotarare si notita.","citations":["frontend/src/pages/Alerts.tsx:682-836","frontend/src/lib/alertsApi.ts:138-154"]},{"name":"Stream live SSE (alerte in timp real)","what":"Alertele noi apar automat in lista si actualizeaza bulina de necitite fara reincarcare manuala a paginii.","how":"useAlertsStream deschide EventSource pe /api/v1/alerts/stream, asculta evenimentele 'alert' si 'alert_enriched', face refreshUnreadAlerts() si incrementeaza streamVersion care declanseaza re-fetch in pagina. Reconnect cu backoff exponential 1s pana la 30s.","settings":"Heartbeat ping la 25s; retry EventSource fixat la 3000ms; cap 5 stream-uri per owner.","citations":["frontend/src/hooks/useAlertsStream.ts:112-183","backend/src/routes/alerts.ts:653-772"]},{"name":"Badge necitite in sidebar","what":"Numarul de alerte necitite este afisat ca bulina si se sincronizeaza in timp real.","how":"useAlertsStream expune unreadAlerts (din alertsApi.list cu onlyUnread, pageSize 1, citeste campul unread ca sursa de adevar de la server) consumat de chrome-ul de navigatie.","citations":["frontend/src/hooks/useAlertsStream.ts:39-46","frontend/src/lib/alertsApi.ts:45-51"]},{"name":"Imbogatire alerta (alert_enriched)","what":"Cand runner-ul completeaza ulterior detalii (sumar solutie, numar document, instanta) pe o alerta deja existenta, cardul se actualizeaza fara reload si fara a fi tratat ca alerta noua.","how":"Backend emite eveniment SSE 'alert_enriched'; hook-ul doar incrementeaza streamVersion (fara notificare desktop sau refresh contor), iar pagina re-fetch-uieste pagina vizibila.","citations":["frontend/src/hooks/useAlertsStream.ts:165-167","backend/src/routes/alerts.ts:724-750"]},{"name":"Filtre si cautare","what":"Filtrare dupa tipul jobului (Toate/Dosare/Nume), tip alerta, severitate, interval de date (de la/pana la), doar necitite, include inchise, plus cautare text dupa nume sau numar dosar.","how":"Stari controlate in Alerts.tsx; cautarea e debounced 300ms; datele de tip 'date' sunt convertite local->ISO (localDateInputToIso). Patru tipuri de alerta sunt ascunse din dropdown pentru ca runner-ele lor nu sunt cablate.","settings":"Tipuri ascunse: dosar_relevant_now, dosar_no_longer_relevant, aviz_changed, dosar_disappeared.","citations":["frontend/src/pages/Alerts.tsx:52-74","frontend/src/pages/Alerts.tsx:114-129","frontend/src/pages/Alerts.tsx:438-553"]},{"name":"Marcare citit / necitit","what":"Fiecare alerta poate fi marcata citita sau readusa la necitita; deschiderea unui dosar din alerta o marcheaza optimist ca citita.","how":"Butoane per card apeleaza alertsApi.markSeen / markUnseen (PATCH); la 'Deschide dosar' se face markSeen fire-and-forget si navigare la /dosare.","citations":["frontend/src/pages/Alerts.tsx:210-236","frontend/src/pages/Alerts.tsx:685-710"]},{"name":"Marcheaza pagina (bulk seen)","what":"Buton care marcheaza ca citite toate alertele necitite vizibile pe pagina curenta.","how":"markVisibleSeen colecteaza id-urile necitite si apeleaza alertsApi.markAlertsSeen (POST /seen-bulk, max 100); fallback per-id cu Promise.allSettled daca ruta bulk lipseste.","citations":["frontend/src/pages/Alerts.tsx:252-283","backend/src/routes/alerts.ts:230-254"]},{"name":"Inchidere individuala (dismiss)","what":"Buton 'Inchide' pe fiecare card; operatie definitiva, alerta inchisa nu mai poate fi redeschisa.","how":"alertsApi.dismiss -> PATCH /:id/dismissed, in tranzactie cu audit.","citations":["frontend/src/pages/Alerts.tsx:238-250","backend/src/routes/alerts.ts:206-228"]},{"name":"Inchidere in masa (selectie / toate filtrate)","what":"Checkbox per card + 'Selecteaza pagina'; cu selectie activa apare 'Inchide selectia', altfel 'Inchide toate' (toate cele care satisfac filtrele active). Confirmare modala cu numarul exact.","how":"performBulkDismiss apeleaza alertsApi.dismissBulk cu mode 'ids' sau 'filters'; backend probeaza count-ul si refuza cu 413 daca depaseste 10k. 'Inchide toate' dezactivat cand filtrul 'Inchise' e activ.","settings":"Limita 10.000 randuri per operatie; includeDismissed respins server-side.","citations":["frontend/src/pages/Alerts.tsx:298-365","backend/src/routes/alerts.ts:302-378"]},{"name":"Export Excel / PDF","what":"Export al alertelor cu link-uri catre dosare pe portal.just.ro/scj.ro, in format Excel sau PDF. Trei surse: doar selectia, toate cele filtrate, sau interval custom de date.","how":"AlertsExportModal trimite payload (ids/filters/range) la /export.xlsx sau /export.pdf; backend construieste fisierul si il streameaza ca blob descarcabil; eticheta de context trimisa prin header x-export-context-label.","settings":"Format implicit PDF; mod implicit 'ids' daca exista selectie, altfel 'filters'; cap 10k randuri (413 daca depaseste).","citations":["frontend/src/components/AlertsExportModal.tsx:66-175","backend/src/routes/alerts.ts:639-651","backend/src/routes/alerts.ts:496-499"]},{"name":"Notita pe alerta","what":"Daca jobul de monitorizare are o notita atasata, aceasta apare in cardul alertei intr-un bloc evidentiat (galben) cu eticheta 'Notita:'.","how":"AlertNoteBlock primeste alert.job_notes (propagat din monitoring_jobs.notes de catre listAlerts); nu randeaza nimic daca notita e goala.","citations":["frontend/src/components/alerts/AlertNoteBlock.tsx:5-14","frontend/src/lib/alertsApi.ts:41-42"]},{"name":"Notificari email (SMTP)","what":"Toate alertele noi de monitorizare pot fi trimise si pe email; optional un raport zilnic la 09:00 cu toate alertele din ziua precedenta. Buton de trimitere email de test.","how":"EmailSettingsPanel citeste/salveaza prin me.emailSettings (GET/PUT) si trimite test (POST); validare adresa (max 320 caractere), buton test activ doar daca SMTP e configurat in .env si exista adresa.","settings":"Toggle ' ntend/src/pages/Alerts.tsx:148-150","frontend/src/pages/Alerts.tsx:720"]}],"settings":[{"name":"Tip alerta (kind)","where":"Dropdown filtru pagina /alerte","default":"Toate tipurile","options":"dosar_new, termen_new, termen_changed, termen_dupa_solutie, solutie_aparuta, stadiu_changed, categorie_changed, source_error, source_partial (plus 4 ascunse: dosar_relevant_now, dosar_no_longer_relevant, aviz_changed, dosar_disappeared)","effect":"Filtreaza lista dupa tipul evenimentului de monitorizare","citations":["frontend/src/pages/Alerts.tsx:52-67","frontend/src/lib/alertsApi.ts:102-116"]},{"name":"Severitate","where":"Dropdown filtru pagina /alerte","default":"Toate severitatile","options":"critical (Critic), warning (Atentie), info (Info)","effect":"Filtreaza dupa severitate","citations":["frontend/src/pages/Alerts.tsx:69-74","frontend/src/lib/alertsApi.ts:118-122"]},{"name":"Tip job (jobKind)","where":"JobKindTabs pe pagina /alerte","default":"all (Toate)","options":"all, dosar_soap (Dosare), name_soap (Nume); enum complet aviz_rnpm, iccj","effect":"Filtreaza alertele dupa tipul jobului de monitorizare","citations":["frontend/src/pages/Alerts.tsx:439-446","frontend/src/lib/alertsApi.ts:19"]},{"name":"Cautare (q)","where":"Camp text pagina /alerte","default":"gol","options":"text liber, 1-100 caractere","effect":"Cauta dupa nume sau numar dosar; debounce 300ms","citations":["frontend/src/pages/Alerts.tsx:124","frontend/src/pages/Alerts.tsx:447-474","backend/src/routes/alerts.ts:114"]},{"name":"Interval de la / pana la (from/to)","where":"Doua campuri date pagina /alerte","default":"gol","options":"data calendaristica","effect":"Filtreaza dupa data crearii alertei; convertit local->ISO (to = sfarsit de zi 23:59:59.999)","citations":["frontend/src/pages/Alerts.tsx:81-91","frontend/src/pages/Alerts.tsx:513-530"]},{"name":"Doar necitite (onlyUnread)","where":"Checkbox pagina /alerte","default":"dezactivat","options":"on/off","effect":"Afiseaza doar alertele necitite","citations":["frontend/src/pages/Alerts.tsx:126","frontend/src/pages/Alerts.tsx:531-541"]},{"name":"Include inchise (includeDismissed)","where":"Checkbox pagina /alerte","default":"dezactivat","options":"on/off","effect":"Include si alertele inchise in lista; cand e activ, 'Inchide toate' este dezactivat","citations":["frontend/src/pages/Alerts.tsx:127","frontend/src/pages/Alerts.tsx:542-552"]},{"name":"Marime pagina (pageSize)","where":"TablePagination pagina /alerte","default":"25 (UI); backend default 20","options":"variante din TablePagination; backend max 100","effect":"Numarul de alerte pe pagina","citations":["frontend/src/pages/Alerts.tsx:111","backend/src/routes/alerts.ts:111"]},{"name":"Mod export","where":"AlertsExportModal","default":"ids daca exista selectie, altfel filters","options":"ids (doar selectia), filters (toate cele filtrate), range (interval custom, include si inchise)","effect":"Determina ce randuri intra in export","citations":["frontend/src/components/AlertsExportModal.tsx:81-92","frontend/src/components/AlertsExportModal.tsx:129-153"]},{"name":"Format export","where":"AlertsExportModal","default":"pdf","options":"xlsx (Excel), pdf","effect":"Formatul fisierului exportat","citations":["frontend/src/components/AlertsExportModal.tsx:74","frontend/src/components/AlertsExportModal.tsx:308-342"]},{"name":"Activeaza notificarile pe email","where":"EmailSettingsPanel (setari)","default":"false","options":"on/off","effect":"Trimite fiecare alerta noua si pe email (necesita adresa)","citations":["frontend/src/components/EmailSettingsPanel.tsx:16-20","frontend/src/components/EmailSettingsPanel.tsx:154-162"]},{"name":"Adresa email destinatar","where":"EmailSettingsPanel (setari)","default":"gol","options":"adresa email, max 320 caractere","effect":"Destinatarul alertelor / raportului zilnic","citations":["frontend/src/components/EmailSettingsPanel.tsx:35","frontend/src/components/EmailSettingsPanel.tsx:178-187"]},{"name":"Trimite raport zilnic la 09:00", duri dismiss-bulk","value":"10.000","citation":"backend/src/routes/alerts.ts:268"},{"fact":"Limita body dismiss-bulk","value":"256 * 1024 (256 KiB)","citation":"backend/src/routes/alerts.ts:269"},{"fact":"Heartbeat ping SSE","value":"25.000 ms (25s)","citation":"backend/src/routes/alerts.ts:761-767"},{"fact":"Retry reconectare EventSource (SSE)","value":"3000 ms","citation":"backend/src/routes/alerts.ts:755"},{"fact":"Cap stream-uri SSE per owner","value":"5","citation":"backend/src/routes/alerts.ts:691-693"},{"fact":"Backoff reconnectare client SSE","value":"1000 ms -> max 30.000 ms (dublare)","citation":"frontend/src/hooks/useAlertsStream.ts:114,129"},{"fact":"Cache status notificare nativa","value":"60.000 ms (60s)","citation":"frontend/src/hooks/useAlertsStream.ts:51"},{"fact":"Limita lungime titlu notificare nativa","value":"120 caractere","citation":"electron/notifications.js:30"},{"fact":"Limita lungime body notificare nativa","value":"500 caractere","citation":"electron/notifications.js:31"},{"fact":"Limita lungime tag notificare","value":"200 caractere","citation":"electron/notifications.js:32"},{"fact":"Capacitate map dedup notificari (tag)","value":"100","citation":"electron/notifications.js:33"},{"fact":"Limita adresa email","value":"320 caractere","citation":"frontend/src/components/EmailSettingsPanel.tsx:35"},{"fact":"Eticheta context export (header) max","value":"120 caractere","citation":"backend/src/routes/alerts.ts:496-498"},{"fact":"Ora raport zilnic email","value":"09:00","citation":"frontend/src/components/EmailSettingsPanel.tsx:198"},{"fact":"Truncare titlu in payload notificare alerta","value":"117 caractere + '...' (peste 120)","citation":"frontend/src/hooks/useAlertsStream.ts:22"},{"fact":"Cheie localStorage toggle notificari","value":"legaldashboard.alerts.notifications.enabled","citation":"frontend/src/lib/alertsNotificationPref.ts:8"}],"notes":"Securitate/arhitectura: toate rutele sunt owner-scoped prin getOwnerId(c). Mutatiile seen/unseen/dismissed ruleaza intr-o singura tranzactie better-sqlite3 impreuna cu recordAudit, deci un esec de audit face rollback la modificare; 404 nu este auditat (anti-probing cross-tenant). dismiss-bulk necesita requireDesktopHeader. SSE: abonarea se face INAINTE de a anunta 'ready' ca sa nu se piarda alerte inserate in fereastra de conectare; la depasirea cap-ului de 5 abonati se emite frame 'error' cu code too_many_streams. Notificarile native sunt suprimate cand fereastra e vizibila+focalizata si cand toggle-ul e oprit (fara stocare/flood la reactivare); dedup cross-platform manual prin inchiderea Notification-ului anterior cu acelasi tag (dedup_key). Patru tipuri de alerta (dosar_relevant_now, dosar_no_longer_relevant, aviz_changed, dosar_disappeared) sunt ascunse din dropdown pentru ca runner-ele lor nu sunt cablate, dar label-urile raman pentru alertele istorice. Export: include link-uri catre portal.just.ro/scj.ro pe coloana dosar; XLSX foloseste escape anti formula-injection (din politica globala). SMTP se configureaza exclusiv in .env-ul backendului; UI-ul doar arata starea 'configurat/neconfigurat'.","key":"alerts"},{"module":"Setari AI & Chei API","icon":"🔑","overview":"Modulul gestioneaza configurarea cheilor API pentru furnizorii AI (Anthropic/Claude, OpenAI/GPT, Google/Gemini, OpenRouter) si pentru serviciile de captcha RNPM (2Captcha, CapSolver), plus alegerea modului de rutare AI (Native vs OpenRouter) si a strategiei de rezolvare captcha (secvential vs paralel). Interfata principala este dialogul \"Configurare Chei API\" (ApiKeyDialog). Pe desktop cheile se introduc de utilizator (BYOK) si se cripteaza local cu keystore-ul OS (DPAPI pe Windows / Keychain pe macOS / libsecret pe Linux) via safeStorage, stocandu-se doar ciphertext in localStorage. In modul web, dialogul e vizibil doar pentru admin, iar cheile se configureaza server-side prin variabile de mediu sau per-tenant, nu prin body de request. Din v2.41.0, in modul web frontend-ul citeste si starea cheilor TENANTULUI de la server: adminul vede inventarul per provider, iar non-adminul primeste doar un banner cand o capabilitate e indisponibila; modul de rutare AI efectiv se decide server-side (env > tenant DB > BYOK desktop).","routes":["UI: Dialog modal ApiKeyDialog (deschis din Setari API, gated in sidebar/pagini)","API: GET /api/v1/ai/settings","API: PUT /api/v1/ai/settings","API: POST /api/v1/ai/analyze","API: POST /api/v1/ai/analyze-multi"],"endpoints":[{"method":"GET","path":"/api/v1/ai/settings","purpose":"Returneaza modul de rutare AI al owner-ului ({ mode: native|openrouter }); daca nu exista rand in DB, default native"},{"method":"PUT","path":"/api/v1/ai/settings","purpose":"Persista modul de rutare AI (valideaza prin zod enum native|openrouter); upsert per owner_id"},{"method":"POST","path":"/api/v1/ai/analyze","purpose":"Analiza AI single-agent a unui dosar; alege provider/cheie (env > tenant > body), rezerva buget cota, ruleaza callModel"},{"method":"POST","path":"/api/v1/ai/analyze-multi","purpose":"Analiza multi-agent (2 analisti + 1 judecator) cu streaming SSE de faze (analyst_done, judge_started, done, error)"}],"features":[{"name":"Dialog Configurare Chei API","what":"Fereastra modala unde utilizatorul introduce, vede starea (Activa) si sterge cheile API pentru fiecare furnizor. Toate campurile sunt de tip parola (mascate). La salvare, doar campurile completate sunt scrise; campurile goale sunt ignorate.","how":"Componenta React ApiKeyDialog cu state local keyInputs initializat la EMPTY la fiecare montare; handleSaveKeys apeleaza setKey doar pentru campurile trim-uite nevide; butonul Salveaza e dezactivat cand nu exista input.","citations":["frontend/src/components/ApiKeyDialog.tsx:39","frontend/src/components/ApiKeyDialog.tsx:41","frontend/src/components/ApiKeyDialog.tsx:65-73","frontend/src/components/ApiKeyDialog.tsx:75-81","frontend/src/components/ApiKeyDialog.tsx:383-390"],"settings":"6 campuri de cheie: anthropic, openai, google, openrouter, twocaptcha, capsolver"},{"name":"Gate admin in modul web","what":"In deployment web, dialogul de chei API este vizibil doar pentru utilizatorii cu rol admin; ceilalti useri nu vad modalul (cheile sunt centralizate de admin).","how":"if (authMode === \"web\" && user?.role !== \"admin\") return null; pe desktop authMode nu e web, deci dialogul e mereu disponibil.","citations":["frontend/src/components/ApiKeyDialog.tsx:63"]},{"name":"Selectie mod rutare AI (Native / OpenRouter)","what":"Doua butoane care comuta intre rutarea Native (SDK-uri directe Anthropic/OpenAI/Google) si rutarea prin OpenRouter (un singur gateway/cheie pentru toate modelele). Selectia schimba ce campuri de cheie sunt afisate: in Native apar 3 carduri (Anthropic/OpenAI/Google), in OpenRouter apare un singur card cu cheia OpenRouter.","how":"aiSettings.setMode(\"native\"|\"openrouter\") persista prin PUT /api/v1/ai/settings; randarea conditionala aiSettings.mode === \"native\" alege grila de 3 carduri vs cardul OpenRouter unic.","citations":["frontend/src/components/ApiKeyDialog.tsx:126-148","frontend/src/components/ApiKeyDialog.tsx:152-266","frontend/src/hooks/useAiSettings.ts:60-65"],"settings":"Default mode = native (DEFAULT_SETTINGS si fallback DB)"},{"name":"Card cheie Anthropic (Claude)","what":"Camp pentru cheia Anthropic, cu placeholder sk-ant-api03-..., badge Activa cand exista cheie si buton Sterge cheia. Vizibil doar in modul Native.","how":"input password legat de keyInputs.anthropic; clearKey(\"anthropic\") la stergere; hasAnthropic = keys.anthropic.length > 0.","citations":["frontend/src/components/ApiKeyDialog.tsx:154-180","frontend/src/hooks/useApiKey.ts:217"]},{"name":"Card cheie OpenAI (GPT)","what":"Camp pentru cheia OpenAI, placeholder sk-proj-..., badge Activa + buton Sterge. Vizibil doar in Native.","how":"input legat de keyInputs.openai; clearKey(\"openai\"); hasOpenai = keys.openai.length > 0.","citations":["frontend/src/components/ApiKeyDialog.tsx:182-208","frontend/src/hooks/useApiKey.ts:218"]},{"name":"Card cheie Google (Gemini)","what":"Camp pentru cheia Google AI, placeholder AIza..., badge Activa + buton Sterge. Vizibil doar in Native.","how":"input legat de keyInputs.google; clearKey(\"google\"); hasGoogle = keys.google.length > 0.","citations":["frontend/src/components/ApiKeyDialog.tsx:210-236","frontend/src/hooks/useApiKey.ts:219"]},{"name":"Card cheie OpenRouter","what":"Camp pentru cheia OpenRouter, placeholder sk-or-v1-..., badge Activa + buton Sterge. Vizibil doar in modul OpenRouter. O singura cheie acopera toate modelele prin gateway.","how":"input legat de keyInputs.openrouter; clearKey(\"openrouter\"); hasOpenrouter = keys.openrouter.length > 0. Backend auto-detecteaza prefixul sk-or- pentru a rута via OpenRouter.","citations":["frontend/src/components/ApiKeyDialog.tsx:238-265","frontend/src/hooks/useApiKey.ts:220","backend/src/services/ai.ts:674"]},{"name":"Selectie provider Captcha RNPM (2Captcha / CapSolver)","what":"Doua butoane care aleg providerul activ folosit pentru rezolvarea reCAPTCHA la cautarile RNPM. Fiecare buton arata un punct verde cand cheia respectiva e setata.","how":"setCaptchaProvider(\"2captcha\"|\"capsolver\") salveaza in localStorage cheia portaljust-captcha-provider; activeCaptchaKey selecteaza cheia corespunzatoare providerului.","citations":["frontend/src/components/ApiKeyDialog.tsx:276-291","frontend/src/hooks/useApiKey.ts:191-196","frontend/src/hooks/useApiKey.ts:208"],"settings":"Default provider = 2captcha"},{"name":"Selectie mod Captcha (Secvential / Paralel race)","what":"Alege strategia de rezolvare: Secvential (primary cu fallback daca esueaza) sau Paralel/race (porneste ambii furnizori simultan, castiga cel mai rapid, cost dublu). Modul Paralel este dezactivat daca nu sunt setate ambele chei (2Captcha + CapSolver).","how":"setCaptchaMode(\"sequential\"|\"race\") salveaza in localStorage portaljust-captcha-mode; butonul race are disabled={!(hasTwoCaptcha && hasCapSolver)}.","citations":["frontend/src/components/ApiKeyDialog.tsx:295-315","frontend/src/hooks/useApiKey.ts:198-203"],"settings":"Default mode = sequential"},{"name":"Card cheie 2Captcha","what":"Camp pentru cheia 2captcha.com, badge Activa + buton Sterge, cu nota de cost ~$0.003/captcha, fallback uman.","how":"input legat de keyInputs.twocaptcha; clearKey(\"twocaptcha\"); hasTwoCaptcha = keys.twocaptcha.length > 0.","citations":["frontend/src/components/ApiKeyDialog.tsx:320-347","frontend/src/hooks/useApiKey.ts:221"]},{"name":"Card cheie CapSolver","what":"Camp pentru cheia capsolver.com, badge Activa + buton Sterge, cu nota de cost ~$0.0008/captcha, AI-based.","how":"input legat de keyInputs.capsolver; clearKey(\"capsolver\"); hasCapSolver = keys.capsolver.length > 0.","citations":["frontend/src/components/ApiKeyDialog.tsx:349-376","frontend/src/hooks/useApiKey.ts:222"]},{"name":"Criptare safeStorage + stocare locala","what":"Cheile se cripteaza cu keystore-ul OS (DPAPI/Keychain/libsecret) si se stocheaza ca ciphertext in localStorage; nu se salveaza niciodata in plaintext. Daca keystore-ul nu e disponibil, aplicatia refuza sa persisteze cheile si semnaleaza starea (encryptionUnavailable).","how":"La mount, isEncryptionAvailable() verifica keystore-ul; persist() apeleaza encryptKeys() via desktopApi IPC si scrie cipher la cheia portaljust-api-keys-enc; la load, decryptKeys() merge peste EMPTY pentru compatibilitate cu payload-uri vechi.","citations":["frontend/src/hooks/useApiKey.ts:95-149","frontend/src/hooks/useApiKey.ts:151-171","frontend/src/hooks/useApiKey.ts:22"],"settings":"Cheie storage ciphertext: portaljust-api-keys-enc"},{"name":"Migrare chei legacy (one-shot)","what":"La prima pornire dupa upgrade, cheile vechi obfuscate (XOR/base64-reverse) din localStorage sunt re-criptate prin safeStorage si intrarile legacy sunt sterse. Suporta si formatul vechi cu o singura cheie Anthropic.","how":"readLegacyForMigration() citeste portaljust-api-keys / portaljust-anthropic-key, deobfuscate() inverseaza base64+reverse, apoi encryptKeys + clearLegacyStorage. Calea legacy nu mai e folosita la scrieri noi.","citations":["frontend/src/hooks/useApiKey.ts:20-21","frontend/src/hooks/useApiKey.ts:28-67","frontend/src/hooks/useApiKey.ts:129-141"]},{"name":"Indicator hasKey / stare configurare","what":"Aplicatia stie daca exista cel putin o cheie AI configurata; afecteaza texte (ex. butonul Inchide vs Mai tarziu) si afisarea panoului de analiza AI in dosare.","how":"hasKey = anthropic||openai||google||openrouter au lungime > 0 (captcha nu conteaza pentru hasKey).","citations":["frontend/src/hooks/useApiKey.ts:206-207","frontend/src/components/ApiKeyDialog.tsx:381"]},{"name":"Incarcare/persistenta mod rutare AI (hook)","what":"Modul de rutare AI este incarcat de pe server la deschidere si salvat la fiecare schimbare, cu gestionare de eroare afisata in dialog.","how":"useAiSettings face GET pe /api/v1/ai/settings la mount si PUT la setMode; parseSettings normalizeaza valoarea la native daca nu e openrouter; eroarea se afiseaza langa titlul Rutare AI.","citations":["frontend/src/hooks/useAiSettings.ts:24-58","frontend/src/components/ApiKeyDialog.tsx:122-123"]},{"name":"Panouri auxiliare in dialog","what":"Dialogul include si panouri pentru utilizarea/costul AI, statusul notificarilor si setarile de email (alerte), randate deasupra sectiunilor de chei.","how":"Componentele AIUsagePanel, NotificationStatusPanel si EmailSettingsPanel sunt randate in corpul dialogului.","citations":["frontend/src/components/ApiKeyDialog.tsx:115-117"]},{"name":"Status chei tenant in frontend (web, v2.41.0)","what":"Panou de status pe roluri: adminul vede inventarul cheilor tenant per provider (\"Configurata\" cu ultimele 4 caractere / \"Neconfigurata\"), non-adminul vede doar un banner discret cand o capabilitate (AI, captcha) e indisponibila pentru ca tenantul nu are cheia. Valoarea cheii nu paraseste niciodata serverul.","how":"useTenantKeyStatus citeste GET /api/v1/me/key-status cu politica fail-open pe loading/error (nu blocheaza UI-ul daca statusul intarzie); badge tri-state pe starea cheilor. Gating-ul panoului se face pe modul serverului (auth_mode), nu pe runtime-ul browserului.","citations":["frontend/src/hooks/useTenantKeyStatus.ts:142","frontend/src/components/TenantKeyStatusPanel.tsx:27","backend/src/routes/me.ts:99"]},{"name":"Rutare AI implicita: env > tenant DB > BYOK (v2.41.0)","what":"Modul de rutare AI (Native vs OpenRouter) nu mai depinde doar de setarea locala a utilizatorului: serverul decide modul efectiv in ordinea env var > setarea tenantului din DB > cheile BYOK de pe desktop.","how":"resolveEffectiveAiMode(ownerId) in ruta AI; frontend-ul intreaba serverul si afiseaza modul efectiv.","citations":["backend/src/routes/ai.ts:118","backend/src/routes/ai.ts:132"]}],"settings":[{"name":"Mod rutare AI (mode)","where":"Dialog ApiKeyDialog -> sectiunea Rutare AI (butoane Native/OpenRouter); persistat server-side via PUT /api/v1/ai/settings","effect":"Controleaza daca apelurile AI merg prin SDK native (Anthropic/OpenAI/Google) sau prin gateway-ul OpenRouter cu o singura cheie","options":"native | openrouter","default":"native","citations":["frontend/src/hooks/useAiSettings.ts:9","backend/src/routes/ai.ts:29-31","backend/src/db/ownerAiSettingsRepository.ts:43-47"]},{"name":"Provider captcha activ (captchaProvider)","where":"Dialog ApiKeyDialog -> Captcha RNPM provider activ; localStorage portaljust-captcha-provider","effect":"Alege serviciul folosit pentru rezolvarea reCAPTCHA la cautarile RNPM","options":"2captcha | capsolver","default":"2captcha","citations":["frontend/src/hooks/useApiKey.ts:23","frontend/src/hooks/useApiKey.ts:73-79"]},{"name":"Mod captcha (captchaMode)","where":"Dialog ApiKeyDialog -> butoane Secvential/Paralel; localStorage portaljust-captcha-mode","effect":"Secvential = primary cu fallback; Paralel(race) = ambii furnizori simultan, castiga cel mai rapid (cost dublu). Race necesita ambele chei setate","options":"sequential | race","default":"sequential","citations":["frontend/src/hooks/useApiKey.ts:24","frontend/src/hooks/useApiKey.ts:81-87","frontend/src/components/ApiKeyDialog.tsx:306"]},{"name":"Cheie Anthropic","where":"Dialog ApiKeyDialog (mod Native) / desktop BYOK; env ANTHROPIC_API_KEY","effect":"Activeaza modelele Claude (Haiku/Sonnet/Opus) pe ruta nativa","options":"string (placeholder sk-ant-api03-...)","default":"gol","citations":["frontend/src/components/ApiKeyDialog.tsx:164","backend/src/services/ai.ts:649"]},{"name":"Cheie OpenAI","where":"Dialog ApiKeyDialog (mod Native); env OPENAI_API_KEY","effect":"Activeaza modelele GPT-5.4 pe ruta nativa","options":"string (placeholder sk-proj-...)","default":"gol","citations":["frontend/src/components/ApiKeyDialog.tsx:192","backend/src/services/ai.ts:650"]},{"name":"Cheie Google AI","where":"Dialog ApiKeyDialog (mod Native); env GOOGLE_AI_KEY","effect":"Activeaza modelele Gemini pe ruta nativa","options":"string (placeholder AIza...)","default":"gol","citations":["frontend/src/components/ApiKeyDialog.tsx:220","backend/src/services/ai.ts:651"]},{"name":"Cheie OpenRouter","where":"Dialog ApiKeyDialog (mod OpenRouter); env OPENROUTER_API_KEY","effect":"O singura cheie ruteaza toate modelele prin OpenRouter; prefixul sk-or- declanseaza auto-detect rutare OpenRouter","options":"string (placeholder sk-or-v1-...)","default":"gol","citations":["frontend/src/components/ApiKeyDialog.tsx:249","backend/src/services/ai.ts:652","backend/src/services/ai.ts:674"]},{"name":"Cheie 2Captcha","where":"Dialog ApiKeyDialog -> card 2Captcha","effect":"Cheie pentru serviciul 2captcha.com (~$0.003/captcha, fallback uman)","options":"string","default":"gol","citations":["frontend/src/components/ApiKeyDialog.tsx:330","frontend/src/components/ApiKeyDialog.tsx:346"]},{"name":"Cheie CapSolver","where":"Dialog ApiKeyDialog -> card CapSolver","effect":"Cheie pentru serviciul capsolver.com (~$0.0008/captcha, AI-based)","options":"string","default":"gol","citations":["frontend/src/components/ApiKeyDialog.tsx:359","frontend/src/components/ApiKeyDialog.tsx:375"]},{"name":"OPENROUTER_DISABLED","where":"Variabila de mediu backend (kill switch)","effect":"Cand =1, apelurile OpenRouter arunca eroare imediat (fail-fast, fara fallback silent la native)","options":"1 (dezactivat) / nesetat","default":"nesetat","citations":["backend/src/services/ai.ts:520-522"]},{"name":"OPENROUTER_MODEL_OVERRIDES","where":"Variabila de mediu backend","effect":"Hot-patch al slug-urilor de model OpenRouter (format modelKey:provider/slug, separate prin virgula); slug invalid e ignorat cu log si fallback la map-ul static","options":"string CSV (ex. claude-opus:anthropic/claude-opus-4.8)","default":"nesetat (foloseste OPENROUTER_MODEL_MAP)","citations":["backend/src/services/ai.ts:64-77","backend/src/services/ai.ts:48-61"]},{"name":"ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_AI_KEY / OPENROUTER_API_KEY (env)","where":"Variabile de mediu backend (deploy server/web)","effect":"Cheile din env au prioritate peste cele din body/tenant; in web mode operatorul le seteaza aici pentru toti userii","options":"string","default":"nesetat","citations":["backend/src/services/ai.ts:634-654","backend/src/routes/ai.ts:46-53"]},{"name":"Refuz BYOK in body (web mode)","where":"Backend POST /api/v1/ai/analyze + /analyze-multi","effect":"In AUTH_MODE=web, trimiterea cheilor in body returneaza 501 WEB_MODE_NOT_IMPLEMENTED; cheile trebuie in env-ul serverului","options":"automat in functie de getAuthMode()","default":"web mode => refuz; desktop => BYOK permis","citations":["backend/src/routes/ai.ts:39-54"]}],"keyFacts":[{"fact":"AI_TIMEOUT (single-agent, per call)","value":"120000 ms (120s)","citation":"backend/src/services/ai.ts:89"},{"fact":"AI_MULTI_TIMEOUT (multi-agent, per call)","value":"180000 ms (180s)","citation":"backend/src/services/ai.ts:90"},{"fact":"AI_MAX_TOKENS (output max per call)","value":"8000 (crescut de la 3000)","citation":"backend/src/services/ai.ts:91"},{"fact":"MAX_AI_BODY_SIZE (limita body endpoint AI)","value":"100 * 1024 = 102400 bytes (100KB)","citation":"backend/src/services/ai.ts:94"},{"fact":"MAX_AI_LIST_ITEMS (max parti/sedinte in dosar)","value":"500","citation":"backend/src/services/ai.ts:97"},{"fact":"Lungime maxima cheie API in body","value":"256 caractere","citation":"backend/src/services/ai.ts:605"},{"fact":"Multi-agent necesita exact 2 analisti","value":"analysts.length === 2","citation":"backend/src/routes/ai.ts:253"},{"fact":"Modele judecator permise","value":"claude-opus (Opus 4.8), gpt-5.4, gemini-pro-3 (Gemini 3.1 Pro)","citation":"backend/src/services/ai.ts:31"},{"fact":"Model AI default (single, fallback)","value":"claude-sonnet (Sonnet 4.6)","citation":"backend/src/routes/ai.ts:165"},{"fact":"Model ID Anthropic Haiku","value":"claude-haiku-4-5-20251001","citation":"backend/src/services/ai.ts:18"},{"fact":"Model ID Anthropic Sonnet","value":"claude-sonnet-4-6","citation":"backend/src/services/ai.ts:19"},{"fact":"Model ID Anthropic Opus","value":"claude-opus-4-8","citation":"backend/src/services/ai.ts:20"},{"fact":"Modele OpenAI","value":"gpt-5.4-nano, gpt-5.4-mini, gpt-5.4","citation":"backend/src/services/ai.ts:22-24"},{"fact":"Modele Google","value":"gemini-3.1-flash-lite-preview, gemini-3.5-flash, gemini-3.1-pro-preview","citation":"backend/src/services/ai.ts:26-28"},{"fact":"baseURL OpenRouter","value":"https://openrouter.ai/api/v1","citation":"backend/src/services/ai.ts:530"},{"fact":"Cost 2Captcha (afisat in UI)","value":"~$0.003/captcha","citation":"frontend/src/components/ApiKeyDialog.tsx:346"},{"fact":"Cost CapSolver (afisat in UI)","value":"~$0.0008/captcha","citation":"frontend/src/components/ApiKeyDialog.tsx:375"},{"fact":"Truncate obiect dosar","value":"500 caractere","citation":"backend/src/services/ai.ts:80"},{"fact":"Truncate analiza (judge prompt)","value":"50000 caractere","citation":"backend/src/services/ai.ts:85"},{"fact":"Cheie localStorage ciphertext","value":"portaljust-api-keys-enc","citation":"frontend/src/hooks/useApiKey.ts:22"}],"notes":"Securitate: cheile nu se salveaza niciodata in plaintext; doar ciphertext criptat cu keystore-ul OS (DPAPI/Keychain/libsecret) via safeStorage IPC. Daca keystore-ul lipseste, persistenta e refuzata (encryptionUnavailable). In modul web, dialogul e admin-only si BYOK prin body e respins cu 501; cheile vin din env sau din tenant keys decriptate server-side. Prioritatea cheilor: env > tenant (web) > body (desktop). shouldRouteViaOpenRouter: modul native explicit invinge auto-detect-ul pe chei sk-or- sau env (fix regresie v2.28.0). Coloana openrouter_stack e legacy (stack chinezesc eliminat in v2.38.0), se scrie constant 'western'. Prompturile aplica protectii anti prompt-injection: truncare campuri, escapeFenceTags pe pseudo-taguri de inchidere, delimitatori <dosar_data>. Empty catch-uri in useApiKey sunt intentionate (CP-12) pentru a nu rupe boot-ul cand localStorage/keystore esueaza.","key":"ai-settings"},{"module":"Administrare","icon":"🛡️","overview":"Suita de administrare disponibila exclusiv in modul web multi-user, vizibila doar utilizatorilor cu rol \"admin\". Din v2.42.0 este gazduita in pagina unica /setari pe taburi (General pentru toti; Utilizatori, Chei API, Cote, Granturi, Consum si Audit doar pentru admin) — rutele /admin/* raman functionale si refolosesc aceleasi componente. Suita acopera: provisionarea conturilor direct din UI (creare individuala + import in masa din Excel), gestionarea rolurilor si statusurilor, cote de buget pe pool-ul AI unic si captcha per utilizator, granturi temporare de buget suplimentar, consumul per utilizator (AI + captcha, cu total tenant), jurnalul de audit cu filtre si export XLSX, si cheile API centralizate ale tenantului. Toate paginile sunt protejate dublu: un gate de UI (AdminGate, 403 prietenos) plus verificarea autoritativa server-side requireRole(\"admin\") pe fiecare ruta /api/v1/admin/*. Orice scriere produce un eveniment de audit cu diff before/after.","routes":["/setari?tab=utilizatori|chei|cote|granturi|consum|audit (UI, v2.42.0 — taburile admin refolosesc paginile /admin/* cu prop embedded, montate on-demand)","/admin/users (UI)","/admin/audit (UI)","/admin/quota (UI)","/admin/grants (UI)","/admin/usage (UI)","/admin/keys (UI)","/api/v1/admin/* (API, montat in backend/src/index.ts:363)"],"endpoints":[{"method":"GET","path":"/api/v1/admin/users","purpose":"Lista paginata de utilizatori cu filtre (search, role, status); pageSize default 20, max 100"},{"method":"GET","path":"/api/v1/admin/users/:id","purpose":"Detalii un utilizator; 404 daca nu exista"},{"method":"PATCH","path":"/api/v1/admin/users/:id/role","purpose":"Schimba rolul; blocheaza auto-demotarea ultimului admin (409 last_admin)"},{"method":"PATCH","path":"/api/v1/admin/users/:id/status","purpose":"Schimba statusul; blocheaza auto-dezactivarea propriului cont (409 self_deactivation)"},{"method":"GET","path":"/api/v1/admin/audit","purpose":"Jurnal de audit paginat cu filtre multiple; pageSize default 50, max 200"},{"method":"GET","path":"/api/v1/admin/keys","purpose":"Status chei tenant (set/last4, niciodata valoarea) + setari captcha"},{"method":"PUT","path":"/api/v1/admin/keys/captcha","purpose":"Seteaza provider + mode captcha pentru tenant"},{"method":"PUT","path":"/api/v1/admin/keys/:field","purpose":"Seteaza/sterge o cheie tenant (anthropic/openai/google/openrouter/twocaptcha/capsolver) cu validare online; 422 INVALID_KEY"},{"method":"GET","path":"/api/v1/admin/users/:id/quota","purpose":"Lista override-uri de cota pentru un user"},{"method":"PUT","path":"/api/v1/admin/users/:id/quota","purpose":"Creeaza/actualizeaza override de cota (feature, period, limitUsdMilli nullable=nelimitat)"},{"method":"DELETE","path":"/api/v1/admin/users/:id/quota/:feature","purpose":"Sterge un override (idempotent, 200 always); userul revine la default"},{"method":"GET","path":"/api/v1/admin/users/:id/grants","purpose":"Lista granturi de buget pentru un user"},{"method":"POST","path":"/api/v1/admin/users/:id/grants","purpose":"Creeaza grant one-shot (extraUsdMilli, expiresAt, reason); 201"},{"method":"DELETE","path":"/api/v1/admin/grants/:id","purpose":"Revoca un grant (idempotent, 200); reason optional"},{"method":"GET","path":"/api/v1/admin/health","purpose":"Health detaliat accesibil adminului logat in mod web (mentionat in index.ts:314)"},{"method":"POST","path":"/api/v1/admin/users","purpose":"Creeaza utilizator individual (roluri creabile din UI: doar Utilizator/Admin); email canonicalizat; re-adaugarea unui cont STERS reactiveaza randul existent (acelasi id)"},{"method":"GET","path":"/api/v1/admin/users/import-template","purpose":"Template XLSX pentru import in masa, generat server-side"},{"method":"POST","path":"/api/v1/admin/users/import","purpose":"Import in masa din XLSX: header exact, aliasuri de rol, dedup in fisier, duplicate DB raportate per rand; cap 500 randuri / 512KB; insert tranzactional totul-sau-nimic"},{"method":"GET","path":"/api/v1/admin/audit/export","purpose":"Raport XLSX al auditului pe interval; 413 peste 10.000 randuri; escape formula-injection inclusiv pe IP; nume fisier datat"},{"method":"GET","path":"/api/v1/admin/quota/overrides","purpose":"Vedere globala: toate override-urile de cota ale tuturor utilizatorilor"},{"method":"GET","path":"/api/v1/admin/grants/active","purpose":"Vedere globala: toate granturile active ale tuturor utilizatorilor"},{"method":"POST","path":"/api/v1/admin/grants/:id/revoke","purpose":"Revoca un grant (acelasi comportament ca DELETE /grants/:id; pastrat pentru simetrie cu ghidul de implementare)"},{"method":"GET","path":"/api/v1/admin/usage/overview","purpose":"Consum agregat per utilizator (AI zilnic/saptamanal/total + captcha), calculat cu ACELEASI functii de citire ca guard-urile de cota"}],"features":[{"name":"AdminGate (poarta de acces UI)","what":"Ascunde intreaga sectiune Admin de cei care nu sunt administratori: in timpul
