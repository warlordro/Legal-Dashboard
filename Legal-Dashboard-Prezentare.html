\" desktop Electron a aplicatiei plus stratul de securitate al backend-ului. El porneste fereastra aplicatiei, lanseaza backend-ul Node in acelasi proces, izoleaza renderer-ul de sistemul de operare (sandbox, fara acces Node) si pune la dispozitie o punte sigura (preload) prin care interfata poate cripta cheile API in seiful sistemului de operare. Tot aici se afla protectiile de retea (limitator de cereri per IP, limite de marime a corpului cererii, blocarea traversarii de cai) si intregul set de variabile de mediu / \"kill switch\"-uri prin care un operator poate opri sau ajusta functii fara recompilare. Pentru utilizatorul avocat, beneficiul concret e o aplicatie care nu pierde cheile, nu se blocheaza la inchidere, nu poate fi pacalita sa navigheze pe site-uri straine si isi pastreaza datele intr-o singura instanta protejata.","routes":["http://localhost:3002 (fereastra Electron incarca SPA-ul servit de backend)","GET /health (probe public, verificat la pornire pentru identitatea backend-ului)","GET /* (servire fisiere statice SPA cu protectie path-traversal)"],"features":[{"name":"Fereastra desktop cu dimensionare dinamica","what":"La pornire aplicatia isi calculeaza marimea ferestrei in functie de monitorul tau (85% latime, 90% inaltime din zona de lucru), cu minim si maxim rezonabile, ca sa nu fie nici prea mica nici sa depaseasca ecranul.","how":"getWindowSize() citeste workAreaSize din ecranul principal; latime = min(85% , 1800px), inaltime = min(90%, 1100px), forteaza minim 900x600. BrowserWindow primeste minWidth/minHeight 900/600.","citations":["electron/main.js:201-213","electron/main.js:331-336"],"settings":"fara setare UI; depinde de rezolutia monitorului"},{"name":"Bara de titlu intunecata personalizata (Windows)","what":"Bara de sus a ferestrei se coloreaza in bleumarin asortat cu aplicatia in loc de negrul nativ Win11, iar la schimbarea temei (intunecat/luminos) bara se actualizeaza instant.","how":"titleBarStyle 'hidden' + titleBarOverlay (color #090E1A, symbolColor #E5E7EB, height 32). IPC 'window:setTheme' seteaza nativeTheme.themeSource si reaplica overlay-ul cu culorile temei efective.","citations":["electron/main.js:343-348","electron/main.js:300-314"],"settings":"tema dark/light/system sincronizata din UI prin desktopApi.setWindowTheme"},{"name":"Pornire backend in-proces + verificare de sanatate","what":"Backend-ul Node porneste in acelasi proces cu aplicatia; fereastra se deschide doar dupa ce /health confirma ca serverul raspunde si chiar este Legal Dashboard (anti-deturnare de port).","how":"startBackend() incarca dist-backend/index.cjs, apoi face polling pe /health la 200ms (cu delay initial 300ms), pana la 30s; valideaza body.service === 'Legal Dashboard API'. La esec arata dialog si inchide.","citations":["electron/main.js:215-267","electron/main.js:193-197","electron/main.js:247"],"settings":"port via LEGAL_DASHBOARD_PORT (default 3002)"},{"name":"Punte sigura preload (window.desktopApi) cu timeout IPC","what":"Interfata web nu are acces direct la sistem; comunica printr-o punte ingusta cu doar cateva functii (criptare/decriptare chei, tema, notificari). Orice apel are timeout de 10s ca aplicatia sa nu inghete niciodata daca procesul principal se blocheaza.","how":"contextBridge.exposeInMainWorld expune encryptKeys, decryptKeys, isEncryptionAvailable, setWindowTheme, getNotificationStatus, showTestNotification, showNotification. invokeWithTimeout face Promise.race intre ipcRenderer.invoke si un timeout de IPC_TIMEOUT_MS=10000ms.","citations":["electron/preload.js:22-33","electron/preload.js:6-14"],"settings":"fara setare; timeout fix 10s"},{"name":"Stocarea cheilor API in seiful OS (safeStorage)","what":"Cheile tale API (AI, captcha) sunt criptate cu seiful sistemului de operare (DPAPI pe Windows, Keychain pe macOS, libsecret pe Linux). Pe disc ajunge doar text criptat; cheia in clar nu atinge niciodata discul.","how":"IPC safeStorage:encrypt/decrypt/available apeleaza safeStorage.encryptString/decryptString. Intrarile sunt plafonate (MAX_PLAINTEXT 8KiB, MAX_CIPHERTEXT_B64 16KiB) si returneaza null la depasire sau cand criptarea nu e disponibila.","citations":["electron/main.js:269-296","electron/main.js:272-273"],"settings":"fara setare; pe web (fara desktopApi) fallback base64 reversibil, NU control de securitate"},{"name":"Single-instance lock (anti-corupere DB)","what":"Nu poti deschide aplicatia de doua ori pe acelasi calculator; a doua lansare doar aduce in fata fereastra existenta. Asta previne coruperea bazei SQLite de scriitori concurenti.","how":"app.requestSingleInstanceLock(); daca esueaza, app.quit()+process.exit(0). Evenimentul 'second-instance' restaureaza si focuseaza fereastra.","citations":["electron/main.js:31-34","electron/main.js:547-552"],"settings":"break-glass: LEGAL_DASHBOARD_FORCE_BOOT=1 pentru reclaim fortat al lock-ului"},{"name":"Crash handlers + drenare backend la inchidere","what":"Erorile neasteptate sunt prinse: cele benigne (pipe rupt) sunt logate si ignorate, cele grave arata un dialog si inchid curat. La iesire, backend-ul (scheduler + SQLite WAL) e drenat inainte ca procesul sa moara, ca sa nu pierzi date.","how":"uncaughtException filtreaza NON_FATAL_CODES (EPIPE, EIO, ECONNRESET, ECONNABORTED); unhandledRejection logheaza. before-quit face preventDefault, ruleaza __legalDashboardShutdown cu plafon BACKEND_SHUTDOWN_TIMEOUT_MS=5000ms, apoi app.quit().","citations":["electron/main.js:49-66","electron/main.js:82-117"],"settings":"timeout shutdown fix 5s"},{"name":"Watchdog event-loop (diagnostic blocaje)","what":"Un mecanism in fundal detecteaza cand procesul principal se blocheaza (ex. stall CPU) si scrie pe disc un raport de diagnostic cu stack-urile, util pentru investigatie post-mortem; secretele din raport sunt sterse.","how":"monitorEventLoopDelay (resolution 100) ruleaza in libuv; polling la POLL_INTERVAL_MS=5000ms, daca max lag > LAG_THRESHOLD_MS=5000ms scrie log (trim la LOG_MAX_LINES=200) + raport JSON (pastrat REPORT_MAX_FILES=20). redactReportSecrets sterge recursiv environmentVariables si header.commandLine, inclusiv din workers[].","citations":["electron/event-loop-watchdog.js:18-21","electron/event-loop-watchdog.js:73-105","electron/event-loop-watchdog.js:132-139"],"settings":"fara setare; scrie in userData/diagnostic"},{"name":"Hardening renderer (webPreferences)","what":"Renderer-ul (interfata web) ruleaza izolat: fara acces Node, izolare de context, sandbox activ, securitate web pornita, iar DevTools este disponibil doar in dezvoltare.","how":"webPreferences: nodeIntegration false, contextIsolation true, sandbox true, webSecurity true, enableRemoteModule false, preload dedicat, devTools = IS_DEV (NODE_ENV !== 'production').","citations":["electron/main.js:351-359","electron/main.js:122"],"settings":"DevTools controlat de NODE_ENV"},{"name":"Navigare restrictionata + whitelist URL extern","what":"Aplicatia refuza sa navigheze in afara propriului localhost si blocheaza ferestrele popup; doar o lista exacta de site-uri guvernamentale poate fi deschisa in browserul extern, doar pe HTTPS.","how":"will-navigate parseaza URL-ul strict (protocol http, host localhost/127.0.0.1, port = BACKEND_PORT, fara user/parola) altfel preventDefault. setWindowOpenHandler returneaza deny; doar ALLOWED_EXTERNAL_DOMAINS (portal.just.ro, www.just.ro, portalquery.just.ro, mj.rnpm.ro, www.rnpm.ro, www.scj.ro) pe https: trec prin shell.openExternal.","citations":["electron/main.js:404-420","electron/main.js:423-442"],"settings":"lista whitelist hardcodata"},{"name":"Content Security Policy (CSP) la nivel de sesiune","what":"Toate raspunsurile incarcate in fereastra primesc o politica de securitate stricta care interzice scripturi externe sau inline, blocand o clasa intreaga de atacuri XSS.","how":"session.defaultSession.webRequest.onHeadersReceived injecteaza Content-Security-Policy: default-src 'self' http://localhost:PORT; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:PORT; img-src 'self' blob:; font-src 'self'; object-src 'none'; frame-ancestors 'none'.","citations":["electron/main.js:525-534"],"settings":"fara setare"},{"name":"Limitator de cereri per IP (rate limit)","what":"Backend-ul limiteaza cate cereri poate face un client pe minut, protejand impotriva buclelor runaway si a abuzului; clientii din spatele aceluiasi NAT au galeti separate per utilizator.","how":"rateLimit: galeata per (ip, ownerId), RATE_LIMIT=120 cereri / RATE_WINDOW=60000ms; ruta /api/ai/analyze-multi consuma weight 3; GET pe /api/rnpm/saved trece liber; fail-closed 503 daca IP-ul lipseste. Limitator pre-auth IP-only PRE_AUTH_LIMIT=60 cereri esuate/min. Sweep idle la SWEEP_INTERVAL_MS=5min.","citations":["backend/src/middleware/rate-limit.ts:10-11","backend/src/middleware/rate-limit.ts:56","backend/src/middleware/rate-limit.ts:122","backend/src/middleware/rate-limit.ts:87"],"settings":"valori hardcodate; cheia IP via readClientIp (socket real, nu X-Forwarded-For)"},{"name":"Limite marime corp cerere (body limits)","what":"Fiecare tip de ruta accepta doar un corp de cerere de o marime maxima, ca un atacator sau un client buggy sa nu poata aloca obiecte uriase.","how":"bodyLimit per ruta: search 64KB, bulk 512KB, small 4KB, AI 100KB, bulk dismiss 256KB; rute monitoring au cap dedicat inainte de parse JSON.","citations":["SECURITY.md:271","CLAUDE.md (Body size limits)"],"settings":"valori per ruta hardcodate"},{"name":"Protectie path-traversal la servirea SPA","what":"Serverul de fisiere statice nu poate fi pacalit sa serveasca fisiere din afara folderului frontend (ex. ../../secret), iar caile API nu cad niciodata pe pagina index.","how":"mountStaticFrontend: cai /api/ sau /health -> 404 JSON; decodeURIComponent cu fallback 400; path.relative(base, target) -> daca incepe cu '..' sau e absolut returneaza 403 Forbidden; altfel fallback SPA la index.html.","citations":["backend/src/middleware/static-frontend.ts:38-58","backend/src/middleware/static-frontend.ts:55-58"],"settings":"extrage automat din app.asar.unpacked daca exista"},{"name":"Zoom initial asortat cu PortalJust","what":"La prima incarcare aplicatia seteaza un nivel de zoom usor micsorat ca dimensiunea vizuala sa semene cu portalul instantelor; dupa ce apesi Ctrl++/Ctrl- preferinta ta persista.","how":"did-finish-load: daca getZoomLevel() === 0 seteaza setZoomLevel(-0.5778829311823857).","citations":["electron/main.js:377-381"],"settings":"fara setare UI; doar bootstrap o singura data"},{"name":"Meniu aplicatie + meniu contextual in romana","what":"Aplicatia are meniu nativ (Fisier/Editare/Vizualizare/Fereastra/Ajutor) si meniu la click-dreapta (Copiaza, Lipeste, Selecteaza tot, Printeaza), totul in romana; Instrumente dezvoltator apar doar in mod dezvoltare.","how":"buildAppMenu construieste template-ul; dialogul Despre afiseaza versiune + Electron/Chromium/Node. context-menu construieste dinamic itemii in functie de selectie/editabil.","citations":["electron/main.js:124-191","electron/main.js:445-478"],"settings":"toggleDevTools doar daca isDev"},{"name":"Icon taskbar + identitate aplicatie (Windows)","what":"Pe Windows aplicatia isi seteaza identitatea (AppUserModelID) si iconita corecta in taskbar, inclusiv un shortcut in Start Menu la rulare in dezvoltare, ca sa nu apara iconita generica Electron.","how":"app.setAppUserModelId(APP_USER_MODEL_ID); ensureDevTaskbarShortcut scrie 'Legal Dashboard (Dev).lnk' cu acelasi AUMID + icon; mainWindow.setIcon dupa creare.","citations":["electron/main.js:18-28","electron/main.js:495-518"],"settings":"fara setare"}],"settings":[{"name":"LEGAL_DASHBOARD_DISABLE_GPU","where":"env var","effect":"Dezactiveaza accelerarea hardware (software rendering) pentru driver GPU instabil; mai lent dar fara ecran negru","options":"1 = activ","default":"neactiv (opt-in)","citations":["electron/main.js:42-44"]},{"name":"LEGAL_DASHBOARD_PORT","where":"env var (setat automat de Electron)","effect":"Portul pe care asculta backend-ul","options":"numar port","default":"3002","citations":["electron/main.js:196-197","SECURITY.md:155"]},{"name":"LEGAL_DASHBOARD_DB_PATH","where":"env var (setat de Electron)","effect":"Calea fisierului SQLite","options":"cale","default":"%APPDATA%/legal-dashboard/legal-dashboard.db","citations":["electron/main.js:218","SECURITY.md:156"]},{"name":"NODE_ENV","where":"env var","effect":"development activeaza DevTools si meniul dev; production le dezactiveaza","options":"production / development","default":"production in Electron","citations":["electron/main.js:122","electron/main.js:217","SECURITY.md:172"]},{"name":"HOST","where":"env var","effect":"Adresa de bind a backend-ului; valorile non-loopback sunt ignorate fara allow-remote","options":"127.0.0.1 / localhost / ::1 / alta (ignorata)","default":"127.0.0.1","citations":["SECURITY.md:153"]},{"name":"LEGAL_DASHBOARD_ALLOW_REMOTE","where":"env var","effect":"Permite bind non-loopback (LAN/web); necesita AUTH_MODE=web + JWT valid altfel boot-ul esueaza","options":"1 = permite","default":"neactiv","citations":["SECURITY.md:154","SESSION-HANDOFF.md:23"]},{"name":"LEGAL_DASHBOARD_AUTH_MODE (alias APP_MODE)","where":"env var","effect":"Selecteaza modul de autentificare; web cere JWT/session semnat, desktop pastreaza identitatea local","options":"desktop / web","default":"desktop","citations":["SECURITY.md:157-158"]},{"name":"LEGAL_DASHBOARD_JWT_SECRET (alias JWT_SECRET)","where":"env var","effect":"Secret pentru semnarea JWT in mod web; minim 32 caractere","options":"string >=32","default":"neactiv (obligatoriu in web)","citations":["SECURITY.md:159"]},{"name":"LEGAL_DASHBOARD_JWT_ISSUER / LEGAL_DASHBOARD_JWT_AUDIENCE","where":"env var","effect":"Issuer si audience JWT; lipsa lor in web mode = eroare fatala la boot","options":"string","default":"neactiv","citations":["SECURITY.md:160"]},{"name":"LEGAL_DASHBOARD_JWT_TTL_SECONDS (alias LEGAL_DASHBOARD_AUTH_TOKEN_TTL_SECONDS)","where":"env var","effect":"Durata de viata a token-ului de sesiune web reimprospatat","options":"interval 60..86400","default":"3600","citations":["SECURITY.md:161-162"]},{"name":"LEGAL_DASHBOARD_AUTH_COOKIE_SECURE","where":"env var","effect":"Forteaza/relaxeaza flag-ul Secure pe cookie; 0 doar pentru test HTTP local","options":"0 / 1","default":"secure in web mode","citations":["SECURITY.md:163"]},{"name":"TENANT_KEY_ENCRYPTION_SECRET","where":"env var","effect":"Master key AES-256-GCM pentru tenant_api_keys; lipsa in web mode opreste boot-ul","options":"base64 decodand exact 32 bytes","default":"neactiv (obligatoriu in web)","citations":["SECURITY.md:164","SESSION-HANDOFF.md:24"]},{"name":"MONITORING_ENABLED","where":"env var","effect":"Activeaza/dezactiveaza rutele si scheduler-ul de monitorizare","options":"0 / 1","default":"1 in Electron","citations":["electron/main.js:221-223","SECURITY.md:165"]},{"name":"MONITORING_DISABLED_KINDS","where":"env var","effect":"Exclude tipuri de joburi din claim-ul scheduler-ului fara modificari in DB","options":"lista separata prin virgula: dosar_soap,name_soap,iccj,aviz_rnpm","default":"neactiv","citations":["SECURITY.md:166","SESSION-HANDOFF.md:15"]},{"name":"ICCJ_ROUTES_DISABLED","where":"env var","effect":"Returneaza 503 pe rutele interactive ICCJ (/api/dosare-iccj, /api/termene-iccj)","options":"1 = activ","default":"neactiv","citations":["SECURITY.md:167"]},{"name":"ICCJ_TIMEOUT_MS / ICCJ_MAX_RESPONSE_BYTES / ICCJ_ENRICH_BUDGET_MS","where":"env var","effect":"Tunabile pentru clientul de scraping scj.ro (timeout per fetch, cap marime raspuns, buget wall-clock enrich)","options":"milisecunde / bytes / milisecunde","default":"30000 / 20971520 / 45000","citations":["SECURITY.md:168"]},{"name":"RNPM_TIMEOUT_MS","where":"env var","effect":"Timeout backstop per-fetch pentru upstream-ul RNPM","options":"milisecunde","default":"60000","citations":["SECURITY.md:169","SESSION-HANDOFF.md (RNPM_TIMEOUT_MS)"]},{"name":"RNPM_RESULTS_FILTER_DISAB "SMTP_SECURE","where":"env var","effect":"Forteaza TLS implicit/explicit pentru SMTP","options":"true / false","default":"port === 465","citations":["SESSION-HANDOFF.md:14"]},{"name":"DAILY_REPORT_HOUR","where":"env var","effect":"Ora locala la care ruleaza scheduler-ul de raport zilnic","options":"0..23","default":"9","citations":["SESSION-HANDOFF.md:27"]},{"name":"LEGAL_DASHBOARD_TRUSTED_PROXY_CIDR","where":"env var (deploy)","effect":"Permite folosirea X-Forwarded-For doar cand peer-ul intra in CIDR-ul proxy-ului de incredere","options":"CIDR","default":"gol pe desktop","citations":["SESSION-HANDOFF.md:20"]},{"name":"LEGAL_DASHBOARD_FORCE_BOOT","where":"env var (break-glass)","effect":"Reclaim fortat al instance lock-ului SQLite cand operatorul confirma manual ca procesul vechi nu ruleaza; audit system.instance_lock.reclaim","options":"1 = activ","default":"neactiv","citations":["SESSION-HANDOFF.md:21"]},{"name":"LEGAL_DASHBOARD_BACKUP_OFFSITE_CMD","where":"env var (operator-trusted)","effect":"Comanda shell rulata dupa backup atomic (offsite); echivalent cu executie de cod la privilegiul OS al backend-ului, fail-open","options":"comanda sh -c / cmd /c","default":"neactiv","citations":["SECURITY.md:185-190"]},{"name":"LEGAL_DASHBOARD_OAUTH2_PROXY_SECRET (fallback OAUTH2_PROXY_SHARED_SECRET)","where":"env var (deploy web)","effect":"Secret partajat pentru bridge-ul /auth/oauth2/sync (X-Proxy-Auth via timingSafeEqual); minim 32 caractere, fail-closed","options":"string >=32","default":"neactiv (bridge_disabled 503)","citations":["SECURITY.md:247"]},{"name":"MIGRATIONS_STRICT","where":"env var (CI)","effect":"Gate CI pentru migrari (self-heal CRLF bidirectional)","options":"1 = activ","default":"neactiv","citations":["SECURITY.md:257"]},{"name":"IPC_TIMEOUT_MS (constanta preload)","where":"cod preload.js","effect":"Timeout pe fiecare apel IPC ca renderer-ul sa nu inghete la blocaj main","options":"milisecunde (fix)","default":"10000","citations":["electron/preload.js:6"]},{"name":"MAX_PLAINTEXT / MAX_CIPHERTEXT_B64 (constante safeStorage)","where":"cod main.js","effect":"Plafon marime intrare pentru criptare/decriptare chei","options":"bytes (fix)","default":"8192 / 16384","citations":["electron/main.js:272-273"]},{"name":"STARTUP_TIMEOUT_MS / HEALTH_POLL_INTERVAL_MS / HEALTH_POLL_INITIAL_DELAY_MS","where":"cod main.js","effect":"Plafon si interval polling pentru confirmarea pornirii backend-ului via /health","options":"milisecunde (fix)","default":"30000 / 200 / 300","citations":["electron/main.js:193-195"]},{"name":"BACKEND_SHUTDOWN_TIMEOUT_MS (constanta main)","where":"cod main.js","effect":"Plafon hard pentru drenarea backend-ului la before-quit","options":"milisecunde (fix)","default":"5000","citations":["electron/main.js:83"]},{"name":"POLL_INTERVAL_MS / LAG_THRESHOLD_MS / LOG_MAX_LINES / REPORT_MAX_FILES (watchdog)","where":"cod event-loop-watchdog.js","effect":"Frecventa polling, prag de stall, trim log si retentie rapoarte pentru watchdog-ul event-loop","options":"fix","default":"5000 / 5000 / 200 / 20","citations":["electron/event-loop-watchdog.js:18-21"]},{"name":"RATE_LIMIT / RATE_WINDOW / PRE_AUTH_LIMIT / SWEEP_INTERVAL_MS (rate-limit)","where":"cod backend rate-limit.ts","effect":"Plafon cereri per (ip,ownerId), fereastra, plafon pre-auth IP-only si interval sweep","options":"fix","default":"120 / 60000ms / 60 / 300000ms","citations":["backend/src/middleware/rate-limit.ts:10-11","backend/src/middleware/rate-limit.ts:122","backend/src/middleware/rate-limit.ts:87"]},{"name":"Body limits per ruta","where":"cod backend (bodyLimit per-ruta)","effect":"Marimea maxima a corpului cererii inainte de parse","options":"search/bulk/small/AI/bulk dismiss","default":"64KB / 512KB / 4KB / 100KB / 256KB","citations":["SECURITY.md:271"]},{"name":"Tema fereastra (dark/light/system)","where":"UI (sincronizat via desktopApi.setWindowTheme)","effect":"Schimba culorile overlay-ului barei de titlu native si nativeTheme.themeSource","options":"dark / light / system","default":"system","citations":["electron/main.js:300-314","electron/preload.js:26"]}],"keyFacts":[{"fact":"Timeout IPC pe fiecare apel preload","value":"10000 ms","citation":"electron/preload.js:6"},{"fact":"Plafon plaintext criptare safeStorage","value":"8 KiB (8192)","citation":"electron/main.js:272"},{"fact":"Plafon ciphertext base64 decriptare","value":"16 KiB (16384)","citation":"electron/main.js:273"},{"fact":"Port backend implicit","value":"3002","citation":"electron/main.js:196"},{"fact":"Timeout pornire backend (/health)","value":"30000 ms","citation":"electron/main.js:193"},{"fact":"Interval polling /health","value":"200 ms","citation":"electron/main.js:194"},{"fact":"Delay initial polling /health","value":"300 ms","citation":"electron/main.js:195"},{"fact":"Timeout drenare backend la inchidere","value":"5000 ms","citation":"electron/main.js:83"},{"fact":"Identitate verificata a backend-ului","value":"service === 'Legal Dashboard API'","citation":"electron/main.js:247"},{"fact":"Dimensiune fereastra (latime/inaltime cap)","value":"85% (max 1800px) / 90% (max 1100px)","citation":"electron/main.js:206-207"},{"fact":"Dimensiune minima fereastra","value":"900 x 600","citation":"electron/main.js:334-335"},{"fact":"Culori overlay bara titlu (dark)","value":"color #090E1A, symbolColor #E5E7EB, height 32","citation":"electron/main.js:344-348"},{"fact":"Zoom initial bootstrap","value":"-0.5778829311823857","citation":"electron/main.js:379"},{"fact":"Coduri erori non-fatale","value":"EPIPE, EIO, ECONNRESET, ECONNABORTED","citation":"electron/main.js:49"},{"fact":"Watchdog polling / prag stall","value":"5000 ms / 5000 ms","citation":"electron/event-loop-watchdog.js:18-19"},{"fact":"Watchdog retentie log / rapoarte","value":"200 linii / 20 fisiere","citation":"electron/event-loop-watchdog.js:20-21"},{"fact":"Rate limit per (ip, ownerId)","value":"120 cereri / 60000 ms","citation":"backend/src/middleware/rate-limit.ts:10-11"},{"fact":"Weight rate-limit /api/ai/analyze-multi","value":"3 unitati","citation":"backend/src/middleware/rate-limit.ts:56"},{"fact":"Limita pre-auth IP-only","value":"60 cereri esuate / min / IP","citation":"backend/src/middleware/rate-limit.ts:122"},{"fact":"Interval sweep entries rate-limit","value":"5 min (300000 ms)","citation":"backend/src/middleware/rate-limit.ts:87"},{"fact":"Prag cleanup inline rate-limit map","value":"1000 intrari","citation":"backend/src/middleware/rate-limit.ts:68"},{"fact":"Body limits per ruta","value":"search 64KB / bulk 512KB / small 4KB / AI 100KB / bulk dismiss 256KB","citation":"SECURITY.md:271"},{"fact":"Whitelist domenii externe (shell.openExternal)","value":"portal.just.ro, www.just.ro, portalquery.just.ro, mj.rnpm.ro, www.rnpm.ro, www.scj.ro","citation":"electron/main.js:423-430"},{"fact":"JWT TTL implicit (web)","value":"3600 s (interval 60..86400)","citation":"SECURITY.md:161"},{"fact":"TENANT_KEY_ENCRYPTION_SECRET dimensiune","value":"exact 32 bytes (base64)","citation":"SECURITY.md:164"},{"fact":"Tunabile ICCJ","value":"timeout 30000ms / cap 20971520 bytes / enrich 45000ms","citation":"SECURITY.md:168"},{"fact":"Timeout fetch RNPM","value":"60000 ms","citation":"SECURITY.md:169"},{"fact":"Ora implicita raport zilnic","value":"9 (DAILY_REPORT_HOUR)","citation":"SESSION-HANDOFF.md:27"},{"fact":"AppUserModelID","value":"ro.legaldashboard.app (packaged) / ro.legaldashboard.dev (dev)","citation":"electron/main.js:18"}],"endpoints":[{"method":"GET","path":"/health","purpose":"Probe public de readiness; verificat la pornire pentru identitatea backend-ului (service === 'Legal Dashboard API'); /api/ si /health nu cad pe fallback SPA"},{"method":"GET","path":"/*","purpose":"Servire fisiere statice SPA cu protectie path-traversal (403 la escape, 400 la decode invalid, fallback index.html)"},{"method":"IPC","path":"safeStorage:available / safeStorage:encrypt / safeStorage:decrypt","purpose":"Criptare/decriptare chei API in seiful OS (DPAPI/Keychain/libsecret) cu plafoane de marime"},{"method":"IPC","path":"window:setTheme","purpose":"Sincronizeaza tema (dark/light/system) cu overlay-ul barei de titlu native"},{"method":"IPC","path":"notification:getStatus / notification:test / notification:show","purpose":"Status si emitere notificari native OS (cu dedup via tag, validat in main)"}],"notes":"Backend-ul ruleaza IN-PROCES cu Electron main (acelasi izolat V8), deci blocajele CPU ale main afecteaza si UI-ul — de aici watchdog-ul event-loop si timeout-ul IPC de 10s (incident real 2026-05-17: stall CPU 1161s aparea fals ca 'API keys disparute'). Watchdog-ul redacteaza recursiv environmentVariables si commandLine din raportul de diagnostic (inclusiv workers[]) pentru ca env-ul poate contine secrete. Limitatorul de cereri foloseste IP-ul socket-ului real via readClientIp, NU X-Forwarded-For (spoofabil), si fail-closed (503) cand IP-ul lipseste. Navigarea foloseste parsare URL stricta (NU startsWith) ca sa blocheze trucuri de tip userinfo (http://localhost:3002@attacker.example/). Modelul de amenintare e single-user desktop: masina si utilizatorul sunt de incredere, alti useri pe LAN NU. In afara scope-ului: cod malitios rulat ca acelasi user OS, supply-chain (npm), binare Windows nesemnate (SmartScreen warning), SOAP HTTP catre portalquery.just.ro. Modul web (LEGAL_DASHBOARD_AUTH_MODE=web) este doar un seam de auth (JWT injectat de IdP extern), NU un produs deploy-ready; /health expone loginAvailable:false. Multe variabile/kill switch-uri sunt strict operationale pentru web si au impact ZERO pe desktop (gateuite pe getAuthMode()==='web').","key":"desktop-security-env"},{"module":"API programatic & PAT","icon":"🔌","overview":"Suprafata API doar-citire care expune dosare + termene (PortalJust), ICCJ (scj.ro) si RNPM catre consumatori externi (scripturi, integrari, server MCP) prin Personal Access Tokens. Disponibila EXCLUSIV in web mode (LEGAL_DASHBOARD_AUTH_MODE=web); pe desktop suprafata PAT nu e montata, deci impa   const $ = (s,r=document)=>r.querySelector(s);
  const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
  const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

  // module accent palette (echoes the real app color-coding)
  const PALETTE = ["#6f8cff","#3b82f6","#d946ef","#a855f7","#f43f5e","#f59e0b","#fbbf24","#fb923c","#10b981","#ef4444","#22d3ee","#14b8a6","#06b6d4","#94a3b8","#84cc16","#eab308","#f472b6"];
  // logical grouping for the sidebar
  const GROUPS = [
    {label:"Module principale", keys:["dashboard","dosare","dosare-ai","termene","iccj","rnpm-search","rnpm-data","captcha"]},
    {label:"Monitorizare & alerte", keys:["monitoring","alerts"]},
    {label:"Setari & AI", keys:["ai-settings","ui-chrome","exports"]},
    {label:"Administrare & sistem", keys:["admin","auth","desktop-security-env","changelog-manual"]}
  ];

  const mods = DATA.modules||[];
  mods.forEach((m,i)=>{ m.accent = m.accent || PALETTE[i%PALETTE.length]; m._id = "mod-"+(m.key||i); });
  const byKey = Object.fromEntries(mods.map(m=>[m.key,m]));

  /* ---- meta ---- */
  $("#ver").textContent = DATA.meta.version||"";

  /* ---- counts ---- */
  const totFeat = mods.reduce((a,m)=>a+(m.features?.length||0),0);
  const totSet  = mods.reduce((a,m)=>a+(m.settings?.length||0),0);
  const totEp   = mods.reduce((a,m)=>a+(m.endpoints?.length||0),0);

  /* ---- HERO ---- */
  const main = $("#main");
  const hero = el("section","hero");
  hero.innerHTML = `
    <div class="eyebrow">Prezentare interactiva · ${esc(DATA.meta.date||"")}</div>
    <h1>Fiecare <em>functie</em> si <em>setare</em>,<br>documentata in detaliu.</h1>
    <p class="lede">${esc(DATA.meta.tagline||"")}</p>
    <div class="meta-chips">
      <span class="chip"><b>${esc(DATA.meta.app||"")}</b> ${esc(DATA.meta.version||"")}</span>
      <span class="chip">AppId · <b>${esc(DATA.meta.appId||"")}</b></span>
      ${(DATA.meta.platforms||[]).map(p=>`<span class="chip">${esc(p)}</span>`).join("")}
    </div>
    <div class="stats">
      <div class="stat" style="--mod:${PALETTE[1]}"><div class="n" data-count="${mods.length}">0</div><div class="l">Module documentate</div></div>
      <div class="stat" style="--mod:${PALETTE[3]}"><div class="n" data-count="${totFeat}">0</div><div class="l">Functii descrise</div></div>
      <div class="stat" style="--mod:${PALETTE[2]}"><div class="n" data-count="${totSet}">0</div><div class="l">Setari & optiuni</div></div>
      <div class="stat" style="--mod:${PALETTE[5]}"><div class="n" data-count="${totEp}">0</div><div class="l">Endpoint-uri API</div></div>
    </div>
    <div class="cov-title">Harta aplicatiei · click pentru a naviga</div>
    <div class="cov-grid">
      ${mods.map(m=>`
        <div class="cov" data-go="${esc(m._id)}" style="--mod:${m.accent}">
          <div class="cv-ico">${esc(m.icon||"•")}</div>
          <div><div class="cv-name">${esc(m.module||m.key)}</div>
          <div class="cv-sub">${(m.features?.length||0)} fn · ${(m.settings?.length||0)} set</div></div>
        </div>`).join("")}
    </div>`;
  main.appendChild(hero);

  /* ---- SECTIONS ---- */
  const mkFeat = (f,accent)=>{
    const parts = [];
    if(f.what) parts.push(`<div class="kv"><div class="k">Ce face</div><div class="v">${esc(f.what)}</div></div>`);
    if(f.how)  parts.push(`<div class="kv"><div class="k">Cum functioneaza</div><div class="v muted">${esc(f.how)}</div></div>`);
    if(f.settings) parts.push(`<div class="kv"><div class="k">Setari legate</div><div class="v muted">${esc(f.settings)}</div></div>`);
    const cites = (f.citations||[]).length?`<div class="cites">${f.citations.map(c=>`<span class="cite">${esc(c)}</span>`).join("")}</div>`:"";
    return `<div class="feat" data-text="${esc((f.name+" "+(f.what||"")+" "+(f.how||"")+" "+(f.settings||"")).toLowerCase())}">
      <div class="feat-head"><span class="dot"></span><span class="fn">${esc(f.name)}</span>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span></div>
      <div class="feat-body"><div><div class="feat-inner">${parts.join("")}${cites}</div></div></div>
    </div>`;
  };
  const mkSet = s=>{
    const optDef = [
      s.options?`<span class="s-opt">${esc(s.options)}</span>`:"",
      s.default?`<br><span class="s-def">implicit: ${esc(s.default)}</span>`:""
    ].join("");
    return `<div class="srow" data-text="${esc((s.name+" "+(s.where||"")+" "+(s.options||"")+" "+(s.effect||"")).toLowerCase())}">
      <div><div class="s-name">${esc(s.name)}</div><div class="s-where">${esc(s.where||"")}</div></div>
      <div class="s-mid">${optDef||'<span class="s-mid">—</span>'}</div>
      <div class="s-eff">${esc(s.effect||"")}</div>
    </div>`;
  };

  mods.forEach(m=>{
    const sec = el("section","section reveal");
    sec.id = m._id; sec.style.setProperty("--mod",m.accent); sec.dataset.key=m.key;
    let html = `
      <div class="sec-head">
        <div class="sec-ico">${esc(m.icon||"•")}</div>
        <div class="sec-titles">
          <div class="sec-kicker">${esc(m.key||"")}</div>
          <h2 class="sec-title">${esc(m.module||m.key)}</h2>
          <div class="routes">${(m.routes||[]).map(r=>`<span class="route">${esc(r)}</span>`).join("")}</div>
        </div>
      </div>
      ${m.overview?`<p class="overview">${esc(m.overview)}</p>`:""}`;

    if(m.features?.length){
      html += `<div class="block-label">Functii <span class="cnt">${m.features.length}</span></div>
        <div class="features">${m.features.map(f=>mkFeat(f,m.accent)).join("")}</div>`;
    }
    if(m.settings?.length){
      html += `<div class="block-label">Setari & optiuni <span class="cnt">${m.settings.length}</span></div>
        <div class="settings-tbl">${m.settings.map(mkSet).join("")}</div>`;
    }
    if(m.endpoints?.length){
      html += `<div class="block-label">Endpoint-uri API <span class="cnt">${m.endpoints.length}</span></div>
        <div class="eps">${m.endpoints.map(e=>`<div class="ep"><span class="m ${esc((e.method||"").toUpperCase())}">${esc(e.method||"")}</span><span class="p">${esc(e.path||"")}</span><span class="pp">${esc(e.purpose||"")}</span></div>`).join("")}</div>`;
    }
    if(m.keyFacts?.length){
      html += `<div class="block-label">Date cheie <span class="cnt">${m.keyFacts.length}</span></div>
        <div class="facts">${m.keyFacts.map(k=>`<div class="fact"><div class="fv">${esc(k.value)}</div><div class="ff">${esc(k.fact)}</div>${k.citation?`<div class="fc">${esc(k.citation)}</div>`:""}</div>`).join("")}</div>`;
    }
    if(m.notes){
      html += `<div class="callout"><span class="ci">${esc(m.icon||"⚖")}</span><div class="ct">${esc(m.notes)}</div></div>`;
    }
    sec.innerHTML = html;
    main.appendChild(sec);
  });

  /* ---- SIDEBAR ---- */
  const nav = $("#sidenav");
  GROUPS.forEach(g=>{
    const present = g.keys.filter(k=>byKey[k]);
    if(!present.length) return;
    nav.appendChild(el("div","nav-group",g.label));
    present.forEach(k=>{
      const m = byKey[k];
      const link = el("div","nav-link",`<span class="ico">${esc(m.icon||"•")}</span><span>${esc(m.module||k)}</span>`);
      link.style.setProperty("--mod",m.accent);
      link.dataset.go = m._id;
      nav.appendChild(link);
    });
  });
  // any module not in a group → append at end
  const grouped = new Set(GROUPS.flatMap(g=>g.keys));
  const leftover = mods.filter(m=>!grouped.has(m.key));
  if(leftover.length){
    nav.appendChild(el("div","nav-group","Altele"));
    leftover.forEach(m=>{
      const link = el("div","nav-link",`<span class="ico">${esc(m.icon||"•")}</span><span>${esc(m.module||m.key)}</span>`);
      link.style.setProperty("--mod",m.accent); link.dataset.go=m._id; nav.appendChild(link);
    });
  }

  /* ---- NAV / SCROLL ---- */
  document.addEventListener("click",e=>{
    const go = e.target.closest("[data-go]");
    if(go){ const t=$("#"+go.dataset.go); if(t){ t.scrollIntoView({behavior:"smooth",block:"start"}); } }
    const fh = e.target.closest(".feat-head");
    if(fh){ fh.parentElement.classList.toggle("open"); }
  });

  const links = [...nav.querySelectorAll(".nav-link")];
  const linkFor = id => links.find(l=>l.dataset.go===id);
  const spy = new IntersectionObserver(es=>{
    es.forEach(en=>{
      if(en.isIntersecting){
        links.forEach(l=>l.classList.remove("active"));
        const a = linkFor(en.target.id); if(a){a.classList.add("active");
          a.scrollIntoView({block:"nearest"});}
      }
    });
  },{rootMargin:"-45% 0px -50% 0px",threshold:0});
  mods.forEach(m=>{const s=$("#"+m._id); if(s)spy.observe(s);});

  /* ---- reveal on scroll ---- */
  const rev = new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); rev.unobserve(en.target);} });
  },{rootMargin:"0px 0px -8% 0px",threshold:.04});
  document.querySelectorAll(".reveal").forEach(n=>rev.observe(n));

  /* ---- count-up ---- */
  document.querySelectorAll("[data-count]").forEach(n=>{
    const target=+n.dataset.count; if(!target){n.textContent="0";return;}
    let cur=0; const step=Math.max(1,Math.round(target/38));
    const t=setInterval(()=>{cur+=step; if(cur>=target){cur=target;clearInterval(t);} n.textContent=cur;},20);
  });

  /* ---- progress ---- */
  const prog=$("#progress");
  addEventListener("scroll",()=>{
    const h=document.documentElement; const sc=h.scrollTop/(h.scrollHeight-h.clientHeight||1);
    prog.style.width=(sc*100).toFixed(1)+"%";
  },{passive:true});

  /* ---- search ---- */
  const search=$("#search"), noRes=$("#noResults");
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  let lastTerm="";
  const doSearch=()=>{
    const raw=search.value.trim(); const q=norm(raw);
    if(q===lastTerm) return; lastTerm=q;
    if(!q){
      document.body.classList.remove("searching");
      document.querySelectorAll(".hide-item,.hide-sec").forEach(n=>n.classList.remove("hide-item","hide-sec"));
      document.querySelectorAll(".feat.search-open").forEach(n=>{n.classList.remove("open","search-open");});
      noRes.classList.remove("show");
      unmark();
      return;
    }
    document.body.classList.add("searching");
    let anySec=false;
    mods.forEach(m=>{
      const sec=$("#"+m._id); if(!sec)return;
      let hit=0;
      sec.querySelectorAll(".feat").forEach(f=>{
        const match=norm(f.dataset.text||"").includes(q);
        f.classList.toggle("hide-item",!match);
        if(match){hit++; if(!f.classList.contains("open")){f.classList.add("open","search-open");}}
        else if(f.classList.contains("search-open")){f.classList.remove("open","search-open");}
      });
      sec.querySelectorAll(".srow").forEach(r=>{
        const match=norm(r.dataset.text||"").includes(q);
        r.classList.toggle("hide-item",!match); if(match)hit++;
      });
      const titleMatch=norm(m.module+" "+m.key).includes(q);
      const show=hit>0||titleMatch;
      sec.classList.toggle("hide-sec",!show);
      if(show)anySec=true;
    });
    noRes.classList.toggle("show",!anySec);
    mark(raw);
  };
  let unmark=()=>{};
  function mark(term){
    unmark();
    if(!term)return;
    const rx=new RegExp("("+term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    const touched=[];
    document.querySelectorAll(".section:not(.hide-sec) .feat:not(.hide-item) .fn, .section:not(.hide-sec) .feat:not(.hide-item) .v, .section:not(.hide-sec) .srow:not(.hide-item) .s-name, .section:not(.hide-sec) .srow:not(.hide-item) .s-eff").forEach(node=>{
      if(node.querySelector("mark"))return;
      const orig=node.innerHTML;
      if(rx.test(node.textContent)){ node.innerHTML=node.innerHTML.replace(rx,"<mark>$1</mark>"); touched.push([node,orig]); }
    });
    unmark=()=>{touched.forEach(([n,o])=>n.innerHTML=o); unmark=()=>{};};
  }
  let st; search.addEventListener("input",()=>{clearTimeout(st);st=setTimeout(doSearch,110);});
  search.addEventListener("keydown",e=>{if(e.key==="Escape"){search.value="";doSearch();search.blur();}});

  /* ---- expand all ---- */
  let allOpen=false;
  $("#expandAll").addEventListener("click",()=>{
    allOpen=!allOpen;
    document.querySelectorAll(".feat").forEach(f=>f.classList.toggle("open",allOpen));
  });

  /* ---- theme ---- */
  const root=document.documentElement, themeBtn=$("#themeBtn");
  const saved=localStorage.getItem("ld-theme"); if(saved)root.dataset.theme=saved;
  const sunMoon=()=>{
    const dark=root.dataset.theme!=="light";
    $("#themeIco").innerHTML = dark
      ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>'
      : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  };
  sunMoon();
  themeBtn.addEventListener("click",()=>{
    root.dataset.theme = root.dataset.theme==="light"?"dark":"light";
    localStorage.setItem("ld-theme",root.dataset.theme); sunMoon();
  });

  /* ---- print ---- */
  $("#printBtn").addEventListener("click",()=>{
    document.querySelectorAll(".feat").forEach(f=>f.classList.add("open")); print();
  });

  /* ---- keyboard ---- */
  addEventListener("keydown",e=>{
    if(e.key==="/"&&document.activeElement!==search){e.preventDefault();search.focus();}
    else if(e.key==="t"&&document.activeElement!==search){themeBtn.click();}
  });

  /* ---- footer ---- */
  $("#foot").innerHTML = `<b>${esc(DATA.meta.app||"Legal Dashboard")}</b> · ${esc(DATA.meta.version||"")} · ${esc(DATA.meta.date||"")}
    <div class="fl">${(DATA.meta.stack||[]).map(esc).join("  ·  ")}</div>
    <div class="fl">Prezentare generata din codul sursa · ${mods.length} module · ${totFeat} functii · ${totSet} setari</div>`;
})();
</script>
</body>
</html>
